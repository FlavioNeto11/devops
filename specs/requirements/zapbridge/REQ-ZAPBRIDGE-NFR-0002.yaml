id: REQ-ZAPBRIDGE-NFR-0002
slug: req-zapbridge-nfr-0002
title: Single-writer — 1 réplica Recreate sobre SQLite/PVC RWO (nunca escalar horizontal)
type: non-functional
status: approved
owner: plataforma-digital
scope:
  product_scope: zapbridge
  applies_to: product
statement: 'O sistema deve preservar a integridade do estado single-writer: o zapbridge-server roda com EXATAMENTE 1 réplica e strategy Recreate — o socket Baileys mantém estado em memória, o PVC é RWO e o SQLite é single-writer (duas instâncias gravando = corrupção). Dados transacionais (SQLite), credenciais Baileys (AUTH_DIR) e mídia (MEDIA_DIR) sobrevivem a restart/rollout via PVC; a janela breve de indisponibilidade do Recreate é uma limitação ACEITA do desenho (operador único). Escalabilidade horizontal está explicitamente fora do escopo.'
