quality_scenarios:
  - source: Rollout de nova imagem ou restart do pod zapbridge-server
    stimulus: O Deployment recria o pod (strategy Recreate) durante operação normal
    environment: Cluster ns apps (Docker Desktop), PVC RWO montado em /data (SQLite + auth Baileys + mídia)
    artifact: Deployment zapbridge-server + PVC de dados
    response: Nunca existem 2 pods gravando ao mesmo tempo; o pod novo religa as sessões Baileys e reabre o SQLite (WAL) sem corrupção; conversas/credenciais/mídia preservadas
    response_measure: replicas=1 e strategy=Recreate nos manifests; zero corrupção de banco pós-rollout; sessão WhatsApp restaurada sem novo QR quando as credenciais seguem válidas
