statement: O sistema deve servir em /zapbridge uma SPA web React 18 + Vite + Tailwind + React Router (base /zapbridge, nginx) com shell responsivo — 1 coluna no mobile e 2 colunas estilo WhatsApp Web no desktop — cobrindo login/registro, conectar (QR/pairing), lista de conversas + painel de chat, contatos, assistente de IA e configurações (tema sistema/claro/escuro, desconectar WhatsApp, apagar dados); um service worker kill-switch (public/sw.js) desregistra o SW do app Expo antigo e limpa caches para migrar instalações/PWAs existentes ao app novo. O app Expo legado permanece no repo (apps/zapbridge/app) porém aposentado do deploy.
business_rationale: A reescrita web pura substituiu o app Expo no ar sem quebrar quem já tinha o PWA antigo instalado.
