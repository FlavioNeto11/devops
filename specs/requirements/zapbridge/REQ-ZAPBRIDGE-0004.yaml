id: REQ-ZAPBRIDGE-0004
slug: req-zapbridge-0004
title: Mensageria completa em tempo real (Socket.IO, envio otimista, recibos, reações)
type: functional
status: approved
owner: plataforma-digital
scope:
  product_scope: zapbridge
  applies_to: product
statement: O sistema deve oferecer a experiência completa de mensageria — lista de conversas ordenada por última atividade com prévia, badge de não lidas e busca; conversa com histórico paginado, envio otimista (pending→sent→delivered/read pelo ack, com erro visível e reenvio), resposta citada (quoted), reações, indicador de digitação, arquivar/trancar conversa e marcar como lida — com atualização em tempo real via Socket.IO autenticado por JWT (room user:<id>, eventos message.received/message.sent/message.status.updated/chat.updated etc.) atrás do subpath /zapbridge/socket.io.
business_rationale: O valor do produto é uma experiência fluida e estável de leitura/resposta em tempo real, equivalente ao WhatsApp Web.
