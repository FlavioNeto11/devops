statement: O sistema deve enviar mídia (imagem, vídeo, áudio, documento) por upload do cliente e receber mídia das conversas baixando-a do WhatsApp (downloadMediaMessage) para MEDIA_DIR (PVC), servindo os arquivos ao cliente por rota autenticada de mídia; a UI exibe preview de imagem, player de vídeo/áudio e abertura de documento, e mídia indisponível/expirada é marcada expired e comunicada claramente.
business_rationale: Conversa real inclui mídia — sem download/entrega confiável a experiência quebra.
