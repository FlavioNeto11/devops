id: REQ-ZAPBRIDGE-0003
slug: req-zapbridge-0003
title: Sincronização e persistência local de conversas (SQLite/Prisma, persist-before-emit)
type: functional
status: approved
owner: plataforma-digital
scope:
  product_scope: zapbridge
  applies_to: product
statement: O sistema deve sincronizar contatos, chats, grupos e mensagens a partir dos eventos Baileys (contacts.upsert, chats.set/upsert, messages.upsert) com upsert no SQLite via Prisma (PVC), persistindo toda mensagem ANTES de qualquer emissão ao cliente; o backend continua recebendo e persistindo com o app fechado, e ao reabrir o cliente busca deltas via REST e religa o tempo real. Inclui paginação do histórico por cursor, carga de mensagens antigas sob demanda e rotinas de reparo (timestamps/duplicatas).
business_rationale: A verdade das conversas vive no backend — o cliente pode cair, fechar ou trocar de aparelho sem perder histórico.
