id: REQ-ZAPBRIDGE-0009
slug: req-zapbridge-0009
title: Assistente RAG + KB PME + agente com confirmação + auto-resposta com guardrails
type: functional
status: approved
owner: plataforma-digital
scope:
  product_scope: zapbridge
  applies_to: product
statement: 'O sistema deve oferecer, sob o mesmo consentimento de IA: (a) assistente "pergunte ao seu WhatsApp" ancorado no histórico via grafo do ai-core (router→ReAct→judge) com tools de leitura (list_chats, get_recent_messages, search_history_semantic, search_knowledge, get_messages_by_time); (b) base de conhecimento PME com ingestão de catálogo/FAQ/preços (texto/PDF/docx via file-ingest) e remoção por fonte; (c) agente com ações mutantes (send_message, react, mark_read) que rodam em dry-run e SÓ executam após confirmação humana via token HMAC (POST /ai/confirm) — nada altera o WhatsApp sem o usuário tocar Confirmar; (d) auto-resposta inteligente opt-in POR CHAT, FAQ-grounded, com judge-gate, janela de horário, limite por chat e handoff humano — nunca em grupos e sempre marcada como automática; (e) compreensão de mídia (descrever imagem/OCR/resumir PDF) apenas sob ação explícita; (f) expurgo total dos dados de IA no disconnect da sessão e via /ai/data/purge.'
business_rationale: Eleva a IA de assistente passivo a agente útil para PME sem abrir mão do controle humano — o clique É o envio.
