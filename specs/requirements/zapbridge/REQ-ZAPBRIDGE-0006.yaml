statement: O sistema deve listar os contatos conhecidos da sessão (nome/pushName/avatar quando disponíveis), permitir iniciar/abrir conversa a partir de um contato, listar grupos com metadados (assunto, descrição) e exibir participantes de grupo com indicação de admin quando disponíveis via groupMetadata.
business_rationale: Contatos e grupos são o índice humano das conversas — sem eles a lista vira só JIDs.
