id: REQ-ZAPBRIDGE-0008
slug: req-zapbridge-0008
title: IA assistiva opt-in (consentimento, smart replies, reescrita, resumo, busca, memória)
type: functional
status: approved
owner: plataforma-digital
scope:
  product_scope: zapbridge
  applies_to: product
statement: 'O sistema deve oferecer uma camada de IA estritamente opt-in com consentimento versionado (sem ai_consent nenhuma rota /ai/* processa e nada é enviado a LLM/embeddings): sugestões de resposta (1–3 chips que preenchem sem enviar), reescrita inline do rascunho (melhorar/encurtar/formalizar/traduzir — troca só após escolha do usuário), resumo efêmero de conversa, busca semântica no histórico indexado e memória de estilo/fatos com TTL, revisável e apagável. A indexação usa embeddings em Postgres/pgvector dedicado (zapbridge-postgres), com reindex/backfill sob demanda; grupos ficam fora por padrão e conversa trancada (locked) é excluída da IA.'
business_rationale: IA como assistente do dono da conta — acelera resposta e busca sem jamais agir sozinha nem vazar dados sem consentimento.
