id: REQ-STOCKPILOT-0003
title: "Processamento assíncrono de pedidos com idempotência e resilência"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: stockpilot
  blueprint: node-api-vue-spa
statement: "O sistema DEVE disparar criação de pedidos de reposição automaticamente quando estoque fica abaixo do mínimo, enfileirando de forma assíncrona, idempotente e resiliente com retry, timeout e backoff, garantindo que não há duplicação."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/stockpilot/product.json"]
priority: critical
criticality: medium
architectural_significance: true
capability_blocks: ["worker-queue-transacional", "idempotencia"]
acceptance_criteria:
  - "Tabela de jobs (pedido_reposicao) com colunas: id, tenant_id, produto_id, job_key (UNIQUE), tentativas, proxima_execucao, status (pending/processing/done/failed), erro_mensagem, created_at, updated_at"
  - "Função SQL que dispara sempre que estoque_atual < estoque_minimo de um produto"
  - "Job criado com job_key = hash(tenant_id, produto_id, timestamp_intervalo) → deduplicação automática"
  - "Worker consome jobs com FOR UPDATE SKIP LOCKED (claim transacional)"
  - "Retry automático com backoff exponencial: 1s, 2s, 4s, ..., máx 3 tentativas"
  - "Timeout por job: 30s; se exceder, job retorna ao estado pending para retry"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
