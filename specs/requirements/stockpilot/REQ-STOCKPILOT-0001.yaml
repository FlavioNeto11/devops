id: REQ-STOCKPILOT-0001
title: "Fundação: Arquitetura em camadas + Observabilidade integral"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product-foundation
  product_scope: stockpilot
  blueprint: node-api-vue-spa
statement: "O sistema DEVE ser construído sobre arquitetura em camadas rígidas (route → service → repository → worker → gateway) com observabilidade por padrão (health checks, métricas Prometheus, ServiceMonitor, alertas SLO e dashboard Grafana)."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/stockpilot/product.json"]
priority: critical
criticality: critical
architectural_significance: true
capability_blocks: ["camadas-rigidas", "migrations-versionadas", "observabilidade"]
acceptance_criteria:
  - "Rotas mapeiam apenas HTTP e validam entrada; nenhuma rota acessa banco ou rede externa diretamente"
  - "Toda regra de negócio vive em services; todo SQL vive em repositories"
  - "Trabalho assíncrono isolado em workers"
  - "Chamadas HTTP externas delegadas a gateways"
  - "GET /health retorna status de sistema, workers e jobs com código HTTP apropriado"
  - "GET /v1/health/{system,workers,jobs} disponível para scraping"
verification_method: [test-integration]
