id: REQ-STOCKPILOT-0006
title: "API em contract-first (OpenAPI) com validação no CI"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: stockpilot
  blueprint: node-api-vue-spa
statement: "O sistema DEVE definir sua superfície HTTP via OpenAPI canônico com tipos gerados automaticamente e validação em CI, de forma que mudanças de rota sejam auditáveis e sincronizadas com exemplos e testes."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/stockpilot/product.json"]
priority: high
criticality: medium
architectural_significance: true
capability_blocks: ["contract-openapi"]
acceptance_criteria:
  - "Arquivo openapi.yaml contém definição completa de endpoints: GET /api/v1/estoque/dashboard, POST /api/v1/pedidos, GET /api/v1/pedidos, etc."
  - "Cada endpoint documenta: operationId, tags, parameters, requestBody, responses com exemplos"
  - "CI rodar validate:openapi que verifica sintaxe OpenAPI + tipos gerados"
  - "Tipos TypeScript gerados a partir de OpenAPI (gen:operations) em src/generated/"
  - "Rotas implementam contratos gerados (interface gerada impõe schema de request/response)"
  - "Toda mudança de rota atualiza openapi.yaml no mesmo PR"
