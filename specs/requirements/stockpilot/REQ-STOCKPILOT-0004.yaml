id: REQ-STOCKPILOT-0004
title: "Integração com fornecedor externo via gateway com auditoria"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: stockpilot
  blueprint: node-api-vue-spa
statement: "O sistema DEVE submeter pedidos de reposição a um fornecedor externo via gateway centralizado com timeout, retry com backoff, redação de segredos em log, erros tipados (AppError) e trilha de auditoria completa das trocas."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/stockpilot/product.json"]
priority: critical
criticality: medium
architectural_significance: true
capability_blocks: ["gateway-externo"]
acceptance_criteria:
  - "Gateway de submissão isolado em gateways/fornecedor-gateway.ts"
  - "Requisição HTTP para API de fornecedor (POST /api/pedidos) com timeout configurável (padrão 10s)"
  - "Retry com backoff: 1s, 2s, 4s, ..., máx 3 tentativas"
  - "Segredos (API key, token) redatados em logs e alertas (LOG.info substitui token por ****)"
  - "Erros retornam AppError tipado: { code, message, statusCode, originalError (stack não logado) }"
  - "Tabela auditoria_gateway: id, tenant_id, operacao (ex.: 'submeter_pedido'), status (success/failure), request_payload (sanitizado), response_payload, tempo_resposta_ms, timestamp"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
