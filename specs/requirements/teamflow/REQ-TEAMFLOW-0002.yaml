id: REQ-TEAMFLOW-0002
title: "Processamento assíncrono via Redis/BullMQ (submit → worker)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: teamflow
  blueprint: gymops-style
statement: "O TeamFlow deve processar trabalho assíncrono via fila Redis/BullMQ: POST /v1/records/:id/submit enfileira um job e um worker BullMQ o processa em segundo plano, atualizando o status do registro, com degradação graciosa quando não há Redis."
business_rationale: "Operação de equipes gera trabalho em lote/assíncrono; a fila Redis/BullMQ é o padrão da stack gymops para isso (distinta da fila transacional do SICAT)."
source:
  origin: "FORGE — gerador gymops-style (prova da 2ª stack)"
  source_paths: ["specs/products/teamflow/product.json"]
priority: high
criticality: high
architectural_significance: true
capability_blocks: ["redis-bullmq"]
acceptance_criteria:
  - "POST /v1/records/:id/submit enfileira (enqueued=true) e o worker BullMQ leva o registro a 'submitted'."
  - "GET /v1/health/queue reporta a conexão com o Redis e as contagens da fila."
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
