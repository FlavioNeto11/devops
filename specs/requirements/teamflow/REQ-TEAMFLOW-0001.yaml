id: REQ-TEAMFLOW-0001
title: "Fundação Fastify + RBAC multi-tenant + observabilidade"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product-foundation
  product_scope: teamflow
  blueprint: gymops-style
statement: "O TeamFlow deve existir como app gymops-style (Fastify + Postgres + worker) com RBAC multi-tenant (papéis em cascata admin>manager>member, deny por padrão; isolamento por tenant_id) e observabilidade por padrão (métricas :9464 + ServiceMonitor + SLO)."
business_rationale: "Base do produto: sem fundação, RBAC e isolamento por tenant nenhuma operação multiequipe é segura; observabilidade é padrão da esteira."
source:
  origin: "FORGE — gerador gymops-style (prova da 2ª stack)"
  source_paths: ["specs/products/teamflow/product.json"]
priority: critical
criticality: critical
architectural_significance: true
capability_blocks: ["camadas-rigidas", "migrations-versionadas", "rbac-multitenant", "observabilidade"]
acceptance_criteria:
  - "GET /teamflow/api/health responde 200 (Fastify + db)."
  - "RBAC: member não pode deletar (403); admin pode (200). Cross-tenant não vê o recurso (404)."
  - "Métricas teamflow_* na :9464 raspadas (ServiceMonitor UP)."
verification_method: [test-integration]
version:
