statement: Recorder must enable CDP Page.startScreencast (JPEG, quality 55, every 2nd frame) to stream browser canvas to frontend over WebSocket. Frontend must be able to inject mouse events (move, click, wheel) and keyboard input (chars via insertText, control keys via dispatchKeyEvent) back to the browser.
