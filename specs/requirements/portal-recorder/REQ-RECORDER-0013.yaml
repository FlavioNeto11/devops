statement: Normalization must infer observational JSON schema from request/response bodies. Schema must identify required fields (present in all samples), optional fields, data types, and mark sensitive properties (regex match on password, token, cookie, cpf, cnpj, email, recaptcha, authorization). Array types must be detected and recursively inferred.
