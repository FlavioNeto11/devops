statement: "All frontend (/portal-rec), API (/portal-rec/api), and streaming (/portal-rec/stream) routes must require OIDC login via Keycloak. Frontend redirects anonymous users with 302 (console-auth-redirect middleware). API/stream return 401 for anonymous (console-auth-401 middleware). Cross-namespace allowCrossNamespace: true. Bearer token is defensa-em-profundidad for writes (separate from OIDC session)."
