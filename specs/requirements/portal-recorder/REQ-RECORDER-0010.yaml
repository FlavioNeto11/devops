id: REQ-RECORDER-0010
slug: req-recorder-0010
title: Bearer token auth for write operations (fail-closed)
type: functional
status: approved
owner: plataforma-digital
scope:
  product_scope: portal-recorder
  applies_to: product
statement: "All write operations (POST/DELETE on portals, sessions, annotations, screenshots, normalize) must require Authorization: Bearer <PORTAL_REC_TOKEN> header. If PORTAL_REC_TOKEN env var is not configured, all writes must return 503 WRITES_DISABLED (fail-closed, never open by accident). Token comparison must use constant-time comparison to prevent timing attacks."
