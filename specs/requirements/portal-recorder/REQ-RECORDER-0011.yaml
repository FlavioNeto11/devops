statement: "API must communicate with Recorder service using separate RECORDER_INTERNAL_TOKEN (not the same as PORTAL_REC_TOKEN). Recorder exposes internal HTTP on port 8090 (not routed via Traefik) and WebSocket stream on port 8091. Best-effort calls: if Recorder unavailable, session creation continues in 'created' status and frontend can retry."
