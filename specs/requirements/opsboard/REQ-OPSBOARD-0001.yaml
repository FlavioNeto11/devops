id: REQ-OPSBOARD-0001
title: "Endpoint de estatísticas de registros (GET /v1/records/stats)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: opsboard
  blueprint: node-api-vue-spa
statement: "O OpsBoard deve expor GET /v1/records/stats que retorna o total de registros e a contagem por status (open, submitting, submitted, failed) do tenant corrente, para alimentar um painel de operações sem o cliente precisar paginar todos os registros."
business_rationale: "Um painel de operações precisa de contagens agregadas por status. Calcular no cliente exigiria baixar todos os registros (não escala). Uma agregação no servidor (GROUP BY status) entrega o número direto e respeitando o isolamento por tenant."
source:
  origin: "FORGE — evolução do produto opsboard (gerado pela esteira)"
  source_paths: ["specs/products/opsboard/product.json"]
priority: high
criticality: medium
architectural_significance: false
capability_blocks: ["camadas-rigidas", "observabilidade"]
acceptance_criteria:
  - "GET /v1/records/stats responde 200 com JSON { total, byStatus } onde byStatus traz a contagem por cada status presente (open, submitting, submitted, failed)."
  - "A rota /v1/records/stats é resolvida ANTES de /v1/records/:id (a palavra 'stats' não é tratada como id e não retorna 404)."
  - "A agregação respeita o tenant (WHERE tenant_id = req.tenantId), como os demais endpoints de records."
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
