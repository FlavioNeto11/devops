id: REQ-CRM-0001
title: "Fundação do app CRM-lite (scaffold, layout, health, auth básica)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product-foundation
  product_scope: crm
  blueprint: node-api-vue-spa
statement: "O CRM-lite deve existir como aplicação no padrão da plataforma (frontend Vue em /crm sem strip, API Node/Express em /crm/api com strip, worker, Postgres), com health em cada serviço, layout base navegável (cabeçalho + menu: Contatos, Empresas, Negócios, Painel) e autenticação básica por sessão."
business_rationale: "Sem a fundação (estrutura, roteamento, banco, layout e auth) nenhum recurso de negócio pode ser construído. Este é o requisito de scaffold do produto."
source:
  origin: "FORGE — brief do produto"
  source_paths: ["specs/products/crm/product-brief.md"]
priority: critical
criticality: critical
architectural_significance: true
acceptance_criteria:
  - "GET /crm/api/health responde 200 {status:ok} e o frontend responde 200 em /crm/."
  - "O layout base mostra o menu com Contatos, Empresas, Negócios e Painel, navegável."
  - "Existe login básico por sessão (usuário seed) protegendo as telas; logout funciona."
verification_method: [test-integration, demo]
version:
  baseline_version: "1.0.0"
  item_revision: 1
