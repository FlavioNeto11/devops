id: REQ-CRM-0004
title: "CRUD de empresas (API + tela) com vínculo de contatos"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product
  product_scope: crm
statement: "O operador deve criar, listar (com busca), ver, editar e remover empresas pela tela /crm/empresas, consumindo /crm/api/companies. A tela de detalhe de uma empresa mostra os contatos vinculados a ela. Uma empresa tem nome, segmento e site."
business_rationale: "Empresas organizam os contatos e os negócios; o operador precisa gerenciá-las e ver quem trabalha em cada uma."
source:
  origin: "FORGE — brief do produto"
  source_paths: ["specs/products/crm/product-brief.md"]
priority: high
criticality: medium
architectural_significance: false
acceptance_criteria:
  - "API: GET/POST/GET:id/PUT:id/DELETE:id em /api/companies com validação; lista aceita ?q=."
  - "Tela /crm/empresas lista, busca, cria, edita e remove; o detalhe mostra os contatos da empresa."
  - "Remover uma empresa com contatos/negócios trata o vínculo (set null ou bloqueio com mensagem clara)."
verification_method: [test-integration, test-e2e]
links:
