id: REQ-CRM-0002
title: "Modelo de dados e persistência (empresas, contatos, negócios)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product
  product_scope: crm
statement: "O CRM-lite deve persistir em Postgres as entidades companies, contacts e deals, com migrations versionadas e um seed inicial. contacts referencia companies (opcional); deals referencia contacts/companies e tem um estágio (lead, qualified, proposal, won, lost) e um valor."
business_rationale: "É a base de dados sobre a qual os CRUDs e o funil operam. Sem schema/migrations/seed, nada se persiste."
source:
  origin: "FORGE — brief do produto"
  source_paths: ["specs/products/crm/product-brief.md"]
priority: critical
criticality: high
architectural_significance: true
acceptance_criteria:
  - "Migrations criam as tabelas companies, contacts (FK opcional p/ companies) e deals (FK p/ contacts/companies, stage enum, amount numérico, timestamps)."
  - "Um seed insere ao menos 2 empresas, 3 contatos e 2 negócios de exemplo."
  - "A API expõe a conexão com o banco e as migrations rodam no boot (idempotente)."
verification_method: [test-integration]
links:
  - { type: depends_on, target: REQ-CRM-0001, note: "precisa da fundação (scaffold + Postgres)" }
version:
  baseline_version: "1.0.0"
  item_revision: 1
