id: REQ-CRM-0005
title: "Funil de negócios (deals) + painel"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product
  product_scope: crm
statement: "O operador deve gerenciar negócios (deals) num funil de estágios (lead, qualified, proposal, won, lost) pela tela /crm/negocios (consumindo /crm/api/deals), movendo um negócio entre estágios e associando-o a um contato/empresa e a um valor. O Painel (/crm/) mostra totais por estágio e os últimos negócios."
business_rationale: "O funil é o coração do acompanhamento comercial; o painel dá ao gestor a visão imediata da operação."
source:
  origin: "FORGE — brief do produto"
  source_paths: ["specs/products/crm/product-brief.md"]
priority: high
criticality: high
architectural_significance: false
acceptance_criteria:
  - "API: CRUD em /api/deals + endpoint para mudar o estágio; um deal tem título, valor, estágio, contato e empresa."
  - "Tela /crm/negocios lista por estágio e permite criar/editar/mover um negócio entre estágios."
  - "O Painel mostra a contagem e o valor somado por estágio e a lista dos últimos negócios."
verification_method: [test-integration, test-e2e, demo]
links:
  - { type: depends_on, target: REQ-CRM-0002, note: "modelo de dados" }
  - { type: depends_on, target: REQ-CRM-0003, note: "contatos para associar" }
  - { type: depends_on, target: REQ-CRM-0004, note: "empresas para associar" }
version:
  baseline_version: "1.0.0"
  item_revision: 1
