scope:
  applies_to: capability
  product_scope: neuroevolui
  blueprint: gymops-style
statement: "O sistema DEVE permitir registrar e acessar registros de evolução de pacientes (notas clínicas, resultados de testes, planos de intervenção) de forma estruturada, com suporte a anexos, versioning de documentos e geração de relatórios consolidados."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
