quality_scenarios:
  - source: Operação concorrente tentando atualizar manifesto
    stimulus: Dois workers ou requests tentam atualizar status do mesmo manifesto simultaneamente
    environment: Postgres 16 com advisory locks em migration; coluna version em manifests, jobs, session_contexts
    artifact: Update falha com constraint violation se version não corresponder; client lê versão atual e reapresenta com versão correta
    response: Transação é rollback; client recebe 409 Conflict ou retry automático via idempotência; garantia de ACID sem deadlock
    response_measure: Zero deadlocks observados em 24h de operação; conflitos de versão resolvidos em < 100ms; migration idempotente com advisory lock
