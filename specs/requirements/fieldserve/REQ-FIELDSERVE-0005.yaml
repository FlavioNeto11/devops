id: REQ-FIELDSERVE-0005
title: "Assistente de IA para triagem/priorização de ordens (dry-run)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: fieldserve
  blueprint: node-api-vue-spa
statement: "O FieldServe deve oferecer um assistente de IA (POST /v1/ai/triage/:id) que sugere a prioridade de uma ordem com uma justificativa, em saída estruturada, sem efeito colateral (dry-run) — a decisão final é do operador."
business_rationale: "Triagem manual de muitas ordens é lenta e inconsistente; a IA acelera priorização mantendo o humano no controle (a sugestão não altera o estado sozinha)."
source:
  origin: "FORGE — brief do produto fieldserve"
  source_paths: ["specs/products/fieldserve/product.json"]
priority: medium
criticality: medium
architectural_significance: false
capability_blocks: ["structured-outputs", "ia-grafo"]
acceptance_criteria:
  - "POST /v1/ai/triage/:id retorna saída estruturada { priority, reason } sem persistir nada (dry-run)."
  - "Sem chave de IA configurada, o endpoint degrada com erro claro (fail-closed), sem quebrar o resto do app."
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
