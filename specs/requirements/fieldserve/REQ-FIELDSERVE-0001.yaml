id: REQ-FIELDSERVE-0001
title: "Fundação + observabilidade por padrão (health, métricas, ServiceMonitor, SLO)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product-foundation
  product_scope: fieldserve
  blueprint: node-api-vue-spa
statement: "O FieldServe deve existir como app no padrão da plataforma (API Node/Express em /fieldserve/api com strip, Postgres, worker), com health estruturado e observabilidade por padrão: métricas Prometheus na :9464 (fieldserve_*), ServiceMonitor e PrometheusRule (SLO de API up + saturação de fila)."
business_rationale: "Sem fundação e observabilidade nenhuma capacidade de negócio é operável nem monitorável. A esteira gera isto por padrão (não é opcional)."
source:
