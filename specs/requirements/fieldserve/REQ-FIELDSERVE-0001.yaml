priority: critical
criticality: critical
architectural_significance: true
capability_blocks: ["camadas-rigidas", "migrations-versionadas", "observabilidade"]
acceptance_criteria:
  - "GET /fieldserve/api/health responde 200 {status:ok, db:connected}."
  - "Métricas fieldserve_* expostas na :9464 e raspadas pelo Prometheus (ServiceMonitor UP)."
  - "PrometheusRule com SLO carregada (kubectl get prometheusrule -n apps)."
verification_method: [test-integration]
