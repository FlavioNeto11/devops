statement: O backend expoe um endpoint SSE (GET /stream) que mantem uma conexao HTTP aberta e empurra snapshots do cluster (namespaces, pods, deployments, services, ingressroutes, eventos) sempre que o estado muda, detectado via informers/watches da API do Kubernetes. O frontend abre EventSource automaticamente para admin; members NAO recebem dados do cluster (apenas dados de seus projetos/tarefas).
