acceptance_criteria:
  - "Arquivo canônico: openapi.yaml na raiz ou docs/ com paths, schemas, respostas, exemplos."
  - "Gen:operations: script que lê openapi.yaml e gera src/generated/operations.ts com tipos de request/response para cada rota."
  - "Validação no CI: validate:openapi verifica conformidade da OpenAPI com JSON Schema e exemplos."
  - "Tipos em sync: rotas importam tipos de src/generated/operations.ts; POST /v1/cases/{caseId}/checklist/{type}/{itemId} exigem body tipado conforme schema."
  - "Mudança de rota: altera-se OpenAPI → geram-se tipos → rotas usam tipos → testes de contrato no PR."
  - "Exemplo: OpenAPI define POST /v1/cases com schema `{ title, titular_id, class_type }` → gen cria interface CreateCaseRequest → rota valida."
