id: REQ-BESCNEXT-0007
title: "Contract-First OpenAPI + Tipos Gerados + Validação de Schema"
type: non-functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: besc-next
  blueprint: app-simples
statement: "O sistema DEVE definir sua superfície HTTP em OpenAPI canônico; tipos e operações são gerados a partir do OpenAPI; rotas são tipadas e validadas no CI contra o contrato."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
