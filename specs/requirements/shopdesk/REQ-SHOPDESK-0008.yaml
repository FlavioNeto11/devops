id: REQ-SHOPDESK-0008
title: "Contract-first OpenAPI para API pública integrável"
type: non-functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: shopdesk
  blueprint: node-api-vue-spa
statement: "O sistema DEVE definir contrato HTTP via OpenAPI 3.0 canônico; tipos, operações e validação são gerados; mudanças de rota são propostas em PR com exemplos, testes de contrato e validação no CI."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/shopdesk/product.json"]
priority: medium
criticality: medium
architectural_significance: true
capability_blocks: ["contract-openapi"]
acceptance_criteria:
  - "Arquivo openapi.yml (ou .json) canônico define todos os endpoints, schemas, respostas de erro"
  - "Types TypeScript gerados via gen:operations (no build ou pre-commit); nunca editados manualmente"
  - "Validação OpenAPI no CI: validate:openapi verifica aderência de rotas ao contrato"
  - "Mudança de rota: PR contém OpenAPI → exemplos → tipos gerados → rotas → testes de contrato no mesmo commit"
  - "Documentação interativa via Swagger UI (rota /api/docs)"
  - "Erros estruturados: todas as respostas 4xx/5xx retornam schema de erro padrão (code, message, details)"
quality_scenarios:
  - source: "desenvolvedor/integrador"
    stimulus: "uma rota é adicionada/alterada sem atualizar o OpenAPI"
    environment: "CI (validate:openapi)"
    artifact: "contrato OpenAPI + rotas"
    response: "o gate de contrato reprova o drift bidirecional"
    response_measure: "100% das rotas implementadas estão documentadas e vice-versa (zero drift)"
verification_method: [test-integration, architecture-review]
version:
  baseline_version: "1.0.0"
  item_revision: 1
