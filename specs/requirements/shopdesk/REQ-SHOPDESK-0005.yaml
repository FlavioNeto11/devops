id: REQ-SHOPDESK-0005
title: "Painel web de vendas, pedidos e estoque com design system"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: shopdesk
  blueprint: node-api-vue-spa
statement: "O sistema DEVE oferecer painel web (SPA Vue) para o lojista acompanhar pedidos, vendas (receita, ticket médio), estoque (quantidade, reposição) com design unificado da plataforma."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/shopdesk/product.json"]
priority: high
criticality: medium
architectural_significance: true
capability_blocks: ["design-system"]
acceptance_criteria:
  - "Dashboard mostra: resumo de vendas (receita hoje/mês/ano), quantidade de pedidos, ticket médio, estoque crítico"
  - "Listagem de pedidos com filtros (status, data, valor), busca, paginação e ações (visualizar, reembolsar, rastrear)"
  - "Listagem de estoque com quantidade, sku, alerta de baixa quantidade, botão para criar ordem de reposição"
  - "Frontend herda tokens de design + componentes reusáveis via packages/design-tokens e packages/platform-shell (sem CSS custom)"
  - "Tema claro/escuro sincronizado com plataforma; acessibilidade WCAG AA"
  - "Relatório exportável (CSV) de vendas e estoque"
verification_method: [test-integration]
