id: REQ-SHOPDESK-0003
title: "Carrinho, checkout e pagamento idempotente com webhook"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: shopdesk
  blueprint: node-api-vue-spa
statement: "O sistema DEVE gerenciar carrinho de compra, processar checkout com cobrança idempotente (dedup por Idempotency-Key) via gateway de pagamento e processar webhook de confirmação sem duplicação."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/shopdesk/product.json"]
priority: critical
criticality: medium
architectural_significance: true
capability_blocks: ["pagamentos-gateway", "idempotencia", "gateway-externo"]
acceptance_criteria:
  - "Endpoint POST /checkout aceita Idempotency-Key header; mesma chave retorna mesmo resultado (idempotência)"
  - "Cobrança tokenizada (tokenizer configurable, nunca armazena número de cartão)"
  - "Gateway de pagamento centralizado: timeout 30s, retry com backoff exponencial, redação de segredos em log"
  - "Webhook de PSP verifica assinatura e deduplica por chave de evento do PSP"
  - "Provider 'sandbox' determinístico por padrão (ex.: Stripe testkeys); PSP real atrás de env var PAYMENT_PROVIDER/PAYMENT_API_KEY (fail-closed sem chave)"
  - "Trilha de auditoria: toda transação registra timestamp, valor, status, erro (se houver)"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
