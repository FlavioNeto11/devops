id: REQ-SHOPDESK-0006
title: "Assistente de IA para lojista (sugestão de preço/descrição e Q&A sobre pedidos)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: shopdesk
  blueprint: node-api-vue-spa
statement: "O sistema DEVE oferecer assistente de IA que sugere preço e descrição de produtos (com confirmação antes de persistir) e responde perguntas sobre pedidos (com rastreamento de fonte via RAG)."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/shopdesk/product.json"]
priority: medium
criticality: medium
architectural_significance: true
capability_blocks: ["ia-grafo", "rag-pgvector", "structured-outputs"]
acceptance_criteria:
  - "Endpoint POST /ai/suggest-product-price: recebe produto, histórico de vendas → IA sugere preço com intervalo de confiança → dry-run (não persiste)"
  - "Endpoint POST /ai/suggest-product-description: recebe categoria, características → IA sugere texto SEO → dry-run"
  - "Endpoint POST /ai/ask-about-order: pergunta em linguagem natural → IA busca pedidos similares via RAG (pgvector) → responde citando fontes (pedido_id, data, valor)"
  - "Toda sugestão de preço/descrição exige confirmação explícita do usuário (botão 'Aplicar') antes de persistir"
  - "IA falha-fechada: timeout 10s sem resposta → retorna erro estruturado, não fallback silencioso"
  - "Autorização: assistente responde apenas sobre pedidos do tenant do usuário autenticado"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
