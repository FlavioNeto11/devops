id: REQ-SHOPDESK-0001
title: "Fundação: Arquitetura em camadas + Observabilidade por padrão"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product-foundation
  product_scope: shopdesk
  blueprint: node-api-vue-spa
statement: "O sistema DEVE implementar arquitetura em camadas rígidas (route → service → repository → worker → gateway) com observabilidade nativa (health checks, métricas Prometheus, ServiceMonitor, alertas SLO e dashboard Grafana)."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/shopdesk/product.json"]
priority: critical
criticality: critical
architectural_significance: true
capability_blocks: ["camadas-rigidas", "migrations-versionadas", "observabilidade"]
acceptance_criteria:
  - "Endpoints de health estruturados em /health e /v1/health/{system,workers,jobs} retornam status de DB, workers e fila"
  - "Métricas Prometheus na porta :9464 (fora do Traefik) incluem latência p95, taxa de erro, saturação de fila"
  - "ServiceMonitor criado para kube-prometheus-stack raspar métricas"
  - "Dashboard Grafana gerado automaticamente com SLOs de latência, erro e throughput"
  - "Rotas validam entrada e mapeiam HTTP; services contêm regra de negócio; repositories contêm SQL; gateways contêm chamadas HTTP externas"
  - "Nenhuma rota acessa banco ou rede externa diretamente"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
