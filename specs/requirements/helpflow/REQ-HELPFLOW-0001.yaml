id: REQ-HELPFLOW-0001
title: "Fundação de Arquitetura e Observabilidade"
type: functional
status: approved
owner: flavio
scope:
  applies_to: product-foundation
  product_scope: helpflow
  blueprint: node-api-vue-spa
statement: "O sistema DEVE implementar uma arquitetura em camadas rígidas (route → service → repository → worker → gateway) com observabilidade nativa (health checks, métricas Prometheus, ServiceMonitor, SLO e dashboard Grafana), garantindo que toda mudança no schema ou operações assíncronas sejam rastreáveis e auditáveis desde o boot."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/helpflow/product.json"]
priority: critical
criticality: critical
architectural_significance: true
capability_blocks: ["camadas-rigidas", "migrations-versionadas", "observabilidade"]
acceptance_criteria:
  - "Routes mapeiam apenas HTTP e validação de entrada; nenhuma regra de negócio ou SQL em rotas"
  - "Services contêm toda lógica de domínio (SLA, status, categoria); repositories isolam SQL"
  - "Migrations versionadas com advisory-lock no boot (sem race conditions em múltiplas réplicas)"
  - "Endpoints /health e /v1/health/{system,workers,jobs} retornam status estruturado"
  - "Métricas Prometheus (latência p95, taxa de erro, saturação de fila) raspadasem porta :9464"
  - "ServiceMonitor registrado para kube-prometheus-stack"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
