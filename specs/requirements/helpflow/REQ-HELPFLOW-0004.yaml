id: REQ-HELPFLOW-0004
title: "Processamento Assíncrono Idempotente de Longa Duração (Worker + Fila Transacional)"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: helpflow
  blueprint: node-api-vue-spa
statement: "O sistema DEVE processar operações longas (submissão a gateway externo, geração de documento, sincronização de catálogo) de forma assíncrona e idempotente: jobs persistidos numa tabela do Postgres, consumidos por worker (mesma imagem da API) com claim transacional FOR UPDATE SKIP LOCKED, retry com backoff exponencial, idempotência por job_key, dead-letter queue (DLQ), heartbeat de claim e graceful shutdown. Toda operação que cria efeito (POST ticket, comentário) recebe uma Idempotency-Key do cliente, garantindo um único efeito mesmo com retries."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/helpflow/product.json"]
priority: critical
criticality: medium
architectural_significance: true
capability_blocks: ["worker-queue-transacional", "idempotencia"]
acceptance_criteria:
  - "Tabela job_queue com colunas: id, key, tipo, payload, tenant_id, estado (pending/processing/success/failed/dlq), attempts, heartbeat_at, created_at"
  - "POST /tickets com header Idempotency-Key retorna mesmo resultado em retry (idempotência de ponta a ponta)"
  - "Worker poll com SELECT FOR UPDATE SKIP LOCKED, incremente heartbeat a cada 10s, requeue se heartbeat espirou"
  - "Retry com backoff exponencial (1s, 2s, 4s, ..., max 5 tentativas)"
  - "Jobs que falham 5x vão para DLQ (jobs com falha persistente, revisão manual)"
  - "Graceful shutdown: SIGTERM aguarda jobs em voo completar ou timeout 30s"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
