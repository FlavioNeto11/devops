id: REQ-HELPFLOW-0002
title: "Autenticação OIDC, Autorização RBAC Multi-Tenant e Persistência de Sessão"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: helpflow
  blueprint: node-api-vue-spa
statement: "O sistema DEVE autenticar operadores via OIDC/Keycloak (realm nvit), emitir sessão própria (JWT) do app, escopar todo acesso por tenant (organização) e papel (owner, gerente, agente, solicitante) com deny por padrão fora do escopo, garantindo isolamento entre empresas e controle fino de permissões para visualizar/editar tickets e conhecimento."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/helpflow/product.json"]
priority: critical
criticality: medium
architectural_significance: true
capability_blocks: ["oidc-sessao", "rbac-multitenant"]
acceptance_criteria:
  - "Fluxo OIDC PKCE completo: frontend redireciona para Keycloak, backend valida /userinfo, emite sessão JWT do app"
  - "Middleware de autenticação rejeita requisições sem sessão válida (código 401)"
  - "Toda query ao banco carrega WHERE tenant_id = ? baseado na sessão do usuário"
  - "Middleware de autorização nega acesso a recurso fora do escopo do papel (código 403)"
  - "Soft-delete ativo: registros deletados têm deleted_at preenchido, never hard-delete"
  - "Testes verificam isolamento: usuário de tenant A não vê tickets de tenant B"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
