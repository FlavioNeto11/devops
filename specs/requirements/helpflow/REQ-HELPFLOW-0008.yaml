id: REQ-HELPFLOW-0008
title: "Design System Unificado no Frontend (Vue SPA)"
type: non-functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: helpflow
  blueprint: node-api-vue-spa
statement: "O frontend Vue SPA DEVE herdar identidade visual, tema (claro/escuro), acessibilidade e navegação da plataforma via design system unificado: tokens de design únicos (packages/design-tokens, gerados no build via codegen-sync), componentes reusáveis (packages/platform-shell) nunca customizados no app, CSS gerado acoplado ao Tailwind. Todo componente app-specific (ex.: painel de tickets, modal de novo ticket) reutiliza componentes de shell e tokens. Tema e acessibilidade herdadas por padrão."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/helpflow/product.json"]
priority: medium
criticality: medium
architectural_significance: true
capability_blocks: ["design-system"]
acceptance_criteria:
  - "packages/design-tokens importado no projeto; build sincroniza tokens gerados em src/design-tokens.generated.css"
  - "Componentes de shell (Button, Input, Card, Modal, etc.) reusados 100% em tickets, comentários, artigos"
  - "Nenhum CSS customizado no app; apenas Tailwind + tokens (variáveis CSS herdadas)"
  - "Tema claro/escuro alterável em runtime; preferência persistida em localStorage"
  - "WCAG 2.1 AA alcançado: contraste, navegação por teclado, labels acessíveis (aria-*)"
  - "Documentação de componentes (Storybook ou equiv.) atualizada junto com shell"
quality_scenarios:
  - source: "operador/sistema"
    stimulus: "O frontend Vue SPA DEVE herdar identidade visual, tema (claro/escuro), acessibilidade e navegação da plataforma via design system unificado:"
    environment: "produção"
    artifact: "helpflow"
    response: "atende o atributo de qualidade especificado"
    response_measure: "packages/design-tokens importado no projeto; build sincroniza tokens gerados em src/design-tokens.generated.css"
verification_method: [test-integration, monitoring]
version:
  baseline_version: "1.0.0"
  item_revision: 1
