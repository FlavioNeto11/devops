id: REQ-HELPFLOW-0007
title: "Assistente de IA com Grafo, Tools e Controle Próprio"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: helpflow
  blueprint: node-api-vue-spa
statement: "O sistema DEVE disponibilizar um assistente de IA conversacional que: (1) sugere categoria/prioridade de novo ticket baseado em descrição e histórico (classificação); (2) propõe rascunho de resposta a ticket aberto, citando artigos da base; (3) realiza ReAct reasoning com tools de domínio (buscar tickets similares, recuperar artigos, listar categorias). O assistente usa o motor de grafo (ai-core: createAiGraph com router → especialista deep + loop ReAct + judge/verify), prompts versionados e resiliência (fallback offline se control plane estiver fora). Saídas estruturadas validadas contra schema (classificação, rascunho)."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/helpflow/product.json"]
priority: high
criticality: medium
architectural_significance: true
capability_blocks: ["ia-grafo", "structured-outputs", "control-ai-por-app"]
acceptance_criteria:
  - "Grafo de IA: router direciona 'classificação de ticket' vs 'rascunho de resposta' a especialistas"
  - "Especialista de classificação: input = descrição do ticket → output = {categoria, prioridade, confiança}"
  - "Especialista de resposta: input = ticket aberto + artigos recuperados → output = {rascunho_texto, artigos_citados, actions_propostas}"
  - "Loop ReAct com tools: pensar → agir (buscar artigos, buscar tickets similares) → pensar → responder"
  - "Dry-run em mutações: resposta é rascunho, usuário confirma antes de publicar"
  - "Prompts versionados no control plane; fallback offline para prompt v1 (fail-closed)"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
