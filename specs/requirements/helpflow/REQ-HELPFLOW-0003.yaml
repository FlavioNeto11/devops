id: REQ-HELPFLOW-0003
title: "API Contract-First (OpenAPI) e Modelos de Domínio"
type: functional
status: approved
owner: flavio
scope:
  applies_to: capability
  product_scope: helpflow
  blueprint: node-api-vue-spa
statement: "O sistema DEVE definir a superfície HTTP num OpenAPI canônico versionado, gerar tipos/operações via gen:operations no CI, validar contrato no CI (validate:openapi), e manter lockstep entre OpenAPI → exemplos → tipos gerados → rotas → testes de contrato. Modelos de domínio: Ticket (id, tenant_id, categoria, prioridade, status, solicitante, agente, sla_deadline, created_at, updated_at), Comentário (id, ticket_id, author_id, texto, criado_em), Artigo (id, tenant_id, título, conteúdo, tags, embeddings), Categoria e Prioridade como enums reusáveis."
business_rationale: "Capacidade proposta pela IA da Forja a partir do brief do produto."
source:
  origin: "FORGE — concepção pela IA (propose_requirements)"
  source_paths: ["specs/products/helpflow/product.json"]
priority: critical
criticality: medium
architectural_significance: true
capability_blocks: ["contract-openapi"]
acceptance_criteria:
  - "OpenAPI 3.1 definido em docs/openapi.yaml com todos os endpoints (GET/POST/PATCH ticket, comentário, artigo)"
  - "CI executa validate:openapi (lint, type coverage 100%, exemplos válidos)"
  - "Types TypeScript gerados em src/generated/openapi.ts via gen:operations"
  - "Tipos gerados importados em routes e services (nunca types manuais incompatíveis)"
  - "Rotas respondem exatamente conforme schema (status code, headers, body)"
  - "Testes de contrato verificam exemplos do OpenAPI (pact-like, sem mock)"
verification_method: [test-integration]
version:
  baseline_version: "1.0.0"
  item_revision: 1
