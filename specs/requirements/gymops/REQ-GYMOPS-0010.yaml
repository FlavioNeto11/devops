statement: "O sistema deve expor telas em /settings para: (1) perfil (avatar R2, nome, telefone, timezone); (2) organização (logo URL, delivery log); (3) unidades (CRUD, vincular áreas via UnitAreasDialog, reordenar); (4) áreas (CRUD, editável visibilityDefault); (5) equipe (invite escopado org/unit/area, edit role inline, histórico convites); (6) templates (CRUD com preview); (7) recorrências (CRUD, pause/resume); (8) integrações (health/status Trello, reconnect, WhatsApp); (9) import (Trello JSON + OAuth); (10) auditoria (log paginado)."
