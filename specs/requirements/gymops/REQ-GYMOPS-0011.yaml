statement: "O sistema deve enviar notificações por 3 canais: (1) SMTP via Nodemailer (activity_assigned, due_reminder, overdue, daily_summary, import_complete); (2) web-push via VAPID (browser + PWA); (3) WhatsApp Twilio (usuarios.phone E.164 + opt-in). Preferences por usuário em notification_preferences. Delivery log com filtros canal/status/paginação."
