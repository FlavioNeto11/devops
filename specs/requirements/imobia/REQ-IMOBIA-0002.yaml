statement: 'O sistema deve orquestrar múltiplas IAs como funcionários especializados: Cortex (modelo rápido/barato) faz a triagem e escolhe o especialista; GPT executa lógica/function-calling, Claude redação/análise avançada e Gemini documentos/visão. Quando o provider ideal do especialista estiver ausente, o motor deve cair para qualquer provider disponível (fallbackProvider) e registrar custo/tokens por chamada via ai-core.'
business_rationale: Divisão de trabalho fiel ao documento de concepção — cada modelo atua na sua vocação, com triagem barata na frente para conter custo.
