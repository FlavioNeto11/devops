id: REQ-IMOBIA-0007
slug: req-imobia-0007
title: WhatsApp multi-instância como eixo central com triagem por IA
type: functional
status: approved
owner: plataforma-digital
scope:
  product_scope: imobia
  applies_to: product
statement: O sistema deve operar múltiplos canais/números de WhatsApp por segmento (captação, vendas, finanças) com webhook centralizador; toda mensagem entrante passa pela triagem do Cortex (classificação de canal/intenção) e é processada de forma assíncrona (fila whatsapp-inbound), alimentando os demais módulos do ecossistema. A integração é fail-soft — sem provedor configurado (Baileys/Evolution/Z-API), o módulo opera manualmente.
business_rationale: O WhatsApp é o coração que conecta todos os módulos (documento de concepção e diagrama).
