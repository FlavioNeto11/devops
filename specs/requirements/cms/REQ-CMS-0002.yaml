statement: "O sistema deve fornecer um editor visual (VisualEditor) que renderiza o portal em um iframe com ?cmsEdit=1, permitindo: clique para editar texto destacado, mover/ocultar/excluir/reordenar seções por arrastar, controles por item (adicionar/remover), upload de mídia no lugar, e alternância entre páginas. Alterações devem auto-salvar com debounce."
