owner: plataforma-digital
scope:
  product_scope: cms
  applies_to: product
statement: "O sistema deve gerenciar arquivos em dois escopos: 'project' (padrão, exclusivo do portal) e 'global' (biblioteca pública da plataforma, admin-only). MediaPicker deve exibir abas 'Todos disponíveis / Este portal / Biblioteca pública'. Upload/exclusão de global é restrito a admin (403 para member). Mimes permitidos: imagens (png, jpeg, webp, gif, svg), documentos (pdf, docx, xlsx, pptx, csv, txt, zip), vídeo (mp4, webm, quicktime)."
