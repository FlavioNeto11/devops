statement: "O sistema deve implementar protocolo cmsEdit completo no site-renderer: /sites/<chave>/?cmsEdit=1 com handshake same-origin entre iframe e Console. Oferece clique-para-editar, mover/publicar/ocultar/excluir/adicionar seção por moldura, controles por item, upload de mídia no lugar. Header/rodapé também editáveis (nome site, tagline, contatos) abrindo painel do SITE. Visitante público NUNCA vê o chrome."
