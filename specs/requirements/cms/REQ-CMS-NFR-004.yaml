statement: "O sistema deve atender ao atributo de qualidade \"Media file handling with MIME allowlist and per-type size limits\": Arquivo validado: mime em allowlist, tamanho ≤tipo-específico (8MB padrão, 50MB vídeo). Rejeitado se exceder: 400 'arquivo muito grande' com tipo/limite. Aceito: armazenado como bytea em PostgreSQL, retorna id + URL pública"
