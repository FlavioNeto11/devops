id: REF-HELPFLOW-0024
slug: ref-helpflow-0024
title: "Detalhe do artigo"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0006
    relation: implements

surface:
  route: "/kb-articles/:id"
  name: "Detalhe do artigo"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "artigo carregado"
      ui: "conteudo renderizado, metadados e artigos relacionados"
    - name: loading
      when: "buscando o artigo"
      ui: "skeleton do conteudo"
    - name: empty
      when: "artigo sem artigos relacionados"
      ui: "secao de relacionados vazia"
    - name: error
      when: "artigo nao encontrado ou erro ao carregar"
      ui: "mensagem de erro com link de volta para a lista"
  data:
    - field: "article"
      source: "api:/kb-articles/:id"
      editable: false
      format: "conteudo e metadados do artigo"
    - field: "related"
      source: "api:/kb-articles/:id/related"
      editable: false
      format: "artigos relacionados"
  interactions:
    - trigger: "clicar em editar"
      action: "navega para edicao"
      result: "abre /kb-articles/:id/edit"
    - trigger: "clicar em um artigo relacionado"
      action: "navega para o detalhe"
      result: "abre /kb-articles/:id"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
