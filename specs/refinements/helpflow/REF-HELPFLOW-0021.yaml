id: REF-HELPFLOW-0021
slug: ref-helpflow-0021
title: "Editar política de SLA"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements

surface:
  route: "/sla-policies/:id/edit"
  name: "Editar política de SLA"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "formulario carregado com os dados da politica"
      ui: "formulario preenchido com metas e calendario"
    - name: loading
      when: "buscando a politica para edicao"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "campos opcionais sem valor"
      ui: "placeholders e ajuda inline"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "name"
      source: "api:/sla-policies/:id"
      editable: true
      format: "nome da politica"
    - field: "first_response_target"
      source: "api:/sla-policies/:id"
      editable: true
      format: "meta de primeira resposta"
    - field: "resolution_target"
      source: "api:/sla-policies/:id"
      editable: true
      format: "meta de resolucao"
  interactions:
    - trigger: "alterar metas"
      action: "valida coerencia"
      result: "habilita salvar quando valido"
    - trigger: "clicar em salvar"
      action: "persiste as alteracoes"
      result: "redireciona para o detalhe da politica"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
