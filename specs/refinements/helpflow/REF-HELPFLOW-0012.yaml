id: REF-HELPFLOW-0012
slug: ref-helpflow-0012
title: "Detalhe do agente"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0002
    relation: implements
  - requirement_id: REQ-HELPFLOW-0003
    relation: relates_to

surface:
  route: "/agents/:id"
  name: "Detalhe do agente"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "agente carregado"
      ui: "perfil do agente, time, carga atual e chamados atribuidos"
    - name: loading
      when: "buscando o agente"
      ui: "skeleton do perfil e dos chamados"
    - name: empty
      when: "agente sem chamados atribuidos"
      ui: "estado vazio na lista de chamados atribuidos"
    - name: error
      when: "agente nao encontrado ou erro ao carregar"
      ui: "mensagem de erro com link de volta para a lista"
  data:
    - field: "agent"
      source: "api:/agents/:id"
      editable: false
      format: "perfil e papel do agente"
    - field: "assigned_tickets"
      source: "api:/agents/:id/tickets"
      editable: false
      format: "chamados atribuidos ao agente"
  interactions:
    - trigger: "clicar em editar"
      action: "navega para edicao"
      result: "abre /agents/:id/edit"
    - trigger: "clicar em um chamado atribuido"
      action: "navega para o detalhe do chamado"
      result: "abre /tickets/:id"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
