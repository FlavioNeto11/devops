id: REF-HELPFLOW-0002
slug: ref-helpflow-0002
title: "Chamados"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements
  - requirement_id: REQ-HELPFLOW-0004
    relation: relates_to

surface:
  route: "/tickets"
  name: "Chamados"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "lista de chamados carregada"
      ui: "tabela de chamados com status, prioridade, SLA e responsavel"
    - name: loading
      when: "buscando chamados"
      ui: "skeleton de linhas na tabela"
    - name: empty
      when: "nenhum chamado encontrado"
      ui: "estado vazio com acao de abrir novo chamado"
    - name: error
      when: "falha ao listar chamados"
      ui: "mensagem de erro com botao de tentar novamente"
  data:
    - field: "tickets"
      source: "api:/tickets"
      editable: false
      format: "lista paginada de chamados"
    - field: "filters"
      source: "api:/tickets?status&priority&team"
      editable: true
      format: "filtros por status, prioridade e fila"
  interactions:
    - trigger: "abrir /tickets"
      action: "carrega a lista de chamados"
      result: "renderiza a tabela com paginacao e filtros"
    - trigger: "clicar em um chamado"
      action: "navega para o detalhe"
      result: "abre /tickets/:id"
    - trigger: "clicar em novo chamado"
      action: "navega para o formulario de criacao"
      result: "abre /tickets/new"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
