id: REF-HELPFLOW-0025
slug: ref-helpflow-0025
title: "Editar artigo"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0006
    relation: implements

surface:
  route: "/kb-articles/:id/edit"
  name: "Editar artigo"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "editor carregado com o artigo"
      ui: "editor preenchido com titulo, categoria e corpo"
    - name: loading
      when: "buscando o artigo para edicao"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "campos opcionais sem valor"
      ui: "placeholders e ajuda inline"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "title"
      source: "api:/kb-articles/:id"
      editable: true
      format: "titulo do artigo"
    - field: "category"
      source: "api:/kb-articles/:id"
      editable: true
      format: "categoria"
    - field: "body"
      source: "api:/kb-articles/:id"
      editable: true
      format: "conteudo (markdown)"
  interactions:
    - trigger: "alterar conteudo"
      action: "valida campos obrigatorios"
      result: "habilita salvar quando valido"
    - trigger: "clicar em salvar"
      action: "persiste as alteracoes"
      result: "redireciona para o detalhe do artigo"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
