id: REF-HELPFLOW-0006
slug: ref-helpflow-0006
title: "Solicitantes"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements
  - requirement_id: REQ-HELPFLOW-0002
    relation: relates_to

surface:
  route: "/customers"
  name: "Solicitantes"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "lista de solicitantes carregada"
      ui: "tabela de solicitantes com nome, contato e chamados abertos"
    - name: loading
      when: "buscando solicitantes"
      ui: "skeleton de linhas na tabela"
    - name: empty
      when: "nenhum solicitante cadastrado"
      ui: "estado vazio com acao de novo solicitante"
    - name: error
      when: "falha ao listar solicitantes"
      ui: "mensagem de erro com botao de tentar novamente"
  data:
    - field: "customers"
      source: "api:/customers"
      editable: false
      format: "lista paginada de solicitantes"
    - field: "search"
      source: "api:/customers?q="
      editable: true
      format: "busca por nome ou email"
  interactions:
    - trigger: "abrir /customers"
      action: "carrega a lista de solicitantes"
      result: "renderiza a tabela com busca e paginacao"
    - trigger: "clicar em um solicitante"
      action: "navega para o detalhe"
      result: "abre /customers/:id"
    - trigger: "clicar em novo solicitante"
      action: "navega para o formulario"
      result: "abre /customers/new"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
