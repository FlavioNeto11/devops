id: REF-HELPFLOW-0036
slug: ref-helpflow-0036
title: "Configurações e Tenant"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0002
    relation: implements

surface:
  route: "/settings"
  name: "Configurações e Tenant"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "configuracoes do tenant carregadas"
      ui: "abas de identidade do tenant, preferencias e papeis de acesso"
    - name: loading
      when: "buscando configuracoes"
      ui: "skeleton das secoes de configuracao"
    - name: empty
      when: "tenant sem preferencias customizadas"
      ui: "valores padrao com convite para personalizar"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "tenant_profile"
      source: "api:/settings/tenant"
      editable: true
      format: "nome, dominio e identidade do tenant"
    - field: "preferences"
      source: "api:/settings/preferences"
      editable: true
      format: "preferencias operacionais (fuso, idioma, notificacoes)"
    - field: "roles"
      source: "api:/settings/roles"
      editable: true
      format: "papeis e permissoes de acesso"
  interactions:
    - trigger: "alterar uma configuracao"
      action: "valida e habilita salvar"
      result: "destaca alteracoes pendentes"
    - trigger: "clicar em salvar"
      action: "persiste as configuracoes do tenant"
      result: "confirma a atualizacao com feedback de sucesso"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
