id: REF-HELPFLOW-0034
slug: ref-helpflow-0034
title: "Detalhe do job"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0004
    relation: implements

surface:
  route: "/jobs/:id"
  name: "Detalhe do job"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "job carregado"
      ui: "payload, historico de tentativas, erro e log de execucao"
    - name: loading
      when: "buscando o job"
      ui: "skeleton dos dados e do log"
    - name: empty
      when: "job sem tentativas registradas"
      ui: "estado vazio no historico de tentativas"
    - name: error
      when: "job nao encontrado ou erro ao carregar"
      ui: "mensagem de erro com link de volta para a fila"
  data:
    - field: "job"
      source: "api:/jobs/:id"
      editable: false
      format: "dados do job (tipo, status, payload)"
    - field: "attempts"
      source: "api:/jobs/:id/attempts"
      editable: false
      format: "historico de tentativas e erros"
  interactions:
    - trigger: "clicar em reprocessar"
      action: "reenfileira o job"
      result: "atualiza o status e registra nova tentativa"
    - trigger: "clicar em voltar"
      action: "navega para a fila"
      result: "abre /jobs"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
