id: REF-HELPFLOW-0004
slug: ref-helpflow-0004
title: "Detalhe do chamado"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements
  - requirement_id: REQ-HELPFLOW-0005
    relation: relates_to
  - requirement_id: REQ-HELPFLOW-0007
    relation: relates_to

surface:
  route: "/tickets/:id"
  name: "Detalhe do chamado"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "chamado carregado"
      ui: "cabecalho com status/SLA, thread de mensagens, painel de metadados e acoes"
    - name: loading
      when: "buscando o chamado"
      ui: "skeleton do cabecalho e da thread"
    - name: empty
      when: "chamado sem mensagens"
      ui: "thread vazia com convite para responder"
    - name: error
      when: "chamado nao encontrado ou erro ao carregar"
      ui: "mensagem de erro com link de volta para a lista"
  data:
    - field: "ticket"
      source: "api:/tickets/:id"
      editable: false
      format: "dados do chamado (status, prioridade, SLA, responsavel)"
    - field: "messages"
      source: "api:/tickets/:id/messages"
      editable: false
      format: "thread de interacoes"
    - field: "sla_timer"
      source: "api:/tickets/:id/sla"
      editable: false
      format: "tempo restante de SLA"
    - field: "ai_reply_suggestion"
      source: "api:/tickets/:id/assist"
      editable: false
      format: "sugestao de resposta grounded da IA"
  interactions:
    - trigger: "enviar resposta"
      action: "adiciona mensagem a thread"
      result: "atualiza a conversa e o estado do SLA"
    - trigger: "clicar em editar"
      action: "navega para edicao do chamado"
      result: "abre /tickets/:id/edit"
    - trigger: "aplicar sugestao da IA"
      action: "insere o rascunho sugerido no campo de resposta"
      result: "permite revisao antes do envio"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
