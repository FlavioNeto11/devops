id: REF-HELPFLOW-0035
slug: ref-helpflow-0035
title: "Observabilidade"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0001
    relation: implements

surface:
  route: "/observability"
  name: "Observabilidade"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "metricas e saude carregadas"
      ui: "paineis de health, latencia, throughput e erros do service desk"
    - name: loading
      when: "buscando metricas"
      ui: "skeleton dos paineis"
    - name: empty
      when: "sem dados no intervalo selecionado"
      ui: "estado vazio convidando a alterar o periodo"
    - name: error
      when: "falha ao carregar metricas"
      ui: "mensagem de erro com botao de tentar novamente"
  data:
    - field: "health"
      source: "api:/observability/health"
      editable: false
      format: "status dos servicos (api/worker/db)"
    - field: "metrics"
      source: "api:/observability/metrics"
      editable: false
      format: "latencia, throughput e taxa de erro"
    - field: "time_range"
      source: "input:usuario"
      editable: true
      format: "intervalo de tempo selecionado"
  interactions:
    - trigger: "abrir /observability"
      action: "carrega health e metricas"
      result: "renderiza os paineis de observabilidade"
    - trigger: "alterar o intervalo"
      action: "recarrega as metricas para o periodo"
      result: "atualiza os graficos"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
