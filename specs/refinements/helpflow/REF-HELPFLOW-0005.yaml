id: REF-HELPFLOW-0005
slug: ref-helpflow-0005
title: "Editar chamado"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements

surface:
  route: "/tickets/:id/edit"
  name: "Editar chamado"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "formulario carregado com os dados do chamado"
      ui: "formulario preenchido com status, prioridade, fila e responsavel"
    - name: loading
      when: "buscando o chamado para edicao"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "campos opcionais sem valor"
      ui: "placeholders e ajuda inline"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "status"
      source: "api:/tickets/:id"
      editable: true
      format: "estado do chamado"
    - field: "priority"
      source: "api:/tickets/:id"
      editable: true
      format: "prioridade"
    - field: "team_id"
      source: "api:/teams"
      editable: true
      format: "fila/time"
    - field: "assignee_id"
      source: "api:/agents"
      editable: true
      format: "agente responsavel"
  interactions:
    - trigger: "alterar campos"
      action: "valida em tempo real"
      result: "habilita salvar quando valido"
    - trigger: "clicar em salvar"
      action: "persiste as alteracoes"
      result: "redireciona para o detalhe do chamado"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
