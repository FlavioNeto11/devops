id: REF-HELPFLOW-0003
slug: ref-helpflow-0003
title: "Novo chamado"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements
  - requirement_id: REQ-HELPFLOW-0006
    relation: relates_to

surface:
  route: "/tickets/new"
  name: "Novo chamado"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "formulario pronto"
      ui: "formulario de abertura de chamado com solicitante, assunto, prioridade e fila"
    - name: loading
      when: "carregando opcoes (solicitantes, times, SLA)"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "formulario sem dados preenchidos"
      ui: "placeholders e ajuda inline por campo"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "subject"
      source: "input:usuario"
      editable: true
      format: "assunto do chamado"
    - field: "requester_id"
      source: "api:/customers"
      editable: true
      format: "solicitante vinculado"
    - field: "priority"
      source: "input:usuario"
      editable: true
      format: "prioridade (baixa/media/alta/critica)"
    - field: "team_id"
      source: "api:/teams"
      editable: true
      format: "fila/time de atendimento"
    - field: "kb_suggestions"
      source: "api:/kb-articles?suggest=true"
      editable: false
      format: "artigos sugeridos pelo assunto"
  interactions:
    - trigger: "preencher assunto"
      action: "busca sugestoes na base de conhecimento"
      result: "exibe artigos relacionados ao problema"
    - trigger: "clicar em salvar"
      action: "valida e cria o chamado"
      result: "redireciona para o detalhe do chamado criado"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
