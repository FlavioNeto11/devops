id: REF-HELPFLOW-0011
slug: ref-helpflow-0011
title: "Novo agente"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0002
    relation: implements

surface:
  route: "/agents/new"
  name: "Novo agente"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "formulario pronto"
      ui: "formulario de cadastro de agente com papel e time"
    - name: loading
      when: "carregando opcoes (times/papeis)"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "formulario sem dados preenchidos"
      ui: "placeholders e ajuda inline por campo"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "name"
      source: "input:usuario"
      editable: true
      format: "nome do agente"
    - field: "email"
      source: "input:usuario"
      editable: true
      format: "email do agente"
    - field: "role"
      source: "input:usuario"
      editable: true
      format: "papel (agente/supervisor/admin)"
    - field: "team_id"
      source: "api:/teams"
      editable: true
      format: "time/fila do agente"
  interactions:
    - trigger: "preencher campos"
      action: "valida em tempo real"
      result: "habilita salvar quando valido"
    - trigger: "clicar em salvar"
      action: "cria o agente"
      result: "redireciona para o detalhe do agente"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
