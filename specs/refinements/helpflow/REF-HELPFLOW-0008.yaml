id: REF-HELPFLOW-0008
slug: ref-helpflow-0008
title: "Detalhe do solicitante"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements

surface:
  route: "/customers/:id"
  name: "Detalhe do solicitante"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "solicitante carregado"
      ui: "dados do solicitante e historico de chamados"
    - name: loading
      when: "buscando o solicitante"
      ui: "skeleton dos dados e do historico"
    - name: empty
      when: "solicitante sem chamados"
      ui: "historico vazio com convite para abrir chamado"
    - name: error
      when: "solicitante nao encontrado ou erro ao carregar"
      ui: "mensagem de erro com link de volta para a lista"
  data:
    - field: "customer"
      source: "api:/customers/:id"
      editable: false
      format: "dados do solicitante"
    - field: "ticket_history"
      source: "api:/customers/:id/tickets"
      editable: false
      format: "chamados do solicitante"
  interactions:
    - trigger: "clicar em editar"
      action: "navega para edicao"
      result: "abre /customers/:id/edit"
    - trigger: "clicar em um chamado do historico"
      action: "navega para o detalhe do chamado"
      result: "abre /tickets/:id"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
