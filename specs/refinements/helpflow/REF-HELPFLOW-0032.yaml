id: REF-HELPFLOW-0032
slug: ref-helpflow-0032
title: "Editar integração"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0005
    relation: implements

surface:
  route: "/integrations/:id/edit"
  name: "Editar integração"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "formulario carregado com a integracao"
      ui: "formulario preenchido com credenciais e mapeamento"
    - name: loading
      when: "buscando a integracao para edicao"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "campos opcionais sem valor"
      ui: "placeholders e ajuda inline"
    - name: error
      when: "validacao falhou, credencial invalida ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "type"
      source: "api:/integrations/:id"
      editable: false
      format: "tipo da integracao"
    - field: "credentials"
      source: "api:/integrations/:id"
      editable: true
      format: "credenciais (redigidas)"
    - field: "mapping"
      source: "api:/integrations/:id"
      editable: true
      format: "mapeamento para filas/times"
  interactions:
    - trigger: "alterar credenciais"
      action: "valida e testa a conexao"
      result: "indica sucesso ou falha do teste"
    - trigger: "clicar em salvar"
      action: "persiste as alteracoes"
      result: "redireciona para o detalhe da integracao"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
