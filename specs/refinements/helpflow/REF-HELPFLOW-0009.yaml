id: REF-HELPFLOW-0009
slug: ref-helpflow-0009
title: "Editar solicitante"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements

surface:
  route: "/customers/:id/edit"
  name: "Editar solicitante"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "formulario carregado com os dados do solicitante"
      ui: "formulario preenchido com nome, email e organizacao"
    - name: loading
      when: "buscando o solicitante para edicao"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "campos opcionais sem valor"
      ui: "placeholders e ajuda inline"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "name"
      source: "api:/customers/:id"
      editable: true
      format: "nome do solicitante"
    - field: "email"
      source: "api:/customers/:id"
      editable: true
      format: "email de contato"
    - field: "organization"
      source: "api:/customers/:id"
      editable: true
      format: "organizacao/empresa"
  interactions:
    - trigger: "alterar campos"
      action: "valida em tempo real"
      result: "habilita salvar quando valido"
    - trigger: "clicar em salvar"
      action: "persiste as alteracoes"
      result: "redireciona para o detalhe do solicitante"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
