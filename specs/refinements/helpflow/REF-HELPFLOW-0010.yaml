id: REF-HELPFLOW-0010
slug: ref-helpflow-0010
title: "Agentes"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0002
    relation: implements

surface:
  route: "/agents"
  name: "Agentes"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "lista de agentes carregada"
      ui: "tabela de agentes com nome, time, carga e disponibilidade"
    - name: loading
      when: "buscando agentes"
      ui: "skeleton de linhas na tabela"
    - name: empty
      when: "nenhum agente cadastrado"
      ui: "estado vazio com acao de novo agente"
    - name: error
      when: "falha ao listar agentes"
      ui: "mensagem de erro com botao de tentar novamente"
  data:
    - field: "agents"
      source: "api:/agents"
      editable: false
      format: "lista paginada de agentes"
    - field: "search"
      source: "api:/agents?q="
      editable: true
      format: "busca por nome ou time"
  interactions:
    - trigger: "abrir /agents"
      action: "carrega a lista de agentes"
      result: "renderiza a tabela com busca e paginacao"
    - trigger: "clicar em um agente"
      action: "navega para o detalhe"
      result: "abre /agents/:id"
    - trigger: "clicar em novo agente"
      action: "navega para o formulario"
      result: "abre /agents/new"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
