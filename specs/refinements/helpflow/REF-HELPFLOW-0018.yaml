id: REF-HELPFLOW-0018
slug: ref-helpflow-0018
title: "Políticas de SLA"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements
  - requirement_id: REQ-HELPFLOW-0004
    relation: relates_to

surface:
  route: "/sla-policies"
  name: "Políticas de SLA"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "lista de politicas carregada"
      ui: "tabela de politicas com metas por prioridade e horario de atendimento"
    - name: loading
      when: "buscando politicas de SLA"
      ui: "skeleton de linhas na tabela"
    - name: empty
      when: "nenhuma politica cadastrada"
      ui: "estado vazio com acao de nova politica"
    - name: error
      when: "falha ao listar politicas"
      ui: "mensagem de erro com botao de tentar novamente"
  data:
    - field: "policies"
      source: "api:/sla-policies"
      editable: false
      format: "lista de politicas de SLA"
    - field: "search"
      source: "api:/sla-policies?q="
      editable: true
      format: "busca por nome da politica"
  interactions:
    - trigger: "abrir /sla-policies"
      action: "carrega a lista de politicas"
      result: "renderiza a tabela com metas por prioridade"
    - trigger: "clicar em uma politica"
      action: "navega para o detalhe"
      result: "abre /sla-policies/:id"
    - trigger: "clicar em nova politica"
      action: "navega para o formulario"
      result: "abre /sla-policies/new"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
