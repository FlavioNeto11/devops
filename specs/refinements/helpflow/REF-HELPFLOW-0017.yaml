id: REF-HELPFLOW-0017
slug: ref-helpflow-0017
title: "Editar time/fila"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0003
    relation: implements

surface:
  route: "/teams/:id/edit"
  name: "Editar time/fila"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "formulario carregado com os dados do time"
      ui: "formulario preenchido com nome, regra de roteamento e SLA"
    - name: loading
      when: "buscando o time para edicao"
      ui: "campos desabilitados com indicador de carregamento"
    - name: empty
      when: "campos opcionais sem valor"
      ui: "placeholders e ajuda inline"
    - name: error
      when: "validacao falhou ou erro ao salvar"
      ui: "mensagens de erro por campo e alerta geral"
  data:
    - field: "name"
      source: "api:/teams/:id"
      editable: true
      format: "nome do time/fila"
    - field: "routing_rule"
      source: "api:/teams/:id"
      editable: true
      format: "regra de roteamento"
    - field: "default_sla_policy_id"
      source: "api:/sla-policies"
      editable: true
      format: "politica de SLA padrao"
  interactions:
    - trigger: "alterar campos"
      action: "valida em tempo real"
      result: "habilita salvar quando valido"
    - trigger: "clicar em salvar"
      action: "persiste as alteracoes"
      result: "redireciona para o detalhe do time"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
