id: REF-HELPFLOW-0033
slug: ref-helpflow-0033
title: "Fila de Processamento"
kind: screen
status: approved

scope:
  product_scope: helpflow
  applies_to: screen

anchors:
  - requirement_id: REQ-HELPFLOW-0004
    relation: implements

surface:
  route: "/jobs"
  name: "Fila de Processamento"
  roles:
    - user

behavior:
  states:
    - name: normal
      when: "lista de jobs carregada"
      ui: "tabela de jobs com tipo, status, tentativas e agendamento"
    - name: loading
      when: "buscando jobs"
      ui: "skeleton de linhas na tabela"
    - name: empty
      when: "nenhum job na fila"
      ui: "estado vazio indicando fila ociosa"
    - name: error
      when: "falha ao listar jobs"
      ui: "mensagem de erro com botao de tentar novamente"
  data:
    - field: "jobs"
      source: "api:/jobs"
      editable: false
      format: "lista de jobs em fila/processando/concluidos/falhos"
    - field: "filters"
      source: "api:/jobs?status&type"
      editable: true
      format: "filtros por status e tipo"
  interactions:
    - trigger: "abrir /jobs"
      action: "carrega a fila de processamento"
      result: "renderiza a tabela com status dos jobs"
    - trigger: "clicar em um job"
      action: "navega para o detalhe"
      result: "abre /jobs/:id"
    - trigger: "clicar em reprocessar um job falho"
      action: "reenfileira o job"
      result: "atualiza o status para em fila"

source:
  source_paths:
    - specs/products/helpflow/product.json
    - apps/helpflow/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
