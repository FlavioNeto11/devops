id: REF-SHOPDESK-0011
slug: ref-shopdesk-0011
title: "Carrinhos"
kind: screen
status: approved

scope:
  product_scope: shopdesk
  applies_to: screen

anchors:
  - requirement_id: REQ-SHOPDESK-0003
    relation: implements

surface:
  route: "/carts"
  name: "Carrinhos"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "items"
      source: "api:/carts"
      editable: false
      format: "colecao paginada"
    - field: "total"
      source: "api:/carts"
      editable: false
      format: "inteiro"
    - field: "query"
      source: "estado-local (filtro/busca)"
      editable: true
  interactions:
    - trigger: "abrir /carts"
      action: "carrega a colecao de carts"
      result: "renderiza tabela/lista com paginacao"
    - trigger: "digitar na busca/filtro"
      action: "consulta a colecao filtrada"
      result: "atualiza a lista exibida"
    - trigger: "clicar em uma linha"
      action: "navega para o detalhe"
      result: "abre /carts/:id"

source:
  source_paths:
    - specs/products/shopdesk/product.json
    - apps/shopdesk/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
