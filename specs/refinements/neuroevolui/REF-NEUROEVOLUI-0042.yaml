      action: "POST /api/knowledge-sources/:id/reindex"
      result: "reindexação enfileirada, feedback de confirmação"
    - trigger: "clique em 'Voltar'"
      action: "navega para /knowledge-sources"
      result: "retorna à lista de fontes"
