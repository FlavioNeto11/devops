      ui: "Skeleton dos campos de detalhe enquanto carrega"
    - name: "empty"
      ui: "Fonte sem documentos: mensagem orientando a reindexação"
    - name: "error"
      ui: "Mensagem de erro 404 se fonte não encontrada, com link para voltar à lista"
  data:
    - field: "name"
      source: "api:/api/knowledge-sources/:id"
      editable: false
    - field: "description"
      source: "api:/api/knowledge-sources/:id"
      editable: false
    - field: "source_type"
      source: "api:/api/knowledge-sources/:id"
      editable: false
    - field: "url"
      source: "api:/api/knowledge-sources/:id"
      editable: false
    - field: "active"
      source: "api:/api/knowledge-sources/:id"
      editable: false
    - field: "indexed_at"
      source: "api:/api/knowledge-sources/:id"
      format: "dd/MM/yyyy HH:mm"
      editable: false
    - field: "document_count"
      source: "api:/api/knowledge-sources/:id"
      editable: false
  interactions:
    - trigger: "clique em 'Editar'"
