id: "REF-NEUROEVOLUI-0049"
slug: "ref-neuroevolui-0049"
title: "Detalhes do Job"
kind: "screen"
status: "approved"
scope:
  product_scope: "neuroevolui"
anchors:
  - requirement_id: "REQ-NEUROEVOLUI-0003"
    relation: "implements"
surface:
  route: "/async-jobs/:id"
  name: "Detalhes do Job"
  roles:
    - "user"
behavior:
  states:
    - name: "normal"
      ui: "Detalhes completos do job: tipo, status, progresso, logs de execução e timestamps"
    - name: "loading"
      ui: "Skeleton dos campos de detalhe enquanto carrega"
    - name: "empty"
      ui: "Estado não aplicável — job sempre existe ao acessar por ID válido"
    - name: "error"
      ui: "Mensagem de erro 404 se job não encontrado, com link para voltar à lista"
  data:
    - field: "id"
      source: "api:/api/async-jobs/:id"
      editable: false
    - field: "type"
      source: "api:/api/async-jobs/:id"
      editable: false
    - field: "status"
      source: "api:/api/async-jobs/:id"
      editable: false
    - field: "progress"
      source: "api:/api/async-jobs/:id"
      format: "percent"
      editable: false
    - field: "logs"
      source: "api:/api/async-jobs/:id"
      editable: false
    - field: "created_at"
      source: "api:/api/async-jobs/:id"
      format: "dd/MM/yyyy HH:mm:ss"
      editable: false
    - field: "completed_at"
      source: "api:/api/async-jobs/:id"
      format: "dd/MM/yyyy HH:mm:ss"
      editable: false
    - field: "error_message"
      source: "api:/api/async-jobs/:id"
      editable: false
  interactions:
    - trigger: "clique em 'Cancelar job'"
      action: "DELETE /api/async-jobs/:id"
      result: "job cancelado, confirmação exibida"
    - trigger: "clique em 'Reintentar'"
      action: "POST /api/async-jobs/:id/retry"
      result: "job reenfileirado, status atualizado"
    - trigger: "clique em 'Voltar'"
      action: "navega para /async-jobs"
      result: "retorna à lista de jobs"
source:
  source_paths:
    - "specs/products/neuroevolui/product.json"
    - "apps/neuroevolui/frontend/src/views"
version:
  baseline_version: "1.0.0"
  item_revision: 1
