id: REF-CONTAVIVA360-0026
slug: accounts-receivable-edit
title: Editar Conta a Receber
kind: screen
status: approved

scope:
  product_scope: contaviva-360
  applies_to: screen

anchors:
  - requirement_id: REQ-CONTAVIVA360-0005
    relation: implements
    note: formulário de edição de conta a receber existente

surface:
  route: /accounts-receivable/:id/edit
  name: Editar Conta a Receber
  roles: [user]

behavior:
  states:
    - name: normal
      when: dados carregados para edição
      ui: campos pré-preenchidos com todos os campos editáveis
    - name: loading
      when: carregando dados ou enviando atualização
      ui: skeleton nos campos; botão "Salvar" com spinner durante envio
    - name: empty
      when: ID não encontrado (404)
      ui: mensagem "Registro não encontrado" com botão "Voltar"
    - name: error
      when: erro de validação ou falha de rede
      ui: mensagens de erro inline; banner de erro geral
  data:
    - field: contraparte
      source: api:/v1/accounts-receivable/:id
      format: texto
      editable: true
    - field: valor
      source: api:/v1/accounts-receivable/:id
      format: decimal
      editable: true
    - field: data
      source: api:/v1/accounts-receivable/:id
      format: data
      editable: true
    - field: categoria
      source: api:/v1/accounts-receivable/:id
      format: texto
      editable: true
    - field: descricao
      source: api:/v1/accounts-receivable/:id
      format: texto longo
      editable: true
    - field: forma_recebimento
      source: api:/v1/accounts-receivable/:id
      format: texto
      editable: true
    - field: recorrente
      source: api:/v1/accounts-receivable/:id
      format: booleano
      editable: true
    - field: status
      source: api:/v1/accounts-receivable/:id
      format: enum (pendente|recebido|vencido|cancelado)
      editable: true
    - field: comprovante_url
      source: api:/v1/accounts-receivable/:id
      format: URL
      editable: true
  interactions:
    - trigger: carregar página
      action: GET /v1/accounts-receivable/:id
      result: pré-preenche campos com dados existentes
    - trigger: submeter formulário
      action: PUT /v1/accounts-receivable/:id com campos atualizados
      result: atualiza conta a receber e redireciona para /accounts-receivable
    - trigger: clicar em "Cancelar"
      action: navega para /accounts-receivable
      result: descarta alterações

source:
  source_paths:
    - specs/products/contaviva-360/product.json
    - apps/contaviva-360/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
