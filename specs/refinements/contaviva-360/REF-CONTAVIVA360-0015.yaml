id: REF-CONTAVIVA360-0015
slug: fiscal-obligations-edit
title: Editar Obrigação Fiscal
kind: screen
status: approved

scope:
  product_scope: contaviva-360
  applies_to: screen

anchors:
  - requirement_id: REQ-CONTAVIVA360-0003
    relation: implements
    note: formulário de edição de obrigação fiscal existente

surface:
  route: /fiscal-obligations/:id/edit
  name: Editar Obrigação Fiscal
  roles: [user]

behavior:
  states:
    - name: normal
      when: dados carregados para edição
      ui: campos pré-preenchidos (tipo, data_vencimento, periodicidade, status, descrição, valor estimado)
    - name: loading
      when: carregando dados ou enviando atualização
      ui: skeleton nos campos; botão "Salvar" com spinner durante envio
    - name: empty
      when: ID não encontrado (404)
      ui: mensagem "Registro não encontrado" com botão "Voltar"
    - name: error
      when: erro de validação ou falha de rede
      ui: mensagens de erro inline; banner de erro geral
  data:
    - field: tipo
      source: api:/v1/fiscal-obligations/:id
      format: enum (IRPF|IRPJ|ICMS|ISS|DARF|ECF|ECD|e-Social|CAGED|Simples DAS|PER|DIRF|RRA|outro)
      editable: true
    - field: data_vencimento
      source: api:/v1/fiscal-obligations/:id
      format: data (YYYY-MM-DD)
      editable: true
    - field: periodicidade
      source: api:/v1/fiscal-obligations/:id
      format: enum (mensal|trimestral|anual)
      editable: true
    - field: status
      source: api:/v1/fiscal-obligations/:id
      format: enum (pendente|pago|cancelado|atrasado|aprovacao_pendente)
      editable: true
    - field: descricao
      source: api:/v1/fiscal-obligations/:id
      format: texto livre
      editable: true
    - field: valor_estimado
      source: api:/v1/fiscal-obligations/:id
      format: decimal
      editable: true
    - field: entidade_tipo
      source: api:/v1/fiscal-obligations/:id
      format: enum (PF|PJ)
      editable: false
    - field: entidade_id
      source: api:/v1/fiscal-obligations/:id
      format: número
      editable: false
  interactions:
    - trigger: carregar página
      action: GET /v1/fiscal-obligations/:id
      result: pré-preenche os campos com os dados existentes
    - trigger: submeter formulário
      action: PUT /v1/fiscal-obligations/:id com tipo, data_vencimento, periodicidade, status, descricao, valor_estimado
      result: atualiza obrigação e redireciona para /fiscal-obligations/:id
    - trigger: alterar status via seletor rápido
      action: PATCH /v1/fiscal-obligations/:id/status com novo_status
      result: atualiza apenas o status da obrigação
    - trigger: clicar em "Cancelar"
      action: navega para /fiscal-obligations/:id
      result: descarta alterações

source:
  source_paths:
    - specs/products/contaviva-360/product.json
    - apps/contaviva-360/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
