id: REF-CONTAVIVA360-0013
slug: fiscal-obligations-list
title: Obrigações Fiscais
kind: screen
status: approved

scope:
  product_scope: contaviva-360
  applies_to: screen

anchors:
  - requirement_id: REQ-CONTAVIVA360-0003
    relation: implements
    note: listagem de obrigações fiscais com alertas de vencimento

surface:
  route: /fiscal-obligations
  name: Obrigações Fiscais
  roles: [user]

behavior:
  states:
    - name: normal
      when: lista carregada com registros
      ui: tabela com tipo, entidade, vencimento, periodicidade, status, nível de alerta e ações
    - name: loading
      when: requisição em andamento
      ui: skeleton de tabela
    - name: empty
      when: nenhuma obrigação cadastrada
      ui: mensagem "Nenhuma obrigação fiscal cadastrada" com botão "Cadastrar"
    - name: error
      when: falha na requisição
      ui: mensagem de erro com botão "Tentar novamente"
  data:
    - field: id
      source: api:/v1/fiscal-obligations
      format: número
      editable: false
    - field: tipo
      source: api:/v1/fiscal-obligations
      format: enum (IRPF|IRPJ|ICMS|ISS|DARF|ECF|ECD|e-Social|CAGED|Simples DAS|PER|DIRF|RRA|outro)
      editable: false
    - field: data_vencimento
      source: api:/v1/fiscal-obligations
      format: data DD/MM/AAAA
      editable: false
    - field: periodicidade
      source: api:/v1/fiscal-obligations
      format: enum (mensal|trimestral|anual)
      editable: false
    - field: status
      source: api:/v1/fiscal-obligations
      format: enum (pendente|pago|cancelado|atrasado|aprovacao_pendente)
      editable: false
    - field: nivel_alerta
      source: api:/v1/fiscal-obligations
      format: enum (critico|vermelho|laranja|amarelo|null)
      editable: false
    - field: entidade_tipo
      source: api:/v1/fiscal-obligations
      format: enum (PF|PJ)
      editable: false
    - field: valor_estimado
      source: api:/v1/fiscal-obligations
      format: moeda BRL
      editable: false
  interactions:
    - trigger: carregar página
      action: GET /v1/fiscal-obligations
      result: popula tabela com obrigações do tenant ordenadas por vencimento
    - trigger: filtrar por status
      action: GET /v1/fiscal-obligations?status=<valor>
      result: filtra obrigações pelo status
    - trigger: filtrar por tipo
      action: GET /v1/fiscal-obligations?tipo=<valor>
      result: filtra obrigações pelo tipo
    - trigger: clicar em "Nova Obrigação"
      action: navega para /fiscal-obligations/new
      result: abre formulário de cadastro
    - trigger: clicar em linha da tabela
      action: navega para /fiscal-obligations/:id
      result: abre detalhe da obrigação

source:
  source_paths:
    - specs/products/contaviva-360/product.json
    - apps/contaviva-360/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
