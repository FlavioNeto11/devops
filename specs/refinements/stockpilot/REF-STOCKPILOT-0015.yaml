id: REF-STOCKPILOT-0015
slug: ref-stockpilot-0015
title: "Novo fornecedor"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0004
    relation: implements

surface:
  route: "/suppliers/new"
  name: "Novo fornecedor"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "name"
      source: "ui:form"
      editable: true
      format: "nome do fornecedor"
    - field: "contact"
      source: "ui:form"
      editable: true
      format: "contato (email/telefone)"
    - field: "lead_time"
      source: "ui:form"
      editable: true
      format: "prazo de entrega em dias"
  interactions:
    - trigger: "abrir /suppliers/new"
      action: "exibe formulario vazio de fornecedor"
      result: "renderiza campos com validacao inline"
    - trigger: "clicar em Salvar"
      action: "POST /suppliers"
      result: "cria o fornecedor e navega para o detalhe"
    - trigger: "clicar em Cancelar"
      action: "descarta o formulario"
      result: "retorna para /suppliers"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
