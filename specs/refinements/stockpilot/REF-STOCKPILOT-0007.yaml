id: REF-STOCKPILOT-0007
slug: ref-stockpilot-0007
title: "Detalhe do pedido"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0003
    relation: implements
  - requirement_id: REQ-STOCKPILOT-0004
    relation: relates_to

surface:
  route: "/orders/:id"
  name: "Detalhe do pedido"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "order"
      source: "api:/orders/:id"
      editable: false
      format: "cabecalho do pedido (status, fornecedor, datas)"
    - field: "lines"
      source: "api:/orders/:id"
      editable: false
      format: "itens do pedido com quantidades"
    - field: "supplier"
      source: "api:/suppliers/:id"
      editable: false
      format: "fornecedor vinculado ao pedido"
  interactions:
    - trigger: "abrir /orders/:id"
      action: "carrega o pedido e seus itens"
      result: "renderiza cabecalho, itens e fornecedor"
    - trigger: "clicar no fornecedor"
      action: "navega para /suppliers/:id"
      result: "abre o detalhe do fornecedor"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
