id: REF-STOCKPILOT-0001
slug: ref-stockpilot-0001
title: "Painel de controle"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0005
    relation: implements
  - requirement_id: REQ-STOCKPILOT-0001
    relation: relates_to

surface:
  route: "/"
  name: "Painel de controle"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "kpis"
      source: "api:/dashboard/summary"
      editable: false
      format: "metricas agregadas de estoque (OK/ALERTA/RUPTURA)"
    - field: "low_stock"
      source: "api:/products?status=low"
      editable: false
      format: "lista de itens em alerta"
    - field: "recent_alerts"
      source: "api:/alerts?recent=true"
      editable: false
      format: "alertas recentes"
  interactions:
    - trigger: "abrir /"
      action: "carrega KPIs, itens em alerta e alertas recentes"
      result: "renderiza cards de status e atalhos operacionais"
    - trigger: "clicar em um card de status"
      action: "navega para a lista filtrada correspondente"
      result: "abre a tela alvo com filtro aplicado"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
