id: REF-STOCKPILOT-0003
slug: ref-stockpilot-0003
title: "Novo produto"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0005
    relation: implements

surface:
  route: "/products/new"
  name: "Novo produto"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "form"
      source: "ui:local"
      editable: true
      format: "campos do produto (sku, nome, estoque, ponto de reposicao)"
  interactions:
    - trigger: "abrir /products/new"
      action: "exibe formulario vazio"
      result: "renderiza campos editaveis"
    - trigger: "submeter o formulario"
      action: "valida e envia POST /products"
      result: "cria o produto e navega para o detalhe"
    - trigger: "cancelar"
      action: "descarta as alteracoes"
      result: "volta para a lista de produtos"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
