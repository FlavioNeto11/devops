id: REF-STOCKPILOT-0014
slug: ref-stockpilot-0014
title: "Fornecedores"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0004
    relation: implements

surface:
  route: "/suppliers"
  name: "Fornecedores"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "suppliers"
      source: "api:/suppliers"
      editable: false
      format: "lista de fornecedores com contato e status"
    - field: "search"
      source: "ui:local"
      editable: true
      format: "termo de busca"
  interactions:
    - trigger: "abrir /suppliers"
      action: "carrega a lista de fornecedores"
      result: "renderiza tabela com fornecedores e contatos"
    - trigger: "clicar em Novo fornecedor"
      action: "navega para /suppliers/new"
      result: "abre o formulario de criacao"
    - trigger: "clicar em uma linha"
      action: "navega para /suppliers/:id"
      result: "abre o detalhe do fornecedor"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
