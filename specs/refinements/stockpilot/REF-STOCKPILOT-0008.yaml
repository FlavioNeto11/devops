id: REF-STOCKPILOT-0008
slug: ref-stockpilot-0008
title: "Alertas de estoque"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0007
    relation: implements
  - requirement_id: REQ-STOCKPILOT-0005
    relation: relates_to

surface:
  route: "/alerts"
  name: "Alertas de estoque"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "alerts"
      source: "api:/alerts"
      editable: false
      format: "lista de alertas de estoque (ALERTA/RUPTURA)"
    - field: "severity_filter"
      source: "ui:local"
      editable: true
      format: "filtro por severidade"
  interactions:
    - trigger: "abrir /alerts"
      action: "carrega os alertas de estoque"
      result: "renderiza lista com severidade e produto afetado"
    - trigger: "clicar em um alerta"
      action: "navega para o produto relacionado"
      result: "abre /products/:id"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
