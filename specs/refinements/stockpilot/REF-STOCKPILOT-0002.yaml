id: REF-STOCKPILOT-0002
slug: ref-stockpilot-0002
title: "Produtos"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0005
    relation: implements
  - requirement_id: REQ-STOCKPILOT-0003
    relation: relates_to

surface:
  route: "/products"
  name: "Produtos"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "items"
      source: "api:/products"
      editable: false
      format: "lista paginada de produtos"
    - field: "filters"
      source: "ui:local"
      editable: true
      format: "busca e filtro por status de estoque"
  interactions:
    - trigger: "abrir /products"
      action: "carrega a lista de produtos"
      result: "renderiza tabela densa com sinais de status"
    - trigger: "clicar em uma linha"
      action: "navega para o detalhe do produto"
      result: "abre /products/:id"
    - trigger: "clicar em Novo produto"
      action: "navega para o formulario de criacao"
      result: "abre /products/new"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
