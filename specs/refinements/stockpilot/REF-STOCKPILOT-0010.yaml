      source: "api:/notifications/:id"
      editable: false
      format: "conteudo da notificacao, canal e destinatario"
    - field: "delivery_status"
      source: "api:/notifications/:id"
      editable: false
      format: "status de entrega e degradacao graciosa"
  interactions:
    - trigger: "abrir /notifications/:id"
      action: "carrega o detalhe da notificacao"
      result: "renderiza conteudo, canal e status de entrega"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
