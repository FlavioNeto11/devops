id: REF-STOCKPILOT-0013
slug: ref-stockpilot-0013
title: "Editar canal"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0007
    relation: implements

surface:
  route: "/channels/:id/edit"
  name: "Editar canal"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "form"
      source: "api:/channels/:id"
      editable: true
      format: "campos do canal pre-preenchidos"
  interactions:
    - trigger: "abrir /channels/:id/edit"
      action: "carrega e preenche o formulario do canal"
      result: "renderiza campos editaveis com valores atuais"
    - trigger: "clicar em Salvar"
      action: "PUT /channels/:id"
      result: "salva e volta para /channels"
    - trigger: "clicar em Cancelar"
      action: "descarta as alteracoes"
      result: "retorna para /channels"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
