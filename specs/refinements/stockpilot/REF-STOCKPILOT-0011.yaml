id: REF-STOCKPILOT-0011
slug: ref-stockpilot-0011
title: "Canais de notificacao"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0007
    relation: implements

surface:
  route: "/channels"
  name: "Canais de notificacao"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "channels"
      source: "api:/channels"
      editable: false
      format: "lista de canais configurados (email/push/whatsapp)"
    - field: "enabled_status"
      source: "api:/channels"
      editable: false
      format: "estado de habilitacao por canal"
  interactions:
    - trigger: "abrir /channels"
      action: "carrega os canais de notificacao"
      result: "renderiza lista com tipo e estado de cada canal"
    - trigger: "clicar em Novo canal"
      action: "navega para /channels/new"
      result: "abre o formulario de criacao"
    - trigger: "clicar em Editar"
      action: "navega para /channels/:id/edit"
      result: "abre o formulario de edicao"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
