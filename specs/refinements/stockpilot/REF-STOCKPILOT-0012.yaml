id: REF-STOCKPILOT-0012
slug: ref-stockpilot-0012
title: "Novo canal"
kind: screen
status: approved

scope:
  product_scope: stockpilot
  applies_to: screen

anchors:
  - requirement_id: REQ-STOCKPILOT-0007
    relation: implements

surface:
  route: "/channels/new"
  name: "Novo canal"
  roles:
    - user

behavior:
  states:
    - name: normal
    - name: loading
    - name: empty
    - name: error
  data:
    - field: "type"
      source: "ui:form"
      editable: true
      format: "tipo do canal (email/push/whatsapp)"
    - field: "target"
      source: "ui:form"
      editable: true
      format: "destino do canal (endereco/numero/token)"
    - field: "enabled"
      source: "ui:form"
      editable: true
      format: "estado de habilitacao"
  interactions:
    - trigger: "abrir /channels/new"
      action: "exibe formulario vazio de canal"
      result: "renderiza campos com validacao inline"
    - trigger: "clicar em Salvar"
      action: "POST /channels"
      result: "cria o canal e volta para /channels"
    - trigger: "clicar em Cancelar"
      action: "descarta o formulario"
      result: "retorna para /channels"

source:
  source_paths:
    - specs/products/stockpilot/product.json
    - apps/stockpilot/frontend/src/views

version:
  baseline_version: 1.0.0
  item_revision: 1
