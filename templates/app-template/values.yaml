# =============================================================================
# values.yaml — Valores PADRAO do chart (fallback).
# -----------------------------------------------------------------------------
# Na pratica, sempre forneca um arquivo de ambiente explicito:
#   helm template ./ -f values.local.yaml
#   helm upgrade --install aplicacao1 ./ -n apps -f values.local.yaml
#
# Estes defaults espelham o laboratorio local (values.local.yaml) e existem
# apenas para que um "helm template ./" sem -f nao quebre por valores ausentes.
# =============================================================================

app:
  name: aplicacao1
  namespace: apps
  host: nvit.localhost
  basePath: /aplicacao1

# Registry vazio = imagens locais do laboratorio (nao enviadas ao GHCR).
registry: ''

defaults:
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

publish:
  commitSha: local
  branch: local
  imageTag: local
  deployedAt: ''
  runId: ''

# SEM services de exemplo aqui — DELIBERADO. O helm faz DEEP MERGE dos values
# (-f sobre este arquivo) por CAMPO: qualquer service de exemplo declarado aqui
# vaza para apps reais com service homônimo (ex.: um frontend real herdava
# env VITE_BASE_PATH: /aplicacao1/ e um worker real herdava health do exemplo —
# regressão pega na convergência do contaviva-pro, Forja 4.0). Exemplos completos:
# values.local.yaml / values.dev.yaml / app.yaml (nunca auto-carregados).
services: {}
