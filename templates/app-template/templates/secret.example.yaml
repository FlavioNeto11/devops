# =============================================================================
# secret.example.yaml — EXEMPLO de Secret da aplicacao (NAO APLICAR DIRETAMENTE).
# -----------------------------------------------------------------------------
# ATENCAO: este arquivo e apenas um MODELO com valores PLACEHOLDER.
# NAO aplique este arquivo no cluster. Em vez disso:
#   1. Copie este arquivo para "secret.yaml" (que deve estar no .gitignore).
#        copy templates\secret.example.yaml templates\secret.yaml
#   2. Preencha os valores reais em stringData (sem aspas extras desnecessarias).
#   3. Aplique manualmente:  kubectl apply -f templates\secret.yaml -n apps
#
# Por que fora do fluxo do Helm? Para evitar que segredos reais entrem no
# controle de versao ou no release do Helm. O chart referencia o Secret pelo
# nome, mas nao o gera com valores reais.
#
# Como preencher cada chave:
#   DATABASE_URL  -> string de conexao do banco (ex.: postgres://user:pass@host:5432/db)
#   API_KEY       -> chave de API de terceiros usada pela API
#   JWT_SECRET    -> segredo para assinar tokens JWT (gere um valor aleatorio forte)
#
# Dica para gerar um segredo forte (PowerShell 7):
#   [Convert]::ToBase64String((1..48 | ForEach-Object { Get-Random -Max 256 }))
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  # Convencao de nome: <app.name>-secrets
  name: aplicacao1-secrets
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao1
    app.kubernetes.io/part-of: aplicacao1
    app.kubernetes.io/managed-by: devops-platform
    devops.flavioneto/app: aplicacao1
type: Opaque
stringData:
  # ---- PREENCHA OS VALORES ABAIXO (placeholders) ----
  DATABASE_URL: "REPLACE_ME_postgres://user:password@host:5432/aplicacao1"
  API_KEY: "REPLACE_ME_api_key"
  JWT_SECRET: "REPLACE_ME_jwt_signing_secret"
