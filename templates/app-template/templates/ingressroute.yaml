{{- /*
=============================================================================
ingressroute.yaml — Rotas do Traefik para a aplicacao (entryPoint web/HTTP).
-----------------------------------------------------------------------------
Gera UMA IngressRoute com uma route por service exposto (expose=true), mais
um Middleware StripPrefix por service com stripPrefix=true.

Convencao de roteamento (critica):
  * frontend (SPA): match Host(app.host) && PathPrefix(app.basePath), SEM
    middleware de strip, com priority MENOR. A imagem ja e servida no subpath.
  * api/api2: match Host(app.host) && PathPrefix(app.basePath + svc.path), COM
    Middleware StripPrefix (remove o prefixo COMPLETO), com priority MAIOR para
    vencer o frontend no mesmo host (o prefixo mais especifico ganha).

Hosts: incluimos app.host E www.xpto.com (quando diferentes) usando a forma
Host(`a`, `b`) do Traefik, para que o mesmo layout de paths funcione no host
local e no dominio real.

HTTPS/websecure: pendente (certificado self-signed). Por enquanto so web.
=============================================================================
*/ -}}
{{- $root := . -}}
{{- $appHost := .Values.app.host -}}
{{- $realHost := "www.xpto.com" -}}
{{- /* Monta a lista de hosts (sem duplicar) para a clausula Host(...) */ -}}
{{- $hosts := list $appHost -}}
{{- if ne $appHost $realHost -}}
{{- $hosts = append $hosts $realHost -}}
{{- end -}}
{{- $hostClause := "" -}}
{{- range $i, $h := $hosts -}}
{{- if $i -}}{{- $hostClause = printf "%s, `%s`" $hostClause $h -}}{{- else -}}{{- $hostClause = printf "`%s`" $h -}}{{- end -}}
{{- end -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "app-template.appName" . }}
  namespace: {{ .Values.app.namespace }}
  labels:
    {{- include "app-template.commonLabels" (dict "root" . "name" "" "component" "ingress") | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    {{- /* Primeiro as rotas de api/api2 (prioridade MAIOR, prefixo mais longo) */ -}}
    {{- range $name, $svc := .Values.services }}
    {{- if and $svc.expose (or (eq $svc.type "api") (eq $svc.type "api2")) }}
    {{- $prefix := include "app-template.fullPrefix" (dict "root" $root "svc" $svc) }}
    - kind: Rule
      match: Host({{ $hostClause }}) && PathPrefix(`{{ $prefix }}`)
      priority: 100
      services:
        - name: {{ include "app-template.fullname" (dict "root" $root "name" $name) }}
          port: {{ $svc.port }}
      {{- if $svc.stripPrefix }}
      middlewares:
        - name: {{ include "app-template.fullname" (dict "root" $root "name" $name) }}-stripprefix
      {{- end }}
    {{- end }}
    {{- end }}
    {{- /* Depois as rotas de frontend (prioridade MENOR), SEM strip */ -}}
    {{- range $name, $svc := .Values.services }}
    {{- if and $svc.expose (eq $svc.type "frontend") }}
    - kind: Rule
      match: Host({{ $hostClause }}) && PathPrefix(`{{ $root.Values.app.basePath }}`)
      priority: 10
      services:
        - name: {{ include "app-template.fullname" (dict "root" $root "name" $name) }}
          port: {{ $svc.port }}
    {{- end }}
    {{- end }}
{{- /* Middlewares StripPrefix: um por service com stripPrefix=true */ -}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.expose $svc.stripPrefix }}
{{- $prefix := include "app-template.fullPrefix" (dict "root" $root "svc" $svc) }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "app-template.fullname" (dict "root" $root "name" $name) }}-stripprefix
  namespace: {{ $root.Values.app.namespace }}
  labels:
    {{- include "app-template.commonLabels" (dict "root" $root "name" $name "component" $svc.type) | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ $prefix | quote }}
{{- end }}
{{- end }}
