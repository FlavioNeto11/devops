# =============================================================================
# api-deployment.yaml - Deployment da API (Express) da aplicacao1
# -----------------------------------------------------------------------------
# Imagem local do laboratorio: aplicacao1-api:local (IfNotPresent).
# liveness/readiness usam /health (rota na raiz, pois o Traefik faz StripPrefix).
# Variaveis de ambiente APP_VERSION/COMMIT_SHA vem do ConfigMap da app.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao1-api
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao1
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: aplicacao1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aplicacao1
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aplicacao1
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: aplicacao1
    spec:
      containers:
        - name: api
          image: aplicacao1-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: aplicacao1-config
                  key: APP_VERSION
            - name: COMMIT_SHA
              valueFrom:
                configMapKeyRef:
                  name: aplicacao1-config
                  key: COMMIT_SHA
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
