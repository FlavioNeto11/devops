# =============================================================================
# frontend-service.yaml - Service (ClusterIP) do frontend da aplicacao1
# -----------------------------------------------------------------------------
# Exposto internamente na porta 80. Roteado externamente pelo IngressRoute
# do Traefik em /aplicacao1 (sem strip).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: aplicacao1-frontend
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao1
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aplicacao1
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
