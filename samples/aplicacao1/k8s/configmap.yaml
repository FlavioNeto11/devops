# =============================================================================
# configmap.yaml - Configuracao (nao sensivel) da aplicacao1
# -----------------------------------------------------------------------------
# Valores nao sensiveis consumidos pelos Deployments (ex.: a API le APP_VERSION
# e COMMIT_SHA). Segredos NAO ficam aqui; use Secret (ver secret.example.yaml
# da plataforma) para credenciais.
#
# No laboratorio local os valores ficam como "local". No CI/CD, o pipeline pode
# sobrescrever COMMIT_SHA/APP_VERSION com o SHA do commit.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aplicacao1-config
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao1
data:
  APP_NAME: "aplicacao1"
  APP_VERSION: "local"
  COMMIT_SHA: "local"
  BASE_PATH: "/aplicacao1/"
  HOST: "xpto.localhost"
