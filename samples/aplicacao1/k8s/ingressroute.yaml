# =============================================================================
# ingressroute.yaml - IngressRoute (Traefik) da aplicacao1
# -----------------------------------------------------------------------------
# Roteamento no host unico (local: xpto.localhost ; real futuro: nvit.io):
#   /aplicacao1/api -> API (priority 20, COM Middleware StripPrefix api-strip)
#   /aplicacao1     -> frontend (priority 10, SEM strip)
#
# A prioridade MAIOR (20) garante que o caminho mais especifico (/aplicacao1/api)
# vença sobre o mais generico (/aplicacao1). Embora o Traefik tambem use o
# tamanho da regra como desempate, definimos priority explicito por seguranca.
#
# entryPoints: [web] (HTTP, porta 80). O websecure (HTTPS/443) fica pendente
# (self-signed) e sera documentado/adicionado posteriormente.
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: aplicacao1
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao1
spec:
  entryPoints:
    - web
  routes:
    # --- API: caminho mais especifico, prioridade maior, COM strip ---
    - match: (Host(`xpto.localhost`) || Host(`nvit.io`)) && PathPrefix(`/aplicacao1/api`)
      kind: Rule
      priority: 20
      services:
        - name: aplicacao1-api
          port: 8080
      middlewares:
        - name: api-strip
    # --- Frontend: caminho generico, prioridade menor, SEM strip ---
    - match: (Host(`xpto.localhost`) || Host(`nvit.io`)) && PathPrefix(`/aplicacao1`)
      kind: Rule
      priority: 10
      services:
        - name: aplicacao1-frontend
          port: 80
