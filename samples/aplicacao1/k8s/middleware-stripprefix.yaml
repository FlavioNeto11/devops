# =============================================================================
# middleware-stripprefix.yaml - Middleware StripPrefix da API da aplicacao1
# -----------------------------------------------------------------------------
# Remove o prefixo COMPLETO /aplicacao1/api antes de encaminhar para o backend.
# Assim, /aplicacao1/api/health chega na API como /health.
#
# Convencao: APIs usam stripPrefix=true; o frontend NAO usa strip.
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-strip
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao1
    app.kubernetes.io/component: api
spec:
  stripPrefix:
    prefixes:
      - /aplicacao1/api
