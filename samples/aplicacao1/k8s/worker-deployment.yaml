# =============================================================================
# worker-deployment.yaml - Deployment do worker da aplicacao1
# -----------------------------------------------------------------------------
# Imagem local do laboratorio: aplicacao1-worker:local (IfNotPresent).
# Probe usa /health no servidor http minimo do worker (porta 8081).
# Este servico NAO e exposto via ingress.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao1-worker
  namespace: apps
  annotations:
    devops.flavioneto/commitSha: "d6a8437"
    devops.flavioneto/branch: "main"
    devops.flavioneto/imageTag: "local"
    devops.flavioneto/deployedAt: "2026-06-07T17:57:00Z"
    devops.flavioneto/runId: "manual-publish-001"
    devops.flavioneto/image: "aplicacao1-worker:local"
  labels:
    app.kubernetes.io/name: aplicacao1
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: aplicacao1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aplicacao1
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aplicacao1
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: aplicacao1
    spec:
      containers:
        - name: worker
          image: aplicacao1-worker:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: PORT
              value: "8081"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
