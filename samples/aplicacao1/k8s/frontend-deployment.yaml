# =============================================================================
# frontend-deployment.yaml - Deployment do frontend (nginx/SPA) da aplicacao1
# -----------------------------------------------------------------------------
# Imagem local do laboratorio: aplicacao1-frontend:local (IfNotPresent).
# readinessProbe usa o endpoint /healthz definido no nginx.conf.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao1-frontend
  namespace: apps
  annotations:
    devops.flavioneto/commitSha: "d6a8437"
    devops.flavioneto/branch: "main"
    devops.flavioneto/imageTag: "local"
    devops.flavioneto/deployedAt: "2026-06-07T17:57:00Z"
    devops.flavioneto/runId: "manual-publish-001"
    devops.flavioneto/image: "aplicacao1-frontend:local"
  labels:
    app.kubernetes.io/name: aplicacao1
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: aplicacao1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aplicacao1
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aplicacao1
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: aplicacao1
    spec:
      containers:
        - name: frontend
          image: aplicacao1-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
