# =============================================================================
# nginx.conf - Frontend (SPA) da aplicacao1
# -----------------------------------------------------------------------------
# IMPORTANTE: NAO ha strip de prefixo para o frontend. A SPA e servida
# diretamente no subpath /aplicacao1/ (build com base path /aplicacao1/).
# O Traefik encaminha o request com o caminho COMPLETO (ex.: /aplicacao1/...)
# e o nginx serve o conteudo estatico a partir desse subpath.
#
# Em contraste, a API (/aplicacao1/api) SOFRE StripPrefix no Traefik.
# =============================================================================

server {
    listen       80;
    server_name  _;

    # Logs para stdout/stderr (capturados pelo Kubernetes).
    access_log   /dev/stdout;
    error_log    /dev/stderr;

    # Redireciona /aplicacao1 (sem barra) para /aplicacao1/ (com barra),
    # garantindo que os caminhos relativos da SPA resolvam corretamente.
    location = /aplicacao1 {
        return 301 /aplicacao1/;
    }

    # SPA servida no subpath. O 'alias' mapeia /aplicacao1/ para a raiz dos
    # arquivos estaticos. O try_files tenta o arquivo solicitado e, se nao
    # existir (rotas client-side), cai para o index.html da SPA.
    location /aplicacao1/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /aplicacao1/index.html;
    }

    # Endpoint de health para o readinessProbe do pod (responde na raiz).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
