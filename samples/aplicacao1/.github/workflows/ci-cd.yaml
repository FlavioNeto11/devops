# =============================================================================
# ci-cd.yaml - Pipeline CI/CD da aplicacao1 (usa os workflows reusaveis centrais)
# -----------------------------------------------------------------------------
# IMPORTANTE (pt-BR):
#   - LOCALMENTE, este pipeline NAO e usado. No laboratorio local as imagens sao
#     buildadas com tag :local (aplicacao1-frontend:local, aplicacao1-api:local,
#     aplicacao1-worker:local) atraves do script publish-sample-app.ps1, e os
#     manifests em k8s/ usam imagePullPolicy: IfNotPresent.
#   - Este pipeline (push para GHCR) so faz sentido quando houver um runner
#     ativo (ex.: self-hosted ou GitHub-hosted). Ele reutiliza os workflows
#     centrais do repositorio FlavioNeto11/devops:
#       * reusable-build-push.yaml  -> build + push das imagens para o GHCR
#       * reusable-deploy-k8s.yaml  -> deploy dos manifests no cluster
#
# Imagens GHCR resultantes (tag = SHA do commit; tambem branch e 'latest'):
#   ghcr.io/flavioneto11/aplicacao1/frontend:<sha>
#   ghcr.io/flavioneto11/aplicacao1/api:<sha>
#   ghcr.io/flavioneto11/aplicacao1/worker:<sha>
# =============================================================================
name: aplicacao1-ci-cd

on:
  push:
    branches:
      - main
    paths:
      - "samples/aplicacao1/**"
      - ".github/workflows/ci-cd.yaml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Build + push das tres imagens (frontend, api, worker) em matrix.
  # Cada item aponta para o subdiretorio de build e o nome da imagem no GHCR.
  # ---------------------------------------------------------------------------
  build-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: samples/aplicacao1/frontend
            image: ghcr.io/flavioneto11/aplicacao1/frontend
          - service: api
            context: samples/aplicacao1/api
            image: ghcr.io/flavioneto11/aplicacao1/api
          - service: worker
            context: samples/aplicacao1/worker
            image: ghcr.io/flavioneto11/aplicacao1/worker
    uses: FlavioNeto11/devops/.github/workflows/reusable-build-push.yaml@main
    with:
      service: ${{ matrix.service }}
      context: ${{ matrix.context }}
      image: ${{ matrix.image }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Deploy dos manifests no cluster (depende do build/push concluir).
  # ---------------------------------------------------------------------------
  deploy:
    needs: build-push
    uses: FlavioNeto11/devops/.github/workflows/reusable-deploy-k8s.yaml@main
    with:
      app: aplicacao1
      namespace: apps
      manifests: samples/aplicacao1/k8s
    secrets: inherit
