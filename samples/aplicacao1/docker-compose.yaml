# =============================================================================
# docker-compose.yaml - Desenvolvimento local da aplicacao1
# -----------------------------------------------------------------------------
# Sobe os tres servicos (frontend, api, worker) para desenvolvimento local,
# sem Kubernetes. Use:
#   docker compose up --build
#
# Observacoes:
#   - O frontend e exposto em http://localhost:8081/aplicacao1/ (nginx serve no
#     subpath /aplicacao1/). A porta 8081 do host mapeia a porta 80 do container.
#   - A API e exposta diretamente em http://localhost:8080 (sem StripPrefix aqui,
#     pois o StripPrefix e responsabilidade do Traefik no cluster). Ex.:
#     http://localhost:8080/health
#   - O worker nao expoe portas ao host (health interno na 8081 do container).
# =============================================================================

services:
  frontend:
    build: ./frontend
    image: aplicacao1-frontend:local
    container_name: aplicacao1-frontend
    ports:
      - "8081:80"
    restart: unless-stopped

  api:
    build: ./api
    image: aplicacao1-api:local
    container_name: aplicacao1-api
    environment:
      PORT: "8080"
      APP_VERSION: "local"
      COMMIT_SHA: "local"
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build: ./worker
    image: aplicacao1-worker:local
    container_name: aplicacao1-worker
    environment:
      PORT: "8081"
    restart: unless-stopped
