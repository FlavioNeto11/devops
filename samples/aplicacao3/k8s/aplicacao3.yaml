---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: aplicacao3
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao3
    app.kubernetes.io/part-of: aplicacao3
spec:
  entryPoints:
    - web
  routes:
    - match: (Host(`xpto.localhost`) || Host(`nvit.io`)) && PathPrefix(`/aplicacao3/api2`)
      kind: Rule
      priority: 36
      services:
        - name: aplicacao3-api2
          port: 8080
      middlewares:
        - name: aplicacao3-api2-strip
    - match: (Host(`xpto.localhost`) || Host(`nvit.io`)) && PathPrefix(`/aplicacao3/api`)
      kind: Rule
      priority: 35
      services:
        - name: aplicacao3-api
          port: 8080
      middlewares:
        - name: aplicacao3-api-strip
    - match: (Host(`xpto.localhost`) || Host(`nvit.io`)) && PathPrefix(`/aplicacao3`)
      kind: Rule
      priority: 10
      services:
        - name: aplicacao3-frontend
          port: 80

