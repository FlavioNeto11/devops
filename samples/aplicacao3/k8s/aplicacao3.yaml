apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao3-frontend
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao3
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: aplicacao3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aplicacao3
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aplicacao3
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: aplicacao3
    spec:
      containers:
        - name: frontend
          image: aplicacao3-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aplicacao3-frontend
  namespace: apps
  labels:
    app.kubernetes.io/part-of: aplicacao3
spec:
  selector:
    app.kubernetes.io/name: aplicacao3
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
