apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplicacao3-worker
  namespace: apps
  labels:
    app.kubernetes.io/name: aplicacao3
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: aplicacao3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aplicacao3
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aplicacao3
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: aplicacao3
    spec:
      containers:
        - name: worker
          image: aplicacao3-worker:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
