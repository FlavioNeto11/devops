# =============================================================================
# Portal NovaIT — configuração nginx (servido na raiz "/").
# -----------------------------------------------------------------------------
# Objetivos:
#   - Servir o portal estático e os assets versionados (/assets) com cache.
#   - Headers de segurança em DEFESA EM PROFUNDIDADE. O Traefik já aplica
#     secure-headers (X-Frame-Options, X-Content-Type-Options, HSTS) na borda;
#     aqui adicionamos os que o Traefik NÃO cobre (CSP, Referrer-Policy,
#     Permissions-Policy) e repetimos nosniff para o caso de acesso direto ao
#     pod (port-forward/debug). Duplicar nosniff é inofensivo.
#   - Compressão gzip (o Traefik comprime na borda; mantemos aqui p/ acesso direto).
#   - Página 404 amigável (error_page -> /404.html).
# CSP: permite as Google Fonts e o fetch same-origin da API do Console
# (/devops/api/...). Sem 'unsafe-inline' em script-src NEM style-src. Há UM único
# <script> inline (o gate `document.documentElement.classList.add('js')` no <head>,
# que habilita o progressive enhancement sem flash) liberado por HASH sha256 —
# não 'unsafe-inline'. Se o snippet mudar, recalcule o hash:
#   printf '%s' "document.documentElement.classList.add('js')" | openssl dgst -sha256 -binary | base64
# Demais JS/CSS são externos; JSON-LD é data block (não bloqueado pelo CSP).
# =============================================================================

# Mapeia a extensão do arquivo para um Cache-Control adequado.
map $uri $portal_cache {
  default                       "no-cache";
  "~*\.(?:css|js|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$" "public, max-age=2592000, immutable";
  "~*\.(?:webmanifest|xml|txt)$" "public, max-age=86400";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Logs de acesso/erro (stdout/stderr via imagem oficial -> coletados pelo Loki).
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # ---- Compressão -----------------------------------------------------------
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml application/json application/javascript
    application/xml application/xml+rss image/svg+xml application/manifest+json;

  # ---- Headers de segurança + cache (always = vale também em respostas de erro)
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'sha256-Du+OJKJSbdUgz5nrHeWWINvez6XKDDU/tyj/5c2uvwo='; connect-src 'self'; form-action 'self'; manifest-src 'self'" always;
  add_header Cache-Control $portal_cache always;

  # Health para o readinessProbe/livenessProbe do Kubernetes.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Assets versionados (?v=) — cache longo e imutável.
  location /assets/ {
    try_files $uri =404;
  }

  # Raiz: serve o portal. Qualquer outro path que chegue aqui (o Traefik só
  # encaminha o que nenhuma rota específica atende) e não for um arquivo real
  # cai no 404 amigável.
  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri =404;
  }

  # 404 amigável.
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
