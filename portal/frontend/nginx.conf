server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Health para o readinessProbe do Kubernetes.
  location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

  # Portal servido na RAIZ (/). Qualquer caminho nao-especifico cai no portal.
  location / {
    try_files $uri /index.html;
  }
}
