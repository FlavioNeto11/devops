<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página não encontrada — NovaIT</title>
    <meta name="description" content="A página que você procurou não existe no portal NovaIT." />
    <meta name="robots" content="noindex, follow" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css?v=8" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-wash" aria-hidden="true"></div>
    <main class="error-page">
      <div class="error-card">
        <a class="brand" href="/" aria-label="NovaIT — página inicial">
          <svg class="logo" viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#2563eb" />
                <stop offset="1" stop-color="#7c6cff" />
              </linearGradient>
            </defs>
            <rect x="3" y="3" width="42" height="42" rx="12" fill="url(#lg)" />
            <path d="M15 33V15l18 18V15" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span class="brand-name">nova<b>IT</b></span>
        </a>
        <p class="error-code grad-txt">404</p>
        <h1>Página não encontrada</h1>
        <p>
          O endereço que você acessou não existe ou foi movido. Volte para a página inicial e
          encontre os produtos, portais e ferramentas da plataforma.
        </p>
        <div class="hero-cta">
          <a class="btn" href="/">Voltar ao início</a>
          <a class="btn ghost" href="/devops">Abrir DevOps Console</a>
        </div>
      </div>
    </main>
  </body>
</html>
