---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: keycloak-secrets
  namespace: identity
spec:
  encryptedData:
    KC_BOOTSTRAP_ADMIN_PASSWORD: 
    KC_BOOTSTRAP_ADMIN_USERNAME: 
    KC_DB_PASSWORD: 
    KC_DB_USERNAME: 
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/managed: "true"
      name: keycloak-secrets
      namespace: identity
    type: Opaque
