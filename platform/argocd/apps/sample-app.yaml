# =============================================================================
# Argo CD Application: aplicacao1 (app de exemplo)
# =============================================================================
# Application filha (descoberta pelo app-of-apps "devops-platform"). Ela
# implanta os manifests Kubernetes da app de exemplo no namespace "apps".
#
# IMPORTANTE (laboratorio x GitOps real):
#   - Para o Argo CD sincronizar de verdade a partir do Git, as IMAGENS
#     referenciadas nos manifests precisam estar PUBLICADAS no GHCR
#     (ex.: ghcr.io/flavioneto11/aplicacao1/<service>:<tag>), pois o cluster
#     puxa as imagens do registry.
#   - No LABORATORIO local usamos imagens :local (aplicacao1-frontend:local,
#     aplicacao1-api:local, aplicacao1-worker:local) buildadas na maquina e
#     aplicadas via script publish-sample-app.ps1 (imagePullPolicy: IfNotPresent),
#     SEM passar pelo registry. Nesse modo, prefira o deploy pelo script.
#   - Ou seja: esta Application e o caminho GitOps "de verdade"; quando as
#     imagens estiverem no GHCR, faca o sync por aqui.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aplicacao1
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # ---------------------------------------------------------------------------
  # Origem (Git): manifests Kubernetes da app de exemplo neste repositorio.
  # ---------------------------------------------------------------------------
  source:
    repoURL: https://github.com/FlavioNeto11/devops
    path: samples/aplicacao1/k8s
    targetRevision: main

  # ---------------------------------------------------------------------------
  # Destino: cluster local; recursos da app vao para o namespace "apps".
  # ---------------------------------------------------------------------------
  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  # ---------------------------------------------------------------------------
  # Politica de sincronizacao: MANUAL no laboratorio.
  # Sincronize pela UI (/argocd) ou via CLI: `argocd app sync aplicacao1`.
  #
  # OPT-IN: para ligar o GitOps automatico, descomente (requer imagens no GHCR):
  # syncPolicy:
  #   automated:
  #     prune: true      # remove recursos que sairam do Git
  #     selfHeal: true   # reverte mudancas manuais feitas no cluster
  #   syncOptions:
  #     - CreateNamespace=true
  # ---------------------------------------------------------------------------
