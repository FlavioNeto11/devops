# =============================================================================
# Argo CD Application: aplicacao3 (gerada por new-app.ps1; frontend+api+api2+worker)
# -----------------------------------------------------------------------------
# Descoberta pelo app-of-apps "devops-platform". Coloca a aplicacao3 sob GitOps.
# Imagens :local (IfNotPresent) no laboratorio; o Argo aplica os manifests.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aplicacao3
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/FlavioNeto11/devops
    path: samples/aplicacao3/k8s
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
