# =============================================================================
# Argo CD Application: portal (landing pública na raiz `/`, namespace
# devops-system). Descoberta pelo app-of-apps "devops-platform". Coloca o portal
# sob GitOps: mudanças em portal/k8s (Deployment/Service/IngressRoute) sincronizam
# sozinhas; o estado vivo aparece na UI do Argo CD junto dos demais componentes.
#
# GitOps REAL: a tag da imagem vive no manifest (`portal/k8s/portal.yaml`) e o Argo
# reconcilia tudo — inclusive o `image`. Sem `kubectl set image`, sem
# `ignoreDifferences`. Release = `publish-portal.ps1` builda `portal-frontend:<sha>`,
# troca o `image:` no manifest e commita; o Argo aplica. Rollback = `git revert`.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/FlavioNeto11/devops
    path: portal/k8s
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-system
  syncPolicy:
    automated:
      prune: false # IngressRoute do portal usa priority 1; nunca prune automático
      # selfHeal DESLIGADO de propósito: o release (publish-portal.ps1) faz um
      # `kubectl apply` do manifest committado para VALIDAR antes do push. Com
      # selfHeal ligado, o Argo (cujo desired fica em cache até re-ler o git)
      # reverteria esse apply para o sha anterior — uma corrida. Sem selfHeal, o
      # Argo continua fazendo AUTO-SYNC quando o GIT muda (o publish dá um refresh
      # logo após o push), mas não briga com o apply de validação. GitOps mantido:
      # git é a fonte da verdade; o Argo aplica cada commit novo.
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
