# =============================================================================
# Argo CD Application: aplicacao2 (multi-servico: frontend + api + api2)
# -----------------------------------------------------------------------------
# Descoberta pelo app-of-apps "devops-platform". Coloca a aplicacao2 sob GitOps.
# No laboratorio as imagens sao :local (IfNotPresent); o Argo aplica os manifests
# e o cluster usa as imagens ja buildadas localmente.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aplicacao2
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/FlavioNeto11/devops
    path: samples/aplicacao2/k8s
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
