# =============================================================================
# Values do Grafana — compativel com o kube-prometheus-stack (Helm)
# =============================================================================
# Este arquivo usa o bloco de topo 'grafana:' porque o Grafana e um SUB-CHART
# do kube-prometheus-stack. Aplique-o JUNTO com prometheus-values.yaml:
#
#   helm upgrade --install kube-prometheus-stack \
#     prometheus-community/kube-prometheus-stack \
#     -n observability --create-namespace \
#     -f C:/devops/platform/observability/prometheus-values.yaml \
#     -f C:/devops/platform/observability/grafana-values.yaml
#
# Roteamento: o Grafana e servido em subpath /grafana atraves do Traefik
# (IngressRoute na plataforma). Por isso usamos serve_from_sub_path=true e
# root_url apontando para http://xpto.localhost/grafana.
# =============================================================================

grafana:
  # ---------------------------------------------------------------------------
  # Credenciais de administrador
  # ---------------------------------------------------------------------------
  # ATENCAO: senha trivial APENAS para laboratorio.
  # COMENTARIO: trocar em producao (de preferencia via Secret/admin.existingSecret).
  adminPassword: "admin"

  # Injeta o client secret do OIDC (Keycloak) como env (GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET).
  # O Secret grafana-oidc e selado (SealedSecret) e versionado com seguranca.
  envFromSecret: grafana-oidc

  # ---------------------------------------------------------------------------
  # Configuracao do grafana.ini
  # ---------------------------------------------------------------------------
  grafana.ini:
    server:
      # URL publica completa, ja incluindo o subpath /grafana (necessaria p/ o
      # redirect do OIDC). Trocada para o dominio publico por causa do SSO.
      root_url: "https://dev.nvit.com.br/grafana"
      # Faz o Grafana servir os assets a partir do subpath (atras do Traefik).
      serve_from_sub_path: true
    # Login anonimo desabilitado. O login local admin/admin CONTINUA disponivel
    # como fallback (nao desabilitamos o login form).
    auth.anonymous:
      enabled: false
    # ---- SSO via Keycloak (realm nvit) ----
    # O client_secret vem do Secret grafana-oidc (envFromSecret -> GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET).
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      client_id: grafana
      scopes: "openid email profile groups"
      auth_url: "https://dev.nvit.com.br/auth/realms/nvit/protocol/openid-connect/auth"
      token_url: "https://dev.nvit.com.br/auth/realms/nvit/protocol/openid-connect/token"
      api_url: "https://dev.nvit.com.br/auth/realms/nvit/protocol/openid-connect/userinfo"
      # Usar o EMAIL como login. O preferred_username deste realm vale "admin",
      # que COLIDE com o usuario interno admin do Grafana e quebra o user.sync
      # ("unable to create user: user not found"). Com email, o login vira
      # admin@nvit.com.br (sem colisao). Aplicado ao vivo via env
      # GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=email ate o proximo helm upgrade.
      login_attribute_path: email
      email_attribute_path: email
      # Membros do grupo platform-admins viram Admin; demais, Viewer.
      role_attribute_path: "contains(groups[*], 'platform-admins') && 'Admin' || 'Viewer'"
      allow_assign_grafana_admin: true
      use_pkce: true

  # ---------------------------------------------------------------------------
  # Persistencia
  # ---------------------------------------------------------------------------
  persistence:
    # Sem PVC no laboratorio: dados (ex.: dashboards criados na UI) sao efemeros.
    # Dashboards provisionados por ConfigMap (sidecar) sobrevivem a recriacao.
    enabled: false

  # ---------------------------------------------------------------------------
  # Fontes de dados adicionais (alem do Prometheus, que o chart ja cria)
  # ---------------------------------------------------------------------------
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      # Servico do Loki single-binary no namespace observability.
      url: "http://loki.observability:3100"
      isDefault: false
      jsonData:
        # Sem multi-tenancy no laboratorio (auth_enabled=false no Loki).
        maxLines: 1000

  # ---------------------------------------------------------------------------
  # Sidecar de provisionamento (dashboards e datasources via ConfigMap)
  # ---------------------------------------------------------------------------
  sidecar:
    dashboards:
      # Provisiona automaticamente dashboards a partir de ConfigMaps que tenham
      # o label 'grafana_dashboard'. Ex.: cluster-overview.json publicado como
      # ConfigMap com esse label.
      enabled: true
      label: grafana_dashboard
      # Procura ConfigMaps em todos os namespaces (facilita publicar dashboards
      # junto das apps). Ajuste para um namespace especifico se preferir.
      searchNamespace: ALL
      # Pasta onde os dashboards aparecem na UI do Grafana.
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: false
    datasources:
      # Permite provisionar datasources extras via ConfigMap (label abaixo).
      enabled: true
      label: grafana_datasource

  # ---------------------------------------------------------------------------
  # Recursos pequenos para o laboratorio
  # ---------------------------------------------------------------------------
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  # ---------------------------------------------------------------------------
  # Service do Grafana
  # ---------------------------------------------------------------------------
  # O acesso externo e feito pelo Traefik (IngressRoute /grafana), entao o
  # Service interno pode permanecer ClusterIP (padrao do chart).
  service:
    type: ClusterIP
