# EXEMPLO do secret do Langfuse — NUNCA commitar valores reais (hard constraint).
# Copie para fora do repo, preencha e aplique (ou use Sealed Secrets):
#   kubectl apply -f <copia-preenchida>.yaml
# Os apps (SICAT/GymOps) usam PROJECT_PUBLIC_KEY/PROJECT_SECRET_KEY para enviar traces.
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: observability
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE-ME-pg-password"
  DATABASE_URL: "postgres://langfuse:CHANGE-ME-pg-password@langfuse-db:5432/langfuse"
  NEXTAUTH_SECRET: "CHANGE-ME-64-hex"          # openssl rand -hex 32
  SALT: "CHANGE-ME-64-hex"                     # openssl rand -hex 32
  PROJECT_PUBLIC_KEY: "pk-lf-CHANGE-ME"        # chave do projeto (init headless)
  PROJECT_SECRET_KEY: "sk-lf-CHANGE-ME"
  INIT_USER_EMAIL: "admin@nvit.com.br"
  INIT_USER_PASSWORD: "CHANGE-ME-strong-password"
