app: { name: neuroevolui, namespace: apps, host: nvit.localhost, basePath: /neuroevolui }
# Gerado pela FORGE (gymops-style: Fastify + Redis/BullMQ + RBAC). Blocos: observabilidade, camadas-rigidas, migrations-versionadas, oidc-sessao, rbac-multitenant, redis-bullmq, idempotencia, pagamentos-gateway, ia-grafo, rag-pgvector, control-ai-por-app, structured-outputs, notificacoes-multicanal, design-system
services:
  frontend: { type: frontend, image: neuroevolui-frontend, path: /, port: 80, expose: true, stripPrefix: false, priority: 10 }
  api: { type: api, image: neuroevolui-api, path: /api, port: 8080, expose: true, stripPrefix: true, priority: 40, health: { path: /health } }
  worker: { type: worker, image: neuroevolui-worker, port: 9464, expose: false, command: ["npm", "run", "worker"] }
dependencies: { redis: { image: "redis:7-alpine" } }
observability: { metricsPort: 9464, serviceMonitor: true, prometheusRule: true }