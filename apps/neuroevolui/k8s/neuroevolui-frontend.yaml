# NeuroEvolui — frontend (Vue SPA) gerado pela Forge. Aditivo ao k8s do backend.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: neuroevolui-frontend, namespace: apps, labels: { app.kubernetes.io/name: neuroevolui-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: neuroevolui } }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: neuroevolui-frontend } }
  template:
    metadata: { labels: { app.kubernetes.io/name: neuroevolui-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: neuroevolui } }
    spec: { containers: [ { name: frontend, image: neuroevolui-frontend:local, imagePullPolicy: IfNotPresent, ports: [ { containerPort: 80 } ], readinessProbe: { httpGet: { path: /healthz, port: 80 }, initialDelaySeconds: 3, periodSeconds: 10 } } ] }
---
apiVersion: v1
kind: Service
metadata: { name: neuroevolui-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: neuroevolui } }
spec: { selector: { app.kubernetes.io/name: neuroevolui-frontend }, ports: [ { port: 80, targetPort: 80 } ] }
---
# Frontend NÃO faz strip (regra de ouro) e priority 10 < 40 da API -> /neuroevolui/api vai p/ a API.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: neuroevolui-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: neuroevolui } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/neuroevolui`)
      kind: Rule
      priority: 10
      services: [ { name: neuroevolui-frontend, port: 80 } ]
