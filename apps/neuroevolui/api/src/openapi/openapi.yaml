  /v1/knowledge-sources:
    get:
      summary: Listar fontes da base de conhecimento (paginado)
      tags: [KnowledgeSources]
      parameters:
        - { name: page, in: query, required: false, schema: { type: integer } }
        - { name: pageSize, in: query, required: false, schema: { type: integer } }
        - { name: sort, in: query, required: false, schema: { type: string } }
        - { name: dir, in: query, required: false, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: Lista paginada de fontes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { type: object } }
                  total: { type: integer }
    post:
      summary: Ingerir fonte de conhecimento (conteúdo real -> chunking + embedding)
      description: >
        Ingere o CONTEÚDO da fonte: chunking + embedding no servidor. JSON com `content`
        (texto colado) OU multipart/form-data com arquivos (campo `files`; o texto é extraído
        de PDF/txt/csv/docx etc.). `content_hash` e `chunk_count` são derivados do conteúdo
        REAL no servidor — NÃO são campos de entrada. Embedding é fail-soft (sem índice
        vetorial os chunks são gravados sem vetor e reprocessados depois).
      tags: [KnowledgeSources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                source_id: { type: string }
                title: { type: string }
                content: { type: string, description: Texto a indexar (modo texto colado) }
                embedding_model: { type: string }
          multipart/form-data:
            schema:
              type: object
              required: [title]
              properties:
                source_id: { type: string }
                title: { type: string }
                embedding_model: { type: string }
                files:
                  type: array
                  items: { type: string, format: binary }
                  description: Arquivos da fonte (texto extraído no servidor)
      responses:
        '201':
          description: Fonte ingerida (content_hash e chunk_count computados no servidor)
          content:
            application/json:
              schema: { type: object }
        '400':
          description: Validação (sem título ou sem conteúdo extraível)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

