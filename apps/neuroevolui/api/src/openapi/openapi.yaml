openapi: 3.1.0
info:
  title: NeuroEvolui API
  version: 1.0.0
  summary: API de gestão clínica neuroevolutiva — contract-first (gymops-style).
  description: |
    API interna do NeuroEvolui. Documentação canônica gerada via Forge contract-first.
    Auth: headers `X-Tenant-Id` (tenant) e `X-Role` (professional | clinic_manager | patient).
    Roteamento: `/neuroevolui/api` (Traefik stripPrefix — o processo enxerga `/v1/*`).

servers:
  - url: http://nvit.localhost/neuroevolui/api
    description: Cluster local (Traefik)
  - url: http://localhost:8080
    description: Desenvolvimento local direto

tags:
  - name: Health
    description: Saúde e status do serviço.
  - name: Patients
    description: Cadastro e prontuário de pacientes.
  - name: Professionals
    description: Equipe clínica (profissionais).
  - name: KnowledgeSources
    description: Fontes da base de conhecimento (RAG).
  - name: Records
    description: Registros clínicos dos pacientes.
  - name: Consultations
    description: Agendamento e listagem de consultas.
  - name: Payments
    description: Webhooks de pagamento.
  - name: Dashboard
    description: Métricas e relatórios gerenciais.
  - name: Jobs
    description: Acompanhamento de jobs assíncronos (BullMQ).
  - name: Audit
    description: Trilha de auditoria.
  - name: EvolutionNotes
    description: Notas evolutivas dos pacientes.
  - name: PatientReports
    description: Relatórios de pacientes (geração assíncrona).
  - name: Assistant
    description: Assistente IA para profissionais e pacientes.
  - name: Notifications
    description: Preferências e subscrições de notificação push/e-mail/WhatsApp.
  - name: Docs
    description: Documentação da API (auto-servida).

components:
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: false
      schema:
        type: string
      description: Identificador do tenant (clínica). Obrigatório em rotas multi-tenant.
    Role:
      name: X-Role
      in: header
      required: false
      schema:
        type: string
        enum: [professional, clinic_manager, patient]
      description: Papel do usuário autenticado.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            code:
              type: string

    Record:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        title:
          type: string
        status:
          type: string
          # Valores REALMENTE emitidos pelo backend: 'open' (default da tabela),
          # 'submitting' (POST /submit), 'submitted' (worker concluiu) e 'failed'
          # (worker falhou). 'done' é mantido como sinônimo de conclusão para
          # compatibilidade. Não use 'error'/'draft' (o código nunca os escreve).
          enum: [open, submitting, submitted, failed, done]
        external_ref:
          type: string
          nullable: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecordList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Record'

    AsyncJobResponse:
      type: object
      required: [job_id, queue, status]
      properties:
        job_id:
          type: string
        queue:
          type: string
        status:
          type: string
          enum: [queued, running, retry_wait, succeeded, failed, dlq]
        inline:
          type: boolean
        deduplicated:
          type: boolean

    JobResource:
      type: object
      properties:
        job_id:
          type: string
        queue_name:
          type: string
        job_key:
          type: string
        status:
          type: string
          enum: [queued, running, retry_wait, succeeded, failed, dlq]
        payload:
          type: object
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Consultation:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        patient_id:
          type: string
        professional_id:
          type: string
        scheduled_at:
          type: string
          format: date-time
        scheduled_end_at:
          type: string
          format: date-time
        amount_cents:
          type: integer
        currency:
          type: string
        status:
          type: string

    ConsultationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Consultation'

    RevenueReport:
      type: object
      properties:
        total_revenue_cents:
          type: integer
        period_from:
          type: string
          format: date
        period_to:
          type: string
          format: date
        by_professional:
          type: array
          items:
            type: object
            properties:
              professional_id:
                type: string
              total_cents:
                type: integer
              count:
                type: integer
        data:
          type: array
          items:
            type: object

    AuditEntry:
      type: object
      properties:
        id:
          type: integer
        entity_id:
          type: string
        entity_type:
          type: string
        action:
          type: string
        actor:
          type: string
        created_at:
          type: string
          format: date-time
        metadata:
          type: object

    EvolutionNote:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        patient_id:
          type: string
        professional_id:
          type: string
        type:
          type: string
        note_date:
          type: string
          format: date
        text:
          type: string
        structured_fields:
          type: object
        attachments:
          type: array
          items:
            type: object
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EvolutionNoteList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EvolutionNote'

    PatientReport:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        patient_id:
          type: string
        status:
          type: string
          enum: [queued, processing, done, failed]
        filters:
          type: object
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    PatientReportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PatientReport'

    AssistantRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          description: Pergunta ou instrução para o assistente.
        context_type:
          type: string
          enum: [professional, patient]
          default: professional
        files:
          type: array
          items:
            type: object
            required: [filename, mime, data]
            properties:
              filename:
                type: string
              mime:
                type: string
              data:
                type: string
                description: Conteúdo do arquivo em base64.

    AssistantResponse:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: object
        confidence:
          type: number
          format: float
        actions:
          type: array
          items:
            type: object

    NotificationPreference:
      type: object
      properties:
        channel:
          type: string
          enum: [email, push, whatsapp]
        enabled:
          type: boolean
        contact_value:
          type: string

paths:
  /:
    get:
      summary: Informações do serviço
      tags: [Health]
      responses:
        '200':
          description: App info
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    type: string
                  service:
                    type: string
                  ok:
                    type: boolean
              example:
                app: neuroevolui
                service: api
                ok: true

  /health:
    get:
      summary: Health check (banco de dados)
      tags: [Health]
      responses:
        '200':
          description: Serviço saudável
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
              example:
                status: ok
                db: connected

  /me:
    get:
      summary: Identidade do usuário corrente (borda SSO)
      description: >
        Identidade lida dos headers da borda SSO (oauth2-proxy → X-Auth-Request-*).
        A casca do frontend usa email/name para exibir o usuário logado. Sem header de
        borda (dev/local), email é null e a casca apenas não mostra usuário (nunca 500).
      tags: [Health]
      responses:
        '200':
          description: Identidade resolvida (campos null fora do SSO)
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    nullable: true
                  name:
                    type: string
                    nullable: true
                  role:
                    type: string
                    nullable: true
                  tenantId:
                    type: integer
                  user:
                    type: string
              example:
                email: maria@clinica.com.br
                name: maria.silva
                role: professionals
                tenantId: 1
                user: maria@clinica.com.br

  /v1/health/queue:
    get:
      summary: Health check das filas BullMQ
      tags: [Health]
      responses:
        '200':
          description: Status das filas
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  queue:
                    type: object
              example:
                status: ok
                queue:
                  waiting: 0
                  active: 0
                  failed: 0

  /v1/records:
    get:
      summary: Listar registros clínicos do tenant
      tags: [Records]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Role'
      responses:
        '200':
          description: Lista de registros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordList'
              example:
                data:
                  - id: 1
                    tenant_id: clinica-abc
                    title: Consulta inicial
                    status: done
                    created_by: prof-1
                    created_at: '2026-01-10T09:00:00Z'

    post:
      summary: Criar registro clínico
      tags: [Records]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: X-Role
          in: header
          required: false
          schema:
            type: string
            enum: [professional]
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Chave de idempotência para criar apenas uma vez.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
            example:
              title: Avaliação neurológica
      responses:
        '201':
          description: Registro criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
              example:
                id: 42
                tenant_id: clinica-abc
                title: Avaliação neurológica
                status: draft
                created_by: prof-1
                created_at: '2026-01-10T10:00:00Z'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: title obrigatório

  /v1/records/{id}:
    get:
      summary: Obter registro clínico por ID
      tags: [Records]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Registro encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
              example:
                id: 42
                tenant_id: clinica-abc
                title: Avaliação neurológica
                status: done
                created_by: prof-1
                created_at: '2026-01-10T10:00:00Z'
        '404':
          description: Registro não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: não encontrado

    put:
      summary: Editar registro (título e referência externa)
      description: >
        Atualiza os campos editáveis do registro (title / external_ref) e grava a
        alteração em audit_logs (edição auditável). Campos omitidos são preservados.
      tags: [Records]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: X-Role
          in: header
          required: false
          schema:
            type: string
            enum: [professional]
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                title:
                  type: string
                external_ref:
                  type: string
                  nullable: true
            example:
              title: Avaliação neurológica (revisada)
              external_ref: PRONT-2026-0042
      responses:
        '200':
          description: Registro atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
              example:
                id: 42
                tenant_id: clinica-abc
                title: Avaliação neurológica (revisada)
                status: open
                external_ref: PRONT-2026-0042
                created_by: prof-1
                created_at: '2026-01-10T10:00:00Z'
                updated_at: '2026-01-11T08:30:00Z'
        '400':
          description: Dados inválidos (nenhum campo editável ou título vazio)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: informe title e/ou external_ref
        '404':
          description: Registro não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: não encontrado

    delete:
      summary: Remover registro clínico
      tags: [Records]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: X-Role
          in: header
          required: false
          schema:
            type: string
            enum: [clinic_manager]
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Registro removido
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
              example:
                deleted: true

  /v1/records/{id}/submit:
    post:
      summary: Submeter registro para processamento assíncrono
      tags: [Records]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '202':
          description: Registro enfileirado para processamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                  enqueued:
                    type: boolean
              example:
                id: 42
                status: submitting
                enqueued: true
        '404':
          description: Registro não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/consultations/schedule:
    post:
      summary: Agendar consulta
      tags: [Consultations]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: X-Role
          in: header
          required: false
          schema:
            type: string
            enum: [professional]
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient_id, professional_id, scheduled_at, amount_cents]
              properties:
                patient_id:
                  type: string
                professional_id:
                  type: string
                scheduled_at:
                  type: string
                  format: date-time
                duration_minutes:
                  type: integer
                  default: 60
                amount_cents:
                  type: integer
                currency:
                  type: string
                  default: BRL
                payment_method_token:
                  type: string
            example:
              patient_id: pac-001
              professional_id: prof-001
              scheduled_at: '2026-02-15T14:00:00Z'
              duration_minutes: 50
              amount_cents: 25000
              currency: BRL
      responses:
        '201':
          description: Consulta agendada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consultation'
              example:
                id: 10
                tenant_id: clinica-abc
                patient_id: pac-001
                professional_id: prof-001
                scheduled_at: '2026-02-15T14:00:00Z'
                amount_cents: 25000
                status: scheduled
        '200':
          description: Consulta já agendada (idempotência)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consultation'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflito de horário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: Horário já ocupado para este profissional
                  code: SCHEDULE_CONFLICT

  /v1/consultations:
    get:
      summary: Listar consultas do tenant
      tags: [Consultations]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Role'
      responses:
        '200':
          description: Lista de consultas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultationList'
              example:
                data:
                  - id: 10
                    tenant_id: clinica-abc
                    patient_id: pac-001
                    professional_id: prof-001
                    scheduled_at: '2026-02-15T14:00:00Z'
                    status: scheduled

  /v1/consultations/{id}:
    get:
      summary: Obter consulta por ID
      description: Alimenta o card "Consulta vinculada" da tela de transação. Exige clinic_manager.
      tags: [Consultations]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: X-Role
          in: header
          required: false
          schema:
            type: string
            enum: [clinic_manager]
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Consulta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consultation'
              example:
                id: 10
                tenant_id: clinica-abc
                patient_id: pac-001
                professional_id: prof-001
                scheduled_at: '2026-02-15T14:00:00Z'
                status: scheduled
        '404':
          description: Consulta não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: consulta não encontrada
    put:
      summary: Atualizar consulta (status, notas, horário)
      tags: [Consultations]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [agendado, confirmado, realizado, cancelado, no_show] }
                payment_status: { type: string, enum: [pendente, pago, estornado, falhou] }
                notes: { type: string }
                amount_cents: { type: integer }
                scheduled_at: { type: string, format: date-time }
                scheduled_end_at: { type: string, format: date-time }
                duration_minutes: { type: integer }
      responses:
        '200':
          description: Consulta atualizada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Consultation' }
        '404':
          description: Consulta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      summary: Cancelar/remover consulta (soft-delete)
      tags: [Consultations]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Consulta removida
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        '404':
          description: Consulta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/payments/webhook:
    post:
      summary: Receber webhook de pagamento
      tags: [Payments]
      parameters:
        - name: X-Signature
          in: header
          required: false
          schema:
            type: string
        - name: X-Event-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                event_id:
                  type: string
                event_type:
                  type: string
                payload:
                  type: object
            example:
              event_id: evt_001
              event_type: payment.confirmed
              payload:
                transaction_id: txn-123
                amount_cents: 25000
      responses:
        '200':
          description: Webhook processado
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Assinatura inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/dashboard/revenue:
    get:
      summary: Dashboard de receita (clinic_manager)
      tags: [Dashboard]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: X-Role
          in: header
          required: false
          schema:
            type: string
            enum: [clinic_manager]
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: professional_id
          in: query
          schema:
            type: string
        - name: patient_id
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Relatório de receita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueReport'
              example:
                total_revenue_cents: 500000
                period_from: '2026-01-01'
                period_to: '2026-01-31'
                by_professional:
                  - professional_id: prof-001
                    total_cents: 300000
                    count: 12
                data: []

  /v1/consultation-notes:
    post:
      summary: Enfileirar geração de notas de consulta (async)
      tags: [Jobs]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: X-Role
          in: header
          required: false
          schema:
            type: string
            enum: [professional]
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                job_key:
                  type: string
            example:
              job_key: notes-clinica-abc-20260115
      responses:
        '202':
          description: Job enfileirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
              example:
