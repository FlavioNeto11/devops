# Servir a SPA sob /neuroevolui/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /neuroevolui { return 301 /neuroevolui/; }
  location /neuroevolui/ {
    alias /usr/share/nginx/html/neuroevolui/;
    try_files $uri $uri/ /neuroevolui/index.html;
  }
}
