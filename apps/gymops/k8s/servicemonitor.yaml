# ServiceMonitor: o kube-prometheus-stack (selectors nulos = raspa todos) coleta
# as métricas ai_* da camada de IA (porta dedicada `metrics`, nunca roteada pelo Traefik).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gymops-api-ai
  namespace: apps
  labels: { app.kubernetes.io/part-of: gymops }
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: gymops
  namespaceSelector: { matchNames: [apps] }
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
