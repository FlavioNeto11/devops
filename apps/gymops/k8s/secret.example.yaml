# EXEMPLO do Secret gymops-config (envFrom da api/worker). NAO versionar valores reais.
# O Secret real e criado no cluster a partir do .env.docker da maquina, ajustando os hosts:
#   $t = Get-Content C:\GIT\GYM\.env.docker -Raw
#   $t = $t -replace '@postgres:5432','@gymops-postgres:5432' -replace 'redis://redis:6379','redis://gymops-redis:6379' `
#           -replace 'http://localhost:7480/gymops','https://dev.nvit.com.br/gymops'
#   $t | Set-Content $env:TEMP\gymops.env -Encoding ascii
#   kubectl -n apps create secret generic gymops-config --from-env-file=$env:TEMP\gymops.env
# (NAO incluido no kustomization.yaml -> o Argo nao gerencia/pruna este Secret.)
apiVersion: v1
kind: Secret
metadata:
  name: gymops-config
  namespace: apps
  labels:
    app.kubernetes.io/part-of: gymops
type: Opaque
stringData:
  NODE_ENV: production
  API_HOST: 0.0.0.0
  API_PORT: "3001"
  PUBLIC_BASE_URL: https://dev.nvit.com.br/gymops
  FRONTEND_URL: https://dev.nvit.com.br/gymops
  DATABASE_URL: postgresql://gymops:CHANGE_ME@gymops-postgres:5432/gymops
  REDIS_URL: redis://gymops-redis:6379
  JWT_SECRET: CHANGE_ME_64_chars
  JWT_REFRESH_SECRET: CHANGE_ME_64_chars
  ENCRYPTION_KEY: CHANGE_ME_64_hex_chars
  # Integracoes opcionais (deixe vazio se nao usar — degradam graciosamente):
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  OPENAI_API_KEY: ""
  R2_ACCOUNT_ID: ""
  R2_ACCESS_KEY_ID: ""
  R2_SECRET_ACCESS_KEY: ""
  R2_BUCKET_NAME: ""
  SMTP_HOST: ""
  VAPID_PUBLIC_KEY: ""
  VAPID_PRIVATE_KEY: ""
