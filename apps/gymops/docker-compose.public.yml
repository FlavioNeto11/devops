services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gymops']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ['node', 'apps/api/dist/worker-process.js']
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /gymops/api
        NEXT_PUBLIC_APP_BASE_PATH: /gymops
        NEXT_PUBLIC_ENABLE_GOOGLE_LOGIN: 'false'
        INTERNAL_API_URL: http://api:3001
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /gymops/api
      NEXT_PUBLIC_APP_BASE_PATH: /gymops
      NEXT_PUBLIC_ENABLE_GOOGLE_LOGIN: 'false'
      INTERNAL_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/gymops/login || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '7480:80'
    volumes:
      - ./docker/nginx/gymops.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
