# Contrato da esteira DevOps para o Reqhub (Requirements Hub) — o WORKBENCH +
# Product Studio (Forja) da base de requisitos (specs/). App SOMENTE-FRONTEND estatico
# (nginx) que LE a baseline gerada (specs/baseline/*.json, assada na imagem) e renderiza
# a Forja (hub, view default), Explorador, Workspace, Editor, Mapa de impacto, Cobertura
# e Mudancas. Fonte da verdade e autoria continuam no git (specs/) — o workbench nao
# escreve requisitos direto; a Forja/Studio, porem, dispara launch (cria/auto-mescla PR)
# e delete (apaga codigo+baseline+Argo+cluster) via o backend api, com salvaguardas
# (gate de preview, denylist, confirmacao de blast-radius). Ver
# docs/decisions/0002-requirements-as-source-of-truth.md.
#
# basePath /reqs ; frontend sem strip (HTML com <base href="/reqs/">) ; priority 10.
# Build com CONTEXTO = raiz do repo (precisa de specs/baseline/ + apps/reqhub/frontend/),
# Dockerfile em apps/reqhub/Dockerfile. Imagem rebuilda quando specs/baseline muda.
app:
  name: reqhub
  namespace: apps
  host: dev.nvit.com.br        # + nvit.localhost no dev local
  basePath: /reqs
  appType: platform_tool          # taxonomia: cms_portal | product_software | platform_tool
services:
  frontend:
    type: frontend
    path: /
    image: ghcr.io/flavioneto11/reqhub/frontend   # CI/GHCR; local usa reqhub-frontend:local
    port: 80
    expose: true
    stripPrefix: false
    priority: 10
    build:
      context: .                  # RAIZ do repo (acessa specs/baseline/ + apps/reqhub/frontend/)
      dockerfile: apps/reqhub/Dockerfile
    health:
      path: /healthz
  api:
    type: api
    path: /api                    # exposto em /reqs/api ; IA de AUTORIA (R1, sem escrita no git)
    image: ghcr.io/flavioneto11/reqhub/api        # CI/GHCR; local usa reqhub-api:local
    port: 8080
    expose: true
    stripPrefix: true             # Middleware reqhub-api-strip remove /reqs/api -> app ve /health,/v1/*
    priority: 30                  # api > frontend (10): /reqs/api e prefixado por /reqs
    build:
      context: apps/reqhub/api    # a API NAO precisa de specs/baseline (contexto = a propria pasta)
      dockerfile: apps/reqhub/api/Dockerfile
    env:
      REQHUB_AI_MODEL: gpt-5
    # OPENAI_API_KEY + token (REQHUB_API_TOKEN) via Sealed Secret reqhub-api-config
    # (k8s/secret.example.yaml). Ausentes -> rotas de IA respondem 503 (fail-closed).
    health:
      path: /health
