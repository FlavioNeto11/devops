# EXEMPLO (placeholders). O Secret REAL e criado fora do git (kubectl/kubeseal) e
# NUNCA commitado. Este arquivo fica FORA do kustomization.yaml — o Argo nao o aplica
# nem gerencia/apaga o secret real. Em GitOps, sele com kubeseal (SealedSecret).
#
# reqhub-api-config alimenta a IA de AUTORIA do Reqhub (R1) E o painel "Uso da IA":
#   - OPENAI_API_KEY: chave da conta OpenAI (gpt-5). Sem ela, /reqs/api/v1/authoring/* = 503.
#   - token (REQHUB_API_TOKEN): Bearer exigido nas rotas de autoria (operador).
#   Painel "Uso da IA" (admin-only, /reqs/api/v1/ai-usage/*) — TODAS opcionais (sem elas o
#   painel mostra só a telemetria interna; a visão "oficial da conta" responde 503 fail-soft):
#   - OPENAI_ADMIN_KEY: chave ADMIN/org da OpenAI (custo/uso/limites OFICIAIS da conta).
#   - ANTHROPIC_ADMIN_KEY: chave ADMIN da Anthropic (sk-ant-admin…) — custo/uso da conta.
#   - ANTHROPIC_API_KEY: chave normal da Anthropic — só p/ o probe de rate-limit (opt-in).
#   - LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY: cross-check per-model via Langfuse self-hosted.
#   Forge LAUNCH (a UI cria requisitos no git disparando a esteira):
#   - GITHUB_DISPATCH_TOKEN: PAT FINE-GRAINED com permissão "Contents: Read and write" (o
#     repository_dispatch exige Contents:write) SÓ no repo
#     FlavioNeto11/devops. Sem ele, POST /reqs/api/v1/forge/launch = 503 (fail-closed) e a Forja
#     segue mostrando o YAML/comando de PR manual. NUNCA commitar o valor real.
# Tudo OPCIONAL no Deployment (optional: true) -> o pod sobe sem o secret e cada recurso
# degrada (fail-closed/soft), sem derrubar o workbench (read-only, independe da IA).
#
# Criar o real (lab), em PowerShell 7:
#   $token = -join ((48..57)+(97..122) | Get-Random -Count 32 | ForEach-Object {[char]$_})
#   kubectl -n apps create secret generic reqhub-api-config `
#     --from-literal=OPENAI_API_KEY="sk-..." `
#     --from-literal=token=$token
#
# GitOps (selar):
#   kubectl -n apps create secret generic reqhub-api-config --dry-run=client -o yaml `
#     --from-literal=OPENAI_API_KEY="sk-..." --from-literal=token=$token `
#     | kubeseal --format yaml > apps/reqhub/k8s/reqhub-api-sealedsecret.yaml   # ESSE pode ir ao git
apiVersion: v1
kind: Secret
metadata:
  name: reqhub-api-config
  namespace: apps
  labels:
    app.kubernetes.io/name: reqhub-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: reqhub
type: Opaque
stringData:
  OPENAI_API_KEY: "CHANGE_ME"
  token: "CHANGE_ME"
  # Painel "Uso da IA" — opcionais (deixe fora se não for usar; o painel degrada):
  OPENAI_ADMIN_KEY: "CHANGE_ME"
  ANTHROPIC_ADMIN_KEY: "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
  LANGFUSE_PUBLIC_KEY: "CHANGE_ME"
  LANGFUSE_SECRET_KEY: "CHANGE_ME"
  # Forge LAUNCH — opcional (sem ele, /v1/forge/launch = 503; a UI mostra o PR manual):
  GITHUB_DISPATCH_TOKEN: "CHANGE_ME"
---
# reqhub-db alimenta a MEMORIA DURAVEL do chat de autoria (F3): Postgres+pgvector
# (ai_chat_threads + ai_user_memory). OPCIONAL (DATABASE_URL ausente -> chat sem memoria
# duravel, fail-soft). O Deployment reqhub-postgres usa envFrom secretRef reqhub-db; o
# reqhub-api le DATABASE_URL (optional: true). Criar o real (lab), PowerShell 7:
#   $pwd = -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 28 | ForEach-Object {[char]$_})
#   kubectl -n apps create secret generic reqhub-db `
#     --from-literal=POSTGRES_USER=reqhub --from-literal=POSTGRES_PASSWORD=$pwd `
#     --from-literal=POSTGRES_DB=reqhub_ai `
#     --from-literal=DATABASE_URL="postgres://reqhub:$pwd@reqhub-postgres:5432/reqhub_ai"
apiVersion: v1
kind: Secret
metadata:
  name: reqhub-db
  namespace: apps
  labels:
    app.kubernetes.io/part-of: reqhub
type: Opaque
stringData:
  POSTGRES_USER: "reqhub"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "reqhub_ai"
  DATABASE_URL: "postgres://reqhub:CHANGE_ME@reqhub-postgres:5432/reqhub_ai"
