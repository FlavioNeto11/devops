apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Manifests do Reqhub (frontend + api de IA de autoria). Descoberto pelo Argo (app reqhub).
# secret.example.yaml fica FORA daqui de proposito (placeholders; o real e selado/imperativo).
resources:
  - reqhub.yaml
  - api.yaml
  - postgres.yaml   # F3: Postgres+pgvector da memoria duravel do chat (secret reqhub-db fora do git)
  - usage-config.yaml    # orcamentos (nao-secreto) do painel "Uso da IA"
  - servicemonitor.yaml  # scrape das metricas ai_* do reqhub-api (porta 9464)
