# =============================================================================
# reqhub-api — IA de AUTORIA do Reqhub (R1, sem escrita no git) sob /reqs/api.
# Roteamento (regra de ouro: API SEMPRE com strip; api > frontend em priority):
#   /reqs/api -> reqhub-api:8080 (StripPrefix /reqs/api, priority 30) — o processo
#   ve /health e /v1/* na raiz. O frontend /reqs (priority 10) continua intacto.
# IMAGEM: lab usa reqhub-api:local + IfNotPresent (docker build apps/reqhub/api);
#   CI publica ghcr.io/flavioneto11/reqhub/api:<sha>.
# SECRET reqhub-api-config (OPENAI_API_KEY + token) e OPCIONAL: sem ele o pod SOBE
#   e as rotas de IA respondem 503 (fail-closed) — a IA so enriquece o Editor.
#   Secret real fora do git (kubeseal/SealedSecret) — ver k8s/secret.example.yaml.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reqhub-api
  namespace: apps
  annotations:
    devops.flavioneto/commitSha: "local"
    devops.flavioneto/branch: "main"
    devops.flavioneto/imageTag: "local"
    devops.flavioneto/deployedAt: "2026-06-25T16:30:00Z"
    devops.flavioneto/runId: "manual-publish-reqhub-api"
    devops.flavioneto/image: "reqhub-api:local"
  labels:
    app.kubernetes.io/name: reqhub-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: reqhub
    app.kubernetes.io/managed-by: devops-platform
    devops.flavioneto/app-type: platform_tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reqhub-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reqhub-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: reqhub
        devops.flavioneto/app-type: platform_tool
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: api
          image: reqhub-api:local
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            # Provider de IA: anthropic = Claude. Credencial = API key dedicada (ANTHROPIC_API_KEY,
            # x-api-key); o código prefere o token de assinatura SE presente, senão usa a API key.
            # Trocar p/ "openai" reverte ao gpt-5 sem redeploy de código.
            - name: AI_PROVIDER
              value: "anthropic"
            # sonnet-4-6: liberado pela API key dedicada (limite próprio, sem o 429 da assinatura).
            - name: REQHUB_AI_MODEL
              value: "claude-sonnet-4-6"
            # Router num modelo capaz (não o haiku barato): o haiku sub-roteava turnos de AUTORIA
            # para o fast-path (genérico, sem grounding). Com forceSpecialist ligado isto é defesa
            # extra; mantém o roteamento de complexidade confiável.
            - name: REQHUB_AI_ROUTER_MODEL
              value: "claude-sonnet-4-6"
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: ANTHROPIC_API_KEY, optional: true } }
            # Fallback opcional: token de assinatura (ausente do secret após a migração p/ API key).
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: ANTHROPIC_AUTH_TOKEN, optional: true } }
            # OPENAI_API_KEY: REUSA a chave que ja existe na plataforma (secret sicat-config,
            # ns apps) por REFERENCIA — o valor nunca e copiado, o k8s resolve no runtime.
            # Para desacoplar, crie um secret dedicado com scripts/setup-reqhub-secret.ps1 e
            # troque o `name` abaixo para reqhub-api-config.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sicat-config
                  key: OPENAI_API_KEY
                  optional: true   # ausente -> rotas de IA = 503 (fail-closed); pod sobe
            - name: REQHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: reqhub-api-config
                  key: token
                  optional: true   # ausente -> autoria = 503 (fail-closed)
            # Forge LAUNCH (UI cria no git): token p/ DISPARAR a esteira (repository_dispatch).
            # PAT fine-grained, Contents:Read+Write (repository_dispatch) SÓ neste repo. Ausente -> /v1/forge/launch = 503.
            - name: GITHUB_DISPATCH_TOKEN
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: GITHUB_DISPATCH_TOKEN, optional: true } }
            - name: GITHUB_DISPATCH_REPO
              value: "FlavioNeto11/devops"
            # MEMORIA DURAVEL do chat (F3): Postgres+pgvector. OPCIONAL e FAIL-SOFT —
            # ausente/DB fora -> o chat usa a memoria da conversa (history) e nao cai.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reqhub-db
                  key: DATABASE_URL
                  optional: true
            # --- Painel "Uso da IA" (admin-only): contas dos provedores + telemetria interna.
            #     Tudo OPCIONAL/fail-soft: sem chaves, mostra só a telemetria; conta = 503. ---
            - name: OPENAI_ADMIN_KEY        # Admin/Usage API da conta OpenAI (org) — custo/uso oficial
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: OPENAI_ADMIN_KEY, optional: true } }
            - name: ANTHROPIC_ADMIN_KEY     # Admin/Usage API da conta Anthropic (sk-ant-admin…)
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: ANTHROPIC_ADMIN_KEY, optional: true } }
            - name: ANTHROPIC_API_KEY       # chave normal — só p/ o probe de rate-limit (opt-in)
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: ANTHROPIC_API_KEY, optional: true } }
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: LANGFUSE_PUBLIC_KEY, optional: true } }
            - name: LANGFUSE_SECRET_KEY
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: LANGFUSE_SECRET_KEY, optional: true } }
            - name: LANGFUSE_BASE_URL
              value: "http://langfuse.observability.svc.cluster.local:3000"
            - name: PROMETHEUS_URL   # service headless do operator (existe em qualquer kube-prometheus-stack)
              value: "http://prometheus-operated.observability.svc.cluster.local:9090"
            - name: METRICS_PORT
              value: "9464"
            - name: AI_USAGE_PROBE_ENABLED  # probe gasta 1 token/janela — desligado por padrão
              value: "false"
            # Estado VIVO da Forja (tempo real): diretório montado do ConfigMap reqhub-forge-state
            # (products.json + implementation-status.json da baseline atual). GET /v1/forge/state lê daqui.
            - name: FORGE_DATA_DIR
              value: "/forge-data"
            # PREVIEW da Forja (F3): diretório (PVC RWX) onde o runner deposita dist/ + manifest.json
            # por produto. O reqhub-api SERVE os bytes daqui (GET .../preview/<product>/*) e acompanha o
            # build lendo manifest.json (fail-soft). O build em si (vite) roda no runner, NÃO no pod.
            - name: FORGE_PREVIEW_DIR
              value: "/preview-data"
          # Orçamentos (não-secretos) p/ os alertas do painel — ConfigMap reqhub-usage-config.
          envFrom:
            - configMapRef:
                name: reqhub-usage-config
                optional: true
          ports:
            - name: http
              containerPort: 8080
            - name: metrics            # métricas ai_* do reqhub (scrape do kube-prometheus)
              containerPort: 9464
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "15m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "320Mi"   # +pg pool + grafo/memoria + cache do painel de uso/SSE
          volumeMounts:
            - name: forge-state
              mountPath: /forge-data
              readOnly: true
            # PREVIEW da Forja (F3): o pod SÓ LÊ (serve dist/ + manifest.json). Quem ESCREVE é o runner
            # (forge-preview.yml) via kubectl cp/escrita no PVC. readOnly aqui é defesa em profundidade.
            - name: forge-preview
              mountPath: /preview-data
              readOnly: true
      volumes:
        # Estado VIVO da Forja: products.json + implementation-status.json da baseline ATUAL.
        # optional -> o pod sobe mesmo sem o ConfigMap (GET /v1/forge/state cai p/ source:'empty').
        # Atualizado por scripts/sync-reqhub-forge-state.ps1 (sem reassar a imagem).
        - name: forge-state
          configMap:
            name: reqhub-forge-state
            optional: true
        # PREVIEW da Forja: PVC compartilhado (runner escreve dist/<product>/, o pod serve). Ver preview-pvc.yaml.
        - name: forge-preview
          persistentVolumeClaim:
            claimName: reqhub-preview
---
apiVersion: v1
kind: Service
metadata:
  name: reqhub-api
  namespace: apps
  labels:
    app.kubernetes.io/name: reqhub-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: reqhub
spec:
  selector:
    app.kubernetes.io/name: reqhub-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9464
      targetPort: metrics
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: reqhub-api-strip
  namespace: apps
  labels:
    app.kubernetes.io/name: reqhub-api
    app.kubernetes.io/part-of: reqhub
spec:
  stripPrefix:
    prefixes:
      - /reqs/api
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: reqhub-api
  namespace: apps
  labels:
    app.kubernetes.io/name: reqhub-api
    app.kubernetes.io/part-of: reqhub
spec:
  entryPoints:
    - web
  routes:
    # SSE do painel de Uso da IA -> SEM `compress` (que bufferiza o event-stream). priority 40
    # (vence a rota geral /reqs/api de priority 30). Mesma cadeia de auth/strip.
    - match: (Host(`dev.nvit.com.br`) || Host(`nvit.localhost`)) && PathPrefix(`/reqs/api/v1/ai-usage/stream`)
      kind: Rule
      priority: 40
      services:
        - name: reqhub-api
          port: 8080
      middlewares:
        - name: console-auth-401
          namespace: devops-system
        - name: reqhub-api-strip
        - name: secure-headers
          namespace: traefik
    # SSE do PREVIEW da Forja (F3): gerar+buildar o preview com progresso ao vivo -> SEM `compress`
    # (bufferizaria o event-stream durante o build longo). priority 40 (vence a rota geral priority 30).
    - match: (Host(`dev.nvit.com.br`) || Host(`nvit.localhost`)) && PathPrefix(`/reqs/api/v1/forge/preview/generate`)
      kind: Rule
      priority: 40
      services:
        - name: reqhub-api
          port: 8080
      middlewares:
        - name: console-auth-401
          namespace: devops-system
        - name: reqhub-api-strip
        - name: secure-headers
          namespace: traefik
    # SSE do ESTADO VIVO da Forja (A6): o Studio troca o polling de 15s por push -> SEM `compress`
    # (mesma armadilha). priority 40. Mesma cadeia de auth/strip das demais rotas SSE.
    - match: (Host(`dev.nvit.com.br`) || Host(`nvit.localhost`)) && PathPrefix(`/reqs/api/v1/forge/events`)
      kind: Rule
      priority: 40
      services:
        - name: reqhub-api
          port: 8080
      middlewares:
        - name: console-auth-401
          namespace: devops-system
        - name: reqhub-api-strip
        - name: secure-headers
          namespace: traefik
    # SSE do COPILOTO DA IDEIA (etapa 1 do wizard da Forja): conversa que transmite a resposta em
    # deltas + patch do ideaDraft -> SEM `compress` (bufferizaria o event-stream). priority 40.
    - match: (Host(`dev.nvit.com.br`) || Host(`nvit.localhost`)) && PathPrefix(`/reqs/api/v1/forge/idea/chat`)
      kind: Rule
      priority: 40
      services:
        - name: reqhub-api
          port: 8080
      middlewares:
        - name: console-auth-401
          namespace: devops-system
        - name: reqhub-api-strip
        - name: secure-headers
          namespace: traefik
    # API -> strip /reqs/api, priority 30 (vence o frontend /reqs priority 10).
    - match: (Host(`dev.nvit.com.br`) || Host(`nvit.localhost`)) && PathPrefix(`/reqs/api`)
      kind: Rule
      priority: 30
      services:
        - name: reqhub-api
          port: 8080
      middlewares:
        # Gate OIDC (oauth2-proxy do Console): 401 p/ XHR sem sessao; 202 + headers
        # X-Auth-Request-* quando autenticado. PRIMEIRO (antes do strip). Mesmo SSO da /devops.
        - name: console-auth-401
          namespace: devops-system
        - name: reqhub-api-strip
        - name: compress
          namespace: traefik
        - name: secure-headers
          namespace: traefik
