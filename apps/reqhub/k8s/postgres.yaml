# =============================================================================
# Postgres do Reqhub (db reqhub_ai) — MEMORIA DURAVEL do chat de autoria (F3).
# pgvector/pgvector:pg16 (postgres 16 + extensao vector) p/ ai_chat_threads + ai_user_memory.
# Secret reqhub-db (POSTGRES_USER/PASSWORD/DB/DATABASE_URL) fora do git (imperativo/kubeseal;
# ver k8s/secret.example.yaml). PVC persiste os dados. >=1Gi RAM (512Mi OOMKilla o pgvector).
# FAIL-SOFT: se este pod nao estiver no ar, o reqhub-api segue sem memoria duravel.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reqhub-pgdata
  namespace: apps
  labels:
    app.kubernetes.io/part-of: reqhub
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reqhub-postgres
  namespace: apps
  labels:
    app.kubernetes.io/name: reqhub-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: reqhub
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: reqhub-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reqhub-postgres
        app.kubernetes.io/part-of: reqhub
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          envFrom:
            - secretRef:
                name: reqhub-db
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1"
              # 512Mi OOMKilla o pgvector (checkpoints + indices) e corrompe o WAL no reboot.
              memory: "1Gi"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: reqhub-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: reqhub-postgres
  namespace: apps
  labels:
    app.kubernetes.io/part-of: reqhub
spec:
  selector:
    app.kubernetes.io/name: reqhub-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
