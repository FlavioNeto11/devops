<!doctype html>
<html lang="pt-BR" class="no-js">
  <head>
    <meta charset="utf-8" />
    <base href="/reqs/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="color-scheme" content="light dark" />
    <title>Reqhub — base de requisitos</title>
    <meta name="description" content="Reqhub — a base de requisitos da plataforma como fonte da verdade: explore, analise impacto e cobertura, acompanhe a entrega e construa produtos a partir dos requisitos." />
    <link rel="icon" href="assets/favicon.svg" />
    <link rel="stylesheet" href="assets/platform-tokens.css?v=43" />
    <link rel="stylesheet" href="assets/platform-shell.css?v=42" />
    <link rel="stylesheet" href="assets/styles.css?v=70" />
  </head>
  <body>
    <a class="skip" href="#main">Pular para o conteúdo</a>
    <platform-shell surface="reqs" me-url="api/v1/me"></platform-shell>

    <div class="app" id="app">
      <!-- ============================ SIDEBAR ============================ -->
      <aside class="sidebar" id="sidebar" aria-label="Navegação principal">
        <div class="sidebar-brand">
          <span class="brand-logo" id="brand-logo" aria-hidden="true"></span>
          <span class="brand-text">
            <strong>Reqhub</strong>
            <span class="brand-sub">fonte da verdade</span>
          </span>
        </div>

        <!-- A1a (Forja 4.0): o Studio (Forja) é a porta de entrada; overview/dev/usability saíram da
             navegação (KPIs no hub; Pipeline/Usabilidade migram p/ o Studio); versions+reprocess = "Mudanças". -->
        <nav class="sidebar-nav" aria-label="Telas do Reqhub">
          <div class="nav-group">
            <span class="nav-group-l" aria-hidden="true">Studio</span>
            <button class="nav-item" id="tab-forge" type="button" data-view="forge" data-icon="forge" aria-current="page"><span class="nav-label">Forja</span></button>
          </div>
          <div class="nav-group">
            <span class="nav-group-l" aria-hidden="true">Requisitos</span>
            <button class="nav-item" id="tab-explorer" type="button" data-view="explorer" data-icon="explorer"><span class="nav-label">Explorador</span></button>
            <button class="nav-item" id="tab-workspace" type="button" data-view="workspace" data-icon="workspace"><span class="nav-label">Workspace</span></button>
            <button class="nav-item" id="tab-editor" type="button" data-view="editor" data-icon="editor"><span class="nav-label">Editor</span></button>
          </div>
          <div class="nav-group">
            <span class="nav-group-l" aria-hidden="true">Análise</span>
            <button class="nav-item" id="tab-impact" type="button" data-view="impact" data-icon="impact"><span class="nav-label">Mapa de impacto</span></button>
            <button class="nav-item" id="tab-coverage" type="button" data-view="coverage" data-icon="coverage"><span class="nav-label">Cobertura</span></button>
            <button class="nav-item" id="tab-versions" type="button" data-view="versions" data-icon="versions"><span class="nav-label">Mudanças</span></button>
          </div>
          <!-- Grupo de OPERADOR: revelado pelo app.js só para platform-admins (gating). -->
          <div class="nav-group" id="nav-group-ai" hidden>
            <span class="nav-group-l" aria-hidden="true">Operação</span>
            <button class="nav-item" id="tab-aiusage" type="button" data-view="aiusage" data-icon="aiusage"><span class="nav-label">Uso da IA</span></button>
          </div>
        </nav>

        <button class="sidebar-collapse" id="sidebar-collapse" type="button" aria-label="Recolher menu" title="Recolher menu"><span class="nav-label">Recolher</span></button>
      </aside>

      <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

      <!-- ============================ MAIN ============================ -->
      <div class="app-main">
        <header class="topbar" role="banner">
          <button class="icon-btn topbar-burger" id="sidebar-toggle" type="button" aria-label="Abrir menu" aria-expanded="false"></button>
          <div class="topbar-head">
            <h1 class="page-title" id="page-title">Forja</h1>
            <p class="page-sub" id="page-sub">Do brief ao produto publicado — requisitos, telas, documentação e pipeline</p>
          </div>
          <div class="topbar-tools">
            <label class="search" for="q">
              <span class="visually-hidden">Buscar requisitos</span>
              <span class="search-ic" aria-hidden="true"></span>
              <input id="q" type="search" placeholder="Buscar requisitos…" autocomplete="off" />
            </label>
            <button id="fullscreen" class="icon-btn" type="button" aria-label="Entrar em tela cheia" title="Tela cheia"></button>
          </div>
        </header>

        <main id="main" tabindex="-1">
          <p id="status" class="status" role="status" aria-live="polite">Carregando a base de requisitos…</p>

          <section id="view-explorer" class="view" role="region" aria-label="Explorador de requisitos" hidden>
            <div class="toolbar" id="explorer-filters"></div>
            <div id="explorer-grid" class="grid-wrap"></div>
          </section>

          <section id="view-workspace" class="view" role="region" aria-label="Workspace do requisito" hidden>
            <div id="workspace-body" class="workspace"></div>
          </section>

          <section id="view-versions" class="view" role="region" aria-label="Versões e mudanças" hidden>
            <div id="versions-body"></div>
          </section>

          <section id="view-impact" class="view" role="region" aria-label="Mapa de impacto" hidden>
            <div class="toolbar" id="impact-filters"></div>
            <div id="impact-canvas" class="impact-canvas"></div>
          </section>

          <section id="view-coverage" class="view" role="region" aria-label="Cobertura" hidden>
            <div class="toolbar" id="coverage-filters"></div>
            <div id="coverage-body"></div>
          </section>

          <section id="view-usability" class="view" role="region" aria-label="Usabilidade" hidden>
            <div id="usability-body"></div>
          </section>

          <section id="view-reprocess" class="view" role="region" aria-label="Fila de reprocessamento" hidden>
            <div class="toolbar" id="reprocess-filters"></div>
            <div id="reprocess-body"></div>
          </section>

          <section id="view-dev" class="view" role="region" aria-label="Desenvolvimento" hidden>
            <div class="toolbar" id="dev-filters"></div>
            <div id="dev-body"></div>
          </section>

          <section id="view-editor" class="view" role="region" aria-label="Editor" hidden>
            <div id="editor-body" class="editor"></div>
          </section>

          <section id="view-forge" class="view" role="region" aria-label="Forge" hidden>
            <div id="forge-body"></div>
          </section>

          <section id="view-aiusage" class="view" role="region" aria-label="Uso da IA" hidden>
            <div id="aiusage-alerts" role="region" aria-label="Alertas de orçamento e limite"></div>
            <div id="aiusage-body"></div>
          </section>

          <footer class="foot" role="contentinfo">
            <span id="foot-meta">Reqhub</span>
            <span class="foot-links">
              fonte da verdade: <code>specs/requirements/**</code> · baseline gerada · edição via git/PR
            </span>
          </footer>
        </main>
      </div>
    </div>

    <script type="module" src="assets/platform-shell.js?v=45"></script>
    <script type="module" src="assets/app.js?v=87"></script>
  </body>
</html>
