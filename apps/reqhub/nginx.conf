# Reqhub — nginx servindo o workbench estático sob o subpath /reqs/.
# Traefik NÃO faz strip (frontend): o pod recebe /reqs/... e serve via prefix+alias
# (nunca alias com regex — ver TROUBLESHOOTING da plataforma). Sem inline no app, então
# CSP estrita (script-src 'self'). A baseline assada vive em /data (servida em /reqs/data/).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 512;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Defesa em profundidade (Traefik na borda + estes). App sem inline => CSP estrita.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

  # Health (probe interno do kubelet, fora do subpath).
  location = /healthz { default_type text/plain; return 200 "ok"; }

  location = / { return 308 /reqs/; }
  location = /reqs { return 308 /reqs/; }

  # Assets versionados (?v=) — cache curto (a imagem rebuilda quando muda).
  location /reqs/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1h;
  }
  # Baseline gerada — assada na imagem; cache muito curto (muda a cada rebuild).
  location /reqs/data/ {
    alias /usr/share/nginx/html/data/;
    expires 30s;
  }
  location /reqs/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /reqs/index.html;
    # HTML sempre revalidado (sem cache do documento) — assets versionados (?v=) tem
    # cache proprio na location acima. `expires` nao e add_header, entao preserva a
    # heranca dos headers de seguranca (CSP/nosniff/referrer) definidos no server.
    expires epoch;
  }
}
