# ZapBridge — app web (Vite/React SPA) servido sob /zapbridge (Traefik SEM strip).
# Padrão MIME-safe: PREFIXO + alias ESTÁTICO para assets; SPA fallback p/ index.html
# (rotas client-side do React Router: /zapbridge/settings, /zapbridge/chat/:id, etc.).
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /zapbridge { return 301 /zapbridge/; }

  # Assets do Vite (hash-imutáveis).
  location /zapbridge/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Manifest do PWA (Content-Type correto).
  location = /zapbridge/manifest.webmanifest {
    alias /usr/share/nginx/html/manifest.webmanifest;
    default_type application/manifest+json;
    add_header Cache-Control "no-cache" always;
  }

  # SPA: tudo sob /zapbridge/ cai no index.html (roteamento client-side, base /zapbridge).
  location /zapbridge/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /zapbridge/index.html;
    add_header Cache-Control "no-cache" always;
  }

  location = / { return 301 /zapbridge/; }
}
