# EXEMPLO do Secret zapbridge-config (JWT_SECRET do backend). NAO versionar o valor real.
# O Secret real e criado no cluster FORA do git (e nao entra no kustomization.yaml,
# entao o Argo nao o gerencia nem o pruna):
#   kubectl -n apps create secret generic zapbridge-config `
#     --from-literal=JWT_SECRET=<gerar-um-valor-forte-e-unico>
# Gerar um segredo forte (PowerShell 7):
#   -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 48 | ForEach-Object {[char]$_})
apiVersion: v1
kind: Secret
metadata:
  name: zapbridge-config
  namespace: apps
  labels:
    app.kubernetes.io/part-of: zapbridge
type: Opaque
stringData:
  JWT_SECRET: CHANGE_ME_strong_unique_secret
