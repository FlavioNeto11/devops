# EXEMPLO dos Secrets do ZapBridge. NAO versionar valores reais. Criados no cluster FORA
# do git (nao entram no kustomization.yaml → o Argo nao os gerencia nem os pruna).
#
# 1) zapbridge-config (JWT do app + chaves de IA, todas opt-in):
#   kubectl -n apps create secret generic zapbridge-config `
#     --from-literal=JWT_SECRET=<valor-forte> `
#     --from-literal=ANTHROPIC_API_KEY=<sk-ant-...> `
#     --from-literal=OPENAI_API_KEY=<sk-...>
#   (ANTHROPIC_AUTH_TOKEN no lugar de ANTHROPIC_API_KEY se usar assinatura Claude.)
#   Sem as chaves de IA o app sobe normal — a IA fica desligada (fail-soft).
# Gerar um segredo forte (PowerShell 7):
#   -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 48 | ForEach-Object {[char]$_})
#
# 2) zapbridge-db (Postgres pgvector da IA + URL que o server consome):
#   kubectl -n apps create secret generic zapbridge-db `
#     --from-literal=POSTGRES_USER=zapbridge `
#     --from-literal=POSTGRES_PASSWORD=<senha-forte> `
#     --from-literal=POSTGRES_DB=zapbridge_ai `
#     --from-literal=AI_DATABASE_URL=postgres://zapbridge:<senha-forte>@zapbridge-postgres:5432/zapbridge_ai
apiVersion: v1
kind: Secret
metadata:
  name: zapbridge-config
  namespace: apps
  labels:
    app.kubernetes.io/part-of: zapbridge
type: Opaque
stringData:
  JWT_SECRET: CHANGE_ME_strong_unique_secret
  # IA (opcional — preencher para ligar a IA):
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: zapbridge-db
  namespace: apps
  labels:
    app.kubernetes.io/part-of: zapbridge
type: Opaque
stringData:
  POSTGRES_USER: zapbridge
  POSTGRES_PASSWORD: CHANGE_ME_strong_db_password
  POSTGRES_DB: zapbridge_ai
  AI_DATABASE_URL: postgres://zapbridge:CHANGE_ME_strong_db_password@zapbridge-postgres:5432/zapbridge_ai
