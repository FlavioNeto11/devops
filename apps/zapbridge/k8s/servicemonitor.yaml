# ServiceMonitor: o kube-prometheus-stack coleta as métricas ai_* da camada de IA do
# ZapBridge (porta dedicada `metrics` no zapbridge-server, fora do Traefik). Services
# part-of: zapbridge sem a porta `metrics` (ex.: zapbridge-web) são simplesmente ignorados.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zapbridge-ai
  namespace: apps
  labels: { app.kubernetes.io/part-of: zapbridge }
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: zapbridge
  namespaceSelector: { matchNames: [apps] }
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
