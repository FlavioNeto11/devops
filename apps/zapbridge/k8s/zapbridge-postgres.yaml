# =============================================================================
# Postgres da camada de IA do ZapBridge (db zapbridge_ai). Imagem pgvector/pgvector:pg16
# (postgres:16 + extensão vector) — exigida por threads/memória/embeddings/RAG. Banco
# SEPARADO do SQLite transacional do WhatsApp (o worker de IA só escreve AQUI; o SQLite
# nunca ganha um 2º writer). Secret `zapbridge-db` (POSTGRES_USER/PASSWORD/DB) é criado no
# cluster FORA do git (ver secret.example.yaml) e NÃO entra no kustomization (Argo não pruna).
# PVC próprio (não compartilha com o PVC do zapbridge-server).
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zapbridge-pgdata
  namespace: apps
  labels:
    app.kubernetes.io/part-of: zapbridge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zapbridge-postgres
  namespace: apps
  labels:
    app.kubernetes.io/name: zapbridge-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: zapbridge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: zapbridge-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zapbridge-postgres
        app.kubernetes.io/part-of: zapbridge
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          envFrom:
            - secretRef:
                name: zapbridge-db
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1"
              # 1Gi: 512Mi OOMou o pgvector no sicat e corrompeu o WAL no reboot.
              memory: "1Gi"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: zapbridge-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: zapbridge-postgres
  namespace: apps
  labels:
    app.kubernetes.io/part-of: zapbridge
spec:
  selector:
    app.kubernetes.io/name: zapbridge-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
