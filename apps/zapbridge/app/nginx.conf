# ZapBridge — app web (Expo/react-native-web, SPA) servido sob /zapbridge (Traefik SEM strip).
# Padrão MIME-safe da plataforma: PREFIXO + alias ESTÁTICO para os assets (alias com
# captura de regex serve application/octet-stream e quebra a SPA — TROUBLESHOOTING 14).
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /zapbridge { return 301 /zapbridge/; }

  # Bundle JS do Expo (hash-imutável).
  location /zapbridge/_expo/ {
    alias /usr/share/nginx/html/_expo/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Assets estáticos (ícones etc.).
  location /zapbridge/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # Ícones do PWA.
  location /zapbridge/icons/ {
    alias /usr/share/nginx/html/icons/;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # Manifest do PWA (Content-Type correto para instalabilidade).
  location = /zapbridge/manifest.webmanifest {
    alias /usr/share/nginx/html/manifest.webmanifest;
    default_type application/manifest+json;
    add_header Cache-Control "no-cache" always;
  }

  # Service worker: escopo no root do app, sem cache (revalida sempre).
  location = /zapbridge/sw.js {
    alias /usr/share/nginx/html/sw.js;
    default_type application/javascript;
    add_header Service-Worker-Allowed "/zapbridge/" always;
    add_header Cache-Control "no-cache" always;
  }

  # SPA: tudo sob /zapbridge/ cai no index.html (roteamento client-side, base /zapbridge).
  # index.html sem cache de longa duração (revalida via ETag) — assets são hash-imutáveis.
  location /zapbridge/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /zapbridge/index.html;
    add_header Cache-Control "no-cache" always;
  }

  location = / { return 301 /zapbridge/; }
}
