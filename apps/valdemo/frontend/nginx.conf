# Servir a SPA sob /valdemo/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /valdemo { return 301 /valdemo/; }
  location /valdemo/ {
    alias /usr/share/nginx/html/valdemo/;
    try_files $uri $uri/ /valdemo/index.html;
  }
}
