# Val Demo — k8s gerado pela Forge. Imagens :local (IfNotPresent).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: valdemo-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: valdemo } }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: valdemo-postgres, namespace: apps, labels: { app.kubernetes.io/name: valdemo-postgres, app.kubernetes.io/part-of: valdemo } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: valdemo-postgres } }
  template:
    metadata: { labels: { app.kubernetes.io/name: valdemo-postgres, app.kubernetes.io/part-of: valdemo } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom: [ { secretRef: { name: valdemo-db } } ]
          ports: [ { containerPort: 5432 } ]
          volumeMounts: [ { name: data, mountPath: /var/lib/postgresql/data, subPath: pgdata } ]
      volumes: [ { name: data, persistentVolumeClaim: { claimName: valdemo-postgres } } ]
---
apiVersion: v1
kind: Service
metadata: { name: valdemo-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: valdemo } }
spec: { selector: { app.kubernetes.io/name: valdemo-postgres }, ports: [ { port: 5432, targetPort: 5432 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valdemo-api
  namespace: apps
  labels: { app.kubernetes.io/name: valdemo-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: valdemo, devops.flavioneto/app-type: product_software }
  annotations: { devops.flavioneto/app: valdemo, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: valdemo-api } }
  template:
    metadata: { labels: { app.kubernetes.io/name: valdemo-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: valdemo } }
    spec:
      containers:
        - name: api
          image: valdemo-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          envFrom: [ { secretRef: { name: valdemo-db } } ]
          env:
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "true" }
            - { name: AUTO_SEED, value: "true" }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 9464 }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 8, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: valdemo-api, namespace: apps, labels: { app.kubernetes.io/name: valdemo-api, app.kubernetes.io/part-of: valdemo } }
spec: { selector: { app.kubernetes.io/name: valdemo-api }, ports: [ { name: http, port: 8080, targetPort: 8080 }, { name: metrics, port: 9464, targetPort: 9464 } ] }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: valdemo-api-strip, namespace: apps }
spec: { stripPrefix: { prefixes: ["/valdemo/api"] } }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: valdemo, namespace: apps, labels: { app.kubernetes.io/part-of: valdemo } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/valdemo/api`)
      kind: Rule
      priority: 40
      services: [ { name: valdemo-api, port: 8080 } ]
      middlewares: [ { name: valdemo-api-strip } ]
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: valdemo, namespace: apps, labels: { app.kubernetes.io/part-of: valdemo, release: kube-prometheus-stack } }
spec:
  selector: { matchLabels: { app.kubernetes.io/part-of: valdemo } }
  namespaceSelector: { matchNames: [apps] }
  endpoints: [ { port: metrics, path: /metrics, interval: 15s } ]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: valdemo-slo, namespace: apps, labels: { app.kubernetes.io/part-of: valdemo, release: kube-prometheus-stack } }
spec:
  groups:
    - name: valdemo.slo
      rules:
        - alert: valdemoApiDown
          expr: absent(up{job=~".*valdemo-api.*"} == 1)
          for: 3m
          labels: { severity: critical, app: valdemo }
          annotations: { summary: "valdemo: API sem target UP" }
