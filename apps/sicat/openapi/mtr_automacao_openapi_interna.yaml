  /v1/jobs/{jobId}/events:
    get:
      summary: Stream de eventos de job
      description: |-
        Abre um stream assíncrono em `application/x-ndjson` com atualização em tempo real
        do job, eliminando polling no frontend.

        **Formato:** uma linha JSON por evento.
        - `job.snapshot`: snapshot inicial do job
        - `job.updated`: alteração de estado do job
        - `job.dlq`: job movido para DLQ
        - `job.requeued`: job reencaminhado da DLQ
        - `heartbeat`: keep-alive da conexão
      tags:
      - Jobs
      responses:
        '200':
          description: Stream aberto com eventos NDJSON
          content:
            application/x-ndjson:
              schema:
                type: string
              example: |
                {"type":"job.snapshot","job":{"jobId":"job_01JQW5PAGY61R9Z6T2ZFMK1TJ3","status":"running"}}
                {"type":"job.updated","event":{"eventType":"job.updated","jobId":"job_01JQW5PAGY61R9Z6T2ZFMK1TJ3","status":"succeeded"},"job":{"jobId":"job_01JQW5PAGY61R9Z6T2ZFMK1TJ3","status":"succeeded","result":{"outcome":"manifest_submitted"}}}
        '404':
          $ref: '#/components/responses/Problem'
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - name: jobId
        in: path
        required: true
        schema:
          type: string
