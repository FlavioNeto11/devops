          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresAt:
          type: string
          format: date-time
          description: Data/hora de expiração do token (geralmente 24h)
          example: '2026-03-08T23:59:59Z'
        user:
          type: object
          required:
          - accessCode
          - name
          - email
          properties:
            accessCode:
              type: integer
