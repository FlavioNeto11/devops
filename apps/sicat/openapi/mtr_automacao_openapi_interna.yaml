openapi: 3.1.0
info:
  title: Automação MTR CETESB - API Interna
  version: 1.0.0
  summary: Contrato interno para automação dos fluxos observados de cadastro, manifesto,
    recebimento, CDF, impressão, cancelamento, parceiros, catálogos, jobs e auditoria.
  description: 'OpenAPI interna derivada da especificação técnica e dos HARs analisados
    do SIGOR-MTR/CETESB. Esta API desacopla os consumidores internos da API externa
    da CETESB, padroniza idempotência, correlação, observabilidade, persistência e
    execução assíncrona.


    Fora de escopo nesta versão: qualquer automação envolvendo reCAPTCHA.'
x-cetesb-source-of-truth:
  path: docs/cetesb
  requiredHarFiles:
  - mtr.cetesb.sp.gov.br_login.har
  - mtr.cetesb.sp.gov.br_gerar_mtr.har
  - mtr.cetesb.sp.gov.br_imprimir_mtr.har
  - mtr.cetesb.sp.gov.br_cancelar_mtr.har
  - mtr.cetesb.sp.gov.br_criar_cadastro.har
  - mtr.cetesb.sp.gov.br_recebimento_mtr.har
  - mtr.cetesb.sp.gov.br_gerar_cdf_mtr.har
  - mtr.cetesb.sp.gov.br_baixar_cdf_mtr.har
  # Nota: Health endpoints (/v1/ping, /v1/health/*, /v1/maintenance/cleanup) são INTERNOS
  # e têm fonte de verdade em banco de dados local (worker_health, jobs, performance_snapshots),
  # não em HARs CETESB. Não obrigam validação de HAR.
x-internal-observability:
  description: 'Health endpoints são observabilidade interna do sistema.'
  dataSource: 'Banco de dados local (tabelas: worker_health, jobs, performance_snapshots, system_events)'
  hasDependency: 'Nenhuma - resilientes mesmo quando CETESB está indisponível'
servers:
- url: http://localhost:8080
  description: Servidor padrão funcional (Swagger UI e desenvolvimento local)
tags:
- name: Authentication
  description: Login e autenticação de usuários com recuperação de token JWT e dados
    do parceiro.
- name: SICAT Authentication
  description: Login inicial no SICAT e renovação de tokens da sessão SICAT.
- name: SICAT CETESB Accounts
  description: Gestão de múltiplas contas CETESB vinculadas ao usuário autenticado no SICAT.
- name: Session Contexts
  description: Contextos de sessão/autorização prontos para uso pelo conector CETESB.
- name: Admin Access
  description: Operação administrativa global para leitura de usuários, perfis, permissões e sessões.
- name: Catalogs
  description: Sincronização e consulta local de catálogos normalizados.
- name: Partners
  description: Pesquisa e resolução de parceiros por termo, documento ou código.
- name: Cadastros
  description: Solicitação e acompanhamento de cadastro de acesso/empreendimento.
- name: Manifestos
  description: Criação, submissão, recebimento, consulta, impressão e cancelamento de manifestos.
- name: CDF
  description: Geração, consulta e download de certificados de destinação final.
- name: Jobs
  description: Acompanhamento da execução assíncrona.
- name: Audit
  description: Trilha técnica sanitizada por correlationId.
- name: Health
  description: Monitoramento e observabilidade do sistema (heartbeat, métricas, jobs ativos, DLQ).
- name: Operations
  description: Visão consolidada operacional (jobs, manifestos, contas, sessões).
- name: CETESB
  description: Saúde derivada de contas e sessões CETESB (fonte local).
- name: Reports
  description: Relatórios operacionais (consulta paginada e exportação CSV).
security:
- bearerAuth: []
paths:
  /v1/auth/login:
    post:
      summary: Login com usuário e senha
      description: |-
        Autentica usuário com credenciais CNPJ/CPF + senha e retorna JWT token + dados
        do parceiro.
        
        **Fluxo:**
        1. Cliente envia documento (CNPJ/CPF), senha e opcionalmente recaptchaToken
        2. Backend tenta login na CETESB (campo recaptchaToken é opcional - CETESB aceita string vazia via API backend)
        3. Se sucesso, retorna JWT token + dados completos do parceiro
        4. Cliente pode usar token para criar session context automático
        
        **Nota:** Campo recaptchaToken é aceito mas não validado pela CETESB via API backend.
        Testes práticos comprovam que CETESB aceita string vazia.
      tags:
      - Authentication
      security: []
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIzMzM5NDgiLCJuYW1lIjoiRmxhdmlvIFBhZGlsaGEgTmV0byIsInBhcnRuZXJDb2RlIjoxNzYxNjMsImlhdCI6MTcwOTg1NjAwMCwiZXhwIjoxNzA5OTQyNDAwfQ.dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk
                expiresAt: '2026-03-08T23:59:59Z'
                user:
                  accessCode: 333948
                  name: Flavio Padilha Neto
                  email: flavio_padilha_neto@msn.com
                  cpf: '37088641828'
                  document: '31913781000139'
                  documentType: J
                partner:
                  code: 176163
                  description: Nova IT
                  tradeName: Nova IT
                  document: '31913781000139'
                  state:
                    code: 26
                    abbreviation: SP
        '400':
          description: Credenciais inválidas ou reCAPTCHA não resolvido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                invalidCredentials:
                  summary: Usuário ou senha incorretos
                  value:
                    type: https://api.exemplo.local/problems/invalid-credentials
                    title: Credenciais Inválidas
                    status: 400
                    code: INVALID_CREDENTIALS
                    detail: Usuário ou senha incorretos. Verifique CNPJ/CPF e senha.
                    correlationId: corr_login_001
        '500':
          $ref: '#/components/responses/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              cnpjLogin:
                summary: Login com CNPJ
                value:
                  document: '31913781000139'
                  password: 2dlzft
                  recaptchaToken: 03AGdBq24PBCd...XYZ
              cpfLogin:
                summary: Login com CPF
                value:
                  document: '37088641828'
                  password: 2dlzft
                  recaptchaToken: ''
              emailLogin:
                summary: Login com Email (se suportado)
                value:
                  document: flavio_padilha_neto@msn.com
                  password: 2dlzft
                  recaptchaToken: ''
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
  /v1/auth/partner-info:
    get:
      summary: Buscar informações do parceiro por documento
      description: |-
        Consulta dados do parceiro (código, nome, estado) a partir de CNPJ ou CPF
        **sem necessidade de autenticação prévia**. Útil para preencher formulários
        antes do login.
        
        Este endpoint consulta a base local ou faz lookup na CETESB dependendo
        da disponibilidade de cache.
      tags:
      - Authentication
      security: []
      responses:
        '200':
          description: Dados do parceiro encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerInfo'
              example:
                partnerCode: 176163
                description: Nova IT
                tradeName: Nova IT
                document: '31913781000139'
                documentType: J
                state:
                  code: 26
                  abbreviation: SP
                registeredUsers:
                - accessCode: 333948
                  name: Flavio Padilha Neto
                  email: flavio_padilha_neto@msn.com
                  cpf: '37088641828'
        '404':
          description: Parceiro não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: https://api.exemplo.local/problems/partner-not-found
                title: Parceiro Não Encontrado
                status: 404
                code: PARTNER_NOT_FOUND
                detail: Nenhum parceiro encontrado para o documento 31913781000139
                correlationId: corr_partner_lookup_001
      parameters:
      - name: document
        in: query
        required: true
        description: CNPJ, CPF ou email do parceiro
        schema:
          type: string
        example: '31913781000139'
      - $ref: '#/components/parameters/CorrelationId'
  /v1/sicat/auth/login:
    post:
      summary: Login inicial no SICAT
      description: Autentica o usuário no SICAT (email + senha) e retorna tokens da
        sessão SICAT para o fluxo de dupla autenticação.
      tags:
      - SICAT Authentication
      security: []
      responses:
        '200':
          description: Login SICAT bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SicatLoginResponse'
              example:
                accessToken: sicat_access_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                refreshToken: sicat_refresh_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                expiresAt: '2026-03-13T18:00:00Z'
                user:
                  userId: usr_01JQWABCDEF1234567890
                  name: Flavio Padilha Neto
                  email: flavio_padilha_neto@msn.com
                  roles:
                  - operator
        '400':
          description: Requisição inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Credenciais inválidas
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Falha interna
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SicatLoginRequest'
            example:
              email: flavio_padilha_neto@msn.com
              password: super-secret-password
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
  /v1/sicat/auth/register:
    post:
      summary: Registrar novo usuário SICAT
      description: Cria um usuário SICAT e já retorna tokens da sessão para continuar
        o fluxo de autenticação.
      tags:
      - SICAT Authentication
      security: []
      responses:
        '201':
          description: Usuário SICAT criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SicatLoginResponse'
              example:
                accessToken: sicat_access_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                refreshToken: sicat_refresh_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                expiresAt: '2026-03-13T18:00:00Z'
                user:
                  userId: usr_01JQWABCDEF1234567890
                  name: Flavio Padilha Neto
                  email: flavio_padilha_neto@msn.com
                  roles:
                  - operator
        '400':
          description: Requisição inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Usuário já cadastrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Falha interna
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SicatRegisterRequest'
            example:
              name: Flavio Padilha Neto
              email: flavio_padilha_neto@msn.com
              password: super-secret-password
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
  /v1/sicat/auth/refresh:
    post:
      summary: Renovar sessão SICAT
      description: Renova a sessão do usuário SICAT emitindo novo par de tokens.
      tags:
      - SICAT Authentication
      security: []
      responses:
        '200':
          description: Tokens renovados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SicatRefreshResponse'
              example:
                accessToken: sicat_access_new_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                refreshToken: sicat_refresh_new_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
                expiresAt: '2026-03-13T20:00:00Z'
        '400':
          description: Requisição inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Refresh token inválido ou expirado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SicatRefreshRequest'
            example:
              refreshToken: sicat_refresh_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
  /v1/sicat/cetesb-accounts:
    get:
      summary: Listar contas CETESB vinculadas ao usuário SICAT
      description: Retorna cards operacionais para seleção de conta CETESB ativa no
        fluxo de dupla autenticação.
      tags:
      - SICAT CETESB Accounts
      responses:
        '200':
          description: Lista de contas vinculadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SicatCetesbAccountsListResponse'
              example:
                activeAccountId: acc_01JQWACCOUNT0001
                accounts:
                - accountId: acc_01JQWACCOUNT0001
                  partnerCode: 176163
                  partnerDocument: 31.913.781/0001-39
                  partnerName: Nova IT
                  accountType: generator
                  lastConnectionAt: '2026-03-13T14:10:00Z'
                  lastUsageAt: '2026-03-13T14:52:11Z'
                  usageSummary:
                    manifestsCreated: 25
                    manifestsSubmitted: 22
                    manifestsPrinted: 18
                    manifestsCancelled: 1
                  isActive: true
                - accountId: acc_01JQWACCOUNT0002
                  partnerCode: 221010
                  partnerDocument: 12.***.***/0001-**
                  partnerName: Transportes XPTO
                  accountType: carrier
                  lastConnectionAt: '2026-03-10T09:20:00Z'
                  lastUsageAt: '2026-03-11T08:15:00Z'
                  usageSummary:
                    manifestsCreated: 4
                    manifestsSubmitted: 4
                    manifestsPrinted: 2
                    manifestsCancelled: 0
                  isActive: false
        '401':
          description: Sessão SICAT inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
    post:
      summary: Vincular nova conta CETESB ao usuário SICAT
      description: Adiciona uma conta CETESB ao usuário SICAT usando credenciais CETESB
        para autenticação e vínculo.
      tags:
      - SICAT CETESB Accounts
      responses:
        '201':
          description: Conta CETESB vinculada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SicatCetesbAccountCard'
              example:
                accountId: acc_01JQWACCOUNT0003
                partnerCode: 778899
                partnerDocument: 45.123.456/0001-90
                partnerName: Destino Ambiental Ltda
                accountType: receiver
                lastConnectionAt: '2026-03-13T15:10:00Z'
                lastUsageAt: null
                usageSummary:
                  manifestsCreated: 0
                  manifestsSubmitted: 0
                  manifestsPrinted: 0
                  manifestsCancelled: 0
                isActive: false
        '400':
          description: Dados inválidos
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Sessão SICAT inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Conta CETESB já vinculada para este usuário
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SicatCetesbAccountCreateRequest'
            example:
              login: '31913781000139'
              password: 2dlzft
              email: flavio_padilha_neto@msn.com
              partnerCode: 176163
              recaptchaToken: ''
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
  /v1/sicat/cetesb-accounts/{accountId}/activate:
    post:
      summary: Definir conta CETESB ativa
      description: Define a conta CETESB ativa para o usuário SICAT e retorna o contexto
        ativo para operações subsequentes.
      tags:
      - SICAT CETESB Accounts
      responses:
        '200':
          description: Conta ativa definida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SicatActiveSessionResponse'
              example:
                user:
                  userId: usr_01JQWABCDEF1234567890
                  name: Flavio Padilha Neto
                  email: flavio_padilha_neto@msn.com
                  roles:
                  - operator
                  adminAccess:
                    allowed: false
                    source: none
                activeAccount:
                  accountId: acc_01JQWACCOUNT0001
                  partnerCode: 176163
                  partnerDocument: 31.913.781/0001-39
                  partnerName: Nova IT
                  accountType: generator
                  lastConnectionAt: '2026-03-13T15:20:00Z'
                  lastUsageAt: '2026-03-13T15:20:00Z'
                  usageSummary:
                    manifestsCreated: 25
                    manifestsSubmitted: 22
                    manifestsPrinted: 18
                    manifestsCancelled: 1
                  isActive: true
                sessionContext:
                  sessionContextId: scx_01JQW5M0D2G3CTQYV4N9AB8F1R
                  integrationAccountId: acc_nova_it_prod
                  status: active
        '401':
          description: Sessão SICAT inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Conta CETESB não encontrada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - name: accountId
        in: path
        required: true
        schema:
          type: string
  /v1/sicat/cetesb-accounts/{accountId}:
    delete:
      summary: Remover conta CETESB vinculada ao usuário SICAT
      description: Remove a conta CETESB salva da lista de contas vinculadas do usuário autenticado.
      tags:
      - SICAT CETESB Accounts
      responses:
        '200':
          description: Conta removida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
                  accountId:
                    type: string
              example:
                removed: true
                accountId: acc_01JQWACCOUNT0002
        '401':
          description: Sessão SICAT inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: Conta CETESB não encontrada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - name: accountId
        in: path
        required: true
        schema:
          type: string
  /v1/sicat/session:
    get:
      summary: Obter sessão atual do SICAT
      description: Retorna dados do usuário SICAT autenticado e a conta CETESB ativa,
        quando houver.
      tags:
      - SICAT CETESB Accounts
      responses:
        '200':
          description: Sessão SICAT atual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SicatActiveSessionResponse'
              example:
                user:
                  userId: usr_01JQWABCDEF1234567890
                  name: Flavio Padilha Neto
                  email: flavio_padilha_neto@msn.com
                  roles:
                  - operator
                activeAccount:
                  accountId: acc_01JQWACCOUNT0001
                  partnerCode: 176163
                  partnerDocument: 31.913.781/0001-39
                  partnerName: Nova IT
                  accountType: generator
                  lastConnectionAt: '2026-03-13T15:20:00Z'
                  lastUsageAt: '2026-03-13T15:20:00Z'
                  usageSummary:
                    manifestsCreated: 25
                    manifestsSubmitted: 22
                    manifestsPrinted: 18
                    manifestsCancelled: 1
                  isActive: true
                sessionContext:
                  sessionContextId: scx_01JQW5M0D2G3CTQYV4N9AB8F1R
                  integrationAccountId: acc_nova_it_prod
                  status: active
        '401':
          description: Sessão SICAT inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
  /v1/admin/access/users:
    get:
      summary: Listar usuários para administração de acesso
      description: Retorna visão administrativa global dos usuários e seus perfis atribuídos.
      tags:
      - Admin Access
      responses:
        '200':
          description: Lista de usuários retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessUserListResponse'
              example:
                items:
                - userId: usr_01JQWABCDEF1234567890
                  name: Flavio Padilha Neto
                  email: flavio_padilha_neto@msn.com
                  status: active
                  roles:
                  - roleId: role_admin_global
                    name: admin.global
                    description: Administrador global
                  createdAt: '2026-03-10T10:00:00Z'
                  updatedAt: '2026-03-13T15:20:00Z'
                total: 1
                page: 1
                pageSize: 20
        '401':
          description: Sessão SICAT inválida
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '403':
          description: Usuário sem permissão administrativa
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - name: search
        in: query
        required: false
        schema:
          type: string
          maxLength: 120
        description: Filtro por nome, email ou identificador de usuário.
      - name: roleId
        in: query
        required: false
        schema:
          type: string
          maxLength: 128
        description: Filtra usuários com determinado perfil.
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - active
          - disabled
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
  /v1/admin/access/users/{userId}:
    get:
      summary: Consultar usuário para administração de acesso
      description: Retorna dados detalhados de um usuário para gestão de perfis e permissões.
      tags:
      - Admin Access
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAccessUserDetailsResponse'
              example:
                userId: usr_01JQWABCDEF1234567890
                name: Flavio Padilha Neto
                email: flavio_padilha_neto@msn.com
                status: active
                roles:
                - roleId: role_admin_global
                  name: admin.global
                  description: Administrador global
                permissions:
                - permissionId: perm_access_users_read
                  resource: access.users
                  action: read
                  description: Visualizar usuários de acesso
                createdAt: '2026-03-10T10:00:00Z'
                updatedAt: '2026-03-13T15:20:00Z'
        '401':
