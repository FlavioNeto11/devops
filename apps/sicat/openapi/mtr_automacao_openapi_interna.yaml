      - $ref: '#/components/parameters/IdempotencyKey'
      - name: id
        in: path
        required: true
        schema: { type: string }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Chave opcional para repetição segura de operações críticas.
      schema:
        type: string
        maxLength: 128
      example: 0f70f030-4438-4e21-84dd-c32aab5f5e43
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Identificador de correlação fornecido pelo cliente; se ausente,
        a API gera um novo.
      schema:
        type: string
        maxLength: 128
      example: corr_6b7999cf8c7b4ea4b4c85a3a1f8d7f44
  responses:
    AcceptedCommand:
      description: Comando aceito para execução assíncrona.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommandAccepted'
          example:
            commandId: cmd_01JQW5M7Z6F6Y9N2P3Q4R5S6T7
            jobId: job_01JQW5M7Z6F6Y9N2P3Q4R5S6T7
            correlationId: corr_6b7999cf8c7b4ea4b4c85a3a1f8d7f44
            entityType: manifest
            entityId: man_01JQW5M6YY9M7K7B5N63GQ6E9S
            operation: manifest.submit
            status: queued
            submittedAt: '2026-03-07T20:18:44Z'
            links:
              job: /v1/jobs/job_01JQW5M7Z6F6Y9N2P3Q4R5S6T7
              entity: /v1/manifestos/man_01JQW5M6YY9M7K7B5N63GQ6E9S
              audit: /v1/audit/corr_6b7999cf8c7b4ea4b4c85a3a1f8d7f44
    Problem:
      description: Erro normalizado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.exemplo.local/problems/external-integration-failed
            title: Falha na integração externa
            status: 502
            code: EXTERNAL_INTEGRATION_FAILED
            detail: A CETESB respondeu com erro de negócio ao processar a operação
              solicitada.
            correlationId: corr_6b7999cf8c7b4ea4b4c85a3a1f8d7f44
            errors:
            - field: manifest.residues[0].quantity
              message: Valor incompatível com a unidade informada.
  schemas:
    CommandAccepted:
      type: object
      required:
      - commandId
      - jobId
      - correlationId
      - entityType
      - entityId
      - operation
      - status
      - submittedAt
      - links
      properties:
        commandId:
          type: string
        jobId:
          type: string
        correlationId:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        operation:
          type: string
        status:
          type: string
          enum:
          - queued
          - running
          - retry_wait
          - succeeded
          - failed
          - dlq
          - cancelled
        submittedAt:
          type: string
          format: date-time
        links:
          type: object
          required:
          - job
          - entity
          - audit
          properties:
            job:
              type: string
            entity:
              type: string
            audit:
              type: string
