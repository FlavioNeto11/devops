              example: 333948
            name:
              type: string
              example: Flavio Padilha Neto
            email:
              type: string
              format: email
              example: flavio_padilha_neto@msn.com
            cpf:
              type: string
              example: '37088641828'
              nullable: true
            document:
              type: string
              description: CNPJ ou CPF do login realizado
              example: '31913781000139'
            documentType:
              type: string
              enum:
              - F
              - J
              example: J
