          type: object
          required:
          - code
          - description
          - document
          - state
          properties:
            code:
              type: integer
              description: Código do parceiro no sistema CETESB
              example: 176163
            description:
              type: string
              description: Razão social ou nome do parceiro
              example: Nova IT
            tradeName:
              type: string
              nullable: true
              example: Nova IT
            document:
              type: string
              description: CNPJ do parceiro
              example: '31913781000139'
            state:
              type: object
              required:
              - code
              - abbreviation
