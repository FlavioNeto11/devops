# =============================================================================
# EXEMPLO / placeholders. Os secrets REAIS NUNCA sao versionados - sao criados no
# cluster a partir do .env desta maquina:
#
#   kubectl create secret generic sicat-config --from-env-file=C:\GIT\PADILHA\sicat\.env -n apps
#   kubectl create secret generic sicat-db -n apps `
#     --from-literal=POSTGRES_USER=sicat `
#     --from-literal=POSTGRES_PASSWORD=<gerado> `
#     --from-literal=POSTGRES_DB=mtr_automation `
#     --from-literal=DATABASE_URL="postgres://sicat:<gerado>@sicat-postgres:5432/mtr_automation"
#   kubectl create configmap sicat-certs -n apps `
#     --from-file=cetesb-chain.pem=C:\devops\apps\sicat\certs\cetesb-chain.pem
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sicat-config
  namespace: apps
type: Opaque
stringData:
  # Espelha as chaves do .env (OPENAI_*, CETESB_*, LANGFUSE_*, etc.).
  OPENAI_API_KEY: "sk-REPLACE_ME"
  CETESB_GATEWAY_MODE: "real"
  CETESB_BASE_URL: "https://mtrr.cetesb.sp.gov.br"
  AI_ENABLED: "true"
  AUTH_REQUIRED: "true"
  # DATABASE_URL aqui e ignorado em runtime: o Deployment usa o do Secret sicat-db.
---
apiVersion: v1
kind: Secret
metadata:
  name: sicat-db
  namespace: apps
type: Opaque
stringData:
  POSTGRES_USER: "sicat"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "mtr_automation"
  DATABASE_URL: "postgres://sicat:REPLACE_ME@sicat-postgres:5432/mtr_automation"
