# =============================================================================
# Frontend SICAT (Vue build servido por nginx, base /sicat/). Imagem sicat-frontend:local.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sicat-frontend
  namespace: apps
  labels:
    app.kubernetes.io/name: sicat-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: sicat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sicat-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sicat-frontend
        app.kubernetes.io/part-of: sicat
    spec:
      containers:
        - name: frontend
          image: sicat-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: sicat-frontend
  namespace: apps
  labels:
    app.kubernetes.io/part-of: sicat
spec:
  selector:
    app.kubernetes.io/name: sicat-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
