# =============================================================================
# Backend SICAT: api (HTTP 8080) + worker (fila) - MESMA imagem sicat-api:local,
# comandos diferentes. envFrom sicat-config (.env -> Secret). DATABASE_URL vem do
# Secret sicat-db (aponta para sicat-postgres). PVC de storage compartilhado
# (documentos gerados). CA da CETESB via ConfigMap sicat-certs.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sicat-storage
  namespace: apps
  labels:
    app.kubernetes.io/part-of: sicat
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sicat-api
  namespace: apps
  labels:
    app.kubernetes.io/name: sicat-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sicat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sicat-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sicat-api
        app.kubernetes.io/part-of: sicat
    spec:
      containers:
        - name: api
          image: sicat-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          envFrom:
            - secretRef:
                name: sicat-config
            # Flags do motor conversacional (F4) ajustáveis SEM commit durante o
            # gate de paridade (ConfigMap imperativo, fora do git; Argo ignora).
            # Estado final das flags entra neste manifesto após o gate.
            - configMapRef:
                name: sicat-engine-flags
                optional: true
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sicat-db
                  key: DATABASE_URL
            - name: DATABASE_SSL
              value: "false"
            - name: PORT
              value: "8080"
            # Heap explícito < limite do container (2Gi): o motor conversacional
            # (LangGraph + LLM) é memory-hungry; sem isso o Node OOMa no default.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: STORAGE_DIR
              value: "/data/storage"
            - name: NODE_EXTRA_CA_CERTS
              value: "/opt/certs/cetesb-chain.pem"
            - name: AUTO_MIGRATE
              value: "true"
            - name: AUTO_SEED
              value: "true"
            # ── Observabilidade de IA (F0): Langfuse da plataforma, default ON ──
            # Chaves vêm do Secret sicat-langfuse (criado fora do git; optional:
            # sem ele o provider degrada para desligado, sem quebrar o pod).
            - name: LANGFUSE_ENABLED
              value: "true"
            - name: LANGFUSE_BASE_URL
              value: "http://langfuse.observability.svc.cluster.local:3000"
            - name: LANGFUSE_PUBLIC_BASE_URL
              value: "http://langfuse.localhost"
            - name: LANGFUSE_PROJECT_ID
              value: "nvit-ai"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: sicat-langfuse, key: PROJECT_PUBLIC_KEY, optional: true }
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: sicat-langfuse, key: PROJECT_SECRET_KEY, optional: true }
            # ── Motor conversacional (F4): grafo ai-core como DEFAULT ──────────
            # Router nano + fast-path verificado por judge; complexo vai ao
            # planner legado (deep propose por especialista fica experimental:
            # CONVERSATION_ENGINE_DEEP=propose). Gate 2026-06-11: paridade exata
            # no sample (10/24 = 10/24, judge gpt-5-nano) com +2 líquido nas
            # superfícies do engine; 165 cenários do full sem falha específica
            # do engine. ROLLBACK: trocar para "legacy" (ou remover a env).
            - name: CONVERSATION_ENGINE
              value: "ai-core"
            # ── Governança de IA (F5): rollup de feedback no ai-control-plane ──
            # Best-effort: sem o serviço/token nada quebra (timeout 2s, só loga).
            - name: AI_CONTROL_PLANE_URL
              value: "http://ai-control-plane-api.apps.svc.cluster.local:8080"
            - name: AI_CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef: { name: ai-control-plane-config, key: token, optional: true }
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9464   # Prometheus ai_* (fora do Traefik)
          # startupProbe cobre o boot lento (AUTO_MIGRATE + seed): ate 180s.
          # Readiness/liveness so comecam DEPOIS do startup OK — por isso a
          # readiness pode ser justa (3 falhas = 30s) em vez do antigo
          # failureThreshold 18, que deixava o pod 3min recebendo trafego ruim.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: storage
              mountPath: /data/storage
            - name: certs
              mountPath: /opt/certs
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: sicat-storage
        - name: certs
          configMap:
            name: sicat-certs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sicat-worker
  namespace: apps
  labels:
    app.kubernetes.io/name: sicat-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: sicat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sicat-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sicat-worker
        app.kubernetes.io/part-of: sicat
    spec:
      containers:
        - name: worker
          image: sicat-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker"]
          envFrom:
            - secretRef:
                name: sicat-config
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sicat-db
                  key: DATABASE_URL
            - name: DATABASE_SSL
              value: "false"
            - name: STORAGE_DIR
              value: "/data/storage"
            - name: NODE_EXTRA_CA_CERTS
              value: "/opt/certs/cetesb-chain.pem"
            - name: AUTO_MIGRATE
              value: "true"
            - name: AUTO_SEED
              value: "true"
            # ── Observabilidade de IA (paridade com a api) ──
            - name: LANGFUSE_ENABLED
              value: "true"
            - name: LANGFUSE_BASE_URL
              value: "http://langfuse.observability.svc.cluster.local:3000"
            - name: LANGFUSE_PUBLIC_BASE_URL
              value: "http://langfuse.localhost"
            - name: LANGFUSE_PROJECT_ID
              value: "nvit-ai"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: sicat-langfuse, key: PROJECT_PUBLIC_KEY, optional: true }
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: sicat-langfuse, key: PROJECT_SECRET_KEY, optional: true }
          ports:
            - name: metrics
              containerPort: 9464   # Prometheus ai_* do worker
          # O worker nao expoe HTTP de negocio, mas o servidor de metricas (9464)
          # responde enquanto o processo esta vivo — serve de liveness: worker
          # travado/morto e recriado pelo kubelet em vez de ficar zumbi com jobs
          # presos em 'running' ate o stale-timeout da fila.
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          volumeMounts:
            - name: storage
              mountPath: /data/storage
            - name: certs
              mountPath: /opt/certs
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: sicat-storage
        - name: certs
          configMap:
            name: sicat-certs
---
apiVersion: v1
kind: Service
metadata:
  name: sicat-api
  namespace: apps
  labels:
    app.kubernetes.io/part-of: sicat
spec:
  selector:
    app.kubernetes.io/name: sicat-api
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9464
      targetPort: metrics
