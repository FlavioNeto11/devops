# Kustomization do SICAT para o Argo CD (GitOps).
# Os SealedSecrets (sicat-config, sicat-db) sao CRIPTOGRAFADOS (Bitnami Sealed Secrets)
# e seguros para versionar: so o controller no cluster (kube-system) consegue decifra-los,
# recriando os Secrets reais. secret.example.yaml continua excluido (placeholders).
# O ConfigMap sicat-certs (CA publica da CETESB) segue criado fora do git.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - sealed-sicat-config.yaml
  - sealed-sicat-db.yaml
  - postgres.yaml
  - backend.yaml
  - frontend.yaml
  - ingressroute.yaml
