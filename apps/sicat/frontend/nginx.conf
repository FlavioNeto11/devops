# SICAT frontend (SPA Vue) servido sob /sicat/ (SEM strip no Traefik).
# Usa PREFIXO + alias ESTATICO para os assets -> mime correto (ver TROUBLESHOOTING
# secao 14: alias com captura de regex serve application/octet-stream e quebra a SPA).
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /sicat { return 301 /sicat/; }

  # Assets versionados: prefixo + alias estatico (mime.types aplicado corretamente).
  location /sicat/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # SPA: tudo sob /sicat/ cai no index.html (roteamento client-side, base /sicat/).
  location /sicat/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /sicat/index.html;
  }

  location = / { return 301 /sicat/; }
}
