# Servir a SPA sob /forjademo/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /forjademo { return 301 /forjademo/; }
  location /forjademo/ {
    alias /usr/share/nginx/html/forjademo/;
    try_files $uri $uri/ /forjademo/index.html;
  }
}
