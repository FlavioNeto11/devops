# ContaViva 360 — frontend (Vue SPA) gerado pela Forge. Aditivo ao k8s do backend.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: contaviva-360-frontend, namespace: apps, labels: { app.kubernetes.io/name: contaviva-360-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: contaviva-360 } }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: contaviva-360-frontend } }
  template:
    metadata: { labels: { app.kubernetes.io/name: contaviva-360-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: contaviva-360 } }
    spec: { containers: [ { name: frontend, image: contaviva-360-frontend:local, imagePullPolicy: IfNotPresent, ports: [ { containerPort: 80 } ], readinessProbe: { httpGet: { path: /healthz, port: 80 }, initialDelaySeconds: 3, periodSeconds: 10 } } ] }
---
apiVersion: v1
kind: Service
metadata: { name: contaviva-360-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: contaviva-360 } }
spec: { selector: { app.kubernetes.io/name: contaviva-360-frontend }, ports: [ { port: 80, targetPort: 80 } ] }
---
# Frontend NÃO faz strip (regra de ouro) e priority 10 < 40 da API -> /contaviva-360/api vai p/ a API.
# SSO de borda (UX-CV360-001): a SPA operacional não tem guard próprio; o middleware
# console-auth-redirect (ForwardAuth do oauth2-proxy, ns devops-system) faz 302 -> login do
# Keycloak quando não há sessão. Mesmo padrão canônico já usado pela rota da API (console-auth-401).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: contaviva-360-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: contaviva-360 } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/contaviva-360`)
      kind: Rule
      priority: 10
      services: [ { name: contaviva-360-frontend, port: 80 } ]
      middlewares: [ { name: console-auth-redirect, namespace: devops-system } ]
