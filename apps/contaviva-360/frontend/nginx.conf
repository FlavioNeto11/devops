# Servir a SPA sob /contaviva-360/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /contaviva-360 { return 301 /contaviva-360/; }
  location /contaviva-360/ {
    alias /usr/share/nginx/html/contaviva-360/;
    try_files $uri $uri/ /contaviva-360/index.html;
  }
}
