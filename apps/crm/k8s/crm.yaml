apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-frontend
  namespace: apps
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: crm
    devops.flavioneto/app-type: product_software
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crm
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crm
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: crm
        devops.flavioneto/app-type: product_software
    spec:
      containers:
        - name: frontend
          image: crm-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: crm-frontend
  namespace: apps
  labels:
    app.kubernetes.io/part-of: crm
spec:
  selector:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-api
  namespace: apps
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: crm
    devops.flavioneto/app-type: product_software
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crm
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crm
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: crm
        devops.flavioneto/app-type: product_software
    spec:
      containers:
        - name: api
          image: crm-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: crm-api
  namespace: apps
  labels:
    app.kubernetes.io/part-of: crm
spec:
  selector:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crm-api-strip
  namespace: apps
  labels:
    app.kubernetes.io/part-of: crm
spec:
  stripPrefix:
    prefixes:
      - /crm/api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-worker
  namespace: apps
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: crm
    devops.flavioneto/app-type: product_software
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crm
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crm
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: crm
        devops.flavioneto/app-type: product_software
    spec:
      containers:
        - name: worker
          image: crm-worker:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: crm-worker
  namespace: apps
  labels:
    app.kubernetes.io/part-of: crm
spec:
  selector:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: worker
  ports:
    - name: http
      port: 8081
      targetPort: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: crm
  namespace: apps
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/part-of: crm
spec:
  entryPoints:
    - web
  routes:
    - match: (Host(`nvit.localhost`) || Host(`dev.nvit.com.br`)) && PathPrefix(`/crm/api`)
      kind: Rule
      priority: 28
      services:
        - name: crm-api
          port: 8080
      middlewares:
        - name: crm-api-strip
    - match: (Host(`nvit.localhost`) || Host(`dev.nvit.com.br`)) && PathPrefix(`/crm`)
      kind: Rule
      priority: 10
      services:
        - name: crm-frontend
          port: 80

