# Template do Secret do banco — copie para crm-db.secret.yaml (gitignored) ou use Sealed Secrets.
# NUNCA commite o secret real.
apiVersion: v1
kind: Secret
metadata: { name: crm-db, namespace: apps }
stringData:
  POSTGRES_USER: crm
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: crm_db
  DATABASE_URL: postgres://crm:CHANGE_ME@crm-postgres:5432/crm_db
