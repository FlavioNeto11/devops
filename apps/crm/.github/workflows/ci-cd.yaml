name: ci-cd-crm
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
jobs:
  build:
    strategy:
      matrix:
        service: [ frontend, api, worker ]
    uses: FlavioNeto11/devops/.github/workflows/reusable-build-push.yaml@main
    with:
      app: crm
      service: ${{ matrix.service }}
      context: ./${{ matrix.service }}
    secrets: inherit
  deploy:
    needs: build
    uses: FlavioNeto11/devops/.github/workflows/reusable-deploy-k8s.yaml@main
    with:
      app: crm
      namespace: apps
      manifestsPath: ./k8s
    secrets: inherit
