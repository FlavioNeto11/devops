# Kustomization do portal-recorder (entrada do Argo). NÃO inclui secret.example.yaml
# (Secrets reais são imperativos, fora do git).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps
resources:
  - storage.yaml
  - postgres.yaml
  - api.yaml
  - recorder.yaml
  - frontend.yaml
  - ingressroute.yaml
