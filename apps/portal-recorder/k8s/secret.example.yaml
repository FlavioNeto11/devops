# =============================================================================
# EXEMPLO (placeholders). Os Secrets REAIS são criados FORA do git (kubectl) e
# NUNCA commitados. Excluídos do kustomization.yaml — o Argo não os gerencia.
#
# Criar no cluster (PowerShell):
#   $pw  = -join ((48..57)+(97..122) | Get-Random -Count 24 | % {[char]$_})
#   $tok = -join ((48..57)+(97..122)+(65..90) | Get-Random -Count 40 | % {[char]$_})
#   $int = -join ((48..57)+(97..122)+(65..90) | Get-Random -Count 40 | % {[char]$_})
#   kubectl -n apps create secret generic portal-recorder-db `
#     --from-literal=POSTGRES_USER=portalrec `
#     --from-literal=POSTGRES_PASSWORD=$pw `
#     --from-literal=POSTGRES_DB=portal_recorder `
#     --from-literal=DATABASE_URL="postgresql://portalrec:$pw@portal-recorder-postgres:5432/portal_recorder" `
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n apps create secret generic portal-recorder-config `
#     --from-literal=token=$tok `
#     --from-literal=internal_token=$int `
#     --from-literal=github_dispatch_token=REPLACE_ME_PAT `
#     --dry-run=client -o yaml | kubectl apply -f -
#
# github_dispatch_token (OPCIONAL): PAT fine-grained (Contents: Read and write)
# que dispara o workflow portal-contract-promote (promoção de contrato p/ o git).
# Sem ele a app segue no ar e o POST /v1/contracts/:id/promote responde 503
# (fail-closed) — mesmo padrão do reqhub-api (GITHUB_DISPATCH_TOKEN).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: portal-recorder-db
  namespace: apps
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "portal_recorder"
  DATABASE_URL: "postgresql://portalrec:REPLACE_ME@portal-recorder-postgres:5432/portal_recorder"
---
apiVersion: v1
kind: Secret
metadata:
  name: portal-recorder-config
  namespace: apps
type: Opaque
stringData:
  token: "REPLACE_ME"                 # PORTAL_REC_TOKEN — writes públicos
  internal_token: "REPLACE_ME"        # RECORDER_INTERNAL_TOKEN — api↔recorder
  github_dispatch_token: "REPLACE_ME" # GITHUB_DISPATCH_TOKEN — promoção de contrato (opcional; sem ele promote → 503)
