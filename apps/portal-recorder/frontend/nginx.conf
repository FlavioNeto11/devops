# =============================================================================
# nginx — portal-recorder (frontend)
# -----------------------------------------------------------------------------
# A SPA e servida sob o subpath /portal-rec/ e NAO sofre strip-prefix no Traefik
# (convencao de frontend da plataforma). Portanto o nginx precisa atender as
# requisicoes que chegam JA com o prefixo /portal-rec/ intacto.
#
# Como o build do Vite usa base '/portal-rec/', os assets sao referenciados como
# /portal-rec/assets/...  -> com `alias /usr/share/nginx/html/`, a requisicao
# /portal-rec/assets/app.js resolve para /usr/share/nginx/html/assets/app.js.
#
# O try_files cai para /portal-rec/index.html (roteamento client-side da SPA).
# `location = /portal-rec` redireciona para /portal-rec/ (garante a barra final).
# `location = /healthz` responde 200 'ok' para readiness/liveness probes.
#
# Observacao: as rotas /portal-rec/api e /portal-rec/stream NAO sao servidas aqui
# — o Traefik roteia-as para a api e o recorder (priority maior que o frontend).
# =============================================================================

server {
    listen       80;
    server_name  _;

    # Logs no stdout/stderr do container (padrao em imagens nginx:alpine).
    access_log   /var/log/nginx/access.log;
    error_log    /var/log/nginx/error.log warn;

    # Endpoint de health checado pelas probes do Kubernetes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Sem a barra final, redireciona para o subpath canonico.
    location = /portal-rec {
        return 301 /portal-rec/;
    }

    # Assets versionados (hash no nome) com cache agressivo.
    # IMPORTANTE: PREFIXO + alias ESTATICO (sem variavel de regex). Com um alias
    # contendo a captura $1 de uma regex, o nginx perde o mime por extensao e
    # serve tudo como application/octet-stream (default_type) -> o
    # <script type=module> e recusado pelo navegador (pagina em branco). Com o
    # prefixo /portal-rec/assets/ apontando para o alias fixo, o mime.types e
    # aplicado corretamente (text/css, application/javascript). O prefixo mais
    # especifico tem precedencia sobre /portal-rec/ (longest-prefix match).
    location /portal-rec/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA servida sob /portal-rec/. O alias mapeia /portal-rec/<x> -> /usr/share/nginx/html/<x>.
    # O try_files tenta o arquivo/diretorio pedido e, se nao existir, devolve o
    # index.html da SPA (roteamento client-side).
    location /portal-rec/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /portal-rec/index.html;
        # index.html SEMPRE revalidado (sem cache do documento) — assets versionados por
        # hash (cache 1y immutable acima). Sem isto, o navegador cacheia o index.html velho
        # e aponta pro bundle ANTIGO (ex.: sem a casca da plataforma).
        expires epoch;
    }

    # Raiz: conveniencia para quem acessa o container diretamente (sem Traefik).
    # Em producao o acesso real e sempre via /portal-rec/ atraves do Ingress.
    location = / {
        return 301 /portal-rec/;
    }
}
