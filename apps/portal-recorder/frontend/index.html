<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="portal-recorder: captura de portais externos num browser remoto (rede, payloads, screenshots, anotacoes) e normalizacao num contrato de portal."
    />
    <title>portal-recorder</title>
    <!-- Tema aplicado ANTES do bundle p/ evitar flash (FOUC). Default: light. -->
    <script>
      (function () {
        try {
          document.documentElement.dataset.theme =
            localStorage.getItem('portal-rec-theme') || 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
