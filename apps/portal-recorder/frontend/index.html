<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="portal-recorder: captura de portais externos num browser remoto (rede, payloads, screenshots, anotacoes) e normalizacao num contrato de portal."
    />
    <title>portal-recorder — NovaIT</title>
    <!-- Fontes da identidade NovaIT: Inter (corpo) + Sora (titulos). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Tema aplicado ANTES do bundle p/ evitar flash (FOUC). Default: light. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('nvit-theme');
          if (t === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.classList.add('dark');
          } else if (t === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {
          /* sem storage: deixa o CSS resolver */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
