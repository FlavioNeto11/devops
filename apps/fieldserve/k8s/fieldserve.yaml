# FieldServe — manifests (namespace apps). Imagens :local (IfNotPresent). Observabilidade por padrão:
# api e worker expõem /metrics na :9464; ServiceMonitor raspa ambos; PrometheusRule com SLO.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: fieldserve-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: fieldserve } }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fieldserve-postgres
  namespace: apps
  labels: { app.kubernetes.io/name: fieldserve-postgres, app.kubernetes.io/part-of: fieldserve }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: fieldserve-postgres } }
  template:
    metadata: { labels: { app.kubernetes.io/name: fieldserve-postgres, app.kubernetes.io/part-of: fieldserve } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom: [ { secretRef: { name: fieldserve-db } } ]
          ports: [ { containerPort: 5432 } ]
          volumeMounts: [ { name: data, mountPath: /var/lib/postgresql/data, subPath: pgdata } ]
          readinessProbe: { exec: { command: [sh, -c, "pg_isready -U $POSTGRES_USER"] }, initialDelaySeconds: 5, periodSeconds: 10 }
      volumes: [ { name: data, persistentVolumeClaim: { claimName: fieldserve-postgres } } ]
---
apiVersion: v1
kind: Service
metadata: { name: fieldserve-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: fieldserve } }
spec: { selector: { app.kubernetes.io/name: fieldserve-postgres }, ports: [ { port: 5432, targetPort: 5432 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fieldserve-mock-central
  namespace: apps
  labels: { app.kubernetes.io/name: fieldserve-mock-central, app.kubernetes.io/part-of: fieldserve }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: fieldserve-mock-central } }
  template:
    metadata: { labels: { app.kubernetes.io/name: fieldserve-mock-central, app.kubernetes.io/part-of: fieldserve } }
    spec:
      containers:
        - name: mock
          image: fieldserve-mock-central:local
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 8090 } ]
          readinessProbe: { httpGet: { path: /health, port: 8090 }, initialDelaySeconds: 3 }
---
apiVersion: v1
kind: Service
metadata: { name: fieldserve-mock-central, namespace: apps, labels: { app.kubernetes.io/part-of: fieldserve } }
spec: { selector: { app.kubernetes.io/name: fieldserve-mock-central }, ports: [ { port: 8090, targetPort: 8090 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fieldserve-api
  namespace: apps
  labels: { app.kubernetes.io/name: fieldserve-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: fieldserve, devops.flavioneto/app-type: product_software }
  annotations: { devops.flavioneto/app: fieldserve, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: fieldserve-api } }
  template:
    metadata: { labels: { app.kubernetes.io/name: fieldserve-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: fieldserve } }
    spec:
      containers:
        - name: api
          image: fieldserve-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          envFrom: [ { secretRef: { name: fieldserve-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://fieldserve-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "true" }
            - { name: AUTO_SEED, value: "true" }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 9464 }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 8, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: fieldserve-api
  namespace: apps
  labels: { app.kubernetes.io/name: fieldserve-api, app.kubernetes.io/part-of: fieldserve }
spec:
  selector: { app.kubernetes.io/name: fieldserve-api }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: metrics, port: 9464, targetPort: 9464 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fieldserve-worker
  namespace: apps
  labels: { app.kubernetes.io/name: fieldserve-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: fieldserve, devops.flavioneto/app-type: product_software }
  annotations: { devops.flavioneto/app: fieldserve, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: fieldserve-worker } }
  template:
    metadata: { labels: { app.kubernetes.io/name: fieldserve-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: fieldserve } }
    spec:
      containers:
        - name: worker
          image: fieldserve-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker"]
          envFrom: [ { secretRef: { name: fieldserve-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://fieldserve-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "false" }
          ports: [ { name: metrics, containerPort: 9464 } ]
---
apiVersion: v1
kind: Service
metadata:
  name: fieldserve-worker
  namespace: apps
  labels: { app.kubernetes.io/name: fieldserve-worker, app.kubernetes.io/part-of: fieldserve }
spec:
  selector: { app.kubernetes.io/name: fieldserve-worker }
  ports: [ { name: metrics, port: 9464, targetPort: 9464 } ]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: fieldserve-api-strip, namespace: apps }
spec: { stripPrefix: { prefixes: ["/fieldserve/api"] } }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: fieldserve, namespace: apps, labels: { app.kubernetes.io/part-of: fieldserve } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/fieldserve/api`)
      kind: Rule
      priority: 40
      services: [ { name: fieldserve-api, port: 8080 } ]
      middlewares: [ { name: fieldserve-api-strip } ]
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: fieldserve, namespace: apps, labels: { app.kubernetes.io/part-of: fieldserve, release: kube-prometheus-stack } }
spec:
  selector: { matchLabels: { app.kubernetes.io/part-of: fieldserve } }
  namespaceSelector: { matchNames: [apps] }
  endpoints: [ { port: metrics, path: /metrics, interval: 15s } ]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: fieldserve-slo, namespace: apps, labels: { app.kubernetes.io/part-of: fieldserve, release: kube-prometheus-stack } }
spec:
  groups:
    - name: fieldserve.slo
      rules:
        - alert: FieldServeQueueDlqGrowing
          expr: max(fieldserve_queue_depth{status="dlq"}) > 3
          for: 2m
          labels: { severity: warning, app: fieldserve }
          annotations: { summary: "FieldServe: DLQ acima do limite (jobs falhos acumulando)" }
        - alert: FieldServeGatewayErrorRateHigh
          expr: (sum(rate(fieldserve_gateway_calls_total{outcome="error"}[5m])) / clamp_min(sum(rate(fieldserve_gateway_calls_total[5m])), 0.001)) > 0.5
          for: 5m
          labels: { severity: warning, app: fieldserve }
          annotations: { summary: "FieldServe: taxa de erro do gateway externo > 50%" }
        - alert: FieldServeApiDown
          expr: absent(up{job=~".*fieldserve-api.*"} == 1)
          for: 3m
          labels: { severity: critical, app: fieldserve }
          annotations: { summary: "FieldServe: API sem target UP no Prometheus" }
