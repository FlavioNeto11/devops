# Servir a SPA sob /teamflow/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /teamflow { return 301 /teamflow/; }
  location /teamflow/ {
    alias /usr/share/nginx/html/teamflow/;
    try_files $uri $uri/ /teamflow/index.html;
  }
}
