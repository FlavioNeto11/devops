# Servir a SPA sob /stockpilot/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /stockpilot { return 301 /stockpilot/; }
  location /stockpilot/ {
    alias /usr/share/nginx/html/stockpilot/;
    try_files $uri $uri/ /stockpilot/index.html;
  }
}
