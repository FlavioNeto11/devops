# StockPilot — SPA (Vite/Vue) servida sob /stockpilot/ (Traefik SEM strip).
# Padrão MIME-safe da plataforma: PREFIXO + alias estático para assets.
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /stockpilot { return 301 /stockpilot/; }

  # Assets versionados: prefixo + alias estático (mime.types aplicado corretamente).
  location /stockpilot/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # SPA: tudo sob /stockpilot/ cai no index.html (roteamento client-side, base /stockpilot/).
  location /stockpilot/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /stockpilot/index.html;
    add_header Cache-Control "no-cache" always;
  }

  location = / { return 301 /stockpilot/; }
}
