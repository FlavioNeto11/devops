# StockPilot — Reposicao de Estoque — k8s gerado pela Forge. Imagens :local (IfNotPresent).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: stockpilot-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: stockpilot } }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: stockpilot-postgres, namespace: apps, labels: { app.kubernetes.io/name: stockpilot-postgres, app.kubernetes.io/part-of: stockpilot } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: stockpilot-postgres } }
  template:
    metadata: { labels: { app.kubernetes.io/name: stockpilot-postgres, app.kubernetes.io/part-of: stockpilot } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom: [ { secretRef: { name: stockpilot-db } } ]
          ports: [ { containerPort: 5432 } ]
          volumeMounts: [ { name: data, mountPath: /var/lib/postgresql/data, subPath: pgdata } ]
      volumes: [ { name: data, persistentVolumeClaim: { claimName: stockpilot-postgres } } ]
---
apiVersion: v1
kind: Service
metadata: { name: stockpilot-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: stockpilot } }
spec: { selector: { app.kubernetes.io/name: stockpilot-postgres }, ports: [ { port: 5432, targetPort: 5432 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: stockpilot-mock-central, namespace: apps, labels: { app.kubernetes.io/name: stockpilot-mock-central, app.kubernetes.io/part-of: stockpilot } }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: stockpilot-mock-central } }
  template:
    metadata: { labels: { app.kubernetes.io/name: stockpilot-mock-central, app.kubernetes.io/part-of: stockpilot } }
    spec: { containers: [ { name: mock, image: stockpilot-mock-central:local, imagePullPolicy: IfNotPresent, ports: [ { containerPort: 8090 } ], readinessProbe: { httpGet: { path: /health, port: 8090 }, initialDelaySeconds: 3 } } ] }
---
apiVersion: v1
kind: Service
metadata: { name: stockpilot-mock-central, namespace: apps, labels: { app.kubernetes.io/part-of: stockpilot } }
spec: { selector: { app.kubernetes.io/name: stockpilot-mock-central }, ports: [ { port: 8090, targetPort: 8090 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockpilot-frontend
  namespace: apps
  labels: { app.kubernetes.io/name: stockpilot-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: stockpilot, devops.flavioneto/app-type: product_software }
  annotations: { devops.flavioneto/app: stockpilot }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: stockpilot-frontend } }
  template:
    metadata: { labels: { app.kubernetes.io/name: stockpilot-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: stockpilot } }
    spec:
      containers:
        - name: frontend
          image: stockpilot-frontend:local
          imagePullPolicy: IfNotPresent
          ports: [ { name: http, containerPort: 80 } ]
          readinessProbe: { httpGet: { path: /healthz, port: 80 }, initialDelaySeconds: 3, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: stockpilot-frontend, namespace: apps, labels: { app.kubernetes.io/name: stockpilot-frontend, app.kubernetes.io/part-of: stockpilot } }
spec: { selector: { app.kubernetes.io/name: stockpilot-frontend }, ports: [ { name: http, port: 80, targetPort: 80 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockpilot-api
  namespace: apps
  labels: { app.kubernetes.io/name: stockpilot-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: stockpilot, devops.flavioneto/app-type: product_software }
  annotations: { devops.flavioneto/app: stockpilot, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: stockpilot-api } }
  template:
    metadata: { labels: { app.kubernetes.io/name: stockpilot-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: stockpilot } }
    spec:
      containers:
        - name: api
          image: stockpilot-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          envFrom: [ { secretRef: { name: stockpilot-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://stockpilot-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "true" }
            - { name: AUTO_SEED, value: "true" }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 9464 }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 8, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: stockpilot-api, namespace: apps, labels: { app.kubernetes.io/name: stockpilot-api, app.kubernetes.io/part-of: stockpilot } }
spec: { selector: { app.kubernetes.io/name: stockpilot-api }, ports: [ { name: http, port: 8080, targetPort: 8080 }, { name: metrics, port: 9464, targetPort: 9464 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockpilot-worker
  namespace: apps
  labels: { app.kubernetes.io/name: stockpilot-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: stockpilot }
  annotations: { devops.flavioneto/app: stockpilot, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: stockpilot-worker } }
  template:
    metadata: { labels: { app.kubernetes.io/name: stockpilot-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: stockpilot } }
    spec:
      containers:
        - name: worker
          image: stockpilot-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker"]
          envFrom: [ { secretRef: { name: stockpilot-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://stockpilot-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "false" }
          ports: [ { name: metrics, containerPort: 9464 } ]
---
apiVersion: v1
kind: Service
metadata: { name: stockpilot-worker, namespace: apps, labels: { app.kubernetes.io/name: stockpilot-worker, app.kubernetes.io/part-of: stockpilot } }
spec: { selector: { app.kubernetes.io/name: stockpilot-worker }, ports: [ { name: metrics, port: 9464, targetPort: 9464 } ] }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: stockpilot-api-strip, namespace: apps }
spec: { stripPrefix: { prefixes: ["/stockpilot/api"] } }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: stockpilot, namespace: apps, labels: { app.kubernetes.io/part-of: stockpilot } }
spec:
  entryPoints: [web]
  routes:
    # API (XHR): gate SSO de borda — 401 sem sessão (oauth2-proxy/Keycloak realm nvit), depois strip.
    - match: PathPrefix(`/stockpilot/api`)
      kind: Rule
      priority: 40
      services: [ { name: stockpilot-api, port: 8080 } ]
      middlewares: [ { name: console-auth-401, namespace: devops-system }, { name: stockpilot-api-strip } ]
    # Painel (navegação): gate SSO de borda — 302 p/ login no Keycloak quando sem sessão.
    - match: PathPrefix(`/stockpilot`)
      kind: Rule
      priority: 10
      services: [ { name: stockpilot-frontend, port: 80 } ]
      middlewares: [ { name: console-auth-redirect, namespace: devops-system } ]
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: stockpilot, namespace: apps, labels: { app.kubernetes.io/part-of: stockpilot, release: kube-prometheus-stack } }
spec:
  selector: { matchLabels: { app.kubernetes.io/part-of: stockpilot } }
  namespaceSelector: { matchNames: [apps] }
  endpoints: [ { port: metrics, path: /metrics, interval: 15s } ]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: stockpilot-slo, namespace: apps, labels: { app.kubernetes.io/part-of: stockpilot, release: kube-prometheus-stack } }
spec:
  groups:
    - name: stockpilot.slo
      rules:
        - alert: stockpilotApiDown
          expr: absent(up{job=~".*stockpilot-api.*"} == 1)
          for: 3m
          labels: { severity: critical, app: stockpilot }
          annotations: { summary: "stockpilot: API sem target UP" }
        - alert: stockpilotQueueDlq
          expr: max(stockpilot_queue_depth{status="dlq"}) > 3
          for: 2m
          labels: { severity: warning, app: stockpilot }
          annotations: { summary: "stockpilot: DLQ acumulando" }
