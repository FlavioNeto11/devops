openapi: 3.1.0
info:
  title: StockPilot — API de Reposição de Estoque
  version: 1.0.0
  summary: Contrato canônico (contract-first) da superfície HTTP do StockPilot.
  description: >-
    OpenAPI canônico do StockPilot. Descreve as rotas REAIS servidas pela API
    (api/src/server.js), que após o StripPrefix do Traefik aparecem na raiz.
    Toda mudança de rota DEVE atualizar este arquivo no mesmo PR — o validador
    api/openapi/validate.mjs reprova drift entre este contrato e o server.js.
servers:
  - url: http://localhost:8080
    description: Servidor da API (rotas na raiz, como o app as vê após o StripPrefix)
  - url: http://nvit.localhost/stockpilot/api
    description: Superfície pública (Traefik remove o prefixo /stockpilot/api antes de chegar no app)
tags:
  - name: Health
    description: Readiness e profundidade da fila (observabilidade interna do pod).
  - name: Identity
    description: Identidade da sessão derivada dos headers da borda SSO (X-Auth-Request-*).
  - name: Records
    description: Registros genéricos com submissão assíncrona (esteira base da Forge).
  - name: Products
    description: Produtos de estoque com status derivado (OK/ALERTA/RUPTURA) e criação de pedidos.
  - name: Orders
    description: Pedidos de reposição abertos (pending/processing).
  - name: Alerts
    description: Produtos em RUPTURA ou com falha de envio ao fornecedor.
  - name: Audit
    description: Trilha sanitizada das trocas com o fornecedor externo (segredos redigidos).
  - name: Notifications
    description: Notificações multi-canal por evento (ruptura/falha_pedido) com desfecho por canal.
  - name: Suppliers
    description: Fornecedores (gateway externo configurável — URL, forma de auth, timeout/retry). CRUD.
  - name: Channels
    description: Canais de notificação (assinaturas de webhook por tipo/evento). CRUD.
  - name: AI
    description: >-
      Assistente de IA que SUGERE a quantidade de reposição (grounded nos dados reais do produto +
      histórico). Saída estruturada validada por schema; DRY-RUN (não cria pedido nem altera estado).
paths:
  /:
    get:
      operationId: getRoot
      tags:
        - Health
      summary: Identidade do serviço
      description: Ping leve que identifica o app/serviço. Não toca o banco.
      responses:
        '200':
          description: Serviço no ar
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    type: string
                  service:
                    type: string
                  ok:
                    type: boolean
              example:
                app: stockpilot
                service: api
                ok: true
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Readiness do pod
      description: Verifica conectividade com o Postgres (SELECT 1). Rota interna, fora da borda SSO.
      responses:
        '200':
          description: Banco conectado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: ok
                db: connected
        '500':
          description: Falha ao consultar o banco
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: erro
  /me:
    get:
      operationId: getMe
      tags:
        - Identity
      summary: Identidade da sessão (borda SSO)
      description: >-
        Devolve a identidade derivada dos headers injetados pela borda SSO
        (X-Auth-Request-Email/Preferred-Username/User/Groups). A casca usa este
        endpoint para exibir o usuário logado. Sem header (dev/local sem a borda)
        devolve email null — nunca 500 (é uma sonda de identidade, não um gate).
      responses:
        '200':
          description: Identidade da sessão (campos null quando sem borda)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identity'
              example:
                email: operador@nvit.com.br
                name: operador
                role: tenant:acme,platform-admins
  /v1/health/jobs:
    get:
      operationId: getHealthJobs
      tags:
        - Health
      summary: Profundidade da fila por status
      description: Contagem de jobs agrupada por status (queued/running/done/dlq).
      responses:
        '200':
          description: Contagens da fila
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  jobs:
                    type: object
                    additionalProperties:
                      type: integer
              example:
                status: ok
                jobs:
                  queued: 2
                  running: 0
                  done: 17
                  dlq: 0
  /v1/records:
    get:
      operationId: listRecords
      tags:
        - Records
      summary: Lista registros do tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Lista de registros (máx. 200)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Record'
              example:
                data:
                  - id: 1
                    tenant_id: 1
                    title: Registro de exemplo
                    status: open
    post:
      operationId: createRecord
      tags:
        - Records
      summary: Cria um registro
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
            example:
              title: Novo registro
      responses:
        '201':
          description: Registro criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
              example:
                id: 2
                tenant_id: 1
                title: Novo registro
                status: open
        '400':
          description: title obrigatório
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: title obrigatório
  /v1/records/{id}:
    get:
      operationId: getRecord
      tags:
        - Records
      summary: Busca um registro por id
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Registro encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
        '404':
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: não encontrado
  /v1/records/{id}/submit:
    post:
      operationId: submitRecord
      tags:
        - Records
      summary: Submete um registro (enfileira job assíncrono)
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '202':
          description: Submissão enfileirada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                    example: submitting
                  enqueued:
                    type: boolean
              example:
                id: 1
                status: submitting
                enqueued: true
        '404':
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: não encontrado
  /v1/products:
    get:
      operationId: listProducts
      tags:
        - Products
      summary: Lista produtos com status derivado
      description: >-
        Produtos do tenant com status calculado: RUPTURA (abaixo do mínimo e sem
        pedido aberto), ALERTA (perto do mínimo com pedido aberto) ou OK.
        Protegida por sessão (requireAuth → 401 sem sessão).
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Lista de produtos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
              example:
                data:
                  - id: 1
                    name: Álcool 70%
                    current_stock: 5
                    min_stock: 50
                    has_open_order: false
                    last_order_date: null
                    status: RUPTURA
                  - id: 3
                    name: Máscaras N95
                    current_stock: 200
                    min_stock: 50
                    has_open_order: false
                    last_order_date: null
                    status: OK
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/products/{id}:
    get:
      operationId: getProduct
      tags:
        - Products
      summary: Detalhe canônico de um produto
      description: >-
        Retorna o produto (com status derivado OK/ALERTA/RUPTURA, has_open_order e
        last_order_date) junto do histórico recente de pedidos e dos alertas ativos
        do produto. Escopado por tenant: produto inexistente ou de outro tenant
        retorna 404 (deny-by-default, nunca vaza dados cross-tenant).
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Produto encontrado (com histórico e alertas)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
              example:
                product:
                  id: 1
                  name: Álcool 70%
                  current_stock: 5
                  min_stock: 50
                  has_open_order: false
                  last_order_date: null
                  status: RUPTURA
                orders:
                  - id: 11
                    status: pending
                    external_ref: null
                    last_error: null
                    created_at: '2026-06-22T10:00:00Z'
                    last_attempt_at: null
                alerts:
                  - id: 1
                    name: Álcool 70%
                    current_stock: 5
                    min_stock: 50
                    has_open_order: false
                    alert_type: RUPTURA
                    status: RUPTURA
                    last_error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Produto não encontrado (inexistente ou de outro tenant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: produto não encontrado
  /v1/products/{id}/order:
    post:
      operationId: createProductOrder
      tags:
        - Products
        - Orders
      summary: Cria um pedido manual para um produto
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '201':
          description: Pedido criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                id: 10
                product_id: 1
                tenant_id: default
                status: pending
                external_ref: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Produto não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: produto não encontrado
  /v1/products/{id}/reorder:
    post:
      operationId: reorderProduct
      tags:
        - Products
        - Orders
      summary: Reposição assíncrona idempotente
      description: >-
        Cria um pedido pending e enfileira um job idempotente. Repetir com um
        pedido aberto devolve o MESMO recurso (200, deduped) sem criar outro;
        a primeira reposição cria (201).
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '201':
          description: Reposição criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReorderResult'
              example:
                order:
                  id: 11
                  product_id: 1
                  tenant_id: default
                  status: pending
                deduped: false
                enqueued: true
        '200':
          description: Reposição já existente (idempotente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReorderResult'
              example:
                order:
                  id: 11
                  product_id: 1
                  tenant_id: default
                  status: pending
                deduped: true
                enqueued: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Produto não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: produto não encontrado
  /v1/products/{id}/suggest-reorder:
    post:
      operationId: suggestReorder
      tags:
        - AI
        - Products
      summary: Assistente de IA — sugere a quantidade de reposição (DRY-RUN)
      description: >-
        Usa a IA (Claude via @anthropic-ai/sdk) para SUGERIR a quantidade de
        reposição de um produto, fundamentada (grounded) nos dados REAIS — estoque
        atual/mínimo e o histórico recente de pedidos do tenant (RAG-lite sobre o
        banco). A saída é ESTRUTURADA e validada por schema; saída inválida retorna
        erro estruturado (fail-closed). DRY-RUN: a sugestão NÃO cria pedido nem
        altera estado — o operador confirma (via /reorder). Sem ANTHROPIC_API_KEY
        configurada, retorna 503 (fail-closed) sem afetar o resto do app.
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Sugestão (rascunho) gerada — requer confirmação do operador
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReorderSuggestionResult'
              example:
                product:
                  id: 1
                  name: Álcool 70%
                  current_stock: 5
                  min_stock: 50
                suggestion:
                  suggested_quantity: 60
                  rationale: Estoque 5 está abaixo do mínimo 50; repor para operar com folga.
                  confidence: medium
                  sources:
                    - estoque_atual=5 unidades
                    - estoque_minimo=50 unidades
                applied: false
                model: claude-haiku-4-5-20251001
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Produto não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: produto não encontrado
        '502':
          description: IA retornou saída fora do schema esperado (fail-closed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: 'IA retornou saída fora do schema esperado: suggested_quantity deve ser inteiro >= 0'
        '503':
          description: Assistente de IA indisponível (ANTHROPIC_API_KEY não configurada)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: 'assistente de IA indisponível: ANTHROPIC_API_KEY não configurada'
  /v1/orders:
    get:
      operationId: listOpenOrders
      tags:
        - Orders
      summary: Lista pedidos abertos (pending/processing)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Pedidos abertos do tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
              example:
                data:
                  - id: 11
                    product_id: 1
                    product_name: Álcool 70%
                    tenant_id: default
                    status: pending
                    external_ref: null
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/orders/{id}:
    get:
      operationId: getOrder
      tags:
        - Orders
      summary: Detalhe canônico de um pedido de reposição
      description: >-
        Retorna o pedido completo (TODOS os estados: pending/processing/delivered/failed),
        com product_name, external_ref, last_error e last_attempt_at — os campos autoritativos
        que a tela de detalhe usa (linha do tempo, último erro, tentativas). Escopado por tenant:
        pedido inexistente ou de outro tenant retorna 404 (nunca vaza dados cross-tenant).
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                id: 11
                product_id: 1
                product_name: Álcool 70%
                tenant_id: default
                status: failed
                external_ref: null
                last_error: 'Timeout ao contatar fornecedor'
                last_attempt_at: '2026-06-22T12:30:00Z'
                created_at: '2026-06-22T10:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Pedido não encontrado (inexistente ou de outro tenant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: pedido não encontrado
  /v1/orders/{id}/audit:
    get:
      operationId: listOrderAudit
      tags:
        - Orders
        - Audit
      summary: Trilha de auditoria das trocas com o fornecedor para um pedido
      description: >-
        Cada troca (tentativa) com o fornecedor para ESTE pedido, com payloads sanitizados e
        erro redigido (segredos NUNCA vazam). Filtro de domínio no banco (não baixa a trilha
        inteira do tenant). Escopado por tenant: pedido de outro tenant retorna 404.
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Registros de auditoria do pedido (máx. 200)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'
              example:
                data:
                  - id: 42
                    tenant_id: default
                    operation: submeter_pedido
                    product_id: 1
                    order_id: 11
                    outcome: success
                    status_code: 200
                    attempt: 1
                    error_redacted: null
                    duration_ms: 134
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Pedido não encontrado (inexistente ou de outro tenant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: pedido não encontrado
  /v1/alerts:
    get:
      operationId: listAlerts
      tags:
        - Alerts
      summary: Lista alertas (RUPTURA e falhas de envio)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Alertas do tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'
              example:
                data:
                  - id: 1
                    name: Álcool 70%
                    current_stock: 5
                    min_stock: 50
                    has_open_order: false
                    alert_type: RUPTURA
                    status: RUPTURA
                    last_error: null
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/audit:
    get:
      operationId: listAudit
      tags:
        - Audit
      summary: Trilha de auditoria das trocas com o fornecedor
      description: >-
        Cada troca (tentativa) gera um registro com payloads sanitizados e erro
        redigido — segredos NUNCA são vazados. Escopado por tenant.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Registros de auditoria do tenant (máx. 200)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'
              example:
                data:
                  - id: 42
                    tenant_id: default
                    operation: submeter_pedido
                    product_id: 1
                    order_id: 11
                    outcome: success
                    status_code: 200
                    attempt: 1
                    error_redacted: null
                    duration_ms: 134
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/notifications:
    get:
      operationId: listNotifications
      tags:
        - Notifications
      summary: Lista notificações multi-canal do tenant
      description: >-
        Registros de notificação por evento (ruptura/falha_pedido), com o desfecho
        POR canal (sent/failed/skipped — canal sem configuração é pulado). Escopado por tenant.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Notificações do tenant (máx. 200)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
              example:
                data:
                  - id: 7
                    tenant_id: default
                    usuario_id: null
                    tipo: ruptura
                    referencia_id: 1
                    canais:
                      - channel: email
                        status: sent
                      - channel: push
                        status: skipped
                        reason: unconfigured
                      - channel: whatsapp
                        status: skipped
                        reason: unconfigured
                    status: sent
                    tentativas: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/suppliers:
    get:
      operationId: listSuppliers
      tags:
        - Suppliers
      summary: Lista fornecedores do tenant (paginado)
      description: >-
        Fornecedores (gateway externo configurável). Suporta paginação e
        ordenação via query (?page&pageSize&sort&dir) e devolve {data,total}.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Dir'
      responses:
        '200':
          description: Página de fornecedores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createSupplier
      tags:
        - Suppliers
      summary: Cria um fornecedor
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierInput'
      responses:
        '201':
          description: Fornecedor criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        '400':
          description: Campos obrigatórios ausentes ou inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: name obrigatório; gateway_url obrigatório
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/suppliers/{id}:
    get:
      operationId: getSupplier
      tags:
        - Suppliers
      summary: Busca um fornecedor por id
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Fornecedor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Fornecedor não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: fornecedor não encontrado
    put:
      operationId: updateSupplier
      tags:
        - Suppliers
      summary: Atualiza um fornecedor (parcial)
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplierInput'
      responses:
        '200':
          description: Fornecedor atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        '400':
          description: Campos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Fornecedor não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: fornecedor não encontrado
    delete:
      operationId: deleteSupplier
      tags:
        - Suppliers
      summary: Remove um fornecedor
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '204':
          description: Removido (sem corpo)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Fornecedor não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: fornecedor não encontrado
  /v1/suppliers/{id}/orders:
    get:
      operationId: listSupplierOrders
      tags:
        - Suppliers
        - Orders
      summary: Lista pedidos de reposição vinculados a um fornecedor
      description: >-
        Pedidos de reposição cujo supplier_id aponta para este fornecedor, escopados por tenant.
        Fornecedor inexistente ou de outro tenant retorna 404 (nunca vaza dados cross-tenant).
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Pedidos vinculados ao fornecedor (máx. 100)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
              example:
                data:
                  - id: 11
                    product_id: 1
                    product_name: Álcool 70%
                    tenant_id: default
                    status: pending
                    external_ref: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Fornecedor não encontrado (inexistente ou de outro tenant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: fornecedor não encontrado
  /v1/channels:
    get:
      operationId: listChannels
      tags:
        - Channels
      summary: Lista canais de notificação do tenant (paginado)
      description: >-
        Canais de notificação (assinaturas de webhook). Suporta paginação e
        ordenação via query (?page&pageSize&sort&dir) e devolve {data,total}.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Dir'
      responses:
        '200':
          description: Página de canais
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createChannel
      tags:
        - Channels
      summary: Cria um canal de notificação
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInput'
      responses:
        '201':
          description: Canal criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          description: Campos obrigatórios ausentes ou inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: channel obrigatório; webhook_url obrigatório
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/channels/{id}:
    get:
      operationId: getChannel
      tags:
        - Channels
      summary: Busca um canal por id
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Canal encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Canal não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: canal não encontrado
    put:
      operationId: updateChannel
      tags:
        - Channels
      summary: Atualiza um canal (parcial)
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInput'
      responses:
        '200':
          description: Canal atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          description: Campos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Canal não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: canal não encontrado
    delete:
      operationId: deleteChannel
      tags:
        - Channels
      summary: Remove um canal
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '204':
          description: Removido (sem corpo)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Canal não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  message: canal não encontrado
components:
  parameters:
    PathId:
      name: id
      in: path
      required: true
      description: Identificador do recurso
      schema:
        type: integer
        minimum: 1
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: false
      description: >-
        Tenant explícito para uso local/testes (AUTH_REQUIRED=false). Em produção
        o tenant é derivado dos headers de borda X-Auth-Request-* e este header é ignorado.
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      description: Página (1-based). Default 1.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Itens por página (1–200). Default 50.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Sort:
      name: sort
      in: query
      required: false
      description: Coluna de ordenação (allowlist por entidade; default id).
      schema:
        type: string
    Dir:
      name: dir
      in: query
      required: false
      description: Direção da ordenação (asc/desc). Default desc.
      schema:
        type: string
        enum:
          - asc
          - desc
  responses:
    Unauthorized:
      description: Sem sessão de borda (deny-by-default)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              message: não autenticado
  schemas:
    Error:
      type: object
      description: Envelope de erro padrão da API.
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
          properties:
            message:
              type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        db:
          type: string
          example: connected
    Identity:
      type: object
      description: >-
        Identidade da sessão derivada da borda SSO. Todos os campos são null quando
        a request chega sem os headers de borda (dev/local).
      properties:
        email:
          type:
            - string
            - 'null'
        name:
          type:
            - string
            - 'null'
        role:
          type:
            - string
            - 'null'
    Record:
      type: object
      description: Registro genérico (esteira base).
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        title:
          type: string
        status:
          type: string
        external_ref:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ChannelResult:
      type: object
      description: Desfecho da entrega em um canal específico.
      required:
        - channel
        - status
      properties:
        channel:
          type: string
          enum:
            - email
            - push
            - whatsapp
        status:
          type: string
          enum:
            - sent
            - failed
            - skipped
        reason:
          type: string
          description: Motivo quando skipped (unconfigured) ou failed (erro do canal).
    Notification:
      type: object
      description: Notificação multi-canal por evento, com o desfecho por canal.
      required:
        - id
        - tipo
        - status
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        usuario_id:
          type:
            - string
            - 'null'
        tipo:
          type: string
          enum:
            - ruptura
            - falha_pedido
        referencia_id:
          type:
            - integer
            - 'null'
          description: produto_id (ruptura) ou job_id/pedido (falha_pedido).
        canais:
          type: array
          items:
            $ref: '#/components/schemas/ChannelResult'
        status:
          type: string
          description: Agregado — sent (≥1 entregue), failed (nenhum entregue e algum falhou) ou skipped (todos pulados).
          enum:
            - pending
            - sent
            - failed
            - skipped
        tentativas:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Product:
      type: object
      description: Produto de estoque com status derivado.
      required:
        - id
        - name
        - current_stock
        - min_stock
        - status
      properties:
        id:
          type: integer
        name:
          type: string
        current_stock:
          type: integer
        min_stock:
          type: integer
        has_open_order:
          type: boolean
        last_order_date:
          type:
            - string
            - 'null'
          format: date-time
        status:
          type: string
          description: RUPTURA (abaixo do mínimo, sem pedido), ALERTA (perto do mínimo, com pedido) ou OK.
          enum:
            - OK
            - ALERTA
            - RUPTURA
    ProductDetail:
      type: object
      description: >-
        Detalhe canônico de um produto: o produto (com status derivado) + histórico
        recente de pedidos + alertas ativos do produto. Consumido pela tela de detalhe.
      required:
        - product
      properties:
        product:
          $ref: '#/components/schemas/Product'
        orders:
          type: array
          description: Histórico recente de pedidos do produto (mais novos primeiro).
          items:
            $ref: '#/components/schemas/Order'
        alerts:
          type: array
          description: Alertas ativos do produto (RUPTURA / falha de envio).
          items:
            $ref: '#/components/schemas/Alert'
    Order:
      type: object
      description: Pedido de reposição de um produto.
      required:
        - id
        - product_id
        - status
      properties:
        id:
          type: integer
        product_id:
          type: integer
        product_name:
          type: string
        tenant_id:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - delivered
            - failed
        external_ref:
          type:
            - string
            - 'null'
        last_error:
          type:
            - string
            - 'null'
        last_attempt_at:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ReorderSuggestion:
      type: object
      description: >-
        Sugestão estruturada do assistente de IA (validada por schema; fail-closed).
        É um RASCUNHO — não cria pedido nem altera estado.
      required:
        - suggested_quantity
        - rationale
        - confidence
      properties:
        suggested_quantity:
          type: integer
          minimum: 0
          description: Quantidade sugerida de reposição.
        rationale:
          type: string
          description: Justificativa curta (1 frase) fundamentada nos dados reais.
        confidence:
          type: string
          enum:
            - low
            - medium
            - high
        sources:
          type: array
          description: Trechos dos dados reais citados (estoque/mínimo/histórico) — grounding.
          items:
            type: string
    ReorderSuggestionResult:
      type: object
      description: >-
        Resposta do assistente de IA (DRY-RUN). `applied` é sempre false — a sugestão
        precisa de confirmação do operador antes de virar pedido.
      required:
        - suggestion
        - applied
      properties:
        product:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            current_stock:
              type: integer
            min_stock:
              type: integer
        suggestion:
          $ref: '#/components/schemas/ReorderSuggestion'
        grounding:
          type: object
          description: Resumo do contexto usado (histórico) e fontes citáveis.
          properties:
            history_summary:
              type: object
              additionalProperties: true
            sources:
              type: array
              items:
                type: string
        applied:
          type: boolean
          description: Sempre false (dry-run) — o operador confirma para efetivar.
        model:
          type: string
          description: Modelo de IA usado (ex. claude-haiku-4-5-20251001).
    ReorderResult:
      type: object
      description: Resultado de uma reposição (cria ou devolve o pedido aberto existente).
      properties:
        order:
          $ref: '#/components/schemas/Order'
        deduped:
          type: boolean
          description: true quando devolveu um pedido aberto já existente (idempotência).
        enqueued:
          type: boolean
    Alert:
      type: object
      description: Produto em RUPTURA ou com falha de envio ao fornecedor.
      properties:
        id:
          type: integer
        name:
          type: string
        current_stock:
          type: integer
        min_stock:
          type: integer
        has_open_order:
          type: boolean
        alert_type:
          type: string
          enum:
            - RUPTURA
            - ERROR
        status:
          type: string
          enum:
            - OK
            - ALERTA
            - RUPTURA
        last_error:
          type:
            - string
            - 'null'
        last_attempt_at:
          type:
            - string
            - 'null'
          format: date-time
    AuditEntry:
      type: object
      description: Registro sanitizado de uma troca com o fornecedor externo.
      required:
        - id
        - outcome
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        operation:
          type: string
        product_id:
          type:
            - integer
            - 'null'
        order_id:
          type:
            - integer
            - 'null'
        outcome:
          type: string
          enum:
            - success
            - failure
        status_code:
          type:
            - integer
            - 'null'
        attempt:
          type:
            - integer
            - 'null'
        error_redacted:
          type:
            - string
            - 'null'
        duration_ms:
          type:
            - integer
            - 'null'
        created_at:
          type: string
          format: date-time
    Supplier:
      type: object
      description: Fornecedor (gateway externo configurável). Segredos de auth NÃO ficam aqui.
      required:
        - id
        - name
        - gateway_url
        - auth_type
        - active
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        name:
          type: string
        gateway_url:
          type: string
        auth_type:
          type: string
          enum:
            - api_key
            - bearer
            - basic
            - none
        timeout_ms:
          type:
            - integer
            - 'null'
        max_retries:
          type:
            - integer
            - 'null'
        active:
          type: boolean
        notes:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SupplierInput:
      type: object
      description: Corpo para criar/atualizar um fornecedor (no update, todos opcionais).
      required:
        - name
        - gateway_url
        - auth_type
        - active
      properties:
        name:
          type: string
        gateway_url:
          type: string
        auth_type:
          type: string
          enum:
            - api_key
            - bearer
            - basic
            - none
        timeout_ms:
          type: integer
        max_retries:
          type: integer
        active:
          type: boolean
        notes:
          type: string
    SupplierList:
      type: object
      description: Página de fornecedores ({data,total}).
      required:
        - data
        - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Supplier'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    Channel:
      type: object
      description: Canal de notificação (assinatura de webhook por tipo/evento).
      required:
        - id
        - channel
        - webhook_url
        - enabled
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        channel:
          type: string
          enum:
            - email
            - push
            - whatsapp
        webhook_url:
          type: string
        events:
          type:
            - string
            - 'null'
          enum:
            - ruptura
            - falha_pedido
            - 'null'
        enabled:
          type: boolean
        last_status:
          type:
            - string
            - 'null'
          enum:
            - sent
            - failed
            - skipped
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ChannelInput:
      type: object
      description: Corpo para criar/atualizar um canal (no update, todos opcionais).
      required:
        - channel
        - webhook_url
        - enabled
      properties:
        channel:
          type: string
          enum:
            - email
            - push
            - whatsapp
        webhook_url:
          type: string
        events:
          type: string
          enum:
            - ruptura
            - falha_pedido
        enabled:
          type: boolean
        last_status:
          type: string
          enum:
            - sent
            - failed
            - skipped
    ChannelList:
      type: object
      description: Página de canais ({data,total}).
      required:
        - data
        - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
