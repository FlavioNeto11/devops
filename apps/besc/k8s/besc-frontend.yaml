# BESC frontend (React SPA em nginx). Imagem :local. Frontend NAO faz strip (regra de
# ouro) e priority 10 < 40 da API -> /besc/api vai para a API.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: besc-frontend
  namespace: apps
  labels: { app.kubernetes.io/name: besc-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: besc }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: besc-frontend } }
  template:
    metadata: { labels: { app.kubernetes.io/name: besc-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: besc } }
    spec:
      containers:
        - name: frontend
          image: besc-frontend:local
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 80 } ]
          readinessProbe: { httpGet: { path: /healthz, port: 80 }, initialDelaySeconds: 3, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: besc-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: besc } }
spec: { selector: { app.kubernetes.io/name: besc-frontend }, ports: [ { port: 80, targetPort: 80 } ] }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: besc-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: besc } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/besc`)
      kind: Rule
      priority: 10
      services: [ { name: besc-frontend, port: 80 } ]
