# =============================================================================
# Postgres do BESC (db besc) — Fase 0 da evolucao (identidade/RBAC/auditoria).
# Clonado do padrao apps/sicat/k8s/postgres.yaml. Credenciais via SealedSecret
# besc-db (POSTGRES_USER/PASSWORD/DB + DATABASE_URL) — exemplo em
# secret.example.yaml.tmpl. Cases/conteudo continuam no store JSON (ADR-002).
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: besc-pgdata
  namespace: apps
  labels:
    app.kubernetes.io/part-of: besc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: besc-postgres
  namespace: apps
  labels:
    app.kubernetes.io/name: besc-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: besc
  annotations:
    devops.flavioneto/app: besc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: besc-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: besc-postgres
        app.kubernetes.io/part-of: besc
    spec:
      containers:
        - name: postgres
          # pgvector/pgvector:pg16 = postgres:16 + extensao vector (drop-in sobre o
          # mesmo PVC) — mesmo padrao do sicat; deixa busca semantica futura sem
          # troca de imagem/migracao de dados.
          image: pgvector/pgvector:pg16
          envFrom:
            - secretRef:
                name: besc-db
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              # Mesma licao do sicat-postgres: 512Mi OOMKillava o Postgres e o kill
              # no meio de uma escrita corrompeu o WAL no reboot. 1Gi da folga.
              memory: "1Gi"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: besc-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: besc-postgres
  namespace: apps
  labels:
    app.kubernetes.io/part-of: besc
spec:
  selector:
    app.kubernetes.io/name: besc-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
