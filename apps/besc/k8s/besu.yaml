# Hyperledger Besu — no permissionado de TESTE (Fase 3, docs/evolution/05).
# DESLIGADO por padrao no besc-api (LEDGER_ADAPTER=simulated): o off-chain e a fonte
# da verdade; a chain so entra em uso apos o gate regulatorio. Este no roda dev-mode
# gas-free como espelho; NAO exposto no Traefik publico (so ClusterIP interno).
# Para 4+ validadores QBFT de consorcio, evolua o genesis (fora do escopo desta fase).
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: besc-besu-data, namespace: apps, labels: { app.kubernetes.io/part-of: besc } }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 5Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: besc-besu
  namespace: apps
  labels: { app.kubernetes.io/name: besc-besu, app.kubernetes.io/component: ledger, app.kubernetes.io/part-of: besc }
  annotations: { devops.flavioneto/app: besc }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: besc-besu } }
  template:
    metadata: { labels: { app.kubernetes.io/name: besc-besu, app.kubernetes.io/component: ledger, app.kubernetes.io/part-of: besc } }
    spec:
      securityContext: { fsGroup: 1000 }
      containers:
        - name: besu
          image: hyperledger/besu:latest
          imagePullPolicy: IfNotPresent
          args:
            - --network=dev
            - --data-path=/data
            - --rpc-http-enabled
            - --rpc-http-host=0.0.0.0
            - --rpc-http-port=8545
            - --rpc-http-cors-origins=all
            - --rpc-http-api=ETH,NET,WEB3
            - --host-allowlist=*
          ports: [ { name: rpc, containerPort: 8545 } ]
          volumeMounts: [ { name: data, mountPath: /data } ]
          resources:
            requests: { cpu: "250m", memory: 1Gi }
            limits: { cpu: "1", memory: 2Gi }
          readinessProbe:
            httpGet: { path: /liveness, port: 8545 }
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes: [ { name: data, persistentVolumeClaim: { claimName: besc-besu-data } } ]
---
apiVersion: v1
kind: Service
metadata: { name: besc-besu, namespace: apps, labels: { app.kubernetes.io/name: besc-besu, app.kubernetes.io/part-of: besc } }
spec:
  selector: { app.kubernetes.io/name: besc-besu }
  ports: [ { name: rpc, port: 8545, targetPort: 8545 } ]
