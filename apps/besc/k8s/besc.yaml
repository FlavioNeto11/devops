# BESC API (Express + store JSON num PVC). Imagem :local. Sem login, sem banco externo.
# Routing golden path: API com strip (/besc/api) e priority MAIOR que o frontend.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: besc-data, namespace: apps, labels: { app.kubernetes.io/part-of: besc } }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: besc-api
  namespace: apps
  labels: { app.kubernetes.io/name: besc-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: besc }
  annotations: { devops.flavioneto/app: besc }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: besc-api } }
  template:
    metadata: { labels: { app.kubernetes.io/name: besc-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: besc } }
    spec:
      securityContext: { fsGroup: 1000 }
      containers:
        - name: api
          image: besc-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          env:
            - { name: DATA_DIR, value: /data }
            - { name: PORT, value: "8080" }
          ports: [ { name: http, containerPort: 8080 } ]
          volumeMounts: [ { name: data, mountPath: /data } ]
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 20, periodSeconds: 20 }
      volumes: [ { name: data, persistentVolumeClaim: { claimName: besc-data } } ]
---
apiVersion: v1
kind: Service
metadata: { name: besc-api, namespace: apps, labels: { app.kubernetes.io/name: besc-api, app.kubernetes.io/part-of: besc } }
spec: { selector: { app.kubernetes.io/name: besc-api }, ports: [ { name: http, port: 8080, targetPort: 8080 } ] }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: besc-api-strip, namespace: apps }
spec: { stripPrefix: { prefixes: ["/besc/api"] } }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: besc-api, namespace: apps, labels: { app.kubernetes.io/part-of: besc } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/besc/api`)
      kind: Rule
      priority: 40
      services: [ { name: besc-api, port: 8080 } ]
      middlewares: [ { name: besc-api-strip } ]
