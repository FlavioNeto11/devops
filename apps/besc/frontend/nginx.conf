# Servir a SPA sob /besc/ (prefixo + alias estatico = MIME-safe). Assets imutaveis,
# index.html no-cache (aponta sempre p/ o asset mais novo apos deploy).
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /besc { return 301 /besc/; }

  location /besc/assets/ {
    alias /usr/share/nginx/html/besc/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /besc/ {
    alias /usr/share/nginx/html/besc/;
    try_files $uri $uri/ /besc/index.html;
    add_header Cache-Control "no-cache" always;
  }

  location = / { return 301 /besc/; }
}
