apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-pilot-v2-redis
  namespace: apps-dev
  labels:
    app.kubernetes.io/name: "redis"
    app.kubernetes.io/part-of: "forge-pilot-v2"
