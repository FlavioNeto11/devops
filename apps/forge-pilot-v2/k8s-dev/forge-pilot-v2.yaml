# Source: app-template/templates/dependency-postgres.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-pilot-v2-postgres
  namespace: apps-dev
  labels:
    app.kubernetes.io/name: "postgres"
    app.kubernetes.io/part-of: "forge-pilot-v2"
    app.kubernetes.io/component: "db"
    app.kubernetes.io/managed-by: devops-platform
    helm.sh/chart: "app-template-0.1.0"
    devops.flavioneto/app: "forge-pilot-v2"
    devops.flavioneto/app-type: "product_software"
    devops.flavioneto/environment: "dev"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: "postgres"
      app.kubernetes.io/part-of: "forge-pilot-v2"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "postgres"
        app.kubernetes.io/part-of: "forge-pilot-v2"
        app.kubernetes.io/component: "db"
        app.kubernetes.io/managed-by: devops-platform
        helm.sh/chart: "app-template-0.1.0"
        devops.flavioneto/app: "forge-pilot-v2"
        devops.flavioneto/app-type: "product_software"
        devops.flavioneto/environment: "dev"
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: forge-pilot-v2-db
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forge-pilot-v2-postgres-data
