spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: "redis"
      app.kubernetes.io/part-of: "forge-pilot-v2"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "redis"
        app.kubernetes.io/part-of: "forge-pilot-v2"
        app.kubernetes.io/component: "cache"
        app.kubernetes.io/managed-by: devops-platform
