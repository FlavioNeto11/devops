# Servir a SPA sob /contaviva-pro/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /contaviva-pro { return 301 /contaviva-pro/; }
  location /contaviva-pro/ {
    alias /usr/share/nginx/html/contaviva-pro/;
    try_files $uri $uri/ /contaviva-pro/index.html;
  }
}
