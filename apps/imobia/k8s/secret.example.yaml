# reais (imobia-db, imobia-config) sao criados fora do git (kubeseal OU kubectl create secret)
# e ficam FORA do kustomization.yaml para o prune do Argo nunca os deletar.
#
# Criar no laboratorio (exemplo):
#   $pw = -join ((48..57)+(97..122) | Get-Random -Count 24 | % {[char]$_})
#   kubectl -n apps create secret generic imobia-db `
#     --from-literal=POSTGRES_USER=imobia --from-literal=POSTGRES_PASSWORD=$pw `
#     --from-literal=POSTGRES_DB=imobia `
#     --from-literal=DATABASE_URL="postgresql://imobia:$pw@imobia-postgres:5432/imobia?schema=public"
#   kubectl -n apps create secret generic imobia-config `
#     --from-literal=JWT_SECRET=<rand> `
#     --from-literal=KEYCLOAK_USERINFO_URL="" `
#     --from-literal=OPENAI_API_KEY="" --from-literal=ANTHROPIC_API_KEY="" --from-literal=GOOGLE_API_KEY=""
apiVersion: v1
kind: Secret
metadata:
  name: imobia-db
  namespace: apps
  labels:
    app.kubernetes.io/part-of: imobia
type: Opaque
stringData:
  POSTGRES_USER: imobia
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: imobia
  DATABASE_URL: postgresql://imobia:CHANGE_ME@imobia-postgres:5432/imobia?schema=public
---
apiVersion: v1
kind: Secret
metadata:
  name: imobia-config
  namespace: apps
  labels:
    app.kubernetes.io/part-of: imobia
type: Opaque
stringData:
  JWT_SECRET: CHANGE_ME
  # Opcionais / fail-soft (deixe vazio para dormentes):
  KEYCLOAK_USERINFO_URL: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
