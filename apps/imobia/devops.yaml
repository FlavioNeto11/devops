app: { name: imobia, namespace: apps, host: nvit.localhost, basePath: /imobia, appType: product_software }
# imobia — ecossistema imobiliario + fintech orquestrado por multiplas IAs (Cortex=triagem,
# GPT=logica, Claude=redacao, Gemini=documentos/visao). Frontend Vue 3 (ui-vue), API Fastify+
# Prisma+Postgres/pgvector+Redis/BullMQ, worker = MESMA imagem da api. IA fail-soft (dorme sem
# chaves). SSE de IA modelado no k8s como IngressRoute dedicada (sem compress), nao como api2.
# Escopo/fases em CLAUDE.md. Rota /imobia (frontend sem strip) e /imobia/api (strip).
services:
  frontend: { type: frontend, image: imobia-frontend, path: /, port: 80, expose: true, stripPrefix: false, priority: 10 }
  api: { type: api, image: imobia-api, path: /api, port: 8080, expose: true, stripPrefix: true, priority: 30, health: { path: /health } }
  worker: { type: worker, image: imobia-api, path: /worker, port: 8081, expose: false, health: { path: /health } }
