# Servir a SPA sob /imobia/ (prefixo + alias estatico = MIME-safe). Assets imutaveis,
# index.html no-cache (aponta sempre p/ o asset mais novo apos deploy). O Traefik NAO
# faz strip do frontend, entao a app ja vive sob /imobia/.
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /imobia { return 301 /imobia/; }

  location /imobia/assets/ {
    alias /usr/share/nginx/html/imobia/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /imobia/ {
    alias /usr/share/nginx/html/imobia/;
    try_files $uri $uri/ /imobia/index.html;
    add_header Cache-Control "no-cache" always;
  }

  location = / { return 301 /imobia/; }
}
