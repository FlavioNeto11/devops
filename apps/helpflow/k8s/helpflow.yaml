# HelpFlow - Service Desk — k8s gerado pela Forge. Imagens :local (IfNotPresent).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: helpflow-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: helpflow } }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: helpflow-postgres, namespace: apps, labels: { app.kubernetes.io/name: helpflow-postgres, app.kubernetes.io/part-of: helpflow } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: helpflow-postgres } }
  template:
    metadata: { labels: { app.kubernetes.io/name: helpflow-postgres, app.kubernetes.io/part-of: helpflow } }
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          envFrom: [ { secretRef: { name: helpflow-db } } ]
          ports: [ { containerPort: 5432 } ]
          volumeMounts: [ { name: data, mountPath: /var/lib/postgresql/data, subPath: pgdata } ]
      volumes: [ { name: data, persistentVolumeClaim: { claimName: helpflow-postgres } } ]
---
apiVersion: v1
kind: Service
metadata: { name: helpflow-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: helpflow } }
spec: { selector: { app.kubernetes.io/name: helpflow-postgres }, ports: [ { port: 5432, targetPort: 5432 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: helpflow-mock-central, namespace: apps, labels: { app.kubernetes.io/name: helpflow-mock-central, app.kubernetes.io/part-of: helpflow } }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: helpflow-mock-central } }
  template:
    metadata: { labels: { app.kubernetes.io/name: helpflow-mock-central, app.kubernetes.io/part-of: helpflow } }
    spec: { containers: [ { name: mock, image: helpflow-mock-central:local, imagePullPolicy: IfNotPresent, ports: [ { containerPort: 8090 } ], readinessProbe: { httpGet: { path: /health, port: 8090 }, initialDelaySeconds: 3 } } ] }
---
apiVersion: v1
kind: Service
metadata: { name: helpflow-mock-central, namespace: apps, labels: { app.kubernetes.io/part-of: helpflow } }
spec: { selector: { app.kubernetes.io/name: helpflow-mock-central }, ports: [ { port: 8090, targetPort: 8090 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpflow-api
  namespace: apps
  labels: { app.kubernetes.io/name: helpflow-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: helpflow, devops.flavioneto/app-type: product_software }
  annotations: { devops.flavioneto/app: helpflow, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: helpflow-api } }
  template:
    metadata: { labels: { app.kubernetes.io/name: helpflow-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: helpflow } }
    spec:
      containers:
        - name: api
          image: helpflow-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          envFrom: [ { secretRef: { name: helpflow-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://helpflow-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "true" }
            - { name: AUTO_SEED, value: "true" }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 9464 }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 8, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: helpflow-api, namespace: apps, labels: { app.kubernetes.io/name: helpflow-api, app.kubernetes.io/part-of: helpflow } }
spec: { selector: { app.kubernetes.io/name: helpflow-api }, ports: [ { name: http, port: 8080, targetPort: 8080 }, { name: metrics, port: 9464, targetPort: 9464 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpflow-worker
  namespace: apps
  labels: { app.kubernetes.io/name: helpflow-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: helpflow }
  annotations: { devops.flavioneto/app: helpflow, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: helpflow-worker } }
  template:
    metadata: { labels: { app.kubernetes.io/name: helpflow-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: helpflow } }
    spec:
      containers:
        - name: worker
          image: helpflow-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker"]
          envFrom: [ { secretRef: { name: helpflow-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://helpflow-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "false" }
          ports: [ { name: metrics, containerPort: 9464 } ]
---
apiVersion: v1
kind: Service
metadata: { name: helpflow-worker, namespace: apps, labels: { app.kubernetes.io/name: helpflow-worker, app.kubernetes.io/part-of: helpflow } }
spec: { selector: { app.kubernetes.io/name: helpflow-worker }, ports: [ { name: metrics, port: 9464, targetPort: 9464 } ] }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: helpflow-api-strip, namespace: apps }
spec: { stripPrefix: { prefixes: ["/helpflow/api"] } }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: helpflow, namespace: apps, labels: { app.kubernetes.io/part-of: helpflow } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/helpflow/api`)
      kind: Rule
      priority: 40
      services: [ { name: helpflow-api, port: 8080 } ]
      middlewares: [ { name: helpflow-api-strip } ]
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: helpflow, namespace: apps, labels: { app.kubernetes.io/part-of: helpflow, release: kube-prometheus-stack } }
spec:
  selector: { matchLabels: { app.kubernetes.io/part-of: helpflow } }
  namespaceSelector: { matchNames: [apps] }
  endpoints: [ { port: metrics, path: /metrics, interval: 15s } ]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: helpflow-slo, namespace: apps, labels: { app.kubernetes.io/part-of: helpflow, release: kube-prometheus-stack } }
spec:
  groups:
    - name: helpflow.slo
      rules:
        - alert: helpflowApiDown
          expr: absent(up{job=~".*helpflow-api.*"} == 1)
          for: 3m
          labels: { severity: critical, app: helpflow }
          annotations: { summary: "helpflow: API sem target UP" }
        - alert: helpflowQueueDlq
          expr: max(helpflow_queue_depth{status="dlq"}) > 3
          for: 2m
          labels: { severity: warning, app: helpflow }
          annotations: { summary: "helpflow: DLQ acumulando" }
