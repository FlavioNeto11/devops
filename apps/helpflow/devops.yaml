app: { name: helpflow, namespace: apps, host: nvit.localhost, basePath: /helpflow }
# Gerado pela FORGE (SICAT-style). Blocos: observabilidade, camadas-rigidas, migrations-versionadas, oidc-sessao, contract-openapi, worker-queue-transacional, idempotencia, gateway-externo, rag-pgvector, ia-grafo, structured-outputs, control-ai-por-app, design-system
services:
  frontend: { type: frontend, path: /, port: 80, expose: true, stripPrefix: false, priority: 10 }
  api: { type: api, path: /api, port: 8080, expose: true, stripPrefix: true, priority: 40, health: { path: /health } }
  worker: { type: worker, port: 9464, expose: false, command: ["npm", "run", "worker"] }
capabilities: [observabilidade, camadas-rigidas, migrations-versionadas, oidc-sessao, contract-openapi, worker-queue-transacional, idempotencia, gateway-externo, rag-pgvector, ia-grafo, structured-outputs, control-ai-por-app, design-system]
observability: { metricsPort: 9464, serviceMonitor: true, prometheusRule: true }