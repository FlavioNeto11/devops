# Servir a SPA sob /helpflow/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /helpflow { return 301 /helpflow/; }
  location /helpflow/ {
    alias /usr/share/nginx/html/helpflow/;
    try_files $uri $uri/ /helpflow/index.html;
  }
}
