        "404": { description: "não encontrado." }
    delete:
      operationId: deleteProduct
      summary: Remover produto.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/PathId" }
      responses:
        "204": { description: deleted }
        "404": { description: "não encontrado." }
  /v1/orders:
