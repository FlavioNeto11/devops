openapi: 3.1.0
info: { title: "ShopDesk API", version: "1.0.0" }
servers:
  - url: /shopdesk/api
    description: Base sob o subpath da plataforma (Traefik stripPrefix).
components:
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      description: Identificador do tenant (multi-tenant). Toda chamada o exige.
      schema: { type: integer, example: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Chave de idempotência para cobranças (repetir a mesma chave não cobra de novo).
      schema: { type: string, example: "chk-2026-0001" }
    PathId:
      name: id
      in: path
      required: true
      description: Identificador do recurso.
      schema: { type: integer }
    Page:
      name: page
      in: query
      required: false
      description: Página (1-based) para listas paginadas.
      schema: { type: integer, default: 1 }
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Tamanho da página.
      schema: { type: integer, default: 20 }
    Sort:
      name: sort
      in: query
      required: false
      description: Campo de ordenação (camelCase; mapeado para coluna física).
      schema: { type: string }
    Dir:
      name: dir
      in: query
      required: false
      description: Direção da ordenação.
      schema: { type: string, enum: [asc, desc] }
  schemas:
    Error:
      type: object
      description: Envelope canônico de erro — toda falha responde com este corpo.
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message: { type: string, description: "Descrição legível do problema." }
    RecordInput:
      type: object
      required: [title]
      properties:
        title: { type: string, description: "Título do registro." }
    CheckoutInput:
      type: object
      required: [orderId, amount]
      properties:
        orderId: { type: string, description: "Identificador do pedido a cobrar." }
        amount: { type: number, description: "Valor a cobrar." }
        paymentMethodToken: { type: string, description: "Token do meio de pagamento (sandbox por default)." }
    InvoiceInput:
      type: object
      required: [orderId]
      properties:
        orderId: { type: string, description: "Pedido para emitir a NF-e." }
        total: { type: number, description: "Valor total da nota." }
    AssistantInput:
      type: object
      required: [message]
      properties:
        message: { type: string, description: "Pergunta/instrução em linguagem natural." }
    ProductInput:
      type: object
      required: [name, price]
      properties:
        name: { type: string }
        sku: { type: string }
        price: { type: number }
        status: { type: string, enum: [active, inactive] }
    OrderInput:
      type: object
      required: [customer, total]
      properties:
        customer: { type: string }
        total: { type: number }
        status: { type: string }
    CartInput:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { type: object } }
    InventoryInput:
      type: object
      required: [sku, quantity]
      properties:
        sku: { type: string }
        quantity: { type: integer }
    ReorderInput:
      type: object
      required: [sku, quantity]
      properties:
        sku: { type: string }
        quantity: { type: integer }
    UserInput:
      type: object
      required: [name, email]
      properties:
        name: { type: string }
        email: { type: string }
        role: { type: string }
    AuditLogInput:
      type: object
      required: [action]
      properties:
        action: { type: string }
        actor: { type: string }
paths:
  /:
    get:
      operationId: root
      summary: Sonda de identidade do serviço.
      responses: { "200": { description: ok } }
  /health:
    get:
      operationId: health
      summary: Saúde do serviço e do banco.
      responses: { "200": { description: ok } }
  /v1/health/jobs:
    get:
      operationId: healthJobs
      summary: Saúde da fila de jobs (queued/running/done/dlq).
      responses: { "200": { description: ok } }
  /v1/openapi.yaml:
    get:
      operationId: openapiYaml
      summary: Contrato OpenAPI canônico em YAML (fonte para download).
      responses: { "200": { description: "Contrato YAML." } }
  /v1/openapi.json:
    get:
      operationId: openapiJson
      summary: Contrato OpenAPI canônico em JSON (consumido pela tela de documentação).
      responses: { "200": { description: "Contrato JSON." } }
  /v1/records:
    get:
      operationId: listRecords
      summary: Listar registros do tenant.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
      responses:
        "200": { description: "Lista de registros." }
    post:
      operationId: createRecord
      summary: Criar registro.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordInput" }
      responses:
        "201": { description: created }
        "400": { description: "title obrigatório." }
  /v1/records/{id}:
    get:
      operationId: getRecord
      summary: Obter registro por identificador.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/PathId" }
      responses:
        "200": { description: ok }
        "404": { description: "não encontrado." }
  /v1/records/{id}/submit:
    post:
      operationId: submitRecord
      summary: Submeter registro (enfileira processamento assíncrono).
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/PathId" }
      responses:
        "202": { description: accepted }
        "404": { description: "não encontrado." }
  /v1/checkout:
    post:
      operationId: checkout
      summary: Checkout com cobrança idempotente (payments-kit).
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckoutInput" }
      responses:
        "201": { description: created }
        "400": { description: "orderId e amount obrigatórios." }
  /v1/checkout/audit:
    get:
      operationId: checkoutAudit
      summary: Trilha de auditoria recente do gateway de pagamento.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
      responses:
        "200": { description: ok }
  /v1/checkout/webhook:
    post:
      operationId: checkoutWebhook
      summary: Webhook do PSP — verifica assinatura HMAC e deduplica por chave de evento.
      parameters:
        - name: X-PSP-Signature
          in: header
          required: true
          description: Assinatura HMAC-SHA256 do body em hex (verifica autenticidade do PSP).
          schema: { type: string }
        - name: X-PSP-Event-Id
          in: header
          required: true
          description: Chave única do evento do PSP para deduplicação.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: "Evento aceito ou já processado (deduplicated)." }
        "400": { description: "X-PSP-Event-Id obrigatório." }
        "401": { description: "Assinatura inválida." }
  /v1/invoices:
    post:
      operationId: emitInvoice
      summary: Emitir NF-e (sandbox por default).
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InvoiceInput" }
      responses:
        "201": { description: created }
        "400": { description: "orderId obrigatório." }
  /v1/assistant:
    post:
      operationId: assistant
      summary: Assistente de IA do lojista (fail-closed sem chave).
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssistantInput" }
      responses:
        "200": { description: ok }
        "503": { description: "IA indisponível (sem chave configurada)." }
  /v1/assistant/health:
    get:
      operationId: assistantHealth
      summary: Saúde verificável do assistente de IA.
      responses:
        "200": { description: ok }
  /v1/notifications:
    get:
      operationId: listNotifications
      summary: Histórico de notificações (e-mail/push/whatsapp).
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
      responses:
        "200": { description: ok }
  /v1/products:
    get:
      operationId: listProducts
      summary: Listar produtos.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PageSize" }
        - { $ref: "#/components/parameters/Sort" }
        - { $ref: "#/components/parameters/Dir" }
      responses:
        "200": { description: ok }
    post:
      operationId: createProduct
      summary: Criar produto.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductInput" }
      responses:
        "201": { description: created }
        "400": { description: "campos obrigatórios ausentes." }
  /v1/products/{id}:
    get:
      operationId: getProduct
      summary: Obter produto por identificador.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/PathId" }
      responses:
        "200": { description: ok }
        "404": { description: "não encontrado." }
    put:
      operationId: updateProduct
      summary: Atualizar produto.
      parameters:
        - { $ref: "#/components/parameters/TenantId" }
        - { $ref: "#/components/parameters/PathId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductInput" }
      responses:
