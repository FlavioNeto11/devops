# ShopDesk — Loja + Checkout + NF — k8s gerado pela Forge. Imagens :local (IfNotPresent).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: shopdesk-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk } }
spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 1Gi } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: shopdesk-postgres, namespace: apps, labels: { app.kubernetes.io/name: shopdesk-postgres, app.kubernetes.io/part-of: shopdesk } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: shopdesk-postgres } }
  template:
    metadata: { labels: { app.kubernetes.io/name: shopdesk-postgres, app.kubernetes.io/part-of: shopdesk } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom: [ { secretRef: { name: shopdesk-db } } ]
          ports: [ { containerPort: 5432 } ]
          volumeMounts: [ { name: data, mountPath: /var/lib/postgresql/data, subPath: pgdata } ]
      volumes: [ { name: data, persistentVolumeClaim: { claimName: shopdesk-postgres } } ]
---
apiVersion: v1
kind: Service
metadata: { name: shopdesk-postgres, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk } }
spec: { selector: { app.kubernetes.io/name: shopdesk-postgres }, ports: [ { port: 5432, targetPort: 5432 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: shopdesk-mock-central, namespace: apps, labels: { app.kubernetes.io/name: shopdesk-mock-central, app.kubernetes.io/part-of: shopdesk } }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: shopdesk-mock-central } }
  template:
    metadata: { labels: { app.kubernetes.io/name: shopdesk-mock-central, app.kubernetes.io/part-of: shopdesk } }
    spec: { containers: [ { name: mock, image: shopdesk-mock-central:local, imagePullPolicy: IfNotPresent, ports: [ { containerPort: 8090 } ], readinessProbe: { httpGet: { path: /health, port: 8090 }, initialDelaySeconds: 3 } } ] }
---
apiVersion: v1
kind: Service
metadata: { name: shopdesk-mock-central, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk } }
spec: { selector: { app.kubernetes.io/name: shopdesk-mock-central }, ports: [ { port: 8090, targetPort: 8090 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopdesk-api
  namespace: apps
  labels: { app.kubernetes.io/name: shopdesk-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: shopdesk, devops.flavioneto/app-type: product_software }
  annotations: { devops.flavioneto/app: shopdesk, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: shopdesk-api } }
  template:
    metadata: { labels: { app.kubernetes.io/name: shopdesk-api, app.kubernetes.io/component: api, app.kubernetes.io/part-of: shopdesk } }
    spec:
      containers:
        - name: api
          image: shopdesk-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          envFrom: [ { secretRef: { name: shopdesk-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://shopdesk-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "true" }
            - { name: AUTO_SEED, value: "true" }
            - { name: PAYMENT_PROVIDER, value: "sandbox" }
            - { name: FISCAL_MODE, value: "sandbox" }
            # assistente de IA (bloco control-ai-por-app): reusa a chave da plataforma; ausente -> 503 (fail-closed)
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: reqhub-api-config, key: ANTHROPIC_API_KEY, optional: true } }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 9464 }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 8, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: shopdesk-api, namespace: apps, labels: { app.kubernetes.io/name: shopdesk-api, app.kubernetes.io/part-of: shopdesk } }
spec: { selector: { app.kubernetes.io/name: shopdesk-api }, ports: [ { name: http, port: 8080, targetPort: 8080 }, { name: metrics, port: 9464, targetPort: 9464 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopdesk-worker
  namespace: apps
  labels: { app.kubernetes.io/name: shopdesk-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: shopdesk }
  annotations: { devops.flavioneto/app: shopdesk, devops.flavioneto/metrics-port: "9464" }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: shopdesk-worker } }
  template:
    metadata: { labels: { app.kubernetes.io/name: shopdesk-worker, app.kubernetes.io/component: worker, app.kubernetes.io/part-of: shopdesk } }
    spec:
      containers:
        - name: worker
          image: shopdesk-api:local
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker"]
          envFrom: [ { secretRef: { name: shopdesk-db } } ]
          env:
            - { name: EXTERNAL_BASE_URL, value: "http://shopdesk-mock-central:8090" }
            - { name: METRICS_PORT, value: "9464" }
            - { name: AUTO_MIGRATE, value: "false" }
          ports: [ { name: metrics, containerPort: 9464 } ]
---
apiVersion: v1
kind: Service
metadata: { name: shopdesk-worker, namespace: apps, labels: { app.kubernetes.io/name: shopdesk-worker, app.kubernetes.io/part-of: shopdesk } }
spec: { selector: { app.kubernetes.io/name: shopdesk-worker }, ports: [ { name: metrics, port: 9464, targetPort: 9464 } ] }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: shopdesk-api-strip, namespace: apps }
spec: { stripPrefix: { prefixes: ["/shopdesk/api"] } }
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: shopdesk, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/shopdesk/api`)
      kind: Rule
      priority: 40
      services: [ { name: shopdesk-api, port: 8080 } ]
      # bloco oidc-sessao: SSO de borda (reusa oauth2-proxy/Keycloak) — XHR sem sessão = 401; depois strip.
      middlewares: [ { name: console-auth-401, namespace: devops-system }, { name: shopdesk-api-strip } ]
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: shopdesk, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk, release: kube-prometheus-stack } }
spec:
  selector: { matchLabels: { app.kubernetes.io/part-of: shopdesk } }
  namespaceSelector: { matchNames: [apps] }
  endpoints: [ { port: metrics, path: /metrics, interval: 15s } ]
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: shopdesk-slo, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk, release: kube-prometheus-stack } }
spec:
  groups:
    - name: shopdesk.slo
      rules:
        - alert: shopdeskApiDown
          expr: absent(up{job=~".*shopdesk-api.*"} == 1)
          for: 3m
          labels: { severity: critical, app: shopdesk }
          annotations: { summary: "shopdesk: API sem target UP" }
        - alert: shopdeskQueueDlq
          expr: max(shopdesk_queue_depth{status="dlq"}) > 3
          for: 2m
          labels: { severity: warning, app: shopdesk }
          annotations: { summary: "shopdesk: DLQ acumulando" }
