# ShopDesk — Loja + Checkout + NF — frontend (Vue SPA) gerado pela Forge. Aditivo ao k8s do backend.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: shopdesk-frontend, namespace: apps, labels: { app.kubernetes.io/name: shopdesk-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: shopdesk } }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: shopdesk-frontend } }
  template:
    metadata: { labels: { app.kubernetes.io/name: shopdesk-frontend, app.kubernetes.io/component: frontend, app.kubernetes.io/part-of: shopdesk } }
    spec: { containers: [ { name: frontend, image: shopdesk-frontend:local, imagePullPolicy: IfNotPresent, ports: [ { containerPort: 80 } ], readinessProbe: { httpGet: { path: /healthz, port: 80 }, initialDelaySeconds: 3, periodSeconds: 10 } } ] }
---
apiVersion: v1
kind: Service
metadata: { name: shopdesk-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk } }
spec: { selector: { app.kubernetes.io/name: shopdesk-frontend }, ports: [ { port: 80, targetPort: 80 } ] }
---
# Frontend NÃO faz strip (regra de ouro) e priority 10 < 40 da API -> /shopdesk/api vai p/ a API.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: shopdesk-frontend, namespace: apps, labels: { app.kubernetes.io/part-of: shopdesk } }
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/shopdesk`)
      kind: Rule
      priority: 10
      services: [ { name: shopdesk-frontend, port: 80 } ]
      # bloco oidc-sessao: navegação sem sessão -> 302 login (Keycloak); volta autenticado.
      middlewares: [ { name: console-auth-redirect, namespace: devops-system } ]
