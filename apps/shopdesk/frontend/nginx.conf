# Servir a SPA sob /shopdesk/ (prefix+alias MIME-safe). Gerado pela Forge.
server {
  listen 80;
  server_name _;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
  location = /shopdesk { return 301 /shopdesk/; }
  location /shopdesk/ {
    alias /usr/share/nginx/html/shopdesk/;
    try_files $uri $uri/ /shopdesk/index.html;
  }
}
