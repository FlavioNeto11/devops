# EXEMPLO (placeholders). Os Secrets REAIS são criados fora do git (kubectl)
# e NUNCA commitados. Este arquivo fica FORA do kustomization.yaml — o Argo
# não o aplica e não gerencia (nem apaga) os secrets reais.
# Em produção/GitOps, sele com kubeseal (SealedSecret) — ver SECURITY.md.
#
# Criar os reais (lab), em PowerShell 7:
#   $pw = -join ((48..57)+(97..122) | Get-Random -Count 24 | ForEach-Object {[char]$_})
#   kubectl -n apps create secret generic ai-control-plane-db `
#     --from-literal=POSTGRES_USER=aicontrol `
#     --from-literal=POSTGRES_PASSWORD=$pw `
#     --from-literal=POSTGRES_DB=ai_control_plane `
#     --from-literal=DATABASE_URL="postgresql://aicontrol:$pw@ai-control-plane-postgres:5432/ai_control_plane"
#
#   $token = -join ((48..57)+(97..122) | Get-Random -Count 32 | ForEach-Object {[char]$_})
#   kubectl -n apps create secret generic ai-control-plane-config `
#     --from-literal=token=$token
#
# O 'token' é o AI_CONTROL_PLANE_TOKEN: writes na API exigem
# Authorization: Bearer <token>; sem ele configurado, writes retornam 503.
apiVersion: v1
kind: Secret
metadata:
  name: ai-control-plane-db
  namespace: apps
  labels:
    app.kubernetes.io/name: ai-control-plane-db
    app.kubernetes.io/component: db
    app.kubernetes.io/part-of: ai-control-plane
type: Opaque
stringData:
  POSTGRES_USER: "aicontrol"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "ai_control_plane"
  DATABASE_URL: "postgresql://aicontrol:CHANGE_ME@ai-control-plane-postgres:5432/ai_control_plane"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-control-plane-config
  namespace: apps
  labels:
    app.kubernetes.io/name: ai-control-plane-config
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-control-plane
type: Opaque
stringData:
  token: "CHANGE_ME"
