# =============================================================================
# API do ai-control-plane (governança de IA: prompts versionados, feedback,
# eval runs). Imagem local ai-control-plane-api:local (IfNotPresent).
# DATABASE_URL vem do secret ai-control-plane-db; AI_CONTROL_PLANE_TOKEN vem
# do secret ai-control-plane-config (key token) — sem o token, writes = 503.
# O boot tolera banco fora do ar (migrate com retry em background; /health
# responde db:false) — serviço FORA do caminho crítico dos apps.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-control-plane-api
  namespace: apps
  annotations:
    devops.flavioneto/imageTag: "local"
    devops.flavioneto/image: "ai-control-plane-api:local"
    devops.flavioneto/branch: "main"
  labels:
    app.kubernetes.io/name: ai-control-plane-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-control-plane-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-control-plane-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ai-control-plane
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000        # usuário 'node' da imagem oficial
        runAsGroup: 1000
      containers:
        - name: api
          image: ai-control-plane-api:local
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-control-plane-db
                  key: DATABASE_URL
            - name: AI_CONTROL_PLANE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-control-plane-config
                  key: token
                  optional: false   # sem o secret o pod NÃO sobe (fail-closed)
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "15m"
              memory: "48Mi"
            limits:
              cpu: "300m"
              memory: "192Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-control-plane-api
  namespace: apps
  labels:
    app.kubernetes.io/name: ai-control-plane-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-control-plane
spec:
  selector:
    app.kubernetes.io/name: ai-control-plane-api
  ports:
    - name: http
      port: 8080
      targetPort: http
