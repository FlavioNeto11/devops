# Ana Rabottini — SPA (Vite/React) servida sob /anarabottini/ (Traefik SEM strip).
# Padrao MIME-safe da plataforma: PREFIXO + alias ESTATICO para os assets (alias com
# captura de regex serve application/octet-stream e quebra a SPA — ver TROUBLESHOOTING 14).
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /anarabottini { return 301 /anarabottini/; }

  # Assets versionados: prefixo + alias estatico (mime.types aplicado corretamente).
  location /anarabottini/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Imagens estaticas (fotos reais): prefixo + alias estatico (mime correto, sem try_files).
  location /anarabottini/images/ {
    alias /usr/share/nginx/html/images/;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # Materiais (PDFs/e-books): prefixo + alias estatico (mime correto, sem try_files).
  location /anarabottini/materiais/ {
    alias /usr/share/nginx/html/materiais/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
  }

  # SPA: tudo sob /anarabottini/ cai no index.html (roteamento client-side, base /anarabottini/).
  location /anarabottini/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /anarabottini/index.html;
  }

  location = / { return 301 /anarabottini/; }
}
