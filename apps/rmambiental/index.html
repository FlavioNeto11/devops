    <script>
      // Tema CLARO por padrão; respeita a escolha salva. Aplica antes do render (sem flash).

        try {
          if (localStorage.getItem('rmamb-theme') === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
