# =============================================================================
# RM Ambiental Brasil — portal institucional (somente frontend) sob /rmambiental.
# Roteamento (host dev.nvit.com.br / nvit.localhost):
#   /rmambiental  -> frontend (nginx + SPA Vite, SEM strip, priority 10)
# Imagem local: rmambiental-frontend:local (build: docker build -t rmambiental-frontend:local apps/rmambiental).
# As annotations devops.flavioneto/* alimentam a aba "Publicacoes" do DevOps Console.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rmambiental-frontend
  namespace: apps
  annotations:
    devops.flavioneto/commitSha: "local"
    devops.flavioneto/branch: "main"
    devops.flavioneto/imageTag: "local"
    devops.flavioneto/deployedAt: "2026-06-08T00:00:00Z"
    devops.flavioneto/runId: "manual-publish-rmambiental"
    devops.flavioneto/image: "rmambiental-frontend:local"
  labels:
    app.kubernetes.io/name: rmambiental
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: rmambiental
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rmambiental
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rmambiental
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: rmambiental
    spec:
      containers:
        - name: frontend
          image: rmambiental-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 8
            periodSeconds: 15
          resources:
            requests:
              cpu: "10m"
              memory: "24Mi"
            limits:
              cpu: "150m"
              memory: "96Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rmambiental-frontend
  namespace: apps
  labels:
    app.kubernetes.io/part-of: rmambiental
spec:
  selector:
    app.kubernetes.io/name: rmambiental
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rmambiental
  namespace: apps
  labels:
    app.kubernetes.io/name: rmambiental
    app.kubernetes.io/part-of: rmambiental
spec:
  entryPoints:
    - web
  routes:
    # frontend institucional (priority 10 vence o portal `/` priority 1)
    - match: (Host(`dev.nvit.com.br`) || Host(`nvit.localhost`)) && PathPrefix(`/rmambiental`)
      kind: Rule
      priority: 10
      services:
        - name: rmambiental-frontend
          port: 80
      # So compress (SEM secure-headers): o frameDeny quebraria o editor visual
      # do Console, que exibe este portal dentro de um iframe (?cmsEdit=1).
      middlewares:
        - name: compress
          namespace: traefik
