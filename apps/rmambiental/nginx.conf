# RM Ambiental — SPA (Vite/React) servida sob /rmambiental/ (Traefik SEM strip).
# Padrao MIME-safe da plataforma: PREFIXO + alias ESTATICO para os assets (alias com
# captura de regex serve application/octet-stream e quebra a SPA — ver TROUBLESHOOTING 14).
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /rmambiental { return 301 /rmambiental/; }

  # Assets versionados: prefixo + alias estatico (mime.types aplicado corretamente).
  location /rmambiental/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Imagens estaticas (fotos reais): prefixo + alias estatico (mime correto, sem try_files).
  location /rmambiental/images/ {
    alias /usr/share/nginx/html/images/;
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # SPA: tudo sob /rmambiental/ cai no index.html (roteamento client-side, base /rmambiental/).
  # index.html SEM cache de longa duracao (no-cache = sempre revalida via ETag): os assets sao
  # hash-imutaveis, mas o HTML precisa apontar para o asset mais novo a cada deploy (senao o
  # navegador serve um index.html velho — ainda mais dentro de iframe — e quebra apos publicar).
  location /rmambiental/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /rmambiental/index.html;
    add_header Cache-Control "no-cache" always;
  }

  location = / { return 301 /rmambiental/; }
}
