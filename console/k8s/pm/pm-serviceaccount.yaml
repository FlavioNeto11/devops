# ServiceAccount do pm-api SEM ClusterRole/Role: o modulo PM NUNCA toca o Kubernetes.
# (O cross-link com dados ao vivo do cluster e feito no FRONTEND, via o backend read-only.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pm-api
  namespace: devops-system
  labels:
    app.kubernetes.io/name: pm-api
    app.kubernetes.io/part-of: devops-console
    app.kubernetes.io/component: meta-project
automountServiceAccountToken: false
