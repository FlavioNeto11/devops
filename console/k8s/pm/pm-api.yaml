apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm-api
  namespace: devops-system
  labels: { app.kubernetes.io/name: pm-api, app.kubernetes.io/part-of: devops-console, app.kubernetes.io/component: meta-project, app.kubernetes.io/managed-by: devops-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: pm-api } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pm-api, app.kubernetes.io/part-of: devops-console, app.kubernetes.io/component: meta-project }
    spec:
      serviceAccountName: pm-api
      automountServiceAccountToken: false
      containers:
        - name: pm-api
          image: console-pm:local
          imagePullPolicy: IfNotPresent
          env:
            - { name: PORT, value: "3002" }
            - { name: AUTO_MIGRATE, value: "true" }
            - { name: AUTO_SEED, value: "true" }
            - { name: DATABASE_URL, valueFrom: { secretKeyRef: { name: pm-db, key: DATABASE_URL } } }
            # Identidade/escopo: papel vem dos headers da borda; gestão de usuários restritos via Keycloak.
            - { name: PM_MEMBER_GROUP, value: "project-members" }
            - { name: KEYCLOAK_BASE, value: "http://keycloak.identity.svc.cluster.local:8080/auth" }
            - { name: KC_REALM, value: "nvit" }
            - { name: KC_SVC_CLIENT_ID, value: "devops-console-svc" }
            - { name: KC_SVC_CLIENT_SECRET, valueFrom: { secretKeyRef: { name: devops-console-kc-svc, key: KC_SVC_CLIENT_SECRET } } }
            # IA do CMS (geração de portal): secret "pm-ai" criado fora do git
            # (ver pm-ai.example.yaml). optional=true -> sem a chave o pm-api sobe
            # normalmente e a rota /cms/generate degrada com 503 gracioso.
            - { name: OPENAI_API_KEY, valueFrom: { secretKeyRef: { name: pm-ai, key: OPENAI_API_KEY, optional: true } } }
          ports: [{ containerPort: 3002, name: http }]
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 25
            periodSeconds: 20
          resources:
            requests: { cpu: 25m, memory: 96Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
---
apiVersion: v1
kind: Service
metadata:
  name: pm-api
  namespace: devops-system
  labels: { app.kubernetes.io/part-of: devops-console }
spec:
  selector: { app.kubernetes.io/name: pm-api }
  ports: [{ name: http, port: 3002, targetPort: http }]
