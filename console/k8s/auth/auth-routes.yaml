# =============================================================================
# Rota /oauth2 (oauth2-proxy) + Middlewares ForwardAuth do DevOps Console.
# -----------------------------------------------------------------------------
# - IngressRoute /oauth2  -> oauth2-proxy:4180 (login/callback/auth). SEM gate.
# - Middleware console-auth-redirect: usado nas rotas de NAVEGACAO (frontend).
#     address = oauth2-proxy "/" -> 302 p/ login quando nao-autenticado, 202 quando ok.
# - Middleware console-auth-401: usado nas rotas de API (XHR).
#     address = oauth2-proxy "/oauth2/auth" -> 401 quando nao-autenticado, 202 quando ok
#     (a SPA ja autenticou via cookie antes de chamar a API).
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: oauth2-proxy
  namespace: devops-system
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/part-of: devops-console
spec:
  entryPoints: [web]
  routes:
    - match: (Host(`xpto.localhost`) || Host(`dev.nvit.com.br`)) && PathPrefix(`/oauth2`)
      kind: Rule
      priority: 50
      services:
        - name: oauth2-proxy
          port: 4180
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: console-auth-redirect
  namespace: devops-system
  labels: { app.kubernetes.io/part-of: devops-console }
spec:
  forwardAuth:
    # "/" no oauth2-proxy: 302 -> login (navegacao) quando sem sessao; 202 quando ok.
    address: http://oauth2-proxy.devops-system.svc.cluster.local:4180/
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: console-auth-401
  namespace: devops-system
  labels: { app.kubernetes.io/part-of: devops-console }
spec:
  forwardAuth:
    # "/oauth2/auth": 401 (sem redirect) p/ XHR sem sessao; 202 quando ok.
    address: http://oauth2-proxy.devops-system.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
