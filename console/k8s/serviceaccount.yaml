# =============================================================================
# serviceaccount.yaml - ServiceAccount do DevOps Console (backend)
# -----------------------------------------------------------------------------
# Identidade usada pelo Pod do console-backend para autenticar na API do
# Kubernetes. As permissoes (apenas leitura) sao concedidas no rbac.yaml por
# meio de um ClusterRole + ClusterRoleBinding ligados a esta ServiceAccount.
#
# Principio de menor privilegio: esta SA NAO tem nenhuma permissao por padrao;
# tudo o que ela pode fazer e estritamente o que o ClusterRole 'console-readonly'
# autoriza (get/list/watch).
#
# Aplicar com:
#   kubectl apply -f C:/devops/console/k8s/serviceaccount.yaml
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: console
  namespace: devops-system
  labels:
    app.kubernetes.io/name: console-backend
    app.kubernetes.io/part-of: devops-console
    app.kubernetes.io/managed-by: devops-platform
# Nao montar o token automaticamente em todos os Pods nao e necessario aqui:
# o backend PRECISA do token para falar com a API do cluster, entao deixamos o
# automount no padrao (true). O escopo do token e limitado pelo RBAC.
automountServiceAccountToken: true
