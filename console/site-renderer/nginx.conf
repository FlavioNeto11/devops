# site-renderer — SPA generica dos portais CMS, servida sob /sites/ (Traefik SEM strip).
# Padrao MIME-safe da plataforma: PREFIXO + alias ESTATICO para os assets (TROUBLESHOOTING 14).
server {
  listen 80;
  server_name _;

  location = /healthz { access_log off; add_header Content-Type text/plain; return 200 'ok'; }

  location = /sites { return 301 /sites/; }

  # Assets versionados (compartilhados por todos os portais renderizados).
  location /sites/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # SPA: /sites/<chave>[/<pagina>] cai no index.html (roteamento client-side).
  # index.html sempre revalida (no-cache) para apontar ao asset mais novo.
  location /sites/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /sites/index.html;
    add_header Cache-Control "no-cache" always;
  }

  location = / { return 301 /sites/; }
}
