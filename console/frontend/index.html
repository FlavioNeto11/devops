<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="DevOps Console: visao somente leitura, em tempo real, do cluster Kubernetes local (docker-desktop)."
    />
    <title>DevOps Console</title>
    <!-- Tema aplicado ANTES do bundle p/ evitar flash (FOUC). Default: light. -->
    <script>
      (function () {
        try {
          document.documentElement.dataset.theme = localStorage.getItem('console-theme') || 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
