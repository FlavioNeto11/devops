<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="DevOps Console: visao somente leitura, em tempo real, do cluster Kubernetes local (docker-desktop)."
    />
    <title>DevOps Console</title>
    <!-- favicon (diamante da marca) inline — sem request extra -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 2 22 12 12 22 2 12Z' fill='%232f6fed'/%3E%3C/svg%3E" />
    <!-- Tema aplicado ANTES do bundle p/ evitar flash (FOUC). Default: light. -->
    <script>
      (function () {
        try {
          document.documentElement.dataset.theme = localStorage.getItem('console-theme') || 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
