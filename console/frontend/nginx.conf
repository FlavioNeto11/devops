# =============================================================================
# nginx — DevOps Console (frontend)
# -----------------------------------------------------------------------------
# A SPA e servida sob o subpath /devops/ e NAO sofre strip-prefix no Traefik
# (convencao de frontend da plataforma). Portanto o nginx precisa atender as
# requisicoes que chegam JA com o prefixo /devops/ intacto.
#
# Como o build do Vite usa base '/devops/', os assets sao referenciados como
# /devops/assets/...  -> com `alias /usr/share/nginx/html/`, a requisicao
# /devops/assets/app.js resolve para /usr/share/nginx/html/assets/app.js.
#
# O try_files cai para /devops/index.html (roteamento client-side da SPA).
# `location = /devops` redireciona para /devops/ (garante a barra final).
# `location = /healthz` responde 200 'ok' para readiness/liveness probes.
# =============================================================================

# (E4, Forja 4.1) MODO EMBED (?embed=1): o Product Studio (/reqs) embute o editor de
# conteudo via iframe same-origin (/devops/?embed=1#conteudo?projeto=<key>). O
# middleware secure-headers do Traefik poe X-Frame-Options: DENY em TODA resposta do
# Console — o que bloquearia o iframe. CSP3 OBSOLETA o XFO no browser: respondendo
# `Content-Security-Policy: frame-ancestors 'self'`, o DENY do Traefik e ignorado e o
# framing continua restrito a MESMA origem (anti-clickjacking preservado — padrao
# provado no E0/preview da Forja). ESCOPO por QUERY STRING via map: o header SO sai
# quando a requisicao pede ?embed=1 (o documento do embed); o Console "normal"
# (sem ?embed=1) continua NAO-emolduravel (XFO DENY da borda intacto). Os assets
# (/devops/assets/) nao carregam a query e nao precisam do header (frame-ancestors
# so tem efeito em documentos). ADR: docs/decisions/0004-cms-embed-no-studio.md.
# add_header com valor VAZIO nao emite o header (comportamento documentado do nginx).
map $arg_embed $embed_frame_csp {
    "1"     "frame-ancestors 'self'";
    default "";
}

server {
    listen       80;
    server_name  _;

    # Logs no stdout/stderr do container (padrao em imagens nginx:alpine).
    access_log   /var/log/nginx/access.log;
    error_log    /var/log/nginx/error.log warn;

    # Endpoint de health checado pelas probes do Kubernetes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Sem a barra final, redireciona para o subpath canonico (preservando a query
    # string — ex.: /devops?embed=1 continua embed depois do redirect).
    location = /devops {
        return 301 /devops/$is_args$args;
    }

    # Assets versionados (hash no nome) com cache agressivo.
    # IMPORTANTE: PREFIXO + alias ESTATICO (sem variavel de regex). Com um alias
    # contendo a captura $1 de uma regex, o nginx perde o mime por extensao e
    # serve tudo como application/octet-stream (default_type) -> o
    # <script type=module> e recusado pelo navegador (pagina em branco). Com o
    # prefixo /devops/assets/ apontando para o alias fixo, o mime.types e
    # aplicado corretamente (text/css, application/javascript). O prefixo mais
    # especifico tem precedencia sobre /devops/ (longest-prefix match).
    location /devops/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA servida sob /devops/. O alias mapeia /devops/<x> -> /usr/share/nginx/html/<x>.
    # O try_files tenta o arquivo/diretorio pedido e, se nao existir, devolve o
    # index.html da SPA (roteamento client-side).
    location /devops/ {
        alias /usr/share/nginx/html/;
        # NOTA (E4): o fallback do try_files descarta a query string, entao uma rota
        # de PATH inexistente (ex.: /devops/rota?embed=1) cai no index.html SEM a flag
        # do embed (sem o header frame-ancestors). Aceito: a SPA navega por hash/estado
        # (nao ha rotas por path) e o embed usa sempre /devops/?embed=1. NAO anexar
        # $is_args$args aqui: variavel no fallback + alias quebra o redirect interno
        # (bug conhecido do nginx — foi testado e o fallback virou 404).
        try_files $uri $uri/ /devops/index.html;
        # index.html SEMPRE revalidado (sem cache do documento) — os assets sao
        # versionados por hash (cache 1y immutable na location acima). Sem isto, o
        # navegador cacheia o index.html velho e aponta pro bundle ANTIGO (ex.: sem a
        # casca da plataforma). `expires` preserva os headers herdados do server.
        expires epoch;
        # (E4) frame-ancestors 'self' APENAS quando ?embed=1 (ver o map no topo);
        # valor vazio (caso default) = header ausente, Console normal inalterado.
        add_header Content-Security-Policy $embed_frame_csp always;
    }

    # Raiz: conveniencia para quem acessa o container diretamente (sem Traefik).
    # Em producao o acesso real e sempre via /devops/ atraves do Ingress.
    location = / {
        return 301 /devops/;
    }
}
