# =============================================================================
# auto-merge-validated — fecha a esteira: PR da Claude -> validacao -> merge -> deploy.
# -----------------------------------------------------------------------------
# Auto-merge de PRs gerados pela esteira (label claude-generated) SOMENTE quando:
#   (1) o PR tem o label `gpt-approved` (aplicado pelo loop de validacao no ChatGPT,
#       via browser: posta-se o PR/diff no GPT -> aprovacao -> `gh pr edit --add-label
#       gpt-approved`. O ChatGPT com conector NAO tem API p/ o CI chamar, por isso a
#       validacao e por LABEL, fiel ao loop que usamos); E
#   (1b) ANTI-SPOOFING: quem APLICOU o label e um aprovador confiavel (default: dono do
#       repo; ampliavel via var TRUSTED_APPROVERS) — label nao e aprovacao criptografica; E
#   (1c) GUARD de merge: o diff do PR passa no guard-worktree (allowed_paths/denylist) —
#       barreira tecnica que vale ate para PR feito a mao com os labels certos; E
#   (2) todos os checks obrigatorios estao verdes e o PR e mergeable e nao-rascunho.
# Apos o merge, o Argo (auto-sync) / pipeline do app deploya; o reconciliador marca
# o requisito como `merged` em implementation-status.json (best-effort).
# =============================================================================
name: auto-merge-validated

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  pull_request_target:
    types: [closed]
  check_suite:
    types: [completed]
  status: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge (gpt-approved + CI verde)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Mesclar PRs validados
        env:
          GH_TOKEN: ${{ secrets.FORGE_GH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # Aprovadores confiaveis do label gpt-approved (default: dono do repo). Pode
          # ser ampliado via variavel de repo TRUSTED_APPROVERS (logins separados por espaco).
          TRUSTED_APPROVERS: ${{ vars.TRUSTED_APPROVERS }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          trusted="${TRUSTED_APPROVERS:-$OWNER}"
          echo "Aprovadores confiaveis: $trusted"
          # PRs abertos com AMBOS os labels.
          nums=$(gh pr list --repo "$REPO" --state open --label gpt-approved --label claude-generated --json number --jq '.[].number')
          for n in $nums; do
            info=$(gh pr view "$n" --repo "$REPO" --json mergeable,isDraft,statusCheckRollup,headRefName,body)
            draft=$(echo "$info" | jq -r '.isDraft')
            mergeable=$(echo "$info" | jq -r '.mergeable')
            # IMPORTANTE: exclui o PROPRIO check deste workflow das contagens. Quando este job
            # roda por evento `pull_request` (ex.: label aplicada depois do CI ja assentar), ele
            # aparece no statusCheckRollup do PR como CheckRun IN_PROGRESS (conclusion=null) e se
            # contaria como "pendente" -> deadlock auto-referencial (nunca mescla). Filtrar pelo
            # nome do job resolve sem afrouxar nenhuma barreira (os checks reais seguem exigidos).
            SELF="Auto-merge (gpt-approved + CI verde)"
            failed=$(echo "$info" | jq -r --arg self "$SELF" '[.statusCheckRollup[]? | select(((.name // .context) // "") != $self) | ((.conclusion // .state) // "") | select(. == "FAILURE" or . == "ERROR" or . == "CANCELLED" or . == "TIMED_OUT")] | length')
            pending=$(echo "$info" | jq -r --arg self "$SELF" '[.statusCheckRollup[]? | select(((.name // .context) // "") != $self) | ((.conclusion // .state) // "PENDING") | select(. == "PENDING" or . == "EXPECTED" or . == "")] | length')
            if [ "$draft" = "true" ]; then echo "PR #$n: rascunho — skip"; continue; fi
            if [ "$failed" != "0" ]; then echo "PR #$n: $failed check(s) falho(s) — skip"; continue; fi
            if [ "$pending" != "0" ]; then echo "PR #$n: $pending check(s) pendente(s) — aguarda proximo evento"; continue; fi
            if [ "$mergeable" != "MERGEABLE" ]; then echo "PR #$n: mergeable=$mergeable — skip"; continue; fi

            # (1) ANTI-SPOOFING: quem aplicou o label gpt-approved precisa ser confiavel.
            approver=$(gh api "repos/$REPO/issues/$n/events" --paginate \
              --jq '[.[] | select(.event=="labeled" and .label.name=="gpt-approved")] | last | (.actor.login // "")')
            case " $trusted " in
              *" $approver "*) echo "PR #$n: gpt-approved por '$approver' (confiavel)";;
              *) echo "PR #$n: gpt-approved aplicado por '$approver' (NAO confiavel) — skip"; continue;;
            esac

            # (2) GUARD do diff do PR vs allowed_paths/denylist (barreira de merge, defesa
            # em profundidade — vale ate para PR feito a mao com os labels certos).
            reqid=$(echo "$info" | jq -r '.body' | sed -n 's/.*Closes-Req:[[:space:]]*\(REQ-[A-Z0-9-]*\).*/\1/p' | head -1)
            if [ -z "$reqid" ]; then
              reqid=$(echo "$info" | jq -r '.headRefName' | sed -n 's#req/\(REQ-[A-Z0-9-]*\)/.*#\1#p' | head -1)
            fi
            if [ -z "$reqid" ]; then echo "PR #$n: sem REQ-ID (Closes-Req/branch) — skip"; continue; fi
            if ! node specs/tools/make-work-order.mjs "$reqid" --out wo.json >/dev/null 2>&1; then
              echo "PR #$n: REQ $reqid sem ordem de trabalho (ausente na baseline?) — skip"; continue
            fi
            gh pr view "$n" --repo "$REPO" --json files --jq '.files[].path' > changed.txt
            if ! node specs/tools/guard-worktree.mjs --work-order wo.json --changed-file changed.txt; then
              echo "PR #$n: guard-worktree REPROVOU o diff (fora do blast-radius) — skip"
              gh pr comment "$n" --repo "$REPO" --body "⛔ Auto-merge bloqueado: \`guard-worktree\` detectou arquivo fora de \`allowed_paths\`/denylist para $reqid. Revise manualmente." || true
              continue
            fi

            echo "PR #$n: validado (gpt-approved confiavel + CI verde + guard OK) — MERGE"
            gh pr merge "$n" --repo "$REPO" --squash --delete-branch
          done

  # ---------------------------------------------------------------------------
  # CAMINHO AUTONOMO DA FORJA (opt-in): mescla PRs de implementacao de produtos
  # gerados pela Forja em modo release SEM o gpt-approved humano — porem SO quando a
  # variavel de repo FORGE_AUTONOMOUS=true (duplo gate: var + marcador autonomous.json
  # versionado). As barreiras TECNICAS continuam: CI verde + guard-worktree (blast-radius)
  # + mergeable. Job ADITIVO — nao toca no caminho gpt-approved acima.
  # ---------------------------------------------------------------------------
  forge-autonomous-merge:
    name: Auto-merge autonomo (Forja — FORGE_AUTONOMOUS)
    if: github.event.action != 'closed' && vars.FORGE_AUTONOMOUS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Mesclar PRs autonomos da Forja (sem gpt-approved; mantem CI+guard)
        env:
          GH_TOKEN: ${{ secrets.FORGE_GH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Candidatos: PRs da esteira (claude-generated) SEM gpt-approved.
          nums=$(gh pr list --repo "$REPO" --state open --label claude-generated --json number,labels --jq '.[] | select([.labels[].name] | index("gpt-approved") | not) | .number')
          for n in $nums; do
            info=$(gh pr view "$n" --repo "$REPO" --json mergeable,isDraft,statusCheckRollup,headRefName,body)
            draft=$(echo "$info" | jq -r '.isDraft')
            mergeable=$(echo "$info" | jq -r '.mergeable')
            # mergeable e computado async pelo GitHub — se UNKNOWN, aguarda resolver (evita skip
            # prematuro que deixava o PR parado ate o proximo evento / toque manual de label).
            for k in 1 2 3 4 5 6; do
              [ "$mergeable" = "MERGEABLE" ] && break
              [ "$mergeable" = "CONFLICTING" ] && break
              sleep 5
              mergeable=$(gh pr view "$n" --repo "$REPO" --json mergeable --jq '.mergeable')
            done
            SELF="Auto-merge autonomo (Forja — FORGE_AUTONOMOUS)"
            failed=$(echo "$info" | jq -r --arg self "$SELF" '[.statusCheckRollup[]? | select(((.name // .context) // "") != $self) | ((.conclusion // .state) // "") | select(. == "FAILURE" or . == "ERROR" or . == "CANCELLED" or . == "TIMED_OUT")] | length')
            pending=$(echo "$info" | jq -r --arg self "$SELF" '[.statusCheckRollup[]? | select(((.name // .context) // "") != $self) | ((.conclusion // .state) // "PENDING") | select(. == "PENDING" or . == "EXPECTED" or . == "")] | length')
            if [ "$draft" = "true" ]; then echo "PR #$n: rascunho - skip"; continue; fi
            if [ "$failed" != "0" ]; then echo "PR #$n: $failed check(s) falho(s) - skip"; continue; fi
            if [ "$pending" != "0" ]; then echo "PR #$n: $pending check(s) pendente(s) - aguarda"; continue; fi
            if [ "$mergeable" != "MERGEABLE" ]; then echo "PR #$n: mergeable=$mergeable - skip"; continue; fi
            # REQ-ID -> produto -> marcado como autonomo da Forja?
            reqid=$(echo "$info" | jq -r '.body' | sed -n 's/.*Closes-Req:[[:space:]]*\(REQ-[A-Z0-9-]*\).*/\1/p' | head -1)
            if [ -z "$reqid" ]; then reqid=$(echo "$info" | jq -r '.headRefName' | sed -n 's#req/\(REQ-[A-Z0-9-]*\)/.*#\1#p' | head -1); fi
            if [ -z "$reqid" ]; then echo "PR #$n: sem REQ-ID - skip"; continue; fi
            product=""
            for d in specs/requirements/*/; do if [ -f "${d}${reqid}.yaml" ]; then product=$(basename "$d"); break; fi; done
            if [ -z "$product" ] || [ ! -f "specs/products/$product/autonomous.json" ]; then
              echo "PR #$n: REQ $reqid nao pertence a produto autonomo da Forja - skip"; continue; fi
            # GUARD do diff (mesma barreira tecnica do caminho normal — defesa em profundidade).
            if ! node specs/tools/make-work-order.mjs "$reqid" --out wo.json >/dev/null 2>&1; then
              echo "PR #$n: REQ $reqid sem ordem de trabalho - skip"; continue; fi
            gh pr view "$n" --repo "$REPO" --json files --jq '.files[].path' > changed.txt
            if ! node specs/tools/guard-worktree.mjs --work-order wo.json --changed-file changed.txt; then
              echo "PR #$n: guard-worktree REPROVOU (fora do blast-radius) - skip"
              gh pr comment "$n" --repo "$REPO" --body "Auto-merge autonomo bloqueado: guard-worktree detectou arquivo fora do blast-radius para $reqid." || true
              continue; fi
            echo "PR #$n: AUTONOMO ($product) - CI verde + guard OK - MERGE (sem gpt-approved, via FORGE_AUTONOMOUS)"
            gh pr merge "$n" --repo "$REPO" --squash --delete-branch
            # redeploy: builda :local + republica o produto (self-hosted) p/ a feature subir.
            gh workflow run forge-deploy.yml --repo "$REPO" -f product="$product" || true
          done

  reconcile-merged:
    name: Reconciliar status (merged)
    if: github.event.action == 'closed' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'claude-generated')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.FORGE_GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Marcar merged + encadear o próximo req (serial)
        env:
          BODY: ${{ github.event.pull_request.body }}
          PRNUM: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
          GH_TOKEN: ${{ secrets.FORGE_GH_PAT || secrets.GITHUB_TOKEN }}
          AUTONOMOUS: ${{ vars.FORGE_AUTONOMOUS }}
        run: |
          set -euo pipefail
          # Extrai REQ-IDs do trailer "Closes-Req: REQ-..." (um ou mais).
          ids=$(printf '%s\n' "$BODY" | sed -n 's/.*Closes-Req:[[:space:]]*\(REQ-[A-Z0-9-]*\).*/\1/p' | sort -u)
          if [ -z "$ids" ]; then echo "Sem trailer Closes-Req — nada a reconciliar."; exit 0; fi
          changed=0; prod=""
          for id in $ids; do
            node specs/tools/impl-status.mjs --set "$id" status=merged pr="https://github.com/${{ github.repository }}/pull/${PRNUM}" commit="${SHA}" >/dev/null && changed=1
            echo "  $id -> merged"
            if [ -z "$prod" ]; then for d in specs/requirements/*/; do [ -f "${d}${id}.yaml" ] && prod=$(basename "$d") && break; done; fi
          done
          node specs/tools/impl-status.mjs --check || true
          if [ "$changed" = "1" ] && ! git diff --quiet -- specs/baseline/implementation-status.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add specs/baseline/implementation-status.json
            git commit -m "chore(specs): status merged via PR #${PRNUM} [skip ci]"
            git push origin main || echo "::warning::push do status falhou (proteção de branch?)."
          fi
          # ENCADEAMENTO SERIAL: se o produto é AUTÔNOMO da Forja, dispara o PRÓXIMO requisito (1 por vez).
          # Evita PRs paralelos que CONFLITAM (todos editam db.js/server.js do mesmo app) — cada req é
          # implementado sobre a main JÁ com o anterior mesclado.
          if [ -n "$prod" ] && [ "${AUTONOMOUS:-}" = "true" ] && [ -f "specs/products/$prod/autonomous.json" ]; then
            echo "encadeando: próximo requisito de '$prod' (serial, max 1)…"
            gh workflow run greenfield-orchestrate.yml -f product="$prod" -f max=1 || echo "::warning::re-dispatch do orchestrate falhou."
          fi
