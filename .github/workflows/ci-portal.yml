# =============================================================================
# ci-portal — gate de qualidade do Portal NovaIT (portal/frontend)
# -----------------------------------------------------------------------------
# Roda em PR e push para main quando muda portal/**. Jobs:
#   - quality: prettier --check, eslint, testes (node:test, zero infra).
#   - docker:  smoke build da imagem (valida Dockerfile + presença dos assets).
#   - manifests: kubeconform nos manifests k8s do portal (CRDs ignorados).
#   - build-push: SÓ em push p/ main e após quality+docker — publica a imagem
#     imutável no GHCR (ghcr.io/flavioneto11/portal/frontend:<sha>) via workflow
#     reutilizável. Dá artefato imutável por commit (histórico + rollback).
# Falhas reais quebram o pipeline. Runner: ubuntu-latest (igual aos demais).
# =============================================================================
name: ci-portal

# Forca as JS actions (docker/*, pnpm/*, etc.) a rodarem em Node 24, eliminando
# os avisos de deprecacao do Node 20 antes da troca forcada (~jun/2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "portal/**"
      - ".github/workflows/ci-portal.yml"
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/ci-portal.yml"

permissions:
  contents: read

jobs:
  quality:
    name: lint • format • test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portal/frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Prettier (format:check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Testes (node:test)
        run: npm test

  docker:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build da imagem do portal
        run: docker build -t portal-frontend:ci ./portal/frontend

  manifests:
    name: kubeconform (portal/k8s)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar kubeconform
        run: |
          set -euo pipefail
          VER=v0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${VER}/kubeconform-linux-amd64.tar.gz" | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validar manifests do portal
        run: |
          set -euo pipefail
          kubeconform -ignore-missing-schemas -summary portal/k8s/portal.yaml

  # Tree-sha do CONTEÚDO de portal/frontend — a MESMA tag que o publish-portal.ps1
  # fixa no manifest. Determinístico: igual aqui e no release local. Assim o GHCR
  # publica exatamente a imagem que o manifest pina (pré-requisito do GHCR-pull).
  treesha:
    name: tree-sha do conteúdo (portal/frontend)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - id: t
        run: echo "tag=$(git rev-parse HEAD:portal/frontend | cut -c1-12)" >> "$GITHUB_OUTPUT"

  # Publica a imagem no GHCR só quando o gate passa em push para main. A tag
  # principal é o tree-sha (alinhada ao manifest); o sha do commit fica como extra.
  build-push:
    name: build & push GHCR (tree-sha do conteúdo)
    needs: [quality, docker, treesha]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-push.yaml
    with:
      app: portal
      service: frontend
      context: portal/frontend
      dockerfile: portal/frontend/Dockerfile
      tag: ${{ needs.treesha.outputs.tag }}
