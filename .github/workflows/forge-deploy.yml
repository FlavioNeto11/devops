# =============================================================================
# forge-deploy — last-mile do lab p/ um produto da Forja: builda as imagens :local
# (no runner self-hosted = a máquina do cluster), garante o Secret <prod>-db (Postgres),
# e religa os Deployments para o Argo/k8s publicar. Idempotente:
#   - o Secret só é criado se faltar (não rotaciona a senha do PVC já inicializado);
#   - imagens :local + IfNotPresent => rebuild + rollout restart pega a nova imagem.
# Disparado pela cadeia autônoma (greenfield-launch após o scaffold; e por
# forge-autonomous-merge após mesclar PRs de implementação, p/ as features subirem).
# =============================================================================
name: forge-deploy

on:
  workflow_dispatch:
    inputs:
      product:
        description: "Produto da Forja (slug) — apps/<product> já na main"
        type: string
        required: true

permissions:
  contents: write   # marca os requisitos MERGED como 'deployed' após o rollout (commit best-effort na main)

jobs:
  deploy:
    name: Build :local + deploy (lab)
    runs-on: [self-hosted, windows, docker-desktop, local-k8s, flavio-devops]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1
      - name: Build imagens :local + secret + rollout
        env:
          KUBECONFIG: C:\ProgramData\forge-kube\config   # runner-serviço (NETWORK SERVICE) usa este kubeconfig
        run: |
          $ErrorActionPreference = "Stop"
          $prod = "${{ github.event.inputs.product }}"
          if ($prod -notmatch '^[a-z][a-z0-9-]{1,30}$') { Write-Host "::error::product inválido: '$prod'"; exit 1 }

          # 0) preflight: o runner-serviço precisa de acesso ao Docker p/ buildar imagens :local.
          docker info *> $null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Runner sem acesso ao Docker daemon. Adicione o usuário do serviço do runner ao grupo 'docker-users' (Windows) e reinicie o runner, OU rode o deploy localmente: scripts/forge-deploy-local.ps1 -Name $prod"
            exit 1
          }
          Write-Host "preflight Docker OK."

          $appDir = Join-Path $env:GITHUB_WORKSPACE "apps/$prod"
          if (-not (Test-Path $appDir)) { Write-Host "::error::apps/$prod não existe na main"; exit 1 }

          # 1) imagens :local — uma por serviço com Dockerfile (context = a pasta do serviço).
          $svcDirs = Get-ChildItem -Path $appDir -Directory | Where-Object { Test-Path (Join-Path $_.FullName 'Dockerfile') }
          foreach ($d in $svcDirs) {
            $svc = $d.Name
            $tag = "${prod}-${svc}:local"
            Write-Host "== docker build $tag =="
            docker build -t $tag $d.FullName
            if ($LASTEXITCODE -ne 0) { Write-Host "::error::build de ${prod}-${svc} falhou"; exit 1 }
          }

          # 2) Secret <prod>-db (só se o app tiver Postgres E o secret faltar — não rotaciona senha do PVC).
          $needsDb = Select-String -Path (Join-Path $appDir 'k8s/*.yaml') -Pattern "$prod-postgres" -Quiet
          if ($needsDb) {
            $exists = (kubectl -n apps get secret "$prod-db" --ignore-not-found -o name 2>$null)
            if (-not $exists) {
              $pw = -join ((48..57)+(97..122) | Get-Random -Count 24 | ForEach-Object {[char]$_})
              $durl = "postgresql://$prod`:$pw@$prod-postgres:5432/$prod"
              kubectl -n apps create secret generic "$prod-db" --from-literal=POSTGRES_USER=$prod --from-literal=POSTGRES_PASSWORD=$pw --from-literal=POSTGRES_DB=$prod --from-literal=DATABASE_URL=$durl
              Write-Host "secret $prod-db criado."
            } else { Write-Host "secret $prod-db já existe — mantido." }
          }

          # 2b) Secret <prod>-ai com ANTHROPIC_API_KEY (RUNTIME do assistente do app). O assistente é
          #     fail-closed: sem a chave responde 503 (era por isso que "o assistente nunca funciona"
          #     quando deployado — o secret nunca era criado). A chave vem do AMBIENTE do runner (o dono
          #     a fornece — NUNCA commitamos segredo). Idempotente; só (re)aplica se a env existir.
          if ($env:ANTHROPIC_API_KEY) {
            kubectl -n apps create secret generic "$prod-ai" --from-literal=ANTHROPIC_API_KEY="$env:ANTHROPIC_API_KEY" --dry-run=client -o yaml | kubectl apply -f - | Out-Null
            Write-Host "secret $prod-ai aplicado (assistente IA com chave de runtime)."
          } else {
            Write-Host "::warning::ANTHROPIC_API_KEY ausente no runner — o assistente de $prod responderá 503. Defina a env no runner p/ ativar (o smoke abaixo vai sinalizar)."
          }

          # 2c) Secret <prod>-auth (bloco contas-acesso): JWT_SECRET aleatório + admin de bootstrap aleatório.
          #     Só se o app tiver auth própria (gera apps/<prod>/api/src/auth.js) E o secret faltar — NÃO
          #     rotaciona (rotacionar invalidaria todas as sessões + trocaria a senha do admin já criado).
          #     NUNCA logamos os valores: o admin é recuperável via `kubectl get secret <prod>-auth`.
          $hasAuth = Test-Path (Join-Path $appDir 'api/src/auth.js')
          if ($hasAuth) {
            $authExists = (kubectl -n apps get secret "$prod-auth" --ignore-not-found -o name 2>$null)
            if (-not $authExists) {
              $jwt = -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 48 | ForEach-Object {[char]$_})
              $adminPw = -join ((48..57)+(65..90)+(97..122) | Get-Random -Count 24 | ForEach-Object {[char]$_})
              $adminEmail = "admin@$prod.local"
              kubectl -n apps create secret generic "$prod-auth" --from-literal=JWT_SECRET=$jwt --from-literal=BOOTSTRAP_ADMIN_EMAIL=$adminEmail --from-literal=BOOTSTRAP_ADMIN_PASSWORD=$adminPw | Out-Null
              Write-Host "secret $prod-auth criado (JWT + admin de bootstrap)."
              Write-Host "::notice::admin de bootstrap de $prod no Secret $prod-auth (email: $adminEmail). Recupere a senha com: kubectl -n apps get secret $prod-auth -o jsonpath='{.data.BOOTSTRAP_ADMIN_PASSWORD}' | base64 -d"
            } else { Write-Host "secret $prod-auth já existe — mantido (não rotaciona JWT/admin)." }
          }

          # 3) aplica os manifests (caso o Argo ainda não tenha) + religa p/ pegar a :local nova.
          kubectl apply -f (Join-Path $appDir 'k8s') 2>$null
          kubectl -n apps rollout restart deployment -l app.kubernetes.io/part-of=$prod
          kubectl -n apps rollout status deployment -l app.kubernetes.io/part-of=$prod --timeout=180s

          # 3b) marca 'deployed' os requisitos MERGED deste produto — o rollout subiu a imagem com o
          #     código deles. Sem isto a esteira parava em 'merged' e o app NO AR aparecia "0 no ar"
          #     na Forge (no ar = deployed+done). Best-effort: se o push falhar, o passo 4 ainda
          #     propaga o estado local pro ConfigMap (Forge reflete a verdade até o próximo rebuild).
          $pidu = ($prod -replace '[^a-zA-Z0-9]', '').ToUpper()
          $st = Get-Content "specs/baseline/implementation-status.json" -Raw | ConvertFrom-Json
          $merged = @($st.items.PSObject.Properties | Where-Object { $_.Name -match "^REQ-$pidu-" -and $_.Value.status -eq 'merged' } | ForEach-Object { $_.Name })
          if ($merged.Count -gt 0) {
            foreach ($id in $merged) { node specs/tools/impl-status.mjs --set $id status=deployed | Out-Null; Write-Host "  $id -> deployed" }
            git config user.name "forge-bot"; git config user.email "forge-bot@users.noreply.github.com"
            git add specs/baseline/implementation-status.json
            git commit -m "chore(specs): status deployed ($prod) [skip ci]" | Out-Null
            git pull --rebase origin main 2>$null
            git push origin main 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "::warning::push do status deployed falhou (proteção de branch?) — ConfigMap ainda será atualizado." }
          }

          # 4) ressincroniza o estado VIVO da Forja (ConfigMap) a partir da baseline ATUAL — a tela Build
          #    reflete o progresso real (reqs mesclados) sem reassar a imagem. (reconcile commita o
          #    impl-status no git; aqui, self-hosted, propagamos pro cluster.)
          git pull --rebase origin main 2>$null
          & ./scripts/sync-reqhub-forge-state.ps1

          # 5) SMOKE pós-deploy — prova que as rotas RESPONDEM (não confia só no readiness probe). Via
          #    port-forward porque o ingress tem gate OIDC (-> 401). Crítico (/health) falha = ::error::;
          #    o assistente é reportado explicitamente (nunca "ok" falso quando está 503).
          $hasApi = (kubectl -n apps get svc "$prod-api" --ignore-not-found -o name 2>$null)
          if ($hasApi) {
            $job = Start-Job {
              $env:Path = [Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [Environment]::GetEnvironmentVariable('Path','User')
              $env:KUBECONFIG = $using:env:KUBECONFIG
              kubectl port-forward -n apps "svc/$using:prod-api" 18090:8080
            }
            Start-Sleep -Seconds 6
            try { $h = (Invoke-WebRequest "http://localhost:18090/health" -TimeoutSec 8 -SkipHttpStatusCheck).StatusCode } catch { $h = -1 }
            if ($h -ne 200) { Write-Host "::error::smoke ${prod}: /health = $h (esperado 200) — deploy com problema." }
            else { Write-Host "smoke ${prod}: /health OK (200)." }
            try { $a = (Invoke-WebRequest "http://localhost:18090/v1/assistant/health" -TimeoutSec 8 -SkipHttpStatusCheck).StatusCode } catch { $a = -1 }
            if ($a -eq 200) { Write-Host "smoke ${prod}: assistente OK (200)." }
            elseif ($a -eq 404) { Write-Host "smoke ${prod}: app sem assistente (404) — ok se não tem o bloco IA." }
            else { Write-Host "::warning::smoke ${prod}: /v1/assistant/health = $a — assistente provavelmente sem ANTHROPIC_API_KEY (503)." }
            Stop-Job $job -EA SilentlyContinue; Remove-Job $job -EA SilentlyContinue
          }
          Write-Host "::notice::forge-deploy: $prod buildado + publicado + Forge atualizada + smoke. Acesse /$prod."
