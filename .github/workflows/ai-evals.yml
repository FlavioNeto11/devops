# =============================================================================
# ai-evals — gate de regressão da PLATAFORMA DE IA (F5 da re-engenharia)
# -----------------------------------------------------------------------------
# Protege o que as fases F0-F3 entregaram: PR que regride os evals de IA é
# BLOQUEADO. Roda em PR/push quando muda superfície de IA, e à noite (full).
#
# Jobs determinísticos (SEM rede/LLM — sempre bloqueantes):
#   - ai-core: 28 testes do @flavioneto11/ai-core (tools/graph/rag/memory/eval).
#   - gymops-evals: golden set em modo mock (harness/assertions) e --graph
#     (grafo REAL + LLM simulado: roteamento fast/deep, escolha de tool,
#     ancoragem), ambos com --enforce-kpis (tool_call_accuracy >= meta).
#   - sicat-catalog: valida os 466 cenários do catálogo de intents (estrutura/
#     categorias/dedupe) — script dependency-free.
#
# Job noturno (LLM real, gpt-5-nano + amostra): roda só no schedule/dispatch e
# quando OPENAI_API_KEY estiver configurada como secret do repo.
#
# Forja 4.0 — B4 (MLOps da esteira):
#   - forge-evals: eval DETERMINÍSTICO dos geradores da Forja (golden briefs em
#     specs/forge/evals/golden/) — bloqueante em PR que toca specs/forge/** ou
#     apps/reqhub/api/src/prompts.js. Sem LLM.
#   - forge-budget: nightly no runner self-hosted — consulta o Prometheus da
#     plataforma (ai_cost_usd_total por app) e compara com specs/forge/budgets.json;
#     estouro cria/atualiza ISSUE (nunca derruba app); sem métrica => warning honesto.
# =============================================================================
name: ai-evals

# Forca as JS actions (docker/*, pnpm/*, etc.) a rodarem em Node 24, eliminando
# os avisos de deprecacao do Node 20 antes da troca forcada (~jun/2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/ai-core/**"
      - "packages/ai-kit/**"
      - "apps/gymops/apps/api/src/ai/**"
      - "apps/gymops/apps/api/scripts/ai-eval.mjs"
      - "apps/gymops/docs/ai-eval/**"
      - "apps/gymops/vendor/**"
      - "apps/sicat/backend/src/services/conversation/**"
      - "apps/sicat/backend/src/services/ai-control/**"
      - "apps/sicat/backend/docs/ai-chat/**"
      - "apps/sicat/backend/vendor/**"
      - "docs/portal-contracts/**"
      - "apps/sicat/backend/docs/portal-contracts/**"
      - "scripts/portal-contracts/**"
      - "specs/forge/**"
      - "apps/reqhub/api/src/prompts.js"
      - ".github/workflows/ai-evals.yml"
  push:
    branches: [main]
    paths:
      - "packages/ai-core/**"
      - "packages/ai-kit/**"
      - "apps/gymops/apps/api/src/ai/**"
      - "apps/gymops/docs/ai-eval/**"
      - "apps/sicat/backend/docs/ai-chat/**"
      - "docs/portal-contracts/**"
      - "apps/sicat/backend/docs/portal-contracts/**"
      - "scripts/portal-contracts/**"
      - "specs/forge/**"
      - "apps/reqhub/api/src/prompts.js"
      - ".github/workflows/ai-evals.yml"
  schedule:
    - cron: "0 3 * * *"   # nightly: full set + amostra com LLM real (se houver chave)

permissions:
  contents: read

jobs:
  ai-core:
    name: ai-core (testes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-core
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Instalar (ai-kit local via file:)
        run: npm install
      - name: Testes (tools/graph/rag/memory/eval)
        run: npm test

  gymops-evals:
    name: gymops (golden set mock + graph)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gymops
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Eval mock (harness + assertions)
        working-directory: apps/gymops/apps/api
        run: node scripts/ai-eval.mjs --enforce-kpis
      - name: Eval do grafo (roteamento + tools + ancoragem)
        working-directory: apps/gymops/apps/api
        run: node scripts/ai-eval.mjs --graph --enforce-kpis

  sicat-catalog:
    name: sicat (catalogo de intents)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sicat/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      # script dependency-free (node:fs/path) — sem npm ci
      - name: Validar catalogo (466 cenarios)
        run: node scripts/ai-smoke/validate-sicat-chat-catalog.mjs

  portal-contracts:
    name: portal-contracts (validador + comparador)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      # scripts dependency-free (node:fs/path/crypto) — sem npm ci
      - name: Testes puros do diff
        run: node --test scripts/portal-contracts/lib/contract-diff.test.mjs
      - name: Validar contratos de portal (sempre bloqueia)
        run: node scripts/portal-contracts/validate-portal-contract.mjs
      - name: Comparar SICAT x contrato CETESB (bloqueia so em critical)
        run: node scripts/portal-contracts/compare-sicat-cetesb.mjs --no-write --fail-on critical
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: portal-drift-report
          path: artifacts/portal-contracts/

  # Forja 4.0 — B4: eval DETERMINÍSTICO dos geradores da Forja (sem LLM, bloqueante).
  # Golden briefs sintéticos em specs/forge/evals/golden/*.json são passados pelos MESMOS
  # geradores do greenfield-launch (forge-write-reqs + apply-capabilities) num tmpdir e a
  # ESTRUTURA emitida é validada (YAML schema-válido via requirement.schema.json, product
  # files, resolução de blocos, manifesto + provenance). Também roda os testes unitários de
  # specs/forge/*.test.mjs (que antes não rodavam em nenhum workflow).
  forge-evals:
    name: forja (golden briefs determinísticos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Instalar deps de validação (specs/tools — yaml + ajv)
        working-directory: specs/tools
        run: npm ci --no-audit --no-fund
      - name: Testes unitários dos geradores (specs/forge)
        run: node --test "specs/forge/**/*.test.mjs"
      - name: Eval determinístico (golden briefs, schema-válido, bloqueante)
        env:
          FORGE_EVALS_STRICT: "1"   # sem yaml/ajv aqui é ERRO (nunca gate silenciosamente fraco)
        run: node specs/forge/evals/run-evals.mjs
      # TODO(B4): eval NIGHTLY com LLM REAL dos prompts da Forja (forge-propose-requirements@N /
      # forge-propose-architecture@N de apps/reqhub/api/src/prompts.js). O padrão nightly deste
      # workflow (job nightly-real) usa o harness do gymops; a Forja ainda NÃO tem harness de LLM
      # próprio fora do reqhub-api — e mexer em apps/reqhub/** é outra trilha. Quando o harness
      # existir, seguir o padrão do nightly-real (só schedule/dispatch + skip sem OPENAI_API_KEY).

  nightly-real:
    name: nightly (LLM real, amostra)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gymops
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Eval com LLM real (gpt-5-nano, judge + amostra)
        working-directory: apps/gymops/apps/api
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY nao configurada como secret — pulando eval real (jobs deterministicos seguem bloqueantes)."
            exit 0
          fi
          node scripts/ai-eval.mjs --real --sample 8 --enforce-kpis

  # Forja 4.0 — B4: BUDGET nightly de custo de IA por app. Roda no runner self-hosted (o
  # Prometheus da plataforma só é alcançável da máquina do cluster, via port-forward — padrão
  # do forge-deploy). Compara ai_cost_usd_total{app} (janela 30d) com specs/forge/budgets.json:
  # estouro cria/atualiza uma ISSUE (label ai-budget) — NUNCA derruba app. Sem métrica por-app
  # ou Prometheus fora => o script degrada com ::warning:: honesto (exit 0).
  forge-budget:
    name: nightly (budget de IA por app)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, windows, docker-desktop, local-k8s, flavio-devops]
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write   # cria/atualiza a issue de alerta de budget
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
      - name: Consultar Prometheus + comparar com budgets.json
        id: budget
        env:
          KUBECONFIG: C:\ProgramData\forge-kube\config
        run: |
          $ErrorActionPreference = "Stop"
          # port-forward temporário p/ o Prometheus (mesmo padrão do smoke do forge-deploy).
          $pf = Start-Job {
            $env:Path = [Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [Environment]::GetEnvironmentVariable('Path','User')
            $env:KUBECONFIG = 'C:\ProgramData\forge-kube\config'
            kubectl port-forward -n observability svc/prometheus-operated 19090:9090
          }
          Start-Sleep -Seconds 6
          $env:PROMETHEUS_URL = "http://localhost:19090"
          node specs/forge/evals/check-budgets.mjs --out budget-report.md
          $rc = $LASTEXITCODE
          Stop-Job $pf -EA SilentlyContinue; Remove-Job $pf -EA SilentlyContinue
          if ($rc -ne 0) { exit $rc }
          if (Test-Path budget-report.md) { Get-Content budget-report.md -Raw | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append }
      - name: Issue de alerta (cria/atualiza no estouro; fecha na recuperação)
        if: steps.budget.outputs.degraded != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCEEDED: ${{ steps.budget.outputs.exceeded }}
        run: |
          $ErrorActionPreference = "Stop"
          $label = "ai-budget"
          gh label create $label --color d93f0b --description "Alerta de budget de IA (nightly forge-budget)" 2>$null
          $issue = gh issue list --label $label --state open --json number --jq '.[0].number' 2>$null
          if ("$env:EXCEEDED" -eq "true") {
            if ($issue) {
              gh issue edit $issue --body-file budget-report.md
              gh issue comment $issue --body "Atualizado pelo nightly forge-budget (run $env:GITHUB_RUN_ID)."
              Write-Host "issue #$issue atualizada com o relatório da noite."
            } else {
              gh issue create --title "Budget de IA estourado (nightly forge-budget)" --label $label --body-file budget-report.md
            }
          } elseif ($issue) {
            gh issue comment $issue --body "Budget voltou ao normal no nightly forge-budget (run $env:GITHUB_RUN_ID) — fechando."
            gh issue close $issue
          } else {
            Write-Host "dentro do budget e sem issue aberta — nada a fazer."
          }
