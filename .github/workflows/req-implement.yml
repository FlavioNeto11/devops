# =============================================================================
# req-implement — esteira "requisito -> Claude -> PR".
# -----------------------------------------------------------------------------
# Quando um requisito e criado/alterado em specs/requirements/** (push na main) ou
# por disparo manual (workflow_dispatch req_id), ACIONA a Claude (conta Claude Max do
# operador, headless NESTA maquina via runner self-hosted) para IMPLEMENTAR o codigo
# e abrir um PR rastreavel. NUNCA mexe na main nem no cluster — so abre PR (o merge e
# gate externo: branch protection + validacao no ChatGPT -> label gpt-approved ->
# auto-merge-validated.yml). Ver .claude/skills/implement-req e docs/decisions/0002.
#
# SEGURANCA (hardening pos-validacao): a Claude roda SEM --dangerously-skip-permissions
# (--permission-mode acceptEdits + --allowedTools restrito) e SO commita no branch; a
# esteira valida o diff com specs/tools/guard-worktree.mjs (barreira TECNICA de
# blast-radius: allowed_paths/denylist) ANTES de push/PR. Reprovou -> status=blocked,
# sem PR. Assim o blast-radius nao depende so do prompt da skill.
#
# 2 jobs desacoplados: `plan` (ubuntu, barato/deterministico: detecta REQs + gera a
# ordem de trabalho) e `implement` (self-hosted: roda `claude -p`). O token Claude Max
# (CLAUDE_CODE_OAUTH_TOKEN) vive SO no ambiente do runner (fora do GitHub cloud) — ver
# o plano/Inc.4. Se ausente, o job pula com aviso (nao falha).
# =============================================================================
name: req-implement

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      req_id:
        description: "REQ-ID a implementar (ex.: REQ-SICAT-0002). Vazio = nada."
        type: string
        required: true
  push:
    branches: [main]
    paths:
      - "specs/requirements/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  plan:
    name: Planejar (detectar REQs + ordem de trabalho)
    runs-on: ubuntu-latest
    outputs:
      reqs: ${{ steps.detect.outputs.reqs }}
      has_work: ${{ steps.detect.outputs.has_work }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Instalar deps de specs/tools
        working-directory: specs/tools
        run: npm ci --no-audit --no-fund
      - name: Validar baseline (drift)
        working-directory: specs/tools
        run: node build-baseline.mjs --check && node impl-status.mjs --check

      - name: Detectar REQs e gerar ordem de trabalho
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CANDS="${{ github.event.inputs.req_id }}"
          else
            BEFORE="${{ github.event.before }}"
            if ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then BEFORE=$(git rev-parse HEAD~1 || echo ""); fi
            CANDS=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- 'specs/requirements/**/*.yaml' 2>/dev/null \
              | sed -n 's#.*/\(REQ-[A-Z0-9-]*\)\.yaml#\1#p' | sort -u | tr '\n' ' ')
          fi
          echo "candidatos: $CANDS"
          # Idempotencia: so REQs com status not_started (ignora in_progress/pr_open/merged/deployed/done).
          KEEP=""
          for id in $CANDS; do
            # GREENFIELD: requisitos de um produto com specs/products/<scope>/product.json sao
            # dirigidos pelo greenfield-orchestrate (waves/ordem), NAO pelo push-trigger — assim
            # commitar os requisitos de um produto novo nao dispara N implementacoes fora de ordem
            # (e antes do scaffold). No workflow_dispatch (req_id explicito) este filtro NAO se aplica.
            if [ "${{ github.event_name }}" = "push" ]; then
              prod=$(node -e "const fs=require('fs');try{const b=JSON.parse(fs.readFileSync('./specs/baseline/current-baseline.json','utf8'));const r=(b.requirements||[]).find(x=>x.id===process.argv[1]);process.stdout.write((r&&r.scope&&r.scope.product_scope)||'')}catch(e){}" "$id")
              if [ -n "$prod" ] && [ -f "specs/products/$prod/product.json" ]; then echo "skip $id (produto greenfield '$prod' -> orquestrador)"; continue; fi
            fi
            # le o status do arquivo COMMITADO na main via fs+JSON.parse (sem require/cache; trusted)
            st=$(node -e "const fs=require('fs');try{const s=JSON.parse(fs.readFileSync('./specs/baseline/implementation-status.json','utf8'));process.stdout.write(((s.items||{})[process.argv[1]]||{}).status||'absent')}catch(e){process.stdout.write('absent')}" "$id")
            if [ "$st" = "not_started" ] || [ "$st" = "absent" ]; then KEEP="$KEEP $id"; fi
          done
          KEEP=$(echo "$KEEP" | xargs || true)
          if [ -z "$KEEP" ]; then
            echo "has_work=false" >> "$GITHUB_OUTPUT"; echo "reqs=" >> "$GITHUB_OUTPUT"
            echo "Nada a implementar (sem REQ novo/not_started)."; exit 0
          fi
          echo "a implementar: $KEEP"
          node specs/tools/make-work-order.mjs $KEEP --out work-order.json
          echo "has_work=true" >> "$GITHUB_OUTPUT"
          echo "reqs=$KEEP" >> "$GITHUB_OUTPUT"
      - name: Upload work-order
        if: steps.detect.outputs.has_work == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: work-order
          path: work-order.json

  implement:
    name: Implementar (Claude headless, self-hosted)
    needs: plan
    if: needs.plan.outputs.has_work == 'true'
    runs-on: [self-hosted, windows, docker-desktop, local-k8s, flavio-devops]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false   # a Claude roda SEM credencial git no worktree;
                                        # o token so e injetado no passo de push/PR (pos-guard).
      - uses: actions/download-artifact@v4
        with:
          name: work-order
      # PASSO 1 — Claude headless + guard, SEM nenhuma credencial git no ambiente.
      # NAO ha GH_TOKEN aqui e o checkout foi com persist-credentials:false -> mesmo
      # que a Claude execute codigo (ex.: `node arquivo.js`/`npm run`), NAO consegue
      # autenticar push/PR no remoto. So commita branches locais; o guard valida o
      # diff e a lista de aprovados (approved.json) segue para o passo de publicacao.
      - name: Acionar Claude + guard de blast-radius (sem credencial git)
        env:
          REQS: ${{ needs.plan.outputs.reqs }}
          RUN_ID: ${{ github.run_id }}
        run: |
          $ErrorActionPreference = "Stop"
          # CLAUDE_BIN_DIR (opcional, no .env do runner): diretorio do CLI 'claude' acessivel
          # a conta do runner. Necessario quando o runner roda como NETWORK SERVICE e o CLI
          # esta no npm global de outro usuario (fora do PATH/ACL do runner). Ver runbook.
          if ($env:CLAUDE_BIN_DIR -and (Test-Path $env:CLAUDE_BIN_DIR)) { $env:PATH = "$env:CLAUDE_BIN_DIR;$env:PATH" }
          if (-not $env:CLAUDE_CODE_OAUTH_TOKEN) {
            Write-Host "::warning::CLAUDE_CODE_OAUTH_TOKEN ausente no runner — esteira nao acionada. Configure com 'claude setup-token' (ver plano Inc.4)."
            exit 0
          }
          if (-not (Get-Command claude -ErrorAction SilentlyContinue)) {
            Write-Host "::warning::CLI 'claude' nao encontrada no runner — pulando."
            exit 0
          }
          # A ESTEIRA faz TODO o git (a Claude so edita): identidade p/ commit + ignore LOCAL
          # dos artefatos efemeros (p/ `git add -A` nao stage-a-los nem o guard ve-los).
          git config user.name "github-actions[bot]" 2>$null
          git config user.email "github-actions[bot]@users.noreply.github.com" 2>$null
          Set-Content -Encoding ascii .git/info/exclude "work-order.json`nchanged.txt`napproved.json"
          $approved = @()
          foreach ($id in ($env:REQS -split '\s+' | Where-Object { $_ })) {
            Write-Host "==> Implementando $id"
            git checkout main 2>$null; git reset --hard 2>$null
            node specs/tools/make-work-order.mjs $id --out work-order.json
            $wo         = Get-Content work-order.json -Raw
            $branch     = node -e "process.stdout.write(require('./work-order.json').orders[0].pr_template.head)"
            $restricted = node -e "process.stdout.write(String(require('./work-order.json').orders[0].restricted))"
            $title      = node -e "process.stdout.write(require('./work-order.json').orders[0].pr_template.title)"

            # A Claude APENAS edita arquivos + roda test/build — NENHUM git no allowlist (e sem
            # GH_TOKEN/credencial). A esteira cria branch, commita, valida com o guard e abre o PR.
            # Assim a Claude nao toca o repo git nem o remoto: blast-radius so pelos arquivos
            # editados, que o guard valida vs allowed_paths/denylist.
            claude -p "/implement-req $id (run_id=$env:RUN_ID). APENAS edite arquivos no escopo do requisito e rode testes; NAO use git — a esteira cria o branch, commita, valida (guard) e abre o PR." `
              --append-system-prompt $wo `
              --permission-mode acceptEdits `
              --allowedTools "Edit" "Write" "Read" "Grep" "Glob" `
                "Bash(npm ci:*)" "Bash(npm install:*)" "Bash(npm test:*)" "Bash(npm run lint:*)" "Bash(npm run test:*)" "Bash(npm run build:*)" "Bash(npm run typecheck:*)" `
                "Bash(pnpm install:*)" "Bash(pnpm test:*)" "Bash(pnpm run lint:*)" "Bash(pnpm run test:*)" "Bash(pnpm run build:*)" "Bash(pnpm run typecheck:*)" `
                "Bash(node --test:*)" `
              --output-format json
            if ($LASTEXITCODE -ne 0) { Write-Host "::warning::Claude retornou exit $LASTEXITCODE para $id." }

            # captura as mudancas do working tree (a Claude editou sobre a main)
            git add -A 2>$null
            $changed = @(git diff --cached --name-only)
            if (-not $changed -or $changed.Count -eq 0) {
              Write-Host "::warning::$id : a Claude nao produziu mudancas — pulando."
              git reset --hard 2>$null; continue
            }
            $changed | Set-Content -Encoding utf8 changed.txt

            # REGENERA a ordem canonica (baseline) ANTES do guard (anti-adulteracao do work-order)
            node specs/tools/make-work-order.mjs $id --out work-order.json
            # ===== BARREIRA TECNICA: arquivos alterados vs allowed_paths/denylist =====
            node specs/tools/guard-worktree.mjs --work-order work-order.json --changed-file changed.txt
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::$id : guard-worktree REPROVOU (fora do blast-radius) — PR NAO sera aberto."
              git reset --hard 2>$null; continue
            }
            # aprovado -> a esteira cria o branch e commita (mudancas ja estao staged)
            git checkout -B "$branch" 2>$null
            git commit -m "feat: implementa $id" 2>$null | Out-Null
            $approved += [pscustomobject]@{ id = $id; branch = $branch; restricted = $restricted; title = $title }
            git checkout main 2>$null; git reset --hard 2>$null
          }
          $approved | ConvertTo-Json -Depth 4 -AsArray | Set-Content -Encoding utf8 approved.json
          Write-Host "Aprovados pelo guard: $($approved.Count)"

      # PASSO 2 — publicacao (push + PR), unico ponto com GH_TOKEN. Roda DEPOIS do guard,
      # so para os branches aprovados (approved.json). Se o passo 1 pulou (sem token Claude),
      # approved.json nao existe e este passo sai 0. Aqui a esteira (NAO a Claude) injeta o
      # token, atualiza implementation-status (pr_open) e abre o PR rastreavel.
      - name: Publicar PRs validados (push + PR)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path approved.json)) { Write-Host "Nada aprovado p/ publicar."; exit 0 }
          $approved = @(Get-Content approved.json -Raw | ConvertFrom-Json)
          if ($approved.Count -eq 0) { Write-Host "Nada aprovado p/ publicar."; exit 0 }
          gh auth setup-git    # configura o helper de credencial do git p/ usar GH_TOKEN (so deste passo)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # garante que os labels da esteira existem (gh pr create ABORTA se um label falta).
          gh label create requirement      --color 0e8a16 --description "Requisito (esteira)" 2>$null
          gh label create claude-generated --color 1d76db --description "Gerado pela Claude (esteira)" 2>$null
          gh label create gpt-approved     --color 5319e7 --description "Validado no ChatGPT (auto-merge)" 2>$null
          foreach ($a in $approved) {
            # valida o branch name (defesa contra approved.json adulterado) antes de qualquer uso
            if ($a.branch -notmatch '^req/[A-Z0-9-]+/r[0-9]+$' -or $a.id -notmatch '^REQ-[A-Z0-9-]+$') {
              Write-Host "::warning::branch/id invalido em approved.json ('$($a.branch)'/'$($a.id)') — pulando."; continue
            }
            git checkout $a.branch 2>$null
            # RESET do implementation-status p/ a versao de main ANTES do --set: descarta
            # qualquer adulteracao que a Claude possa ter feito no arquivo (status de OUTROS
            # requisitos); so a esteira escreve o pr_open do requisito corrente, via impl-status.
            git checkout main -- specs/baseline/implementation-status.json 2>$null
            node specs/tools/impl-status.mjs --set $a.id status=pr_open branch=$a.branch run_id=$env:RUN_ID | Out-Null
            git add specs/baseline/implementation-status.json
            git commit -m "chore(specs): status $($a.id) pr_open" 2>$null
            git push -u origin $a.branch --force-with-lease
            $draftArgs = @(); if ($a.restricted -eq 'True') { $draftArgs += '--draft' }
            gh pr create --base main --head $a.branch --title $a.title `
              --label requirement --label claude-generated @draftArgs `
              --body "Closes-Req: $($a.id)`n`nGerado pela esteira (run_id=$env:RUN_ID). Merge somente apos validacao no ChatGPT (label gpt-approved por aprovador confiavel) + CI verde + guard. Escopo restrito -> revisao humana."
            git checkout main 2>$null
          }
