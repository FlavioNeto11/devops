# =============================================================================
# greenfield-launch — a UI da Forja "cria no git" sem o reqhub-api escrever git.
# Disparado por repository_dispatch (event_type: forge-launch) com client_payload contendo o
# produto + os requisitos REVISADOS na UI + a arquitetura. O runner (que tem git, gh, node) escreve
# os YAMLs VERBATIM (forge-write-reqs.mjs — sem re-chamar a IA), regenera a baseline e abre o PR de
# requisitos. mode='pr' para aí (humano revisa/mergeia = GATE G2). mode='release' tenta auto-merge
# (best-effort) e dispara a fase de plano da esteira; os PRs de IMPLEMENTAÇÃO continuam passando pela
# validação (gpt-approved, anti-spoofing) — deploy 100% sem humano NÃO é feito aqui (por segurança).
# =============================================================================
name: greenfield-launch

on:
  repository_dispatch:
    types: [forge-launch]

permissions:
  contents: write
  pull-requests: write
  actions: write   # mode=release dispara greenfield-plan

jobs:
  launch:
    name: Criar requisitos no git (UI da Forja)
    runs-on: [self-hosted, windows, docker-desktop, local-k8s, flavio-devops]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false   # escrita dos arquivos sem credencial git

      # PASSO 1 — escreve os requisitos revisados (verbatim) + regenera a baseline. Sem GH_TOKEN.
      - name: Escrever requisitos + regenerar baseline
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          $ErrorActionPreference = "Stop"
          $env:PAYLOAD | Set-Content -Encoding utf8 launch-payload.json
          $p = Get-Content launch-payload.json -Raw | ConvertFrom-Json
          $prod = "$($p.product)"
          if ($prod -notmatch '^[a-z][a-z0-9-]{1,30}$') { Write-Host "::error::product inválido: '$prod'"; exit 1 }
          # denylist espelhada em forge-delete.yml e apps/reqhub/api/src/forge-launch.js (defesa em camadas):
          # launch escreveria specs + apps/<p> + Application do Argo por cima de app vivo sob selfHeal.
          $protected = @('sicat','gymops','rmambiental','anarabottini','reqhub','console','devops-console','portal','portal-recorder','keycloak','langfuse','ai-control-plane','devops-platform')
          if ($protected -contains $prod) { Write-Host "::error::'$prod' é protegido (app vivo/plataforma) — launch recusado."; exit 1 }
          $mode = if ("$($p.mode)" -eq 'release') { 'release' } else { 'pr' }
          "PRODUCT=$prod"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "MODE=$mode"     | Out-File -FilePath $env:GITHUB_ENV -Append
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          Set-Content -Encoding ascii .git/info/exclude "launch-payload.json"
          Push-Location specs/tools; npm ci --no-audit --no-fund | Out-Null; Pop-Location
          node specs/tools/forge-write-reqs.mjs --payload launch-payload.json
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::forge-write-reqs falhou"; exit 1 }
          # regenera baseline (build-baseline + history + impl-status + coverage + products) p/ specs-governance passar
          & ./scripts/specs-baseline-check.ps1 -Fix
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::regeneração da baseline (-Fix) falhou"; exit 1 }

      # PASSO 2 — publica o PR de requisitos (único ponto com GH_TOKEN).
      - name: Abrir PR de requisitos
        id: pr
        env:
          GH_TOKEN: ${{ secrets.FORGE_GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $prod = $env:PRODUCT
          $branch = "forge/$prod/requisitos"
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh label create requirement --color 1d76db --description "Requisito (FORGE/autoria)" 2>$null
          gh label create forge       --color 0e8a16 --description "FORGE (geração greenfield)" 2>$null
          git checkout -B $branch 2>$null
          git add specs/requirements specs/products specs/baseline apps/reqhub/frontend/data/products 2>$null
          # commit só se houver algo novo (re-disparo com mesmo conteúdo não falha)
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "feat($prod): requisitos criados pela Forja (launch, run_id=$env:GITHUB_RUN_ID)" | Out-Null
          } else { Write-Host "nada novo a commitar (re-disparo idempotente)" }
          git push -u origin $branch --force-with-lease
          # PR IDEMPOTENTE: reusa o PR aberto se já existir; senão cria. (Evita o exit 1 de 'já existe'.)
          $url = (gh pr list -R $env:GITHUB_REPOSITORY --head $branch --state open --json url --jq '.[0].url' 2>$null)
          if (-not $url) {
            $url = gh pr create --base main --head $branch --label requirement --label forge `
              --title "feat($prod): requisitos da Forja" `
              --body "Requisitos criados pela UI da Forja (run_id=$env:GITHUB_RUN_ID), mode=$env:MODE.`n`n**GATE G2:** revise e mergeie para destravar a construção — a esteira implementa cada requisito em PR validado."
          } else { Write-Host "PR já existe, reusando: $url" }
          "pr_url=$url" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "PR de requisitos: $url"

      # PASSO 3 — (release) auto-merge dos requisitos + CADEIA AUTÔNOMA (gated por FORGE_AUTONOMOUS).
      #   FORGE_AUTONOMOUS!=true  -> só dispara greenfield-plan (G2 humano) — comportamento com gates.
      #   FORGE_AUTONOMOUS==true  -> plano + scaffold + Application do Argo + orchestrate, tudo inline:
      #     os PRs de implementação auto-mesclam pelo job forge-autonomous-merge (CI verde + guard),
      #     o ci-apps builda as imagens :local e o Argo publica. "Liberar tudo" vira concept->app no ar.
      - name: (release) auto-merge + cadeia autônoma
        if: env.MODE == 'release'
        env:
          GH_TOKEN: ${{ secrets.FORGE_GH_PAT || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          AUTONOMOUS: ${{ vars.FORGE_AUTONOMOUS }}
          KUBECONFIG: C:\ProgramData\forge-kube\config   # runner-serviço usa este kubeconfig p/ a sync do ConfigMap
        run: |
          $ErrorActionPreference = "Stop"
          $prod = $env:PRODUCT
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          Write-Host "release: auto-merge do PR de requisitos ($env:PR_URL)…"
          gh pr merge $env:PR_URL --squash --delete-branch --admin
          if ($LASTEXITCODE -ne 0) { Write-Host "::warning::auto-merge do PR de requisitos bloqueado (proteção de branch?) — merge manual; release degradou."; exit 0 }

          if ("$env:AUTONOMOUS" -ne "true") {
            Write-Host "release: FORGE_AUTONOMOUS off — disparando greenfield-plan (G2 humano)."
            gh workflow run greenfield-plan.yml -f product=$prod
            Write-Host "::notice::release iniciado (modo com gates). Defina a variável de repo FORGE_AUTONOMOUS=true para a cadeia 100% autônoma."
            exit 0
          }

          Write-Host "== FORGE AUTÔNOMO: plano + scaffold + Argo + orchestrate (produto '$prod') =="
          git fetch origin main --quiet
          git checkout main 2>$null; git reset --hard origin/main
          $ws = $env:GITHUB_WORKSPACE
          Push-Location specs/tools; npm ci --no-audit --no-fund | Out-Null; Pop-Location

          # 1) plano DETERMINÍSTICO (sem Claude, p/ confiabilidade) + índices.
          node specs/tools/build-plan.mjs $prod
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::build-plan falhou"; exit 1 }
          node specs/tools/build-products.mjs

          # 2) SCAFFOLD determinístico (gera apps/$prod + k8s + Dockerfiles + testes). Paths do checkout do CI.
          & ./scripts/scaffold-product.ps1 -Name $prod -SpecsDir "$ws\specs" -OutDir "$ws\apps" -ArgoAppsDir "$ws\platform\argocd\apps"
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::scaffold falhou"; exit 1 }

          # 3) APPLICATION DO ARGO (o gerador FORGE-2.0 não emite — preenche o gap; aponta apps/$prod/k8s).
          #    Array de linhas (evita here-string, que não fecha dentro de bloco YAML indentado).
          $argo = @(
            'apiVersion: argoproj.io/v1alpha1',
            'kind: Application',
            'metadata:',
            "  name: $prod",
            '  namespace: argocd',
            '  labels:',
            '    devops.flavioneto/app-type: product_software',
            '  finalizers:',
            '    - resources-finalizer.argocd.argoproj.io',
            'spec:',
            '  project: default',
            '  source:',
            '    repoURL: https://github.com/FlavioNeto11/devops',
            "    path: apps/$prod/k8s",
            '    targetRevision: main',
            '  destination:',
            '    server: https://kubernetes.default.svc',
            '    namespace: apps',
            '  syncPolicy:',
            '    automated: { prune: true, selfHeal: true }',
            '    syncOptions: [ CreateNamespace=true ]'
          ) -join "`n"
          New-Item -ItemType Directory -Force platform/argocd/apps | Out-Null
          $argo | Set-Content -Encoding utf8 "platform/argocd/apps/$prod.yaml"

          # 3b) marca o requisito de SCAFFOLD como merged (a fase C "manual" fazia isso) — destrava o
          #     orchestrate, que gateia em plan.scaffold_req estar done antes de disparar os demais.
          $plan = Get-Content "specs/products/$prod/build-plan.json" -Raw | ConvertFrom-Json
          if ($plan.scaffold_req) {
            Write-Host "marcando scaffold_req $($plan.scaffold_req) = merged"
            node specs/tools/impl-status.mjs --set $plan.scaffold_req status=merged
            if ($LASTEXITCODE -ne 0) { Write-Host "::warning::impl-status do scaffold_req falhou (segue)" }
          }

          # 4) BOOTSTRAP: branch + PR + auto-merge admin (respeita branch protection via --admin).
          $bb = "forge/bootstrap/$prod"
          git checkout -B $bb 2>$null
          git add -A
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "bootstrap($prod): plano + scaffold + Argo (FORGE autônomo, run_id=$env:GITHUB_RUN_ID)" | Out-Null
            git push -u origin $bb --force-with-lease
            $burl = (gh pr list -R $env:GITHUB_REPOSITORY --head $bb --state open --json url --jq '.[0].url' 2>$null)
            if (-not $burl) { $burl = gh pr create --base main --head $bb --label forge --title "bootstrap($prod): scaffold (FORGE autônomo)" --body "Scaffold + plano + Application do Argo gerados automaticamente (FORGE autônomo, run_id=$env:GITHUB_RUN_ID)." }
            gh pr merge $burl --squash --delete-branch --admin
            if ($LASTEXITCODE -ne 0) { Write-Host "::error::auto-merge do bootstrap bloqueado"; exit 1 }
          } else { Write-Host "bootstrap: nada novo (scaffold já na main?)" }

          # 5) DEPLOY do esqueleto: builda as imagens :local + secret + publica (forge-deploy, self-hosted).
          Write-Host "release: disparando forge-deploy ($prod) — build :local + secret + publica o esqueleto…"
          gh workflow run forge-deploy.yml -f product=$prod

          # 6) ORCHESTRATE: dispara req-implement por requisito (impl PRs auto-mesclam via FORGE_AUTONOMOUS;
          #    cada merge redispara forge-deploy p/ as features subirem).
          Write-Host "release: disparando greenfield-orchestrate ($prod)… (serial, max 1 — reconcile encadeia o próximo)"
          gh workflow run greenfield-orchestrate.yml -f product=$prod -f max=1

          # 7) ressincroniza o estado VIVO da Forja (ConfigMap) — o novo produto aparece na tela Forge.
          & ./scripts/sync-reqhub-forge-state.ps1
          Write-Host "::notice::FORGE autônomo: scaffold+Argo na main, esqueleto publicado, orchestrate disparado e Forge atualizada — o app fica em /$prod."
