# =============================================================================
# secret-scan — gitleaks sobre o historico completo
# -----------------------------------------------------------------------------
# Bloqueia segredos REAIS novos. Usa .gitleaks.toml (allowlist de falsos
# positivos: SealedSecrets cifrados, JDBC sem senha, fixtures/exemplos/docs
# legado). Triagem 2026-06: 54 matches brutos -> 0 com a config (nenhum segredo
# vivo). Roda via docker (sem licenca; mesma imagem usada na triagem local).
# Runner: ubuntu-latest.
# =============================================================================
name: secret-scan

# Forca as JS actions (docker/*, pnpm/*, etc.) a rodarem em Node 24, eliminando
# os avisos de deprecacao do Node 20 antes da troca forcada (~jun/2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (historico)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historico completo)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Varredura gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --redact \
            --no-banner
