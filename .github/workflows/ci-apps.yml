# =============================================================================
# ci-apps — gate estatico por app (lint / typecheck / build)
# -----------------------------------------------------------------------------
# Roda em PR e push para main quando muda apps/**. Matrix por app, com o
# gerenciador de pacote correto (sicat=npm workspaces, gymops=pnpm, rmambiental=npm).
#
# Escopo: verificacoes ESTATICAS que NAO precisam de infra. Testes de integracao
# (gymops/sicat) exigem Postgres/Redis e rodam no pipeline proprio de cada app /
# localmente — ficam fora deste gate. Cada app declara seus 'checks' explicitos
# (e um 'prep' opcional de codegen, ex.: prisma generate). run_if pula um check
# se o script nao existir no package.json.
#
# Runner: ubuntu-latest (igual aos demais workflows de build/lint do repo).
# =============================================================================
name: ci-apps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**"
      - ".github/workflows/ci-apps.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/ci-apps.yml"

permissions:
  contents: read

jobs:
  apps:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: sicat
            pm: npm
            prep: ""
            checks: "lint build:frontend"
          - app: gymops
            pm: pnpm
            prep: 'pnpm --filter @gymops/db run generate && pnpm --filter "./packages/*" run build'
            checks: "lint typecheck"
          - app: rmambiental
            pm: npm
            prep: ""
            checks: "build"
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: |
          set -e
          if [ "${{ matrix.pm }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile || pnpm install
          else
            npm ci || npm install
          fi

      - name: Preparar (codegen, se houver)
        if: matrix.prep != ''
        run: ${{ matrix.prep }}

      - name: Verificacoes estaticas
        run: |
          PM="${{ matrix.pm }}"
          run_if () {
            if node -e "const s=require('./package.json').scripts||{};process.exit(s['$1']?0:1)"; then
              echo "::group::$PM run $1"
              $PM run "$1"
              echo "::endgroup::"
            else
              echo "skip: sem script '$1'"
            fi
          }
          for c in ${{ matrix.checks }}; do run_if "$c"; done
