# =============================================================================
# ci-apps — gate estatico por app (lint / typecheck / build)
# -----------------------------------------------------------------------------
# Roda em PR e push para main quando muda apps/**. Matrix por app, com o
# gerenciador de pacote correto (sicat=npm workspaces, gymops=pnpm, rmambiental=npm).
#
# Escopo: verificacoes ESTATICAS que NAO precisam de infra. Testes de integracao
# (gymops/sicat) exigem Postgres/Redis e rodam no pipeline proprio de cada app /
# localmente — ficam fora deste gate. Cada app declara seus 'checks' explicitos
# (e um 'prep' opcional de codegen, ex.: prisma generate). run_if pula um check
# se o script nao existir no package.json.
#
# Runner: ubuntu-latest (igual aos demais workflows de build/lint do repo).
# =============================================================================
name: ci-apps

# Forca as JS actions (docker/*, pnpm/*, etc.) a rodarem em Node 24, eliminando
# os avisos de deprecacao do Node 20 antes da troca forcada (~jun/2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**"
      - ".github/workflows/ci-apps.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/ci-apps.yml"

permissions:
  contents: read

jobs:
  apps:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `path` = subpasta de apps/ onde está o package.json (default = app). Apps
        # multi-serviço (portal-recorder, ai-control-plane) têm o pkg em api/frontend.
        include:
          - app: sicat
            path: sicat
            pm: npm
            prep: ""
            checks: "lint build:frontend"
          - app: gymops
            path: gymops
            pm: pnpm
            prep: 'pnpm --filter @gymops/db run generate && pnpm --filter "./packages/*" run build'
            checks: "lint typecheck"
          - app: rmambiental
            path: rmambiental
            pm: npm
            prep: ""
            checks: "build"
          - app: anarabottini
            path: anarabottini
            pm: npm
            prep: ""
            checks: "typecheck build"
          - app: portal-recorder-api
            path: portal-recorder/api
            pm: npm
            prep: ""
            checks: "test"
          - app: portal-recorder-frontend
            path: portal-recorder/frontend
            pm: npm
            prep: ""
            checks: "build"
          - app: ai-control-plane-api
            path: ai-control-plane/api
            pm: npm
            prep: ""
            checks: "test"
    defaults:
      run:
        working-directory: apps/${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: |
          set -e
          if [ "${{ matrix.pm }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile || pnpm install
          else
            npm ci || npm install
          fi

      - name: Preparar (codegen, se houver)
        if: matrix.prep != ''
        run: ${{ matrix.prep }}

      - name: Verificacoes estaticas
        run: |
          PM="${{ matrix.pm }}"
          run_if () {
            if node -e "const s=require('./package.json').scripts||{};process.exit(s['$1']?0:1)"; then
              echo "::group::$PM run $1"
              $PM run "$1"
              echo "::endgroup::"
            else
              echo "skip: sem script '$1'"
            fi
          }
          for c in ${{ matrix.checks }}; do run_if "$c"; done
