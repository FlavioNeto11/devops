# =============================================================================
# forge-tests — gate dos TESTES LOCKED dos apps gerados pela Forja.
# Em todo PR que toca apps/**, para cada app com tests/.test-locks.json:
#   (1) verify-test-locks.mjs — integridade (existe + sha256 + minCount + anti-sneak); BLOQUEIA adulteração.
#   (2) node --test dos testes locked — arch/unit rodam aqui; integration é LIVE-gated (skip sem BASE_URL)
#       e roda contra o ambiente vivo no deploy/validação (não exige compose no CI).
# Junto com a DENYLIST do guard (que impede o headless de editar locked/), fecha a garantia:
# a IA implementa CÓDIGO que PASSA nos testes locked e não pode enfraquecê-los.
# =============================================================================
name: forge-tests

on:
  pull_request:
    paths:
      - "apps/**"
      - "specs/tools/verify-test-locks.mjs"

permissions:
  contents: read

jobs:
  locked-tests:
    name: Testes LOCKED (integridade + execução)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Verificar integridade + rodar os testes locked
        shell: bash
        run: |
          set -euo pipefail
          found=0
          for app in apps/*/; do
            name="$(basename "$app")"
            if [ -f "${app}tests/.test-locks.json" ]; then
              found=1
              echo "::group::$name — verify-test-locks"
              node specs/tools/verify-test-locks.mjs --app "apps/$name"
              echo "::endgroup::"
              echo "::group::$name — node --test (locked; integration skip sem BASE_URL)"
              node --test "apps/$name/tests/locked/**/*.test.mjs"
              echo "::endgroup::"
            fi
          done
          if [ "$found" = "0" ]; then echo "Nenhum app com suíte locked — nada a verificar."; fi
