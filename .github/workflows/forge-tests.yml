# =============================================================================
# forge-tests — gate REAL dos apps gerados pela Forja. Roda só para os apps cujo CÓDIGO
# (api/frontend/tests) mudou no PR — gateia O TRABALHO do PR (ex.: cada PR de requisito da
# esteira), não retroativamente todos os apps. Para cada app alvo com tests/.test-locks.json:
#   (1) verify-test-locks.mjs — integridade (existe + sha256 + minCount + anti-sneak).
#   (2) FRONTEND build — `npm ci && npm run build` (vite): pega import/sintaxe quebrada (bug de JS).
#   (3) BACKEND LIVE — sobe Postgres (pgvector) + Redis, sobe o app (AUTO_MIGRATE/SEED), espera /health
#       e roda os testes LOCKED com BASE_URL setado e SERIAL (--test-concurrency=1, pois compartilham
#       uma instância) => os testes de integração/aceite RODAM DE VERDADE (antes skipavam sem BASE_URL
#       e o gate "passava" sem testar nada).
#       Anti-corrida entre apps (bug real do PR #244): o wait de /health também confirma a IDENTIDADE
#       de quem responde (GET / dos scaffolds da Forja retorna {"app":"<name>"} — rota raiz é CONTRATO
#       deste gate) e, ao final de cada app, o kill ESPERA o processo morrer e a porta 8080 liberar.
#       Sem isso, o app seguinte caía em EADDRINUSE (só no log), o /health respondia 200 pelo processo
#       ANTIGO e os testes LOCKED rodavam contra a API errada (404 em rota que existe).
#   (3a) CONTRATO (F3-prep Forja 4.1) — app contract-first (script validate:openapi no api/package.json)
#        roda `npm run validate:openapi`: rota implementada fora do openapi (ou vice-versa) FALHA o PR.
#        Antes NENHUM workflow raiz rodava esse gate (drift passava verde, ex.: PR #136).
#   (3b) IDENTIDADE DE TESTE (F3-prep) — se existir apps/<app>/tests/test-identity.json (NÃO-locked),
#        o gate injeta seus headers via FORGE_TEST_HEADERS nos testes locked (o _lib.mjs gerado os usa
#        como default por chamada). Assim o RBAC pode evoluir por refinamento (ex.: POST /v1/records
#        passar a exigir X-Role) SEM editar os testes locked: muda-se a identidade no gate.
# =============================================================================
name: forge-tests

on:
  pull_request:
    paths:
      - "apps/**"
      - "specs/tools/verify-test-locks.mjs"
      - ".github/workflows/forge-tests.yml"

permissions:
  contents: read

jobs:
  locked-tests:
    name: Testes LOCKED (integridade + build + LIVE)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16   # superset do postgres:16 — cobre apps com bloco rag-pgvector (CREATE EXTENSION vector)
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U forge" --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # precisa do histórico p/ diff dos apps mudados no PR
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Integridade + build frontend + testes LOCKED LIVE (apps mudados)
        shell: bash
        env:
          DATABASE_URL: postgresql://forge:forge@localhost:5432/forge
          REDIS_URL: redis://localhost:6379
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          # apps cujo CÓDIGO (api/frontend/tests) mudou neste PR — gateia o trabalho do PR.
          CHANGED="$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null | grep -oE '^apps/[^/]+/(api|frontend|tests)/' | cut -d/ -f2 | sort -u || true)"
          if [ -z "$CHANGED" ]; then echo "Nenhum app com mudança de código (api/frontend/tests) neste PR — nada a gatear."; exit 0; fi
          echo "Apps alvo: $CHANGED"
          fail=0
          npmget() { if [ -f package-lock.json ]; then npm ci --no-audit --no-fund || npm install --no-audit --no-fund; else npm install --no-audit --no-fund; fi; }
          for name in $CHANGED; do
            [ -f "apps/$name/tests/.test-locks.json" ] || { echo "$name: sem suíte locked — pulando."; continue; }
            echo "::group::$name — verify-test-locks"
            node specs/tools/verify-test-locks.mjs --app "apps/$name" || { echo "::error::$name: verify-test-locks falhou"; fail=1; }
            echo "::endgroup::"

            # (2) FRONTEND build — pega bug de JS (import/sintaxe) antes do merge
            if [ -f "apps/$name/frontend/package.json" ]; then
              echo "::group::$name — frontend build (vite)"
              ( cd "apps/$name/frontend" && npmget && npm run build ) || { echo "::error::$name: build do frontend FALHOU (bug de JS?)"; fail=1; }
              echo "::endgroup::"
            fi

            # (3) BACKEND LIVE — sobe o app e roda os testes LOCKED de verdade (serial)
            if [ -f "apps/$name/api/src/server.js" ]; then
              echo "::group::$name — backend LIVE (sobe app + testes LOCKED, serial)"
              ( cd "apps/$name/api" && npmget ) || { echo "::error::$name: install do api falhou"; fail=1; echo "::endgroup::"; continue; }

              # (3a) CONTRATO contract-first: se o api declara validate:openapi, drift de contrato FALHA o PR
              if node -e "const s=(require('./apps/'+process.argv[1]+'/api/package.json').scripts||{});process.exit(s['validate:openapi']?0:1)" "$name" 2>/dev/null; then
                echo "--- $name: validate:openapi (gate contract-first) ---"
                ( cd "apps/$name/api" && npm run validate:openapi ) || { echo "::error::$name: DRIFT DE CONTRATO — validate:openapi reprovou (rota implementada fora do openapi.yaml ou rota documentada sem implementação)"; fail=1; }
              fi

              # (3b) identidade de teste (NÃO-locked): headers-default p/ os testes locked LIVE
              IDENT="{}"
              if [ -f "apps/$name/tests/test-identity.json" ]; then
                if IDENT="$(node -e "const j=require('./apps/'+process.argv[1]+'/tests/test-identity.json');process.stdout.write(JSON.stringify(j.headers||{}))" "$name")"; then
                  echo "$name: identidade de teste injetada (FORGE_TEST_HEADERS): $IDENT"
                else
                  echo "::error::$name: tests/test-identity.json inválido (esperado {\"headers\":{...}})"; fail=1; IDENT="{}"
                fi
              fi

              PGPASSWORD=forge psql -h localhost -U forge -d forge -v ON_ERROR_STOP=0 -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;" >/dev/null 2>&1 || true
              # envs de auth (bloco contas-acesso): seed cria o admin de bootstrap CONHECIDO p/ os
              # testes locked logarem (admin@local / forge-test-admin); JWT fixo de teste. Apps sem o
              # bloco ignoram (não há auth.js); não rotaciona nada de produção (é o runner do PR).
              # exec => $! é o PID do PRÓPRIO node. Antes ($! do subshell com `... & echo $!` interno)
              # o kill matava só o subshell e o node ficava ÓRFÃO segurando 8080/9464 — foi exatamente
              # o que a checagem de identidade flagrou no run 29217069316 (contaviva-360 imortal).
              ( cd "apps/$name/api" && exec env AUTO_MIGRATE=true AUTO_SEED=true PORT=8080 METRICS_PORT=9464 \
                  JWT_SECRET=forge-test-secret BOOTSTRAP_ADMIN_EMAIL=admin@local BOOTSTRAP_ADMIN_PASSWORD=forge-test-admin \
                  DATABASE_URL="$DATABASE_URL" REDIS_URL="$REDIS_URL" node src/server.js >/tmp/$name-app.log 2>&1 ) & echo $! > /tmp/$name-app.pid
              # espera /health responder E confirma que quem responde é ESTE app: GET / dos scaffolds
              # retorna {"app":"<name>"}. Sem a identidade, um processo anterior ainda vivo na 8080
              # responde 200 e os testes LOCKED rodam contra a API ERRADA (corrida real do PR #244).
              ok=0
              for i in $(seq 1 40); do
                if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
                  if curl -sf http://localhost:8080/ | grep -q "\"app\":\"$name\""; then ok=1; break; fi
                  echo "$name: 8080 respondeu /health, mas GET / não identifica este app (processo anterior ainda na porta?) — aguardando"
                fi
                sleep 1
              done
              if [ "$ok" != "1" ]; then
                echo "::error::$name: app NÃO subiu na 8080 com a identidade dele (/health mudo, EADDRINUSE ou GET / sem {\"app\":\"$name\"}) — log:"; tail -n 40 /tmp/$name-app.log || true; fail=1
              else
                mapfile -t TFILES < <(find "apps/$name/tests/locked" -name '*.test.mjs' -type f)
                if [ "${#TFILES[@]}" -eq 0 ]; then echo "::error::$name: nenhum teste LOCKED"; fail=1; fi
                BASE_URL="http://localhost:8080" FORGE_TEST_HEADERS="$IDENT" node --test --test-concurrency=1 "${TFILES[@]}" || { echo "::error::$name: testes LOCKED LIVE FALHARAM"; fail=1; }
              fi
              # derruba o app e ESPERA morrer + porta liberar — kill sem wait deixava o processo antigo
              # segurando a 8080 e o próximo app caía em EADDRINUSE (corrida real do PR #244).
              APP_PID="$(cat /tmp/$name-app.pid 2>/dev/null || true)"
              if [ -n "$APP_PID" ]; then
                kill "$APP_PID" >/dev/null 2>&1 || true
                for i in $(seq 1 20); do kill -0 "$APP_PID" 2>/dev/null || break; sleep 0.5; done
                kill -9 "$APP_PID" >/dev/null 2>&1 || true
              fi
              # escape: se a 8080 AINDA responde, um node escapou do PID salvo — mata por nome (loop é serial).
              if curl -sf -o /dev/null http://localhost:8080/health 2>/dev/null; then
                echo "$name: 8080 ainda ocupada após o kill do PID — matando node src/server.js remanescente"
                pkill -9 -f 'node src/server.js' >/dev/null 2>&1 || true
              fi
              for i in $(seq 1 20); do curl -sf -o /dev/null http://localhost:8080/health 2>/dev/null || break; sleep 0.5; done
              echo "::endgroup::"
            fi
          done
          if [ "$fail" != "0" ]; then echo "::error::forge-tests REPROVOU — há build/teste quebrado."; exit 1; fi
          echo "forge-tests OK."
